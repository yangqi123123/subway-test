      text-align: right;

  <script>
    (function () {
      var rows = [
        { id: "L02", name: "2??", start: "????", end: "???", stationCount: "38", mileage: "60.8km", trainset: "6A", color: "#ffcc00", createdAt: "2026-05-01 09:20", status: "??" },
        { id: "L05", name: "5??", start: "??????", end: "??", stationCount: "25", mileage: "34.5km", trainset: "6A", color: "#a162f7", createdAt: "2026-05-01 09:26", status: "??" },
        { id: "L07", name: "7??", start: "????", end: "???????", stationCount: "27", mileage: "68km", trainset: "8A", color: "#f59e0b", createdAt: "2026-05-01 09:32", status: "??" },
        { id: "L11", name: "11??", start: "????", end: "????", stationCount: "31", mileage: "65.4km", trainset: "6A", color: "#ef4444", createdAt: "2026-05-01 09:40", status: "??" },
        { id: "L19", name: "19??", start: "??????", end: "????", stationCount: "7", mileage: "23.3km", trainset: "6A", color: "#22c55e", createdAt: "2026-05-01 09:46", status: "??" }
      ];

      var editIndex = -1;
      var tableBody = document.getElementById("line-table-body");
      var modalMask = document.getElementById("line-modal-mask");
      var modalTitle = document.getElementById("line-modal-title");

      function renderRows() {
        tableBody.innerHTML = rows.map(function (row, index) {
          var statusClass = row.status === "??" ? "line-status line-status--enabled" : "line-status line-status--disabled";
          var toggleText = row.status === "??" ? "??" : "??";
          return '<tr class="' + (index % 2 ? 'bg-slate-950/10' : 'bg-slate-950/22') + '">' +
            '<td class="px-4">' + row.id + '</td>' +
            '<td class="px-4">' + row.name + '</td>' +
            '<td class="px-4">' + row.start + '</td>' +
            '<td class="px-4">' + row.end + '</td>' +
            '<td class="px-4">' + row.stationCount + '</td>' +
            '<td class="px-4">' + row.mileage + '</td>' +
            '<td class="px-4">' + row.trainset + '</td>' +
            '<td class="px-4"><span class="line-color inline-block" style="background:' + row.color + '"></span></td>' +
            '<td class="px-4">' + row.createdAt + '</td>' +
            '<td class="px-4"><span class="' + statusClass + '">' + row.status + '</span></td>' +
            '<td class="px-4">' +
              '<span class="line-action text-amber-300" data-action="edit-line" data-index="' + index + '"><i class="fa-regular fa-pen-to-square"></i>??</span>' +
              '<span class="line-action text-rose-300" data-action="delete-line" data-index="' + index + '"><i class="fa-regular fa-trash-can"></i>??</span>' +
              '<span class="line-action text-cyan-300" data-action="toggle-line" data-index="' + index + '"><i class="fa-solid fa-power-off"></i>' + toggleText + '</span>' +
            '</td>' +
          '</tr>';
        }).join("");
      }

      function openModal(mode, index) {
        editIndex = mode === "edit" ? index : -1;
        modalTitle.textContent = mode === "edit" ? "????" : "????";
        var row = index > -1 ? rows[index] : null;
        document.getElementById("line-id").value = row ? row.id : "";
        document.getElementById("line-name").value = row ? row.name : "";
        document.getElementById("line-start").value = row ? row.start : "";
        document.getElementById("line-end").value = row ? row.end : "";
        document.getElementById("line-stations").value = row ? row.stationCount : "";
        document.getElementById("line-mileage").value = row ? row.mileage : "";
        document.getElementById("line-trainset").value = row ? row.trainset : "";
        document.getElementById("line-color").value = row ? row.color : "#009fe8";
        modalMask.classList.add("show");
      }

      function closeModal() {
        modalMask.classList.remove("show");
      }

      function saveLine() {
        var row = {
          id: document.getElementById("line-id").value.trim() || "L00",
          name: document.getElementById("line-name").value.trim() || "?????",
          start: document.getElementById("line-start").value.trim() || "-",
          end: document.getElementById("line-end").value.trim() || "-",
          stationCount: document.getElementById("line-stations").value.trim() || "0",
          mileage: document.getElementById("line-mileage").value.trim() || "0km",
          trainset: document.getElementById("line-trainset").value.trim() || "-",
          color: document.getElementById("line-color").value || "#009fe8",
          createdAt: editIndex > -1 ? rows[editIndex].createdAt : "2026-05-12 19:10",
          status: editIndex > -1 ? rows[editIndex].status : "??"
        };
        if (editIndex > -1) rows[editIndex] = row;
        else rows.unshift(row);
        closeModal();
        renderRows();
      }

      renderRows();

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        var index = Number(trigger.getAttribute("data-index"));
        if (action === "new-line") openModal("new");
        if (action === "edit-line") openModal("edit", index);
        if (action === "delete-line") {
          rows.splice(index, 1);
          renderRows();
        }
        if (action === "toggle-line") {
          rows[index].status = rows[index].status === "??" ? "??" : "??";
          renderRows();
        }
        if (action === "close-line-modal") closeModal();
        if (action === "save-line") saveLine();
      });
    })();
  </script>
