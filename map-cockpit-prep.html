<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全景地图 · 虚拟座舱（起飞准备）</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/map-gis.css" />
    <link rel="stylesheet" href="assets/css/map-cockpit.css" />
    <style>
      body { overflow: hidden; }
    </style>
  </head>
  <body data-shell="fullscreen" data-top="cockpit">
    <div id="page-root" class="cockpit-screen h-[calc(100vh-64px)] px-5 py-4 flex flex-col gap-4">
      <nav class="cockpit-panel cockpit-crumb">
        <span class="cockpit-crumb__icon"><i class="fa-solid fa-location-crosshairs"></i></span>
        <span>全景地图</span>
        <span class="cockpit-crumb__sep">&gt;&gt;</span>
        <span class="cockpit-crumb__current">虚拟座舱</span>
      </nav>
      <div class="flex-1 min-h-0 grid grid-cols-[1fr_360px] gap-5">
        <section class="flex min-h-0 flex-col gap-3">
          <div class="cockpit-panel flex-1 min-h-0 flex flex-col">
            <div class="cockpit-map-wrap">
              <div class="cockpit-map-inner">
                <div id="prep-map" class="cockpit-leaflet h-full w-full"></div>
                <div class="cockpit-map-note">默认显示地图内所有机场及待复核区域，便于分配任务</div>
              </div>
            </div>
          </div>
          <div class="cockpit-actions">
            <button id="btn-unlock" type="button" class="cockpit-btn cockpit-btn--ghost"><i class="fa-solid fa-lock-open mr-1"></i>点击解锁人工操控</button>
            <button id="btn-direct" type="button" class="cockpit-btn">一键起飞</button>
            <button id="btn-stop" type="button" class="cockpit-btn cockpit-btn--warn">急停</button>
            <button id="btn-back" type="button" class="cockpit-btn">智能返航</button>
          </div>
        </section>

        <aside class="flex min-h-0 flex-col gap-4">
          <section class="cockpit-panel min-h-0 flex flex-col">
            <div class="cockpit-title">选择机场</div>
            <div id="airport-list" class="grid grid-cols-2 gap-px p-px" style="background: rgba(52, 211, 235, 0.12)"></div>
          </section>
          <section class="cockpit-panel min-h-0 flex-1 flex flex-col">
            <div class="cockpit-title">
              <span>机场镜头</span>
              <span class="cockpit-title__sub"><i class="fa-solid fa-expand mr-1"></i>放大</span>
            </div>
            <div class="cockpit-camera flex-1">
              <img id="camera-image" src="https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1200&q=80" alt="机场镜头" />
              <div id="camera-empty" class="cockpit-camera-empty hidden">请等待信号源</div>
            </div>
          </section>
        </aside>
      </div>
    </div>

    <div id="confirm-modal" class="cockpit-mask">
      <div class="cockpit-dialog px-6 pt-10 pb-8">
        <button id="close-confirm" type="button" class="cockpit-close">×</button>
        <div class="mt-2 text-center text-[15px] font-semibold leading-8 text-white">相关空域在有效期内，请确认是否立即起飞</div>
        <div class="mt-10 flex justify-center">
          <button id="btn-go-fly" type="button" class="cockpit-btn min-w-[130px]">立即起飞</button>
        </div>
      </div>
    </div>

    <div id="manual-drawer" class="cockpit-drawer">
      <div class="cockpit-drawer-card">
        <div class="cockpit-drawer-head">
          无人机操控台
          <button id="close-manual" type="button" class="cockpit-close">×</button>
        </div>
        <div class="cockpit-manual-layout">
          <div class="flex items-center justify-center gap-3">
            <div class="cockpit-pad">
              <span class="up">前进<br />W</span>
              <span class="down">后退<br />S</span>
              <span class="left">左<br />A</span>
              <span class="right">右<br />D</span>
              <span class="mid">↕</span>
            </div>
          </div>
          <div class="cockpit-manual-center">
            <button type="button" class="cockpit-manual-op" data-console="takeoff">一键起飞</button>
            <button type="button" class="cockpit-manual-op" data-console="camera-down">镜头向下</button>
            <button type="button" class="cockpit-manual-op" data-console="camera-up">镜头向上</button>
          </div>
          <div class="flex items-center justify-center gap-3">
            <div class="cockpit-pad">
              <span class="up">上升</span>
              <span class="down">下降</span>
              <span class="left">左转</span>
              <span class="right">右转</span>
              <span class="mid">机身方向</span>
            </div>
            <div class="cockpit-manual-axis">机身方向</div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="fixed right-5 bottom-5 z-[1400] hidden rounded bg-cyan-500 px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="assets/js/menu-config.js"></script>
    <script src="assets/js/shell.js"></script>
    <script src="assets/js/map-metro-data.js"></script>
    <script src="assets/js/map-patrol-overlay.js"></script>
    <script src="assets/js/map-gis.js"></script>
    <script>
      const airports = [
        { id: "a1", name: "黄家湖机场", status: "工作中", drone: "在线", battery: "100%", condition: "满足", latlng: [30.492, 114.315], camera: "https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1200&q=80" },
        { id: "a2", name: "XX机场", status: "工作中", drone: "在线", battery: "100%", condition: "满足", latlng: [30.612, 114.413], camera: "https://images.unsplash.com/photo-1489515217757-5fd1be406fef?auto=format&fit=crop&w=1200&q=80" },
        { id: "a3", name: "梨园机场", status: "工作中", drone: "在线", battery: "100%", condition: "满足", latlng: [30.562, 114.386], camera: "https://images.unsplash.com/photo-1496307653780-42ee777d4833?auto=format&fit=crop&w=1200&q=80" },
        { id: "a4", name: "XX机场", status: "离线", drone: "离线", battery: "未知", condition: "不满足", latlng: [30.548, 114.472], camera: "" }
      ];
      let selectedAirport = airports[0];

      const toast = (msg) => {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.remove("hidden");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => el.classList.add("hidden"), 1600);
      };

      function renderAirports() {
        const wrap = document.getElementById("airport-list");
        wrap.innerHTML = airports.map((item) => `
          <div class="cockpit-airport-card ${item.id === selectedAirport.id ? "active" : ""} p-3">
            <div class="flex items-center justify-between">
              <div class="cockpit-card-head">${item.name}</div>
              <div class="cockpit-card-head__status ${item.status === "离线" ? "is-offline" : ""}">${item.status}</div>
            </div>
            <div class="mt-3 space-y-2">
              <div class="flex justify-between"><span class="cockpit-label">无人机状态：</span><span class="cockpit-value">${item.drone}</span></div>
              <div class="flex justify-between"><span class="cockpit-label">无人机电量：</span><span class="cockpit-value">${item.battery}</span></div>
              <div class="flex justify-between"><span class="cockpit-label">是否满足起飞条件：</span><span class="cockpit-value ${item.condition === "不满足" ? "cockpit-value--not-ready" : "cockpit-value--ready"}">${item.condition}</span></div>
            </div>
            <div class="mt-3 flex justify-end">
              <button type="button" class="cockpit-btn !h-[30px] !px-4 !text-[12px]" data-select-airport="${item.id}">选择</button>
            </div>
          </div>
        `).join("");
      }

      function syncCamera() {
        const image = document.getElementById("camera-image");
        const empty = document.getElementById("camera-empty");
        if (selectedAirport.camera) {
          image.src = selectedAirport.camera;
          image.classList.remove("hidden");
          empty.classList.add("hidden");
        } else {
          image.classList.add("hidden");
          empty.classList.remove("hidden");
        }
      }

      function bindAirportActions() {
        document.querySelectorAll("[data-select-airport]").forEach((btn) => {
          btn.addEventListener("click", () => {
            selectedAirport = airports.find((item) => item.id === btn.dataset.selectAirport) || airports[0];
            renderAirports();
            bindAirportActions();
            syncCamera();
            document.getElementById("confirm-modal").classList.add("show");
          });
        });
      }

      document.getElementById("btn-unlock").addEventListener("click", () => {
        document.getElementById("manual-drawer").classList.add("show");
      });
      document.getElementById("close-manual").addEventListener("click", () => {
        document.getElementById("manual-drawer").classList.remove("show");
      });
      document.getElementById("close-confirm").addEventListener("click", () => {
        document.getElementById("confirm-modal").classList.remove("show");
      });
      document.getElementById("btn-direct").addEventListener("click", () => {
        document.getElementById("confirm-modal").classList.add("show");
      });
      document.getElementById("btn-go-fly").addEventListener("click", () => {
        location.href = "map-cockpit-fly.html?airport=" + encodeURIComponent(selectedAirport.id);
      });
      document.getElementById("btn-stop").addEventListener("click", () => toast("急停指令已发送"));
      document.getElementById("btn-back").addEventListener("click", () => toast("智能返航待起飞后可执行"));
      document.querySelectorAll("[data-console]").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (btn.dataset.console === "takeoff") {
            document.getElementById("manual-drawer").classList.remove("show");
            document.getElementById("confirm-modal").classList.add("show");
            return;
          }
          toast("已执行：" + btn.textContent);
        });
      });

      renderAirports();
      bindAirportActions();
      syncCamera();

      if (window.WuhanGIS && window.WuhanGIS.mountCockpitMap) {
        window.WuhanGIS.mountCockpitMap("prep-map", {
          center: [30.585, 114.365],
          zoom: 12,
          zoomControl: true,
          airportDetails: [
            { ll: [30.588, 114.302], airportName: "机场1", droneName: "001", battery: "100%", ready: true, readyText: "满足" },
            { ll: [30.602, 114.338], airportName: "机场2", droneName: "002", battery: "86%", ready: true, readyText: "满足" }
          ],
        });
      }
    </script>
  </body>
</html>
