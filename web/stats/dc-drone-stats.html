      });

    function drawTrendChart() {
      const canvas = document.getElementById("trend-chart");
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const left = 42, right = 18, top = 18, bottom = 34;
      const months = ["一月","二月","三月","四月","五月","六月"];
      const drone = [10,20,10,15,30,20];
      const airport = [20,25,50,45,30,30];
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = "rgba(148,163,184,.18)";
      ctx.fillStyle = "#94a3b8";
      ctx.font = "12px sans-serif";
      for (let i = 0; i <= 5; i++) {
        const y = top + ((h - top - bottom) / 5) * i;
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(w - right, y);
        ctx.stroke();
        ctx.fillText(String(50 - i * 10), 12, y + 4);
      }
      months.forEach((m, i) => {
        const x = left + ((w - left - right) / (months.length - 1)) * i;
        ctx.fillText(m, x - 12, h - 10);
      });
      function drawSeries(list, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        list.forEach((v, i) => {
          const x = left + ((w - left - right) / (months.length - 1)) * i;
          const y = top + ((50 - v) / 50) * (h - top - bottom);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        list.forEach((v, i) => {
          const x = left + ((w - left - right) / (months.length - 1)) * i;
          const y = top + ((50 - v) / 50) * (h - top - bottom);
          ctx.fillStyle = "#071426";
          ctx.beginPath();
          ctx.arc(x, y, 3.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.stroke();
        });
      }
      drawSeries(drone, "#1e90ff");
      drawSeries(airport, "#22d3ee");
    }

    function drawDurationChart() {
      const canvas = document.getElementById("duration-chart");
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const left = 54, right = 24, top = 16, bottom = 24;
      const labels = ["一月","二月","三月","四月","五月","六月"];
      const drone = [10,20,30,40,50,60];
      const airport = [20,25,50,45,30,100];
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = "rgba(148,163,184,.18)";
      ctx.fillStyle = "#94a3b8";
      ctx.font = "12px sans-serif";
      [0,20,40,60,80,100].forEach((v, i) => {
        const x = left + ((w - left - right) / 5) * i;
        ctx.beginPath();
        ctx.moveTo(x, top);
        ctx.lineTo(x, h - bottom);
        ctx.stroke();
        ctx.fillText(String(v), x - 8, h - 4);
      });
      labels.forEach((m, i) => {
        const y = top + ((h - top - bottom) / labels.length) * i + 16;
        ctx.fillText(m, 8, y + 4);
        const y1 = y - 8;
        const barH = 10;
        ctx.fillStyle = "#1e90ff";
        ctx.fillRect(left, y1, drone[i] * 2.9, barH);
        ctx.fillStyle = "#31c5e4";
        ctx.fillRect(left, y1 + 14, airport[i] * 2.9, barH);
      });
    }

    function drawViolationMonthChart(values) {
      var canvas = document.getElementById("violation-month-chart");
      if (!canvas) return;
      var ctx = canvas.getContext("2d");
      var w = canvas.width;
      var h = canvas.height;
      var left = 48;
      var right = 20;
      var top = 22;
      var bottom = 36;
      var months = ["一月", "二月", "三月", "四月", "五月", "六月"];
      var max = 100;
      var barColor = "#22d3ee";
      var barGlow = "rgba(34, 211, 238, 0.35)";

      ctx.clearRect(0, 0, w, h);
      ctx.font = "12px sans-serif";
      ctx.fillStyle = "#94a3b8";
      ctx.strokeStyle = "rgba(148,163,184,.2)";

      for (var i = 0; i <= 5; i++) {
        var tick = i * 20;
        var y = h - bottom - ((h - top - bottom) / 5) * i;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(w - right, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillText(String(tick), 14, y + 4);
      }

      var slot = (w - left - right) / months.length;
      var barW = Math.min(42, slot * 0.5);

      months.forEach(function (month, i) {
        var value = values[i] || 0;
        var x = left + slot * i + (slot - barW) / 2;
        var barH = (value / max) * (h - top - bottom);
        var y = h - bottom - barH;

        ctx.fillStyle = barGlow;
        ctx.fillRect(x - 2, y - 2, barW + 4, barH + 4);

        var grad = ctx.createLinearGradient(0, y, 0, h - bottom);
        grad.addColorStop(0, "#67e8f9");
        grad.addColorStop(1, "#0891b2");
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, barW, barH);

        if (barH > 16) {
          ctx.fillStyle = "#f0fdfa";
          ctx.font = "bold 11px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(String(value), x + barW / 2, y + 14);
        }

        ctx.fillStyle = "#94a3b8";
        ctx.font = "12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(month, x + barW / 2, h - 12);
      });
      ctx.textAlign = "left";
    }

    function drawViolationPieChart(segments) {
      var canvas = document.getElementById("violation-pie-chart");
      var legendEl = document.getElementById("violation-pie-legend");
      if (!canvas || !segments.length) return;

      var ctx = canvas.getContext("2d");
      var w = canvas.width;
      var h = canvas.height;
      var cx = w / 2;
      var cy = h / 2;
      var radius = 68;
      var inner = 36;
      var total = segments.reduce(function (sum, s) {
        return sum + s.value;
      }, 0);
      var start = -Math.PI / 2;

      ctx.clearRect(0, 0, w, h);

      ctx.beginPath();
      ctx.arc(cx, cy, radius + 8, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(34, 211, 238, 0.08)";
      ctx.fill();

      segments.forEach(function (seg) {
        var slice = (seg.value / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, start + slice);
        ctx.closePath();
        ctx.fillStyle = seg.color;
        ctx.fill();
        ctx.strokeStyle = "rgba(7, 20, 38, 0.88)";
        ctx.lineWidth = 2;
        ctx.stroke();
        start += slice;
      });

      ctx.beginPath();
      ctx.arc(cx, cy, inner, 0, Math.PI * 2);
      ctx.fillStyle = "#071426";
      ctx.fill();
      ctx.strokeStyle = "rgba(34, 211, 238, 0.28)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.fillStyle = "#e0f2fe";
      ctx.font = "bold 15px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(total), cx, cy - 7);
      ctx.fillStyle = "#94a3b8";
      ctx.font = "10px sans-serif";
      ctx.fillText("违规项", cx, cy + 11);
      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";

      if (legendEl) {
        legendEl.innerHTML = segments
          .map(function (seg) {
            return (
              '<span class="dc-legend-item" title="' +
              seg.name +
              '（' +
              seg.value +
              '个）"><span class="dc-dot" style="background:' +
              seg.color +
              '"></span><span class="dc-legend-label">' +
              seg.name +
              "</span> " +
              seg.value +
              "个</span>"
            );
          })
          .join("");
      }
    }

    function refreshOverviewByLine() {
      var lineKey = document.getElementById("overview-line-select").value;
      var data = getLineData(lineKey);
      drawViolationMonthChart(data.monthly);
      drawViolationPieChart(data.pie);
    }

    drawTrendChart();
    drawDurationChart();
    refreshOverviewByLine();

    document.getElementById("overview-line-select").addEventListener("change", refreshOverviewByLine);

    renderUsageRecords(usageRecords);
    document.getElementById("usage-filter-search").addEventListener("click", applyUsageFilter);
    document.getElementById("usage-filter-reset").addEventListener("click", function () {
      var airportSel = document.getElementById("filter-airport");
      if (airportSel) airportSel.value = "";
      renderUsageRecords(usageRecords);
    });
  </script>
</body>
