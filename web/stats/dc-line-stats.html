<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>线路项目统计</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/dc-chart-toolbar.css" />
  <style>
    .stats-tab { height: 38px; padding: 0 4px; font-size: 13px; color: #cbd5e1; border-bottom: 2px solid transparent; cursor: pointer; background: transparent; border-top: none; border-left: none; border-right: none; }
    .stats-tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
    .line-panel, .sys-chart-panel { border-radius: 14px; border: 1px solid rgba(34, 211, 238, .14); background: rgba(7, 20, 38, .9); padding: 18px 20px 22px; }
    .line-chart-title, .sys-chart-title { text-align: center; color: #f8fafc; font-size: 16px; font-weight: 700; }
    .line-chart-sub, .sys-chart-sub { text-align: center; color: #94a3b8; font-size: 12px; margin-top: 6px; }
    .line-canvas, .sys-canvas { width: 100%; height: 430px; display: block; }
    .stats-tab-panel.hidden { display: none; }
    .stats-tabs-row { display: flex; flex-wrap: wrap; gap: 6px 20px; border-bottom: 1px solid rgba(34, 211, 238, 0.1); margin-bottom: 16px; padding: 0 2px 10px; }
    .disease-layout { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
    .disease-layout__right { position: sticky; top: 72px; align-self: start; width: 300px; max-height: calc(100dvh - 88px); display: flex; flex-direction: column; gap: 10px; }
    .disease-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .disease-stat-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 10px; border: 1px solid rgba(34, 211, 238, 0.22); background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88)); }
    .disease-stat-card__icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel, .disease-quick-panel { display: flex; flex-direction: column; border-radius: 10px; border: 1px solid rgba(34, 211, 238, 0.2); background: rgba(8, 15, 35, 0.78); }
    .disease-panel-title { font-size: 12px; font-weight: 600; color: #e2f5ff; margin: 0; padding: 8px 10px 7px; border-bottom: 1px solid rgba(34, 211, 238, 0.12); background: rgba(8, 15, 35, 0.92); }
    .disease-panel-body { padding: 8px 10px 10px; }
    .disease-filter-panel .disease-panel-body { display: flex; flex-direction: column; gap: 6px; }
    .disease-filter-panel label { display: flex; flex-direction: column; gap: 3px; margin: 0; font-size: 10px; }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input { height: 26px !important; min-height: 26px; font-size: 11px; padding: 0 6px; }
    .disease-filter-actions { display: flex; gap: 6px; margin-top: 4px; padding-top: 6px; border-top: 1px solid rgba(34, 211, 238, 0.1); }
    .disease-filter-actions button { flex: 1; padding-top: 4px; padding-bottom: 4px; font-size: 11px; }
    .disease-quick-panel .disease-panel-body { padding: 6px 10px 8px; }
    .disease-quick-link { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 10px; margin-bottom: 5px; border-radius: 6px; border: 1px solid rgba(34, 211, 238, 0.14); background: rgba(15, 23, 42, 0.45); color: #e2f5ff; font-size: 11px; text-decoration: none; }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover { border-color: rgba(34, 211, 238, 0.4); background: rgba(34, 211, 238, 0.08); color: #fff; }
    .disease-quick-link.is-active { border-color: rgba(34, 211, 238, 0.55); background: rgba(34, 211, 238, 0.12); color: #a5f3fc; }
    .disease-quick-link i { width: 16px; text-align: center; color: #67e8f9; font-size: 12px; }
    @media (max-width: 1400px) { .disease-layout { grid-template-columns: 1fr; } .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } .disease-layout__right { position: static; width: 100%; max-height: none; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } }
    @media (max-width: 768px) { .disease-stats { grid-template-columns: 1fr; } .disease-layout__right { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-shell="default" data-top="st" data-sidebar-key="dc-line-stats">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">线路项目统计</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">线路项目统计面板</span>
    </div>

    <section id="line-stats-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="线路项目统计概览">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-share-nodes"></i></div>
              <div>
                <div id="stat-line" class="disease-stat-card__value">12</div>
                <div class="disease-stat-card__label">线路数量</div>
                <div class="disease-stat-card__trend">全网线路</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-location-crosshairs"></i></div>
              <div>
                <div id="stat-station" class="disease-stat-card__value">317</div>
                <div class="disease-stat-card__label">站点数量</div>
                <div class="disease-stat-card__trend">运营站点</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-bezier-curve"></i></div>
              <div>
                <div id="stat-section" class="disease-stat-card__value">618</div>
                <div class="disease-stat-card__label">区间数量</div>
                <div class="disease-stat-card__trend">保护区区间</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-regular fa-rectangle-list"></i></div>
              <div>
                <div id="stat-project" class="disease-stat-card__value">680</div>
                <div class="disease-stat-card__label">项目数量</div>
                <div class="disease-stat-card__trend">在管项目</div>
              </div>
            </div>
          </div>

          <nav class="stats-tabs-row" aria-label="统计图表标签">
            <button type="button" class="stats-tab active" data-tab="lineProject">线路项目统计</button>
            <button type="button" class="stats-tab" data-tab="projectType">项目类型</button>
            <button type="button" class="stats-tab" data-tab="safety">安全协议</button>
            <button type="button" class="stats-tab" data-tab="daily">当日巡查</button>
            <button type="button" class="stats-tab" data-tab="weekly">当周巡查</button>
            <button type="button" class="stats-tab" data-tab="risk">项目风险评估</button>
            <button type="button" class="stats-tab" data-tab="techReply">技术回函</button>
          </nav>

          <div class="disease-list-area">
    <section id="tab-panel-line" class="stats-tab-panel line-panel">
      <div class="dc-chart-toolbar-row">
        <div class="dc-chart-legend">
          <span class="dc-chart-legend-item"><span class="dc-chart-legend-dot" style="background:#2dd4bf"></span>一般项目</span>
          <span class="dc-chart-legend-item"><span class="dc-chart-legend-dot" style="background:#f97316"></span>重点项目</span>
        </div>
        <div class="dc-chart-tools-slot">
          <div id="line-chart-tools"></div>
        </div>
      </div>
      <div class="line-chart-title">线路项目统计图</div>
      <div class="line-chart-sub">一般项目456个，重点项目224个</div>
      <div class="dc-chart-stage">
        <canvas id="line-project-chart" class="line-canvas dc-chart-canvas" width="1680" height="430"></canvas>
        <div id="line-chart-table" class="dc-chart-table-wrap"></div>
      </div>
    </section>

    <section id="tab-panel-system" class="stats-tab-panel sys-chart-panel hidden">
      <div class="dc-chart-toolbar-row">
        <div id="system-chart-legend" class="dc-chart-legend"></div>
        <div class="dc-chart-tools-slot">
          <div id="system-chart-tools"></div>
        </div>
      </div>
      <div id="chart-title" class="sys-chart-title">项目类型图</div>
      <div id="chart-sub" class="sys-chart-sub">总计701个项目</div>
      <div class="dc-chart-stage">
        <canvas id="system-chart" class="sys-canvas dc-chart-canvas" width="1680" height="430"></canvas>
        <div id="system-chart-table" class="dc-chart-table-wrap"></div>
      </div>
    </section>
          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label>
                <span>所属线路</span>
                <select id="filter-line" class="wh-input w-full px-2">
                  <option value="">全部</option>
                  <option>1号线</option><option>2号线</option><option>3号线</option><option>4号线</option>
                  <option>5号线</option><option>6号线</option><option>7号线</option><option>8号线</option>
                  <option>11号线</option><option>16号线</option><option>19号线</option><option>阳逻线</option>
                </select>
              </label>
              <label>
                <span>所属区间</span>
                <select id="filter-section" class="wh-input w-full px-2">
                  <option value="">全部</option>
                  <option>洪山路~小洪山</option>
                  <option>松槐路~天阳大道</option>
                  <option>光谷五路~花山河</option>
                  <option>武昌站~螃蟹岬</option>
                  <option>青山站~武汉站东</option>
                </select>
              </label>
              <label>
                <span>所属站点</span>
                <select id="filter-station" class="wh-input w-full px-2">
                  <option value="">全部</option>
                  <option>梨园站</option>
                  <option>中南医院站</option>
                  <option>车辆段站</option>
                  <option>青山站</option>
                  <option>光谷五路站</option>
                  <option>花山河站</option>
                </select>
              </label>
              <div class="disease-filter-actions">
                <button type="button" id="filter-search-btn" class="wh-btn-primary">搜索</button>
                <button type="button" id="filter-reset-btn" class="wh-btn-ghost">重置</button>
              </div>
            </div>
          </div>
          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link is-active" data-quick-href="stats/dc-line-stats.html" href="dc-line-stats.html"><i class="fa-solid fa-chart-line"></i><span>线路项目统计</span></a>
              <a class="disease-quick-link" data-quick-href="stats/dc-drone-stats.html" href="dc-drone-stats.html"><i class="fa-solid fa-chart-pie"></i><span>无人机数据统计</span></a>
              <a class="disease-quick-link" data-quick-href="stats/dc-system-stats.html" href="dc-system-stats.html"><i class="fa-solid fa-table"></i><span>全时全域数据统计报表</span></a>
              <a class="disease-quick-link" data-quick-href="stats/dc-library.html" href="dc-library.html"><i class="fa-solid fa-database"></i><span>资料库</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>


  <script src="../../assets/js/dc-line-stats-data.js"></script>
  <script src="../../assets/js/dc-line-stats-page.js"></script>
  <script src="../../assets/js/dc-chart-toolbar.js"></script>
  <script>
    (function () {
      document.addEventListener("DOMContentLoaded", function () {
        if (window.WHLineStatsPage) {
          WHLineStatsPage.boot({ mobile: false });
        }
      });
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
