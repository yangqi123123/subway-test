<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>线路项目统计</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/dc-chart-toolbar.css" />
  <style>
    .stats-tab { height: 38px; padding: 0 4px; font-size: 13px; color: #cbd5e1; border-bottom: 2px solid transparent; cursor: pointer; background: transparent; border-top: none; border-left: none; border-right: none; }
    .stats-tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
    .line-panel, .sys-chart-panel { border-radius: 14px; border: 1px solid rgba(34, 211, 238, .14); background: rgba(7, 20, 38, .9); padding: 18px 20px 22px; }
    .line-chart-title, .sys-chart-title { text-align: center; color: #f8fafc; font-size: 16px; font-weight: 700; }
    .line-chart-sub, .sys-chart-sub { text-align: center; color: #94a3b8; font-size: 12px; margin-top: 6px; }
    .line-canvas, .sys-canvas { width: 100%; height: 430px; display: block; }
    .stats-tab-panel.hidden { display: none; }
    .stats-tabs-row { display: flex; flex-wrap: wrap; gap: 6px 20px; border-bottom: 1px solid rgba(34, 211, 238, 0.1); margin-bottom: 16px; padding: 0 2px 10px; }
    .disease-layout { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
    .disease-layout__right { position: sticky; top: 72px; align-self: start; width: 300px; max-height: calc(100dvh - 88px); display: flex; flex-direction: column; gap: 10px; }
    .disease-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .disease-stat-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 10px; border: 1px solid rgba(34, 211, 238, 0.22); background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88)); }
    .disease-stat-card__icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel, .disease-quick-panel { display: flex; flex-direction: column; border-radius: 10px; border: 1px solid rgba(34, 211, 238, 0.2); background: rgba(8, 15, 35, 0.78); }
    .disease-panel-title { font-size: 12px; font-weight: 600; color: #e2f5ff; margin: 0; padding: 8px 10px 7px; border-bottom: 1px solid rgba(34, 211, 238, 0.12); background: rgba(8, 15, 35, 0.92); }
    .disease-panel-body { padding: 8px 10px 10px; }
    .disease-filter-panel .disease-panel-body { display: flex; flex-direction: column; gap: 6px; }
    .disease-filter-panel label { display: flex; flex-direction: column; gap: 3px; margin: 0; font-size: 10px; }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input { height: 26px !important; min-height: 26px; font-size: 11px; padding: 0 6px; }
    .disease-filter-actions { display: flex; gap: 6px; margin-top: 4px; padding-top: 6px; border-top: 1px solid rgba(34, 211, 238, 0.1); }
    .disease-filter-actions button { flex: 1; padding-top: 4px; padding-bottom: 4px; font-size: 11px; }
    .disease-quick-panel .disease-panel-body { padding: 6px 10px 8px; }
    .disease-quick-link { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 10px; margin-bottom: 5px; border-radius: 6px; border: 1px solid rgba(34, 211, 238, 0.14); background: rgba(15, 23, 42, 0.45); color: #e2f5ff; font-size: 11px; text-decoration: none; }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover { border-color: rgba(34, 211, 238, 0.4); background: rgba(34, 211, 238, 0.08); color: #fff; }
    .disease-quick-link.is-active { border-color: rgba(34, 211, 238, 0.55); background: rgba(34, 211, 238, 0.12); color: #a5f3fc; }
    .disease-quick-link i { width: 16px; text-align: center; color: #67e8f9; font-size: 12px; }
    @media (max-width: 1400px) { .disease-layout { grid-template-columns: 1fr; } .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } .disease-layout__right { position: static; width: 100%; max-height: none; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } }
    @media (max-width: 768px) { .disease-stats { grid-template-columns: 1fr; } .disease-layout__right { grid-template-columns: 1fr; } }
  </style>
</head>

  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/shell.js"></script>
  <script src="../../assets/js/dc-chart-toolbar.js"></script>
  <script>
    (function () {
      function initQuickLinks() {
        document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach(function (anchor) {
          var target = anchor.getAttribute("data-quick-href");
          if (target && typeof whPageHref === "function") anchor.setAttribute("href", whPageHref(target));
        });
      }

      var lineChartBase = {
        title: "线路项目统计图",
        sub: "一般项目456个，重点项目224个",
        axisLabel: "线路",
        yLabel: "项目数量",
        max: 180,
        labels: ["1号线", "2号线", "3号线", "4号线", "5号线", "6号线", "7号线", "8号线", "11号线", "16号线", "19号线", "阳逻线"],
        series: [
          {
            name: "一般项目",
            values: [11, 58, 13, 49, 20, 75, 132, 24, 20, 23, 12, 19],
            colorStart: "#2dd4bf",
            colorEnd: "#0ea5e9",
          },
          {
            name: "重点项目",
            values: [8, 48, 16, 31, 19, 21, 22, 12, 21, 11, 4, 11],
            color: "#f97316",
          },
        ],
      };

      function cloneLineChartConfig(cfg) {
        return {
          title: cfg.title,
          sub: cfg.sub,
          axisLabel: cfg.axisLabel,
          yLabel: cfg.yLabel,
          max: cfg.max,
          labels: cfg.labels.slice(),
          series: cfg.series.map(function (s) {
            var copy = Object.assign({}, s);
            copy.values = s.values.slice();
            return copy;
          }),
        };
      }

      function getFilteredLineChartConfig() {
        var cfg = cloneLineChartConfig(lineChartBase);
        var line = (document.getElementById("filter-line") && document.getElementById("filter-line").value) || "";
        var section = (document.getElementById("filter-section") && document.getElementById("filter-section").value) || "";
        var station = (document.getElementById("filter-station") && document.getElementById("filter-station").value) || "";
        var hints = [];
        if (section) hints.push("区间：" + section);
        if (station) hints.push("站点：" + station);
        if (hints.length) cfg.sub = hints.join(" · ") + " · " + lineChartBase.sub;

        if (line) {
          var idx = cfg.labels.indexOf(line);
          if (idx >= 0) {
            cfg.labels = [line];
            cfg.series = cfg.series.map(function (s) {
              var copy = Object.assign({}, s);
              copy.values = [s.values[idx]];
              return copy;
            });
            var peak = 0;
            cfg.series.forEach(function (s) {
              s.values.forEach(function (v) {
                if (v > peak) peak = v;
              });
            });
            cfg.max = Math.max(40, Math.ceil(peak / 10) * 10 + 20);
          }
        }
        return cfg;
      }

      function updateLineChartTitles(cfg) {
        var titleEl = document.querySelector("#tab-panel-line .line-chart-title");
        var subEl = document.querySelector("#tab-panel-line .line-chart-sub");
        if (titleEl) titleEl.textContent = cfg.title;
        if (subEl) subEl.textContent = cfg.sub;
      }

      function applyGeoFilter() {
        var cfg = getFilteredLineChartConfig();
        updateLineChartTitles(cfg);
        if (document.getElementById("tab-panel-line") && !document.getElementById("tab-panel-line").classList.contains("hidden")) {
          lineToolbar.render();
        }
      }

      function resetGeoFilter() {
        ["filter-line", "filter-section", "filter-station"].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.value = "";
        });
        updateLineChartTitles(lineChartBase);
        if (document.getElementById("tab-panel-line") && !document.getElementById("tab-panel-line").classList.contains("hidden")) {
          lineToolbar.render();
        }
      }

      var chartConfigs = {
        projectType: {
          title: "项目类型图",
          sub: "总计701个项目",
          axisLabel: "工程类别",
          yLabel: "项目数量",
          max: 150,
          labels: [
            "施工项目", "轨土保护区", "地铁保护工程", "委外项目", "桥梁工程", "涉铁工程", "泵站", "检修工程",
            "监测工程", "临铁施工工程", "拆除项目", "围栏封闭&机电工程", "桥改、扩建", "道路（跨）穿轨道路",
            "占用道路工程", "零散劳务、站厅工程", "采空沉降工程",
          ],
          series: [
            {
              name: "项目数量",
              values: [61, 41, 59, 83, 14, 148, 115, 12, 23, 13, 22, 24, 27, 31, 8, 18, 2],
              colors: [
                "#5a72c8", "#91cb74", "#f7c85a", "#f0625f", "#78c6df", "#44aa77", "#ff874d", "#a56cc1",
                "#d36cc2", "#f0b93f", "#ff7a59", "#61a4b7", "#cd7b58", "#c9332e", "#3d566e", "#5870c4", "#8bc47c",
              ],
            },
          ],
        },
        safety: {
          title: "安全协议图",
          sub: "总计701个项目",
          axisLabel: "签订状态",
          yLabel: "项目数量",
          max: 400,
          labels: ["签订协议", "未签订协议"],
          series: [
            { name: "项目数量", values: [303, 398], colors: ["#5a72c8", "#91cb74"] },
          ],
        },
        daily: {
          title: "日巡查统计图",
          sub: "总计43次巡查记录",
          axisLabel: "项目类型",
          yLabel: "巡查数量",
          max: 30,
          defaultBarLayout: "stacked",
          labels: ["一般项目", "重点项目"],
          legend: [
            { name: "无人机巡查", color: "#5a72c8" },
            { name: "人工巡查", color: "#91cb74" },
          ],
          series: [
            { name: "无人机巡查", values: [18, 10], color: "#5a72c8" },
            { name: "人工巡查", values: [8, 7], color: "#91cb74" },
          ],
        },
        weekly: {
          title: "周巡查统计图",
          sub: "总计462次巡查记录",
          axisLabel: "项目类型",
          yLabel: "巡查数量",
          max: 250,
          defaultBarLayout: "stacked",
          labels: ["一般项目", "重点项目"],
          legend: [
            { name: "无人机巡查", color: "#5a72c8" },
            { name: "人工巡查", color: "#91cb74" },
          ],
          series: [
            { name: "无人机巡查", values: [140, 152], color: "#5a72c8" },
            { name: "人工巡查", values: [86, 84], color: "#91cb74" },
          ],
        },
        risk: {
          title: "项目风险评估等级图",
          sub: "总计701个项目",
          axisLabel: "风险等级",
          yLabel: "项目数量",
          max: 600,
          labels: ["一级", "二级", "三级", "四级", "特级", "无"],
          series: [
            {
              name: "项目数量",
              values: [31, 18, 28, 7, 66, 551],
              colors: ["#5a72c8", "#8bc47c", "#f7c85a", "#f0625f", "#6bb2cf", "#44aa77"],
            },
          ],
        },
        techReply: {
          title: "技术回函图",
          sub: "总计701个项目",
          axisLabel: "回函类型",
          yLabel: "项目数量",
          max: 400,
          labels: ["OA流转回复意见", "书面回函"],
          series: [
            { name: "项目数量", values: [412, 289], colors: ["#5a72c8", "#91cb74"] },
          ],
        },
      };

      var activeSystemTab = "projectType";

      document.getElementById("line-chart-tools").innerHTML = DCChartToolbar.createToolsHtml();
      document.getElementById("system-chart-tools").innerHTML = DCChartToolbar.createToolsHtml();

      var lineToolbar = new DCChartToolbar({
        canvas: document.getElementById("line-project-chart"),
        toolsEl: document.getElementById("line-chart-tools"),
        tableWrap: document.getElementById("line-chart-table"),
        fileName: "线路项目统计",
        getConfig: function () {
          return getFilteredLineChartConfig();
        },
      });

      var systemToolbar = new DCChartToolbar({
        canvas: document.getElementById("system-chart"),
        toolsEl: document.getElementById("system-chart-tools"),
        tableWrap: document.getElementById("system-chart-table"),
        fileName: "线路项目统计-全时全域",
        getConfig: function () {
          return chartConfigs[activeSystemTab];
        },
      });

      function renderLegend(config) {
        var legendEl = document.getElementById("system-chart-legend");
        if (!legendEl) return;
        if (!config.legend || !config.legend.length) {
          legendEl.innerHTML = "";
          return;
        }
        legendEl.innerHTML = config.legend
          .map(function (item) {
            return (
              '<span class="dc-chart-legend-item">' +
              '<span class="dc-chart-legend-dot" style="background:' + item.color + '"></span>' +
              item.name +
              "</span>"
            );
          })
          .join("");
      }

      function activateSystemTab(key) {
        activeSystemTab = key;
        var config = chartConfigs[key];
        document.getElementById("chart-title").textContent = config.title;
        document.getElementById("chart-sub").textContent = config.sub;
        if (config.defaultBarLayout) {
          systemToolbar.state.barLayout = config.defaultBarLayout;
          systemToolbar.state.chartType = "bar";
        }
        renderLegend(config);
        systemToolbar.render();
      }

      function activateTab(key) {
        var isLine = key === "lineProject";
        document.querySelectorAll(".stats-tab").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.tab === key);
        });
        document.getElementById("tab-panel-line").classList.toggle("hidden", !isLine);
        document.getElementById("tab-panel-system").classList.toggle("hidden", isLine);
        if (isLine) {
          applyGeoFilter();
        } else {
          activateSystemTab(key);
        }
      }

      document.querySelectorAll(".stats-tab").forEach(function (btn) {
        btn.addEventListener("click", function () {
          activateTab(btn.dataset.tab);
        });
      });

      var filterSearchBtn = document.getElementById("filter-search-btn");
      var filterResetBtn = document.getElementById("filter-reset-btn");
      if (filterSearchBtn) filterSearchBtn.addEventListener("click", applyGeoFilter);
      if (filterResetBtn) filterResetBtn.addEventListener("click", resetGeoFilter);

      initQuickLinks();
      lineToolbar.render();
      activateTab("lineProject");
    })();
  </script>
</body>
</html>
