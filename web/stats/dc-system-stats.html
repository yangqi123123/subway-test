<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全时全域数据统计报表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/dc-chart-toolbar.css" />
  <style>
    .stats-tab { height: 38px; padding: 0 4px; font-size: 13px; color: #cbd5e1; border-bottom: 2px solid transparent; cursor: pointer; background: transparent; border-top: none; border-left: none; border-right: none; }
    .stats-tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
    .line-panel, .sys-chart-panel { border-radius: 14px; border: 1px solid rgba(34, 211, 238, .14); background: rgba(7, 20, 38, .9); padding: 18px 20px 22px; }
    .line-chart-title, .sys-chart-title { text-align: center; color: #f8fafc; font-size: 16px; font-weight: 700; }
    .line-chart-sub, .sys-chart-sub { text-align: center; color: #94a3b8; font-size: 12px; margin-top: 6px; }
    .line-canvas, .sys-canvas { width: 100%; height: 430px; display: block; }
    .stats-tab-panel.hidden { display: none; }
    .stats-tabs-row { display: flex; flex-wrap: wrap; gap: 6px 20px; border-bottom: 1px solid rgba(34, 211, 238, 0.1); margin-bottom: 16px; padding: 0 2px 10px; }
    .disease-layout { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
    .disease-layout__right { position: sticky; top: 72px; align-self: start; width: 300px; max-height: calc(100dvh - 88px); display: flex; flex-direction: column; gap: 10px; }
    .disease-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .disease-stat-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 10px; border: 1px solid rgba(34, 211, 238, 0.22); background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88)); }
    .disease-stat-card__icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel, .disease-quick-panel { display: flex; flex-direction: column; border-radius: 10px; border: 1px solid rgba(34, 211, 238, 0.2); background: rgba(8, 15, 35, 0.78); }
    .disease-panel-title { font-size: 12px; font-weight: 600; color: #e2f5ff; margin: 0; padding: 8px 10px 7px; border-bottom: 1px solid rgba(34, 211, 238, 0.12); background: rgba(8, 15, 35, 0.92); }
    .disease-panel-body { padding: 8px 10px 10px; }
    .disease-filter-panel .disease-panel-body { display: flex; flex-direction: column; gap: 6px; }
    .disease-filter-panel label { display: flex; flex-direction: column; gap: 3px; margin: 0; font-size: 10px; }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input { height: 26px !important; min-height: 26px; font-size: 11px; padding: 0 6px; }
    .disease-filter-actions { display: flex; gap: 6px; margin-top: 4px; padding-top: 6px; border-top: 1px solid rgba(34, 211, 238, 0.1); }
    .disease-filter-actions button { flex: 1; padding-top: 4px; padding-bottom: 4px; font-size: 11px; }
    .disease-quick-panel .disease-panel-body { padding: 6px 10px 8px; }
    .disease-quick-link { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 10px; margin-bottom: 5px; border-radius: 6px; border: 1px solid rgba(34, 211, 238, 0.14); background: rgba(15, 23, 42, 0.45); color: #e2f5ff; font-size: 11px; text-decoration: none; }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover { border-color: rgba(34, 211, 238, 0.4); background: rgba(34, 211, 238, 0.08); color: #fff; }
    .disease-quick-link.is-active { border-color: rgba(34, 211, 238, 0.55); background: rgba(34, 211, 238, 0.12); color: #a5f3fc; }
    .disease-quick-link i { width: 16px; text-align: center; color: #67e8f9; font-size: 12px; }
    @media (max-width: 1400px) { .disease-layout { grid-template-columns: 1fr; } .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } .disease-layout__right { position: static; width: 100%; max-height: none; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } }
    @media (max-width: 768px) { .disease-stats { grid-template-columns: 1fr; } .disease-layout__right { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-shell="default" data-top="st" data-sidebar-key="dc-system-stats">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">全时全域数据统计报表</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">告警信息统计面板</span>
    </div>

    <section id="alert-stats-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="告警统计概览">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-bell"></i></div>
              <div>
                <div id="stat-total" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">告警总数</div>
                <div id="stat-total-hint" class="disease-stat-card__trend">当前筛选范围</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-hourglass-half"></i></div>
              <div>
                <div id="stat-pending" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">待复核</div>
                <div class="disease-stat-card__trend">未复核告警</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-globe"></i></div>
              <div>
                <div id="stat-fulltime" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">全时全域告警</div>
                <div class="disease-stat-card__trend">全时全域·AI / 传统 / 传统+AI</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-plane"></i></div>
              <div>
                <div id="stat-uav" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">无人机告警</div>
                <div class="disease-stat-card__trend">无人机来源</div>
              </div>
            </div>
          </div>

          <nav class="stats-tabs-row" aria-label="统计图表标签">
            <button type="button" class="stats-tab active" data-tab="projectAlert">项目告警统计</button>
            <button type="button" class="stats-tab" data-tab="alertSource">告警来源</button>
            <button type="button" class="stats-tab" data-tab="riskLevel">风险等级</button>
            <button type="button" class="stats-tab" data-tab="workflowStatus">处理状态</button>
          </nav>

          <div class="disease-list-area">
            <section id="tab-panel-chart" class="stats-tab-panel line-panel">
              <div class="dc-chart-toolbar-row">
                <div id="alert-chart-legend" class="dc-chart-legend"></div>
                <div class="dc-chart-tools-slot">
                  <div id="alert-chart-tools"></div>
                </div>
              </div>
              <div id="chart-title" class="line-chart-title">项目告警统计图</div>
              <div id="chart-sub" class="line-chart-sub">—</div>
              <div class="dc-chart-stage">
                <canvas id="alert-chart" class="line-canvas dc-chart-canvas" width="1680" height="430"></canvas>
                <div id="alert-chart-table" class="dc-chart-table-wrap"></div>
              </div>
            </section>
          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label>
                <span>所属线路</span>
                <select id="filter-line" class="wh-input w-full px-2">
                  <option value="">全部</option>
                </select>
              </label>
              <label>
                <span>所在区间</span>
                <select id="filter-area" class="wh-input w-full px-2">
                  <option value="">全部</option>
                </select>
              </label>
              <label>
                <span>所在站点</span>
                <select id="filter-station" class="wh-input w-full px-2">
                  <option value="">全部</option>
                </select>
              </label>
              <label>
                <span>开始日期</span>
                <input type="date" id="filter-date-start" class="wh-input w-full px-2" />
              </label>
              <label>
                <span>结束日期</span>
                <input type="date" id="filter-date-end" class="wh-input w-full px-2" />
              </label>
              <div class="disease-filter-actions">
                <button type="button" id="filter-search-btn" class="wh-btn-primary">搜索</button>
                <button type="button" id="filter-reset-btn" class="wh-btn-ghost">重置</button>
              </div>
            </div>
          </div>
          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link" data-quick-href="stats/dc-line-stats.html" href="dc-line-stats.html"><i class="fa-solid fa-chart-line"></i><span>线路项目统计</span></a>
              <a class="disease-quick-link" data-quick-href="stats/dc-drone-stats.html" href="dc-drone-stats.html"><i class="fa-solid fa-chart-pie"></i><span>无人机数据统计</span></a>
              <a class="disease-quick-link is-active" data-quick-href="stats/dc-system-stats.html" href="dc-system-stats.html"><i class="fa-solid fa-table"></i><span>全时全域数据统计报表</span></a>
              <a class="disease-quick-link" data-quick-href="stats/dc-library.html" href="dc-library.html"><i class="fa-solid fa-database"></i><span>资料库</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/shell.js"></script>
  <script src="../../assets/js/dc-alert-stats-data.js"></script>
  <script src="../../assets/js/dc-chart-toolbar.js"></script>
  <script>
    (function () {
      if (!window.DCAlertStats) return;

      function initQuickLinks() {
        document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach(function (anchor) {
          var target = anchor.getAttribute("data-quick-href");
          if (target && typeof whPageHref === "function") anchor.setAttribute("href", whPageHref(target));
        });
      }

      function fillSelectOptions(selectId, values) {
        var el = document.getElementById(selectId);
        if (!el) return;
        values.forEach(function (val) {
          var o = document.createElement("option");
          o.value = val;
          o.textContent = val;
          el.appendChild(o);
        });
      }

      function populateFilterSelects() {
        var opts = DCAlertStats.getFilterOptions();
        fillSelectOptions("filter-line", opts.lines);
        fillSelectOptions("filter-area", opts.areas);
        fillSelectOptions("filter-station", opts.stations);
      }

      function readFilters() {
        return {
          line: (document.getElementById("filter-line") && document.getElementById("filter-line").value) || "",
          area: (document.getElementById("filter-area") && document.getElementById("filter-area").value) || "",
          station: (document.getElementById("filter-station") && document.getElementById("filter-station").value) || "",
          start: (document.getElementById("filter-date-start") && document.getElementById("filter-date-start").value) || "",
          end: (document.getElementById("filter-date-end") && document.getElementById("filter-date-end").value) || "",
        };
      }

      var activeTab = "projectAlert";
      var chartConfigs = {};

      function refreshData() {
        var alerts = DCAlertStats.filterAlerts(readFilters());
        var summary = DCAlertStats.computeSummary(alerts);
        document.getElementById("stat-total").textContent = String(summary.total);
        document.getElementById("stat-pending").textContent = String(summary.pending);
        document.getElementById("stat-fulltime").textContent = String(summary.fulltime);
        document.getElementById("stat-uav").textContent = String(summary.uav);
        var hint = document.getElementById("stat-total-hint");
        if (hint) {
          var f = readFilters();
          var parts = [];
          if (f.line) parts.push("线路：" + f.line);
          if (f.area) parts.push("区间：" + f.area);
          if (f.station) parts.push("站点：" + f.station);
          if (f.start || f.end) parts.push((f.start || "…") + " ~ " + (f.end || "…"));
          hint.textContent = parts.length ? parts.join(" · ") : "全部告警记录";
        }
        chartConfigs = DCAlertStats.buildChartConfigs(alerts);
      }

      document.getElementById("alert-chart-tools").innerHTML = DCChartToolbar.createToolsHtml();

      refreshData();

      var chartToolbar = new DCChartToolbar({
        canvas: document.getElementById("alert-chart"),
        toolsEl: document.getElementById("alert-chart-tools"),
        tableWrap: document.getElementById("alert-chart-table"),
        fileName: "全时全域告警统计",
        getConfig: function () {
          return chartConfigs[activeTab] || chartConfigs.projectAlert;
        },
      });

      function renderLegend(config) {
        var legendEl = document.getElementById("alert-chart-legend");
        if (!legendEl) return;
        if (!config || !config.legend || !config.legend.length) {
          legendEl.innerHTML = "";
          return;
        }
        legendEl.innerHTML = config.legend
          .map(function (item) {
            return (
              '<span class="dc-chart-legend-item">' +
              '<span class="dc-chart-legend-dot" style="background:' + item.color + '"></span>' +
              item.name +
              "</span>"
            );
          })
          .join("");
      }

      function tabKeyFromBtn(btn) {
        return btn.getAttribute("data-tab") || "";
      }

      function activateTab(key) {
        if (!key) return;
        activeTab = key;
        refreshData();
        var config = chartConfigs[key];
        if (!config) return;
        document.getElementById("chart-title").textContent = config.title;
        document.getElementById("chart-sub").textContent = config.sub;
        document.querySelectorAll(".stats-tab").forEach(function (btn) {
          btn.classList.toggle("active", tabKeyFromBtn(btn) === key);
        });
        chartToolbar.state.viewMode = "chart";
        chartToolbar.state.chartType = "bar";
        chartToolbar.state.barLayout = config.defaultBarLayout || "stacked";
        renderLegend(config);
        chartToolbar.render();
      }

      function applyFilter() {
        activateTab(activeTab);
      }

      function resetFilter() {
        ["filter-line", "filter-area", "filter-station", "filter-date-start", "filter-date-end"].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.value = "";
        });
        applyFilter();
      }

      document.querySelectorAll(".stats-tab").forEach(function (btn) {
        btn.addEventListener("click", function () {
          activateTab(tabKeyFromBtn(btn));
        });
      });

      var filterSearchBtn = document.getElementById("filter-search-btn");
      var filterResetBtn = document.getElementById("filter-reset-btn");
      if (filterSearchBtn) filterSearchBtn.addEventListener("click", applyFilter);
      if (filterResetBtn) filterResetBtn.addEventListener("click", resetFilter);

      populateFilterSelects();
      initQuickLinks();
      activateTab("projectAlert");
    })();
  </script>
</body>
</html>
