<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>区间管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <style>
    .section-table th,
    .section-table td {
      height: 52px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .section-table th:last-child,
    .section-table td:last-child { border-right: 0; }
    .section-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
      white-space: nowrap;
    }
    .section-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .section-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 10px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }
    .section-modal-mask,
    .confirm-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.56);
      padding: 24px;
    }
    .section-modal-mask.show,
    .confirm-mask.show { display: flex; }
    .section-modal {
      width: min(920px, 92vw);
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .section-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 28px;
    }
    .section-form-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-form-label {
      width: 96px;
      flex: 0 0 96px;
      text-align: right;
      color: rgba(226,245,255,.78);
      font-size: 12px;
    }
    .section-form-label.is-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 4px;
    }
    .confirm-card {
      width: 320px;
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.14);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="am-section" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <nav class="neon-panel neon-panel--tight mb-4 px-4 py-2.5 flex flex-wrap items-center gap-2 text-[11px] text-slate-400">
      <span class="text-cyan-400"><i class="fa-solid fa-location-crosshairs"></i></span>
      <span>我的工作台</span>
      <span class="text-slate-600">&gt;&gt;</span>
      <span class="text-cyan-50 font-semibold tracking-wide">区间管理</span>
    </nav>

    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">区间管理</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">区间基础台账维护</span>
    </div>

    <section class="neon-panel neon-panel--tight p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div class="min-w-[220px]">
          <label class="wh-filter-label block mb-1.5">区间名称</label>
          <input class="wh-input h-8 w-full px-3" placeholder="请输入区间名称" />
        </div>
        <div class="min-w-[180px]">
          <label class="wh-filter-label block mb-1.5">所属线路</label>
          <select class="wh-input h-8 w-full px-2">
            <option>全部</option>
            <option>2号线</option>
            <option>5号线</option>
            <option>7号线</option>
            <option>11号线</option>
          </select>
        </div>
        <div class="min-w-[160px]">
          <label class="wh-filter-label block mb-1.5">上下行</label>
          <select class="wh-input h-8 w-full px-2">
            <option>全部</option>
            <option>上行</option>
            <option>下行</option>
          </select>
        </div>
        <div class="flex gap-2">
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-primary">搜索</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-ghost">重置</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-ghost">导出</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-primary" data-action="new-section">新建</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-ghost">导入区间</button>
        </div>
      </div>
    </section>

    <section class="wh-table-shell bg-slate-950/35">
      <div class="overflow-x-auto">
        <table class="section-table min-w-[2000px] w-full text-left">
          <thead>
            <tr>
              <th class="px-4">编号</th>
              <th class="px-4">区间名称</th>
              <th class="px-4">所属线路</th>
              <th class="px-4">上下行</th>
              <th class="px-4">起点里程</th>
              <th class="px-4">终点里程</th>
              <th class="px-4">长度（米）</th>
              <th class="px-4">所处地层</th>
              <th class="px-4">施工单位</th>
              <th class="px-4">施工方法</th>
              <th class="px-4">创建时间</th>
              <th class="px-4">操作</th>
            </tr>
          </thead>
          <tbody id="section-table-body"></tbody>
        </table>
      </div>
      <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
        <span>共 <b class="text-cyan-200">5</b> 条</span>
        <div class="flex items-center gap-2 flex-wrap">
          <button class="min-w-[32px] h-8 rounded text-xs wh-btn-primary">1</button>
          <select class="wh-input px-2 py-1 text-[11px]"><option>10 条/页</option></select>
          <span>跳至</span>
          <input class="wh-input w-12 px-1 py-1 text-center text-[11px]" value="1" />
          <span>页</span>
        </div>
      </div>
    </section>
  </div>

  <div id="section-modal-mask" class="section-modal-mask">
    <div class="section-modal">
      <div class="h-14 px-6 flex items-center justify-between gap-3 border-b border-cyan-400/15">
        <h3 id="section-modal-title" class="text-white text-[16px] font-semibold">新增区间</h3>
        <button type="button" class="wh-modal-close" aria-label="关闭" data-action="close-section-modal">×</button>
      </div>
      <div class="p-6">
        <div class="section-form-grid">
          <label class="section-form-item"><span class="section-form-label">编号：</span><input id="section-id" class="wh-input h-8 flex-1 px-3" placeholder="请输入编号" /></label>
          <label class="section-form-item"><span class="section-form-label is-required">区间名称：</span><input id="section-name" class="wh-input h-8 flex-1 px-3" placeholder="请输入区间名称" /></label>
          <label class="section-form-item"><span class="section-form-label is-required">所属线路：</span><select id="section-line" class="wh-input h-8 flex-1 px-2"><option>2号线</option><option>5号线</option><option>7号线</option><option>11号线</option></select></label>
          <label class="section-form-item"><span class="section-form-label is-required">上下行：</span><select id="section-direction" class="wh-input h-8 flex-1 px-2"><option>上行</option><option>下行</option></select></label>
          <label class="section-form-item"><span class="section-form-label is-required">起点里程：</span><input id="section-start-mile" class="wh-input h-8 flex-1 px-3" placeholder="请输入起点里程" /></label>
          <label class="section-form-item"><span class="section-form-label is-required">终点里程：</span><input id="section-end-mile" class="wh-input h-8 flex-1 px-3" placeholder="请输入终点里程" /></label>
          <label class="section-form-item"><span class="section-form-label">长度：</span><input id="section-length" class="wh-input h-8 flex-1 px-3" placeholder="请输入长度（米）" /></label>
          <label class="section-form-item"><span class="section-form-label">所处地层：</span><input id="section-strata" class="wh-input h-8 flex-1 px-3" placeholder="请输入所处地层" /></label>
          <label class="section-form-item"><span class="section-form-label">施工单位：</span><input id="section-builder" class="wh-input h-8 flex-1 px-3" placeholder="请输入施工单位" /></label>
          <label class="section-form-item"><span class="section-form-label">施工方法：</span><input id="section-method" class="wh-input h-8 flex-1 px-3" placeholder="请输入施工方法" /></label>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-section-modal">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="save-section">确定</button>
      </div>
    </div>
  </div>

  <div id="confirm-mask" class="confirm-mask">
    <div class="confirm-card">
      <div class="px-6 py-5 border-b border-cyan-400/15 text-white text-[16px] font-semibold">删除确认</div>
      <div class="px-6 py-6 text-sm text-cyan-100/80">确认删除当前区间记录吗？</div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="cancel-delete">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="confirm-delete">确定</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var rows = [
        { id:"Q201", name:"常青花园-长港路", line:"2号线", direction:"上行", startMile:"K12+320", endMile:"K14+050", length:"1730", strata:"粉质黏土", builder:"武汉地铁集团", method:"盾构法", createdAt:"2026-05-01 10:15" },
        { id:"Q202", name:"长港路-汉口火车站", line:"2号线", direction:"下行", startMile:"K14+050", endMile:"K15+760", length:"1710", strata:"砂质黏土", builder:"中铁十一局", method:"盾构法", createdAt:"2026-05-01 10:22" },
        { id:"Q501", name:"白沙六路-青菱", line:"5号线", direction:"上行", startMile:"K21+100", endMile:"K23+480", length:"2380", strata:"卵石层", builder:"中铁隧道局", method:"盖挖法", createdAt:"2026-05-01 10:28" },
        { id:"Q701", name:"光谷广场-杨家湾", line:"7号线", direction:"上行", startMile:"K30+000", endMile:"K31+200", length:"1200", strata:"强风化岩层", builder:"中建三局", method:"暗挖法", createdAt:"2026-05-01 10:36" },
        { id:"Q1101", name:"光谷五路-左岭", line:"11号线", direction:"下行", startMile:"K08+260", endMile:"K10+420", length:"2160", strata:"中风化砂岩", builder:"中铁一局", method:"明挖法", createdAt:"2026-05-01 10:42" }
      ];

      var editIndex = -1;
      var deleteIndex = -1;
      var tableBody = document.getElementById("section-table-body");
      var modalMask = document.getElementById("section-modal-mask");
      var confirmMask = document.getElementById("confirm-mask");
      var modalTitle = document.getElementById("section-modal-title");

      function renderRows() {
        tableBody.innerHTML = rows.map(function (row, index) {
          return '<tr class="' + (index % 2 ? 'bg-slate-950/10' : 'bg-slate-950/22') + '">' +
            '<td class="px-4">' + row.id + '</td>' +
            '<td class="px-4">' + row.name + '</td>' +
            '<td class="px-4">' + row.line + '</td>' +
            '<td class="px-4">' + row.direction + '</td>' +
            '<td class="px-4">' + row.startMile + '</td>' +
            '<td class="px-4">' + row.endMile + '</td>' +
            '<td class="px-4">' + row.length + '</td>' +
            '<td class="px-4">' + row.strata + '</td>' +
            '<td class="px-4">' + row.builder + '</td>' +
            '<td class="px-4">' + row.method + '</td>' +
            '<td class="px-4">' + row.createdAt + '</td>' +
            '<td class="px-4">' +
              '<span class="section-action text-amber-300" data-action="edit-section" data-index="' + index + '"><i class="fa-regular fa-pen-to-square"></i>编辑</span>' +
              '<span class="section-action text-rose-300" data-action="delete-section" data-index="' + index + '"><i class="fa-regular fa-trash-can"></i>删除</span>' +
            '</td>' +
          '</tr>';
        }).join("");
      }

      function openModal(mode, index) {
        editIndex = mode === "edit" ? index : -1;
        modalTitle.textContent = mode === "edit" ? "编辑区间" : "新增区间";
        var row = index > -1 ? rows[index] : null;
        document.getElementById("section-id").value = row ? row.id : "";
        document.getElementById("section-name").value = row ? row.name : "";
        document.getElementById("section-line").value = row ? row.line : "2号线";
        document.getElementById("section-direction").value = row ? row.direction : "上行";
        document.getElementById("section-start-mile").value = row ? row.startMile : "";
        document.getElementById("section-end-mile").value = row ? row.endMile : "";
        document.getElementById("section-length").value = row ? row.length : "";
        document.getElementById("section-strata").value = row ? row.strata : "";
        document.getElementById("section-builder").value = row ? row.builder : "";
        document.getElementById("section-method").value = row ? row.method : "";
        modalMask.classList.add("show");
      }

      function closeModal() {
        modalMask.classList.remove("show");
      }

      function saveSection() {
        var name = document.getElementById("section-name").value.trim();
        var line = document.getElementById("section-line").value.trim();
        var direction = document.getElementById("section-direction").value.trim();
        var startMile = document.getElementById("section-start-mile").value.trim();
        var endMile = document.getElementById("section-end-mile").value.trim();
        if (!name || !line || !direction || !startMile || !endMile) {
          alert("请完善必填项：区间名称、所属线路、上下行、起点里程、终点里程");
          return;
        }
        var row = {
          id: document.getElementById("section-id").value.trim() || "Q000",
          name: name,
          line: line,
          direction: direction,
          startMile: startMile,
          endMile: endMile,
          length: document.getElementById("section-length").value.trim() || "0",
          strata: document.getElementById("section-strata").value.trim() || "-",
          builder: document.getElementById("section-builder").value.trim() || "-",
          method: document.getElementById("section-method").value.trim() || "-",
          createdAt: editIndex > -1 ? rows[editIndex].createdAt : "2026-05-12 19:30"
        };
        if (editIndex > -1) rows[editIndex] = row;
        else rows.unshift(row);
        closeModal();
        renderRows();
      }

      renderRows();

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        var index = Number(trigger.getAttribute("data-index"));
        if (action === "new-section") openModal("new");
        if (action === "edit-section") openModal("edit", index);
        if (action === "delete-section") {
          deleteIndex = index;
          confirmMask.classList.add("show");
        }
        if (action === "close-section-modal") closeModal();
        if (action === "save-section") saveSection();
        if (action === "cancel-delete") {
          deleteIndex = -1;
          confirmMask.classList.remove("show");
        }
        if (action === "confirm-delete") {
          if (deleteIndex > -1) rows.splice(deleteIndex, 1);
          deleteIndex = -1;
          confirmMask.classList.remove("show");
          renderRows();
        }
      });
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
