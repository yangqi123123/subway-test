<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>站点管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/patrol-table-actions.css" />
  <style>
    .disease-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }
    .disease-layout__right {
      position: sticky;
      top: 72px;
      align-self: start;
      width: 300px;
      max-height: calc(100dvh - 88px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .disease-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .disease-stat-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.22);
      background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88));
    }
    .disease-stat-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel,
    .disease-quick-panel {
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.2);
      background: rgba(8, 15, 35, 0.78);
    }
    .disease-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #e2f5ff;
      margin: 0;
      padding: 8px 10px 7px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      background: rgba(8, 15, 35, 0.92);
    }
    .disease-panel-body { padding: 8px 10px 10px; }
    .disease-filter-panel .disease-panel-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .disease-filter-panel label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin: 0;
      font-size: 10px;
    }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input {
      height: 26px !important;
      min-height: 26px;
      font-size: 11px;
      padding: 0 6px;
    }
    .disease-filter-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .disease-filter-actions button {
      flex: 1;
      padding-top: 4px;
      padding-bottom: 4px;
      font-size: 11px;
    }
    .disease-list-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .disease-quick-panel .disease-panel-body { padding: 6px 10px 8px; }
    .disease-quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 5px;
      border-radius: 6px;
      border: 1px solid rgba(34, 211, 238, 0.14);
      background: rgba(15, 23, 42, 0.45);
      color: #e2f5ff;
      font-size: 11px;
      text-decoration: none;
    }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover {
      border-color: rgba(34, 211, 238, 0.4);
      background: rgba(34, 211, 238, 0.08);
      color: #fff;
    }
    .disease-quick-link.is-active {
      border-color: rgba(34, 211, 238, 0.55);
      background: rgba(34, 211, 238, 0.12);
      color: #a5f3fc;
    }
    .disease-quick-link i {
      width: 16px;
      text-align: center;
      color: #67e8f9;
      font-size: 12px;
    }
    @media (max-width: 1400px) {
      .disease-layout { grid-template-columns: 1fr; }
      .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .disease-layout__right {
        position: static;
        width: 100%;
        max-height: none;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }
    @media (max-width: 768px) {
      .disease-stats { grid-template-columns: 1fr; }
      .disease-layout__right { grid-template-columns: 1fr; }
    }
    .station-table th,
    .station-table td {
      height: 52px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .station-table th:last-child,
    .station-table td:last-child { border-right: 0; }
    .station-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
      white-space: nowrap;
    }
    .station-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .station-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 10px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }
    .station-modal-mask,
    .confirm-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.56);
      padding: 24px;
    }
    .station-modal-mask.show,
    .confirm-mask.show { display: flex; }
    .station-modal {
      width: min(980px, 94vw);
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .station-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 28px;
    }
    .station-form-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .station-form-item--select { align-items: flex-start; }
    .station-form-item--select .station-form-label { line-height: 32px; }
    .station-form-label {
      width: 96px;
      flex: 0 0 96px;
      text-align: right;
      color: rgba(226,245,255,.78);
      font-size: 12px;
    }
    .station-form-label.is-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 4px;
    }
    .confirm-card {
      width: 320px;
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.14);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .station-modal { overflow: visible; }
    .station-modal .p-6 { overflow: visible; }
    .am-detail-mask {
      position: fixed;
      inset: 0;
      z-index: 115;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 8, 23, 0.72);
    }
    .am-detail-mask.show { display: flex; }
    .am-detail-dialog {
      width: min(980px, 96vw);
      max-height: min(86vh, 900px);
      border-radius: 8px;
      border: 1px solid rgba(34, 211, 238, 0.18);
      background: linear-gradient(180deg, #071525, #020617);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .am-detail-dialog__head {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
    }
    .am-detail-dialog__body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 20px 24px 16px;
    }
    .am-detail-dialog__foot {
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 14px 24px 18px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .detail-value {
      flex: 1;
      min-width: 0;
      min-height: 32px;
      line-height: 32px;
      color: rgba(226, 245, 255, 0.92);
      font-size: 12px;
      word-break: break-word;
    }
    .detail-value--empty { color: #64748b; }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="am-station" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">站点管理</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">站点管理面板</span>
    </div>

    <section id="station-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="站点统计">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-train"></i></div>
              <div>
                <div id="stat-total" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">站点总数</div>
                <div class="disease-stat-card__trend">基础台账</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-train-subway"></i></div>
              <div>
                <div id="stat-lines" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">覆盖线路</div>
                <div class="disease-stat-card__trend">所属线路去重</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-ruler-horizontal"></i></div>
              <div>
                <div id="stat-length" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">长度合计（米）</div>
                <div class="disease-stat-card__trend">当前列表</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-building"></i></div>
              <div>
                <div id="stat-builders" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">施工单位</div>
                <div class="disease-stat-card__trend">去重统计</div>
              </div>
            </div>
          </div>

          <div class="disease-list-area">
            <div class="disease-list-toolbar">
              <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="new-station">
                <i class="fa-solid fa-plus mr-1"></i>新建
              </button>
              <button id="btn-import" type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost">
                <i class="fa-solid fa-file-import mr-1"></i>导入站点
              </button>
              <button id="btn-export" type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost">
                <i class="fa-solid fa-file-export mr-1"></i>导出
              </button>
            </div>
            <div class="wh-table-shell bg-slate-950/35">
              <div class="am-table-wrap overflow-x-auto">
                <table class="station-table min-w-[2200px] w-full text-left">
                  <thead>
                    <tr>
                      <th class="px-4">编号</th>
                      <th class="px-4">站点名称</th>
                      <th class="px-4">所属线路</th>
                      <th class="px-4">起点里程</th>
                      <th class="px-4">终点里程</th>
                      <th class="px-4">长度（米）</th>
                      <th class="px-4">经度</th>
                      <th class="px-4">纬度</th>
                      <th class="px-4">所处地层</th>
                      <th class="px-4">施工单位</th>
                      <th class="px-4">施工方法</th>
                      <th class="px-4">联系电话</th>
                      <th class="px-4 disease-col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="station-table-body"></tbody>
                </table>
              </div>
              <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
                <span>共 <b id="table-total" class="text-cyan-200">0</b> 条</span>
                <div class="flex items-center gap-2 flex-wrap">
                  <button type="button" class="min-w-[32px] h-8 rounded text-xs wh-btn-primary">1</button>
                  <select class="wh-input px-2 py-1 text-[11px]"><option>10 条/页</option></select>
                  <span>跳至</span>
                  <input class="wh-input w-12 px-1 py-1 text-center text-[11px]" value="1" />
                  <span>页</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label>
                <span>站点名称</span>
                <input id="filter-name" class="wh-input w-full" placeholder="请输入站点名称" />
              </label>
              <label>
                <span>所属线路</span>
                <select id="filter-line" class="wh-input w-full px-2">
                  <option value="">全部</option>
                  <option value="2号线">2号线</option>
                  <option value="5号线">5号线</option>
                  <option value="7号线">7号线</option>
                  <option value="11号线">11号线</option>
                </select>
              </label>
              <div class="disease-filter-actions">
                <button id="btn-search" type="button" class="wh-btn-primary">搜索</button>
                <button id="btn-reset" type="button" class="wh-btn-ghost">重置</button>
              </div>
            </div>
          </div>

          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link" data-quick-href="wb/am-line.html" href="am-line.html"><i class="fa-solid fa-train-subway"></i><span>线路管理</span></a>
              <a class="disease-quick-link is-active" data-quick-href="wb/am-station.html" href="am-station.html"><i class="fa-solid fa-train"></i><span>站点管理</span></a>
              <a class="disease-quick-link" data-quick-href="wb/am-section.html" href="am-section.html"><i class="fa-solid fa-road"></i><span>区间管理</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <div id="station-detail-mask" class="am-detail-mask" aria-hidden="true">
    <div class="am-detail-dialog" role="dialog" aria-labelledby="station-detail-title">
      <div class="am-detail-dialog__head">
        <div>
          <h3 id="station-detail-title" class="text-white font-semibold text-sm m-0">查看详情</h3>
          <div id="station-detail-subtitle" class="text-[11px] text-slate-400 mt-0.5">站点详情</div>
        </div>
        <button type="button" class="wh-modal-close text-slate-400 hover:text-white text-xl leading-none" data-action="close-station-detail" aria-label="关闭">×</button>
      </div>
      <div id="station-detail-body" class="am-detail-dialog__body"></div>
      <div class="am-detail-dialog__foot">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-station-detail">关闭</button>
      </div>
    </div>
  </div>

  <div id="station-modal-mask" class="station-modal-mask">
    <div class="station-modal">
      <div class="h-14 px-6 flex items-center justify-between gap-3 border-b border-cyan-400/15">
        <h3 id="station-modal-title" class="text-white text-[16px] font-semibold">新增站点</h3>
        <button type="button" class="wh-modal-close" aria-label="关闭" data-action="close-station-modal">×</button>
      </div>
      <div class="p-6">
        <div class="station-form-grid">
          <label class="station-form-item"><span class="station-form-label">编号：</span><input id="station-id" class="wh-input h-8 flex-1 px-3" placeholder="请输入编号" /></label>
          <label class="station-form-item"><span class="station-form-label is-required">站点名称：</span><input id="station-name" class="wh-input h-8 flex-1 px-3" placeholder="请输入站点名称" /></label>
          <label class="station-form-item"><span class="station-form-label is-required">所属线路：</span><select id="station-line" class="wh-input h-8 flex-1 px-2"><option>2号线</option><option>5号线</option><option>7号线</option><option>11号线</option></select></label>
          <label class="station-form-item"><span class="station-form-label">联系电话：</span><input id="station-phone" class="wh-input h-8 flex-1 px-3" placeholder="请输入联系电话" /></label>
          <label class="station-form-item"><span class="station-form-label is-required">起点里程：</span><input id="station-start-mile" class="wh-input h-8 flex-1 px-3" placeholder="请输入起点里程" /></label>
          <label class="station-form-item"><span class="station-form-label is-required">终点里程：</span><input id="station-end-mile" class="wh-input h-8 flex-1 px-3" placeholder="请输入终点里程" /></label>
          <label class="station-form-item"><span class="station-form-label">长度：</span><input id="station-length" class="wh-input h-8 flex-1 px-3" placeholder="请输入长度（米）" /></label>
          <label class="station-form-item"><span class="station-form-label">经度：</span><input id="station-lng" class="wh-input h-8 flex-1 px-3" placeholder="请输入经度" /></label>
          <label class="station-form-item"><span class="station-form-label">纬度：</span><input id="station-lat" class="wh-input h-8 flex-1 px-3" placeholder="请输入纬度" /></label>
          <label class="station-form-item station-form-item--select"><span class="station-form-label">所处地层：</span><div id="station-strata-select" class="wh-search-select" data-input-id="station-strata"></div></label>
          <label class="station-form-item station-form-item--select"><span class="station-form-label">施工单位：</span><div id="station-builder-select" class="wh-search-select" data-input-id="station-builder"></div></label>
          <label class="station-form-item"><span class="station-form-label">施工方法：</span><input id="station-method" class="wh-input h-8 flex-1 px-3" placeholder="请输入施工方法" /></label>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-station-modal">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="save-station">确定</button>
      </div>
    </div>
  </div>

  <div id="confirm-mask" class="confirm-mask">
    <div class="confirm-card">
      <div class="px-6 py-5 border-b border-cyan-400/15 text-white text-[16px] font-semibold">删除确认</div>
      <div class="px-6 py-6 text-sm text-cyan-100/80">确认删除当前站点记录吗？</div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="cancel-delete">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="confirm-delete">确定</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/search-select.js"></script>
  <script>
    (function () {
      var STRATA_OPTIONS = [
        "3-2 黏土",
        "(20a-2-2) 中风化泥岩",
        "1-1 杂填土",
        "(20c-1) 强风化泥岩",
        "(10-1d) 粉质黏土",
        "(18c-1) 强风化泥质砂岩",
        "(13-1) 砂砾岩残积土",
        "(18d-1) 强风化砂质泥岩"
      ];
      var BUILDER_OPTIONS = [
        "中南勘基",
        "武汉百纵商业发展有限公司",
        "浙江八方电信有限公司",
        "武汉城发智慧能源有限公司",
        "团风立信特种犬防保安服务有限公司",
        "汉阳区水务和湖泊局",
        "汉阳区水务和湖泊局排水队"
      ];

      var rows = [
        { id:"S201", name:"常青花园", line:"2号线", startMile:"K12+320", endMile:"K13+180", length:"860", lng:"114.2415", lat:"30.6501", strata:"(10-1d) 粉质黏土", builder:"中南勘基", method:"明挖法", phone:"13800001201" },
        { id:"S202", name:"长港路", line:"2号线", startMile:"K13+180", endMile:"K14+050", length:"870", lng:"114.2541", lat:"30.6428", strata:"3-2 黏土", builder:"浙江八方电信有限公司", method:"盾构法", phone:"13800001202" },
        { id:"S501", name:"白沙六路", line:"5号线", startMile:"K21+100", endMile:"K21+980", length:"880", lng:"114.3142", lat:"30.5077", strata:"1-1 杂填土", builder:"武汉城发智慧能源有限公司", method:"盖挖法", phone:"13800001203" },
        { id:"S701", name:"光谷广场", line:"7号线", startMile:"K30+000", endMile:"K31+120", length:"1120", lng:"114.4035", lat:"30.5112", strata:"(18c-1) 强风化泥质砂岩", builder:"汉阳区水务和湖泊局", method:"暗挖法", phone:"13800001204" },
        { id:"S1101", name:"光谷五路", line:"11号线", startMile:"K08+260", endMile:"K09+140", length:"880", lng:"114.4496", lat:"30.4855", strata:"(13-1) 砂砾岩残积土", builder:"武汉百纵商业发展有限公司", method:"明挖法", phone:"13800001205" }
      ];

      var displayRows = rows.slice();
      var editIndex = -1;
      var deleteId = "";
      var tableBody = document.getElementById("station-table-body");
      var tableTotal = document.getElementById("table-total");
      var modalMask = document.getElementById("station-modal-mask");
      var confirmMask = document.getElementById("confirm-mask");
      var modalTitle = document.getElementById("station-modal-title");
      var detailMask = document.getElementById("station-detail-mask");
      var detailBody = document.getElementById("station-detail-body");
      var detailSubtitle = document.getElementById("station-detail-subtitle");

      function escHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (char) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
        });
      }
      function detailValue(value) {
        var text = value === undefined || value === null || value === "" ? "—" : String(value);
        return '<div class="detail-value' + (text === "—" ? " detail-value--empty" : "") + '">' + escHtml(text) + "</div>";
      }
      function detailRow(label, value, selectRow) {
        var itemCls = "station-form-item" + (selectRow ? " station-form-item--select" : "");
        var labelCls = "station-form-label" + (selectRow ? "" : "");
        return '<label class="' + itemCls + '"><span class="' + labelCls + '">' + escHtml(label) + "：</span>" + detailValue(value) + "</label>";
      }
      function buildDetailHtml(row) {
        return (
          '<div class="station-form-grid">' +
          detailRow("编号", row.id) +
          detailRow("站点名称", row.name) +
          detailRow("所属线路", row.line) +
          detailRow("联系电话", row.phone) +
          detailRow("起点里程", row.startMile) +
          detailRow("终点里程", row.endMile) +
          detailRow("长度", row.length) +
          detailRow("经度", row.lng) +
          detailRow("纬度", row.lat) +
          detailRow("所处地层", row.strata, true) +
          detailRow("施工单位", row.builder, true) +
          detailRow("施工方法", row.method) +
          "</div>"
        );
      }
      function openDetailRow(row) {
        if (!row || !detailMask || !detailBody) return;
        if (detailSubtitle) detailSubtitle.textContent = row.name || "站点详情";
        detailBody.innerHTML = buildDetailHtml(row);
        detailMask.classList.add("show");
        detailMask.setAttribute("aria-hidden", "false");
      }
      function openDetail(displayIndex) {
        openDetailRow(displayRows[displayIndex]);
      }
      function closeDetail() {
        if (!detailMask) return;
        detailMask.classList.remove("show");
        detailMask.setAttribute("aria-hidden", "true");
      }

      function openDetailFromQuery() {
        var params = new URLSearchParams(location.search);
        if (params.get("view") !== "detail") return;
        var name = params.get("name") || params.get("station");
        if (!name) return;
        var idx = displayRows.findIndex(function (row) {
          return row.name === name || name.indexOf(row.name) >= 0 || row.name.indexOf(name.replace(/站$/, "")) >= 0;
        });
        if (idx >= 0) {
          openDetail(idx);
          return;
        }
        openDetailRow({
          id: params.get("id") || "—",
          name: name,
          line: params.get("line") || "—",
          phone: params.get("phone") || "—",
          startMile: params.get("startMile") || params.get("startMileage") || "—",
          endMile: params.get("endMile") || params.get("endMileage") || "—",
          length: params.get("length") || "—",
          lng: params.get("lng") || "—",
          lat: params.get("lat") || "—",
          strata: params.get("strata") || "—",
          builder: params.get("builder") || "—",
          method: params.get("method") || "—",
        });
      }

      function findRowIndex(id) {
        return rows.findIndex(function (row) { return row.id === id; });
      }

      function updateStationStats(data) {
        var list = data || [];
        var lines = {};
        var builders = {};
        var lengthSum = 0;
        list.forEach(function (row) {
          lines[row.line] = true;
          if (row.builder && row.builder !== "-") builders[row.builder] = true;
          lengthSum += Number(row.length) || 0;
        });
        document.getElementById("stat-total").textContent = String(list.length);
        document.getElementById("stat-lines").textContent = String(Object.keys(lines).length);
        document.getElementById("stat-length").textContent = String(lengthSum);
        document.getElementById("stat-builders").textContent = String(Object.keys(builders).length);
        if (tableTotal) tableTotal.textContent = String(list.length);
      }

      function initQuickLinks() {
        document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach(function (anchor) {
          var target = anchor.getAttribute("data-quick-href");
          if (target && typeof whPageHref === "function") {
            anchor.setAttribute("href", whPageHref(target));
          }
        });
      }
      var strataSelect = WHSearchSelect.create(
        document.getElementById("station-strata-select"),
        STRATA_OPTIONS,
        "请搜索或选择所处地层"
      );
      var builderSelect = WHSearchSelect.create(
        document.getElementById("station-builder-select"),
        BUILDER_OPTIONS,
        "请搜索或选择施工单位"
      );

      function renderRows() {
        tableBody.innerHTML = displayRows.map(function (row, index) {
          return '<tr class="wh-row-open ' + (index % 2 ? 'bg-slate-950/10' : 'bg-slate-950/22') + '" data-row-index="' + index + '">' +
            '<td class="px-4">' + row.id + '</td>' +
            '<td class="px-4">' + row.name + '</td>' +
            '<td class="px-4">' + row.line + '</td>' +
            '<td class="px-4">' + row.startMile + '</td>' +
            '<td class="px-4">' + row.endMile + '</td>' +
            '<td class="px-4">' + row.length + '</td>' +
            '<td class="px-4">' + row.lng + '</td>' +
            '<td class="px-4">' + row.lat + '</td>' +
            '<td class="px-4">' + row.strata + '</td>' +
            '<td class="px-4">' + row.builder + '</td>' +
            '<td class="px-4">' + row.method + '</td>' +
            '<td class="px-4">' + row.phone + '</td>' +
            '<td class="px-4 disease-col-actions"><div class="disease-op-actions">' +
              '<span class="station-action text-amber-300" data-action="edit-station" data-station-id="' + row.id + '"><i class="fa-regular fa-pen-to-square"></i>编辑</span>' +
              '<span class="station-action text-rose-300" data-action="delete-station" data-station-id="' + row.id + '"><i class="fa-regular fa-trash-can"></i>删除</span>' +
            '</div></td>' +
          '</tr>';
        }).join("");
        updateStationStats(displayRows);
      }

      function applyFilter() {
        var name = document.getElementById("filter-name").value.trim();
        var line = document.getElementById("filter-line").value;
        displayRows = rows.filter(function (row) {
          if (name && row.name.indexOf(name) === -1 && row.id.indexOf(name) === -1) return false;
          if (line && row.line !== line) return false;
          return true;
        });
        renderRows();
      }

      function resetFilters() {
        document.getElementById("filter-name").value = "";
        document.getElementById("filter-line").value = "";
        displayRows = rows.slice();
        renderRows();
      }

      function openModal(mode, index) {
        WHSearchSelect.closeAll(null);
        editIndex = mode === "edit" ? index : -1;
        modalTitle.textContent = mode === "edit" ? "编辑站点" : "新增站点";
        var row = index > -1 ? rows[index] : null;
        document.getElementById("station-id").value = row ? row.id : "";
        document.getElementById("station-name").value = row ? row.name : "";
        document.getElementById("station-line").value = row ? row.line : "2号线";
        document.getElementById("station-phone").value = row ? row.phone : "";
        document.getElementById("station-start-mile").value = row ? row.startMile : "";
        document.getElementById("station-end-mile").value = row ? row.endMile : "";
        document.getElementById("station-length").value = row ? row.length : "";
        document.getElementById("station-lng").value = row ? row.lng : "";
        document.getElementById("station-lat").value = row ? row.lat : "";
        strataSelect.setValue(row ? row.strata : "");
        builderSelect.setValue(row ? row.builder : "");
        document.getElementById("station-method").value = row ? row.method : "";
        modalMask.classList.add("show");
      }

      function closeModal() {
        modalMask.classList.remove("show");
      }

      function saveStation() {
        var name = document.getElementById("station-name").value.trim();
        var line = document.getElementById("station-line").value.trim();
        var startMile = document.getElementById("station-start-mile").value.trim();
        var endMile = document.getElementById("station-end-mile").value.trim();
        if (!name || !line || !startMile || !endMile) {
          alert("请完善必填项：站点名称、所属线路、起点里程、终点里程");
          return;
        }
        var row = {
          id: document.getElementById("station-id").value.trim() || "S000",
          name: name,
          line: line,
          phone: document.getElementById("station-phone").value.trim() || "-",
          startMile: startMile,
          endMile: endMile,
          length: document.getElementById("station-length").value.trim() || "0",
          lng: document.getElementById("station-lng").value.trim() || "-",
          lat: document.getElementById("station-lat").value.trim() || "-",
          strata: strataSelect.getValue() || "-",
          builder: builderSelect.getValue() || "-",
          method: document.getElementById("station-method").value.trim() || "-"
        };
        if (editIndex > -1) rows[editIndex] = row;
        else rows.unshift(row);
        closeModal();
        applyFilter();
      }

      document.getElementById("btn-search").addEventListener("click", applyFilter);
      document.getElementById("btn-reset").addEventListener("click", resetFilters);
      document.getElementById("btn-export").addEventListener("click", function () {
        alert("导出当前筛选结果（原型演示）");
      });
      document.getElementById("btn-import").addEventListener("click", function () {
        alert("导入站点（原型演示）");
      });
      initQuickLinks();
      function setupListRowClick() {
        if (!window.WHTableRowClick) return window.setTimeout(setupListRowClick, 40);
        WHTableRowClick.bindById("station-table-body", {
          getRows: function () { return displayRows; },
          onOpen: function (row, index) { openDetail(index); }
        });
      }
      setupListRowClick();
      displayRows = rows.slice();
      renderRows();
      setTimeout(openDetailFromQuery, 80);

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        var stationId = trigger.getAttribute("data-station-id");
        var index = stationId ? findRowIndex(stationId) : -1;
        if (action === "new-station") openModal("new");
        if (action === "edit-station" && index > -1) openModal("edit", index);
        if (action === "delete-station" && stationId) {
          deleteId = stationId;
          confirmMask.classList.add("show");
        }
        if (action === "close-station-modal") closeModal();
        if (action === "close-station-detail") closeDetail();
        if (action === "save-station") saveStation();
        if (action === "cancel-delete") {
          deleteId = "";
          confirmMask.classList.remove("show");
        }
        if (action === "confirm-delete") {
          var deleteIndex = deleteId ? findRowIndex(deleteId) : -1;
          if (deleteIndex > -1) rows.splice(deleteIndex, 1);
          deleteId = "";
          confirmMask.classList.remove("show");
          applyFilter();
        }
      });
      if (detailMask) {
        detailMask.addEventListener("click", function (event) {
          if (event.target === detailMask) closeDetail();
        });
      }
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
