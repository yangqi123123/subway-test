<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/wb-project-layout.css" />
  <link rel="stylesheet" href="../../assets/css/patrol-table-actions.css" />
  <style>
    .project-action {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-right: 8px;
      color: #38bdf8;
      white-space: nowrap;
      cursor: pointer;
      font-size: 11px;
    }

    .project-action--danger {
      color: #fb7185;
    }

    .project-tabs,
    .done-tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 34px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      margin-bottom: 28px;
      overflow-x: auto;
    }

    .project-tab,
    .done-tab {
      height: 44px;
      border-bottom: 2px solid transparent;
      color: rgba(226, 245, 255, 0.78);
      white-space: nowrap;
      font-size: 13px;
    }

    .project-tab.active,
    .done-tab.active {
      color: #67e8f9;
      border-color: #38bdf8;
    }

    .project-form-label {
      width: 148px;
      flex: 0 0 148px;
      text-align: right;
      color: rgba(226, 245, 255, 0.88);
      font-size: 12px;
      line-height: 32px;
    }

    .project-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 3px;
    }

    .project-empty {
      min-height: 86px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.38);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(148, 163, 184, 0.6);
      font-size: 12px;
    }

    .project-modal-mask {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.58);
      padding: 24px;
    }

    .project-modal-mask.show {
      display: flex;
    }

    .project-modal {
      width: min(760px, 96vw);
      max-height: min(86vh, 820px);
      overflow: auto;
      border: 1px solid rgba(34, 211, 238, 0.24);
      border-radius: 8px;
      background: #071426;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), 0 0 30px rgba(34, 211, 238, 0.12);
    }

    .project-toast {
      position: fixed;
      right: 28px;
      bottom: 28px;
      z-index: 90;
      display: none;
      padding: 10px 14px;
      border: 1px solid rgba(34, 211, 238, 0.28);
      border-radius: 8px;
      background: rgba(8, 15, 35, 0.94);
      color: #cffafe;
      font-size: 12px;
      box-shadow: var(--shadow-card);
    }

    .project-toast.show {
      display: block;
    }

    .project-readonly .wh-input,
    .project-readonly textarea,
    .project-readonly select,
    .project-readonly .wh-search-select {
      pointer-events: none;
      opacity: 0.78;
    }

    .project-form-row--select {
      align-items: flex-start;
    }

    .project-form-row--select .project-form-label {
      line-height: 32px;
    }

    .project-hidden-when-readonly {
      display: inline-flex;
    }

    .project-readonly .project-hidden-when-readonly {
      display: none !important;
    }

    .unit-row {
      padding: 18px 0 22px;
    }

    .unit-row__head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
    }

    .unit-contact-panel {
      border: 1px solid rgba(34, 211, 238, 0.14);
      border-radius: 8px;
      background: rgba(8, 15, 35, 0.5);
      overflow: hidden;
      margin: 14px 0 0 146px;
    }

    .unit-contact-panel__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
    }

    .unit-contact-list {
      padding: 10px 18px 16px;
    }

    .unit-contact-table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 12px;
      color: rgba(226, 245, 255, 0.92);
    }

    .unit-contact-table th,
    .unit-contact-table td {
      padding: 11px 12px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.1);
      text-align: left;
      vertical-align: middle;
    }

    .unit-contact-table th {
      color: rgba(207, 250, 254, 0.82);
      background: rgba(2, 8, 23, 0.45);
      font-weight: 600;
    }

    .project-link-action {
      color: #67e8f9;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .project-upload {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px dashed rgba(34, 211, 238, 0.26);
      border-radius: 8px;
      background: rgba(2, 8, 23, 0.38);
    }

    .project-upload__btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      color: #cffafe;
      background: rgba(14, 116, 144, 0.3);
      border: 1px solid rgba(34, 211, 238, 0.2);
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }

    .project-upload__name {
      min-width: 0;
      color: rgba(226, 245, 255, 0.8);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-preview-shell {
      max-width: 860px;
      margin: 0 auto;
      border: 1px solid rgba(34, 211, 238, 0.16);
      border-radius: 10px;
      background: rgba(2, 8, 23, 0.45);
      overflow: hidden;
    }

    .project-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      color: rgba(226, 245, 255, 0.86);
      font-size: 12px;
    }

    .project-preview-body {
      padding: 18px;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(2, 8, 23, 0.94));
    }

    .project-preview-image {
      max-width: 100%;
      max-height: 62vh;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
    }

    .project-preview-frame {
      width: 100%;
      height: 62vh;
      border: 0;
      border-radius: 8px;
      background: #fff;
    }

    .project-preview-file {
      width: min(520px, 100%);
      padding: 28px 24px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.14);
      background: rgba(8, 15, 35, 0.72);
      text-align: center;
      color: rgba(226, 245, 255, 0.88);
    }

    .project-preview-file i {
      font-size: 42px;
      color: #67e8f9;
      margin-bottom: 14px;
    }

    .unit-contact-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .unit-panel-note {
      color: rgba(148, 163, 184, 0.78);
      font-size: 11px;
    }

    .unit-inline-action {
      color: #38bdf8;
      font-size: 12px;
      cursor: pointer;
    }

    .unit-inline-action.unit-inline-action--danger {
      color: #fb7185;
    }

    .project-patrol-tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 34px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      margin-bottom: 16px;
    }

    .project-patrol-frame-wrap {
      min-height: calc(100vh - 200px);
      border: 1px solid rgba(34, 211, 238, 0.12);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(2, 8, 23, 0.45);
    }

    .project-patrol-frame-wrap--embed {
      min-height: calc(100vh - 168px);
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .project-patrol-frame-wrap iframe {
      display: block;
      width: 100%;
      min-height: calc(100vh - 200px);
      height: calc(100vh - 200px);
      border: 0;
      background: #020617;
    }

    .project-patrol-frame-wrap--embed iframe {
      min-height: calc(100vh - 168px);
      height: calc(100vh - 168px);
    }

    .project-patrol-tab {
      height: 44px;
      border-bottom: 2px solid transparent;
      color: rgba(226, 245, 255, 0.78);
      white-space: nowrap;
      font-size: 13px;
      background: transparent;
      padding: 0 4px;
    }

    .project-patrol-tab.active {
      color: #67e8f9;
      border-color: #38bdf8;
    }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="in-project" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <section id="project-list-view">
      <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
        <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">项目管理</h1>
        <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">项目管理面板</span>
      </div>

      <div class="disease-layout disease-layout--fixed-sidebar">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="项目统计">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-folder-tree"></i></div>
              <div>
                <div id="stat-total" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">项目总数</div>
                <div class="disease-stat-card__trend">在管项目</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-star"></i></div>
              <div>
                <div id="stat-key" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">重点项目</div>
                <div class="disease-stat-card__trend">重点监管</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-regular fa-folder-open"></i></div>
              <div>
                <div id="stat-general" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">一般项目</div>
                <div class="disease-stat-card__trend">常规管理</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
              <div>
                <div id="stat-month" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">本月更新</div>
                <div class="disease-stat-card__trend">近 30 天有变更</div>
              </div>
            </div>
          </div>

          <div class="disease-list-area">
            <div class="disease-list-toolbar">
              <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="new-project">
                <i class="fa-solid fa-plus mr-1"></i>新增
              </button>
              <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost" data-action="export-project">
                <i class="fa-solid fa-file-export mr-1"></i>导出
              </button>
            </div>
            <div class="wh-table-shell bg-slate-950/35">
              <div class="project-table-wrap overflow-x-auto">
                <table class="project-table min-w-[1680px] w-full text-left text-[11px]">
                  <thead>
                    <tr class="bg-slate-950/75">
                      <th class="px-3 text-cyan-50/95">编号</th>
                      <th class="px-3 text-cyan-50/95">项目名称</th>
                      <th class="px-3 text-cyan-50/95">项目类型</th>
                      <th class="px-3 text-cyan-50/95">工程类别</th>
                      <th class="px-3 text-cyan-50/95">所属线路</th>
                      <th class="px-3 text-cyan-50/95">所在区间/站点</th>
                      <th class="px-3 text-cyan-50/95">上下行</th>
                      <th class="px-3 text-cyan-50/95">更新时间</th>
                      <th class="px-3 text-cyan-50/95">经度</th>
                      <th class="px-3 text-cyan-50/95">纬度</th>
                      <th class="px-3 text-cyan-50/95">开始时间</th>
                      <th class="px-3 text-cyan-50/95">结束时间</th>
                      <th class="px-3 text-cyan-50/95">工程概况</th>
                      <th class="px-3 text-cyan-50/95 disease-col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="project-table-body"></tbody>
                </table>
              </div>
              <div class="flex flex-wrap items-center justify-end gap-2 px-3 py-2.5 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
                <span>共 <b id="table-total" class="text-cyan-200">0</b> 条</span>
                <button type="button" class="min-w-[28px] h-7 rounded wh-btn-ghost text-slate-500">&lt;</button>
                <button type="button" class="min-w-[28px] h-7 rounded wh-btn-primary">1</button>
                <button type="button" class="min-w-[28px] h-7 rounded wh-btn-ghost">2</button>
                <button type="button" class="min-w-[28px] h-7 rounded wh-btn-ghost">3</button>
                <button type="button" class="min-w-[28px] h-7 rounded wh-btn-ghost">4</button>
                <button type="button" class="min-w-[28px] h-7 rounded wh-btn-ghost">5</button>
                <span>...</span>
                <button type="button" class="min-w-[28px] h-7 rounded wh-btn-ghost">69</button>
                <button type="button" class="min-w-[28px] h-7 rounded wh-btn-ghost">&gt;</button>
                <select class="wh-input h-7 px-2"><option>10 条/页</option><option>20 条/页</option></select>
                <span>跳至</span>
                <input class="wh-input h-7 w-12 px-2 text-center" />
                <span>页</span>
              </div>
            </div>
          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel project-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label class="disease-filter-span-2"><span>项目名称</span><input class="wh-input w-full px-2" data-filter placeholder="请输入搜索项目名称" /></label>
              <label><span>所属线路</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>7号线</option><option>8号线</option><option>19号线</option></select></label>
              <label><span>上下行</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>上行</option><option>下行</option></select></label>
              <label><span>所属区间</span><select class="wh-input w-full px-2" data-filter><option>请选择区间</option><option>洪山路~小洪山</option><option>松槐路~天阳大道</option></select></label>
              <label><span>所在站点</span><select class="wh-input w-full px-2" data-filter><option>请选择站点</option><option>洪山路</option><option>小洪山</option></select></label>
              <label><span>项目类型</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>一般项目</option><option>重点项目</option></select></label>
              <label><span>工程类别</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>钻孔、地勘、打桩</option><option>道路排水工程</option><option>房建工程</option></select></label>
              <label><span>是否发函</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>是</option><option>否</option></select></label>
              <label><span>是否降水</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>是</option><option>否</option></select></label>
              <label><span>是否监测</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>是</option><option>否</option></select></label>
              <label><span>评估报告风险</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>一级</option><option>二级</option><option>三级</option><option>四级</option><option>特级</option><option>无</option></select></label>
              <label><span>地质类型</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>长江三级阶地</option></select></label>
              <label><span>地铁结构类型</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>盾构结构</option><option>明挖结构</option></select></label>
              <label><span>是否与车站接驳</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>是</option><option>否</option></select></label>
              <label class="disease-filter-span-2"><span>是否签订安全协议</span><select class="wh-input w-full px-2" data-filter><option>全部</option><option>是</option><option>否</option></select></label>
              <div class="disease-filter-actions">
                <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary flex-1" data-action="search-project">搜索</button>
                <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost flex-1" data-action="reset-filter">重置</button>
              </div>
            </div>
          </div>

          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link is-active" data-quick-href="wb/in-project.html" href="in-project.html"><i class="fa-solid fa-folder-tree"></i><span>项目管理</span></a>
              <a class="disease-quick-link" data-quick-href="wb/in-project-done.html" href="in-project-done.html"><i class="fa-solid fa-circle-check"></i><span>完工项目</span></a>
              <a class="disease-quick-link hidden" data-quick-href="wb/in-project-patrol.html" href="in-project-patrol.html" aria-hidden="true" hidden><i class="fa-solid fa-route"></i><span>项目巡查</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>

    <section id="project-detail-view" class="hidden">
      <div class="mb-5 flex items-center gap-3">
        <button type="button" class="w-8 h-8 rounded-md wh-btn-ghost" data-action="back-list" title="返回">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div>
          <h1 id="project-view-title" class="text-base font-semibold text-white tracking-tight">项目详情</h1>
          <div id="project-view-subtitle" class="text-[11px] text-slate-400 mt-0.5">项目基本信息</div>
        </div>
        <div class="ml-auto flex gap-2">
          <button type="button" class="px-5 py-2 rounded text-xs wh-btn-primary project-hidden-when-readonly" data-action="save-project">保存</button>
          <button type="button" class="px-5 py-2 rounded text-xs wh-btn-ghost" data-action="back-list" id="project-back-btn">返回</button>
        </div>
      </div>

      <div id="project-detail-shell-host">
      <div class="neon-panel neon-panel--tight p-5" id="project-detail-shell">
        <div class="done-tabs" id="project-tabs">
          <button type="button" class="done-tab active" data-tab="base">项目基本信息</button>
          <button type="button" class="done-tab" data-tab="status">项目状态信息</button>
          <button type="button" class="done-tab" data-tab="units">参建单位信息</button>
          <button type="button" class="done-tab" data-tab="docs">项目相关资料</button>
          <button type="button" class="done-tab" data-tab="exchange">项目交底及交涉信息</button>
          <button type="button" class="done-tab" data-tab="monitor">监测台账</button>
        </div>

        <div class="done-tab-panel" data-panel="base">
          <div class="grid grid-cols-1 xl:grid-cols-3 gap-x-10 gap-y-4">
            <div class="flex items-center gap-3">
              <label class="project-form-label project-required">项目编号：</label>
              <input class="wh-input h-8 flex-1 px-2" value="1401" />
            </div>
            <div class="flex items-center gap-3 xl:col-span-2">
              <label class="project-form-label project-required">项目名称：</label>
              <input class="wh-input h-8 flex-1 px-2" value="花山河口公园湖心岛地勘施工项目" />
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">开始时间：</label>
              <input type="date" class="wh-input h-8 flex-1 px-2" />
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">结束时间：</label>
              <input type="date" class="wh-input h-8 flex-1 px-2" />
            </div>
            <div></div>
            <div class="flex items-center gap-3">
              <label class="project-form-label project-required">所属线路：</label>
              <select class="wh-input h-8 flex-1 px-2"><option>19号线</option><option>8号线</option></select>
            </div>

        if (payload.unit) meta.push('单位：' + payload.unit);

          body = '<img class="project-preview-image" src="' + payload.url + '" alt="' + escapeHtml(payload.name || '图片预览') + '">';

          body = '<div class="project-preview-file">' +
            '<i class="fa-regular ' + (payload.kind === "image" ? 'fa-image' : 'fa-file-lines') + '"></i>' +
            '<div class="text-base text-white mb-2">' + escapeHtml(payload.name || "未命名文件") + '</div>' +

          '<div class="project-preview-head"><div class="font-medium text-cyan-50">' + escapeHtml(payload.title || '预览') + '</div><div>' + escapeHtml(meta.join('  |  ')) + '</div></div>' +

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        if (action === "new-project") showProjectView("new");
        if (action === "detail-project") showProjectView("detail");
        if (action === "edit-project") showProjectView("edit");
        if (action === "back-list") showList();
        if (action === "save-project") {
          monitorLedger = projectMonitor.collectLedger();
          showToast("项目已保存");
          showList();
        }
        if (action === "delete-project") {
          var row = trigger.closest("tr");
          var rowIndex = row ? Number(row.getAttribute("data-row")) : -1;
          if (rowIndex > -1) {
            projects.splice(rowIndex, 1);
            renderRows();
          } else if (row) {
            row.remove();
            updateProjectStats();
          }
          showToast("项目已删除");
        }
        if (action === "view-project-records") {
          ProjectOperationLog.open({
            rowIndex: Number(trigger.getAttribute("data-row")),
            projects: projects,
            logsById: projectOperationLogs,
            maskId: "project-record-mask",
            bodyId: "project-record-body"
          });
        }
        if (action === "patrol-project") showPatrolView(Number(trigger.getAttribute("data-row")));
        if (action === "search-project") showToast("已按当前条件筛选");
        if (action === "reset-filter") {
          document.querySelectorAll("[data-filter]").forEach(function (el) {
            if (el.tagName === "SELECT") el.selectedIndex = 0;
            else el.value = "";
          });
          showToast("筛选条件已重置");
        }
        if (action === "export-project") showToast("已生成导出任务");
        if ((action === "open-contact-modal" || action === "open-doc-modal" || action === "open-exchange-modal" || action === "open-monitor-log-modal") && currentProjectMode === "detail") return;
        if (action === "open-contact-modal") {
          activeUnit = trigger.getAttribute("data-unit") || activeUnit;
          contactEditIndex = -1;
          unitRows();
          openModal("contact", "添加联系人 - " + activeUnit);
        }
        if (action === "open-doc-modal") {
          currentDocCategory = trigger.getAttribute("data-doc") || "资料";
          currentDocEditIndex = -1;
          openModal("doc", currentDocCategory);
        }
        if (action === "edit-doc") {
          if (currentProjectMode === "detail") return;
          currentDocCategory = trigger.getAttribute("data-doc") || "资料";
          currentDocEditIndex = Number(trigger.getAttribute("data-index"));
          openModal("doc", currentDocCategory);
        }
        if (action === "delete-doc") {
          if (currentProjectMode === "detail") return;
          var deleteDocCategory = trigger.getAttribute("data-doc") || "";
          var deleteDocIndex = Number(trigger.getAttribute("data-index"));
          if (docLibrary[deleteDocCategory]) docLibrary[deleteDocCategory].splice(deleteDocIndex, 1);
          docRows();
          showToast("文件已删除");
        }
        if (action === "preview-doc") {
          var previewDocCategory = trigger.getAttribute("data-doc") || "";
          var previewDocIndex = Number(trigger.getAttribute("data-index"));
          var previewDoc = ((docLibrary[previewDocCategory] || [])[previewDocIndex] || {});
          var previewFileKey = trigger.getAttribute("data-file-key");
          previewPayload = previewFileKey
            ? projectDoc.filePreviewPayload(previewDoc, previewFileKey)
            : projectDoc.buildPreviewPayload(previewDocCategory, previewDoc);
          openModal("preview", "文件预览");
        }
        if (action === "open-exchange-modal") {
          currentExchangeEditIndex = -1;
          openModal("exchange", "交涉记录");
        }
        if (action === "edit-exchange") {
          if (currentProjectMode === "detail") return;
          currentExchangeEditIndex = Number(trigger.getAttribute("data-index"));
          openModal("exchange", "编辑交涉记录");

          openModal("preview", "视频预览");
        }
        if (action === "preview-exchange-file") {
          var previewFileIndex = Number(trigger.getAttribute("data-index"));
          previewPayload = projectExchange.buildFilePreviewPayload(exchangeRecords[previewFileIndex] || {});
          openModal("preview", "文件预览");
        }
        if (action === "open-monitor-log-modal") {
          currentMonitorLogEditIndex = -1;
          openModal("monitor-log", "新增监测日志");
        }
        if (action === "edit-monitor-log") {
          if (currentProjectMode === "detail") return;
          currentMonitorLogEditIndex = Number(trigger.getAttribute("data-index"));
          openModal("monitor-log", "编辑监测日志");
        }
        if (action === "delete-monitor-log") {
          if (currentProjectMode === "detail") return;
          monitorLogs.splice(Number(trigger.getAttribute("data-index")), 1);
          projectMonitor.renderLogRows();
          showToast("监测日志已删除");
        }
        if (action === "edit-contact") {
          if (currentProjectMode === "detail") return;
          activeUnit = trigger.getAttribute("data-unit") || activeUnit;
          contactEditIndex = Number(trigger.getAttribute("data-index"));
          openModal("contact", "编辑联系人 - " + activeUnit);
        }
        if (action === "delete-contact") {
          if (currentProjectMode === "detail") return;
          activeUnit = trigger.getAttribute("data-unit") || activeUnit;
          var deleteIndex = Number(trigger.getAttribute("data-index"));
          if (!unitContacts[activeUnit]) unitContacts[activeUnit] = [];
          unitContacts[activeUnit].splice(deleteIndex, 1);
          unitRows();
          showToast("联系人已删除");
        }
        if (action === "close-modal") closeModal();
        if (action === "modal-save") {
          if (modalType === "contact") {
            var nameInput = document.getElementById("contact-name");
            var phoneInput = document.getElementById("contact-phone");
            var otherInput = document.getElementById("contact-other");
            var contact = {
              name: nameInput ? nameInput.value.trim() : "",
              phone: phoneInput ? phoneInput.value.trim() : "",
              otherContact: otherInput ? otherInput.value.trim() : ""
            };
            if (!contact.name || !contact.phone) {
              showToast("请先填写联系人和电话");
              return;
            }
            if (!unitContacts[activeUnit]) unitContacts[activeUnit] = [];
            if (contactEditIndex > -1) unitContacts[activeUnit][contactEditIndex] = contact;
            else unitContacts[activeUnit].push(contact);
            unitRows();
          } else if (modalType === "doc") {
            var existingDoc = currentDocEditIndex > -1 ? ((docLibrary[currentDocCategory] || [])[currentDocEditIndex] || {}) : {};
            var docRecord = projectDoc.collectDocRecord(currentDocCategory, existingDoc);
            if (!projectDoc.validateDocRecord(currentDocCategory, docRecord)) return;
            if (!docLibrary[currentDocCategory]) docLibrary[currentDocCategory] = [];
            if (currentDocEditIndex > -1) docLibrary[currentDocCategory][currentDocEditIndex] = docRecord;
            else docLibrary[currentDocCategory].push(docRecord);
            docRows();
          } else if (modalType === "exchange") {
            var existingExchange = currentExchangeEditIndex > -1 ? (exchangeRecords[currentExchangeEditIndex] || {}) : {};
            var exchangeRecord = projectExchange.collectRecord(existingExchange);
            if (!projectExchange.validateRecord(exchangeRecord)) return;
            if (currentExchangeEditIndex > -1) exchangeRecords[currentExchangeEditIndex] = exchangeRecord;
            else exchangeRecords.push(exchangeRecord);
            renderExchangeRows();
          } else if (modalType === "monitor-log") {
            var logRecord = projectMonitor.collectLogRecord();
            if (!projectMonitor.validateLogRecord(logRecord)) return;
            if (currentMonitorLogEditIndex > -1) monitorLogs[currentMonitorLogEditIndex] = logRecord;
            else monitorLogs.push(logRecord);
            projectMonitor.renderLogRows();
          }
          closeModal();
          showToast("已保存");
        }
      });

      mountProjectFieldSelects();

      document.getElementById("project-tabs").addEventListener("click", function (event) {
        var btn = event.target.closest("[data-tab]");
        if (!btn) return;
        switchTab(btn.getAttribute("data-tab"));
      });


      document.addEventListener("change", function (event) {
        var target = event.target;
        if (!target) return;
        if (target.getAttribute("data-unit-select") === "company") {
          if (currentProjectMode === "detail") return;
          var selectedUnit = target.getAttribute("data-unit");
          if (!selectedUnit) return;
          unitSelections[selectedUnit] = target.value || unitSelections[selectedUnit];
          unitRows();
        }
        if (target.getAttribute("data-upload-input")) {
          var uploadKey = target.getAttribute("data-upload-input");
          var nameEl = document.getElementById(uploadKey + "-name");
          var chosen = target.files && target.files[0] ? target.files[0].name : "未选择文件";
          if (nameEl) nameEl.textContent = chosen;
        }
      });

    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
