<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>巡查打分</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/patrol-table-actions.css" />
  <style>
    .disease-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }
    .disease-layout__right {
      position: sticky;
      top: 72px;
      align-self: start;
      width: 300px;
      max-height: calc(100dvh - 88px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .disease-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .disease-stat-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.22);
      background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88));
    }
    .disease-stat-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card--rose .disease-stat-card__icon { background: rgba(251, 113, 133, 0.12); color: #fda4af; border: 1px solid rgba(251, 113, 133, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel,
    .disease-quick-panel {
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.2);
      background: rgba(8, 15, 35, 0.78);
    }
    .disease-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #e2f5ff;
      margin: 0;
      padding: 8px 10px 7px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      background: rgba(8, 15, 35, 0.92);
    }
    .disease-panel-body { padding: 8px 10px 10px; }
    .disease-filter-panel .disease-panel-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .disease-filter-panel label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin: 0;
      font-size: 10px;
    }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input {
      height: 26px !important;
      min-height: 26px;
      font-size: 11px;
      padding: 0 6px;
    }
    .disease-filter-dates {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .disease-filter-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .disease-filter-actions button {
      flex: 1;
      padding-top: 4px;
      padding-bottom: 4px;
      font-size: 11px;
    }
    .disease-quick-panel .disease-panel-body { padding: 6px 10px 8px; }
    .disease-quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 5px;
      border-radius: 6px;
      border: 1px solid rgba(34, 211, 238, 0.14);
      background: rgba(15, 23, 42, 0.45);
      color: #e2f5ff;
      font-size: 11px;
      text-decoration: none;
    }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover {
      border-color: rgba(34, 211, 238, 0.4);
      background: rgba(34, 211, 238, 0.08);
      color: #fff;
    }
    .disease-quick-link.is-active {
      border-color: rgba(34, 211, 238, 0.55);
      background: rgba(34, 211, 238, 0.12);
      color: #a5f3fc;
    }
    .disease-quick-link i {
      width: 16px;
      text-align: center;
      color: #67e8f9;
      font-size: 12px;
    }
    @media (max-width: 1400px) {
      .disease-layout { grid-template-columns: 1fr; }
      .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .disease-layout__right {
        position: static;
        width: 100%;
        max-height: none;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }
    @media (max-width: 768px) {
      .disease-stats { grid-template-columns: 1fr; }
      .disease-layout__right { grid-template-columns: 1fr; }
    }
    .score-table th,
    .score-table td {
      height: 55px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .score-table th:last-child,
    .score-table td:last-child {
      border-right: 0;
    }
    .score-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
    }
    .score-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .score-action-link {
      color: #60a5fa;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .score-modal-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.52);
      padding: 24px;
    }
    .score-modal-mask.show {
      display: flex;
    }
    .score-modal {
      width: min(1860px, 96vw);
      max-height: calc(100vh - 48px);
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .score-modal__body {
      flex: 1;
      min-height: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: center;
    }
    .score-detail-wrap {
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: auto;
      max-height: calc(100vh - 220px);
      border: 1px solid rgba(34,211,238,.08);
      border-radius: 6px;
    }
    .score-detail-table th,
    .score-detail-table td {
      height: 36px;
      padding: 4px 10px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
      white-space: nowrap;
      text-align: center;
    }
    .score-detail-table th:last-child,
    .score-detail-table td:last-child {
      border-right: 0;
    }
    .score-detail-table thead th {
      background: rgba(2,8,23,.66);
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
    }
    .score-detail-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 11px;
    }
    .score-modal__footer {
      flex-shrink: 0;
      padding: 10px 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid rgba(34,211,238,.12);
      background: rgba(2, 8, 23, 0.55);
    }
    .score-pager {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .score-page-btn {
      min-width: 30px;
      height: 30px;
      padding: 0 8px;
      border: 1px solid rgba(148,163,184,.26);
      background: rgba(15,23,42,.5);
      color: rgba(226,245,255,.82);
      font-size: 12px;
      border-radius: 3px;
    }
    .score-page-btn.is-active {
      border-color: rgba(96,165,250,.66);
      color: #dbeafe;
      background: rgba(37,99,235,.18);
    }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="in-score" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">巡查打分</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">巡查打分面板</span>
    </div>

    <section id="score-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="巡查打分统计">
            <div class="disease-stat-card disease-stat-card--blue">

                <div id="stat-total" class="disease-stat-card__value">0</div>

              </div>

            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-users"></i></div>

                <div id="stat-people" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">巡查人员</div>
                <div class="disease-stat-card__trend">去重统计</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-chart-line"></i></div>
              <div>
                <div id="stat-avg" class="disease-stat-card__value">0</div>

          </div>

          <div class="disease-list-area">
            <div class="wh-table-shell bg-slate-950/35">
              <div class="am-table-wrap overflow-x-auto">
                <table class="score-table min-w-[1600px] w-full text-left">
                  <thead>
                    <tr>
                      <th class="px-4">账号</th>
                      <th class="px-4">巡查人员</th>
                      <th class="px-4">负责线路</th>
                      <th class="px-4">设备号</th>
                      <th class="px-4">巡查日期</th>
                      <th class="px-4">最低分数</th>
                      <th class="px-4 disease-col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="score-table-body"></tbody>
                </table>
              </div>
              <div class="flex flex-wrap items-center justify-end gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
                <span>共 <b id="table-total" class="text-cyan-200">0</b> 条</span>
                <div class="score-pager">
                  <button type="button" class="score-page-btn text-slate-500">&lt;</button>
                  <button type="button" class="score-page-btn is-active">1</button>
                  <button type="button" class="score-page-btn text-slate-500">&gt;</button>
                  <select class="wh-input h-[30px] px-2 text-[11px]">
                    <option>10 条/页</option>

          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label>
                <span>巡查人员</span>

              </label>
              <label>
                <span>时间范围</span>
                <div class="disease-filter-dates">
                  <input id="filter-date-start" class="wh-input w-full" value="2026-03-09 10:44:15" />
                  <input id="filter-date-end" class="wh-input w-full" value="2026-04-08 10:44:15" />
                </div>
              </label>
              <div class="disease-filter-actions">
                <button id="btn-search" type="button" class="wh-btn-primary">搜索</button>
                <button id="btn-reset" type="button" class="wh-btn-ghost">重置</button>
              </div>
            </div>
          </div>

          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link" data-quick-href="wb/in-track-person.html" href="in-track-person.html"><i class="fa-solid fa-person-walking"></i><span>人员轨迹</span></a>
              <a class="disease-quick-link" data-quick-href="wb/in-quality-stats.html" href="in-quality-stats.html"><i class="fa-solid fa-chart-line"></i><span>统计分析</span></a>
              <a class="disease-quick-link is-active" data-quick-href="wb/in-score.html" href="in-score.html"><i class="fa-solid fa-star-half-stroke"></i><span>巡查打分</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <div id="score-modal-mask" class="score-modal-mask">
    <div class="score-modal">
      <div class="h-14 px-6 flex items-center justify-between gap-3 border-b border-cyan-400/15">
        <h3 class="text-white text-[16px] font-semibold">巡查详情</h3>
        <button type="button" class="wh-modal-close" data-action="close-detail" aria-label="关闭">×</button>
      </div>
      <div class="score-modal__body">
        <div class="score-detail-wrap">
          <table class="score-detail-table min-w-[1520px] w-full text-left">
            <thead>
              <tr>
                <th class="px-4">设备号</th>
                <th class="px-4">巡查人员</th>
                <th class="px-4">区间名称</th>
                <th class="px-4">所属线路</th>
                <th class="px-4">线内时长（分钟）</th>
                <th class="px-4">线外时长（分钟）</th>
                <th class="px-4">巡查日期</th>
                <th class="px-4">得分</th>
              </tr>
            </thead>
            <tbody id="score-detail-body"></tbody>
          </table>
        </div>
      </div>
      <div class="score-modal__footer">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-detail">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="close-detail">确定</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var DEFAULT_DATE_START = "2026-03-09 10:44:15";
      var DEFAULT_DATE_END = "2026-04-08 10:44:15";

      var allListRows = [
        { account:"yanghaotian", user:"杨昊天", line:"5号线", device:"Y18807", date:"2026-04-13 00:00:00", minScore:50 },
        { account:"yanghaotian", user:"杨昊天", line:"5号线", device:"Y18807", date:"2026-04-12 00:00:00", minScore:56 },
        { account:"zhangwei", user:"张伟", line:"2号线", device:"Y15502", date:"2026-04-11 00:00:00", minScore:61 },
        { account:"liulei", user:"刘磊", line:"7号线", device:"Y17328", date:"2026-04-10 00:00:00", minScore:58 },
        { account:"wangjun", user:"王军", line:"2号线", device:"Y12216", date:"2026-04-09 00:00:00", minScore:65 },
        { account:"zhaomin", user:"赵敏", line:"11号线", device:"Y19831", date:"2026-04-08 00:00:00", minScore:63 },
        { account:"chenkai", user:"陈凯", line:"5号线", device:"Y18810", date:"2026-04-07 00:00:00", minScore:67 }
      ];
      var listRows = allListRows.slice();

      var detailMap = {
        Y18807: [
          { device:"Y18807", user:"杨昊天", section:"红霞-黄家湖", line:"5号线", inside:26.75, outside:10.75, date:"2026-04-13 00:00:00", score:70 },
          { device:"Y18807", user:"杨昊天", section:"中医药大学-白沙六路", line:"5号线", inside:57.67, outside:19.25, date:"2026-04-13 00:00:00", score:60 },
          { device:"Y18807", user:"杨昊天", section:"黄家湖-中医药大学", line:"5号线", inside:8.08, outside:0, date:"2026-04-13 00:00:00", score:50 }
        ],
        Y15502: [
          { device:"Y15502", user:"张伟", section:"常青花园-长港路", line:"2号线", inside:31.2, outside:5.4, date:"2026-04-11 00:00:00", score:82 },
          { device:"Y15502", user:"张伟", section:"长港路-汉口火车站", line:"2号线", inside:24.5, outside:7.2, date:"2026-04-11 00:00:00", score:61 }
        ],
        Y17328: [
          { device:"Y17328", user:"刘磊", section:"园博园-园博大道", line:"7号线", inside:22.14, outside:11.3, date:"2026-04-10 00:00:00", score:58 }
        ],
        Y12216: [
          { device:"Y12216", user:"王军", section:"金银潭-常青车辆段", line:"2号线", inside:39.5, outside:4.8, date:"2026-04-09 00:00:00", score:65 }
        ],
        Y19831: [
          { device:"Y19831", user:"赵敏", section:"光谷五路-左岭", line:"11号线", inside:41.9, outside:8.6, date:"2026-04-08 00:00:00", score:63 }
        ],
        Y18810: [
          { device:"Y18810", user:"陈凯", section:"白沙六路-青菱", line:"5号线", inside:44.12, outside:6.35, date:"2026-04-07 00:00:00", score:67 }
        ]
      };

      var tableBody = document.getElementById("score-table-body");
      var detailBody = document.getElementById("score-detail-body");
      var modalMask = document.getElementById("score-modal-mask");
      var tableTotal = document.getElementById("table-total");

      function parseDateTime(value) {
        var normalized = String(value || "").trim().replace(" ", "T");
        var time = Date.parse(normalized);
        return Number.isNaN(time) ? null : time;
      }

      function updateScoreStats(rows) {
        var data = rows || [];
        var people = {};
        var sum = 0;
        var low = 0;
        data.forEach(function (row) {
          people[row.user] = true;
          sum += row.minScore;
          if (row.minScore < 60) low += 1;
        });
        document.getElementById("stat-total").textContent = String(data.length);
        document.getElementById("stat-people").textContent = String(Object.keys(people).length);
        document.getElementById("stat-avg").textContent = data.length ? (sum / data.length).toFixed(1) : "0";
        document.getElementById("stat-low").textContent = String(low);
        if (tableTotal) tableTotal.textContent = String(data.length);
      }

      function initQuickLinks() {
        document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach(function (anchor) {
          var target = anchor.getAttribute("data-quick-href");
          if (target && typeof whPageHref === "function") {
            anchor.setAttribute("href", whPageHref(target));
          }
        });
      }

      function renderList() {
        tableBody.innerHTML = listRows.map(function (row, index) {
          return '<tr class="' + (index % 2 ? "bg-slate-950/10" : "bg-slate-950/22") + '">' +
            '<td class="px-4">' + row.account + '</td>' +
            '<td class="px-4">' + row.user + '</td>' +
            '<td class="px-4">' + row.line + '</td>' +
            '<td class="px-4">' + row.device + '</td>' +
            '<td class="px-4">' + row.date + '</td>' +
            '<td class="px-4">' + row.minScore + '</td>' +
            '<td class="px-4 disease-col-actions"><div class="disease-op-actions"><span class="score-action-link" data-action="open-detail" data-device="' + row.device + '">详情</span></div></td>' +
          '</tr>';
        }).join("");
        updateScoreStats(listRows);
      }

      function searchRows() {
        var start = parseDateTime(document.getElementById("filter-date-start").value);
        var end = parseDateTime(document.getElementById("filter-date-end").value);
        var userKeyword = (document.getElementById("filter-user").value || "").trim();
        listRows = allListRows.filter(function (row) {
          if (userKeyword && String(row.user || "").indexOf(userKeyword) < 0) return false;
          var rowTime = parseDateTime(row.date);
          if (rowTime === null) return true;
          if (start !== null && rowTime < start) return false;
          if (end !== null && rowTime > end) return false;
          return true;
        });
        renderList();
      }

      function resetFilters() {
        document.getElementById("filter-user").value = "";
        document.getElementById("filter-date-start").value = DEFAULT_DATE_START;
        document.getElementById("filter-date-end").value = DEFAULT_DATE_END;
        listRows = allListRows.slice();
        renderList();
      }

      function openDetail(device) {
        var rows = detailMap[device] || [];
        detailBody.innerHTML = rows.map(function (row, index) {
          return '<tr class="' + (index % 2 ? "bg-slate-950/10" : "bg-slate-950/22") + '">' +
            '<td class="px-4">' + row.device + '</td>' +
            '<td class="px-4">' + row.user + '</td>' +
            '<td class="px-4">' + row.section + '</td>' +
            '<td class="px-4">' + row.line + '</td>' +
            '<td class="px-4">' + row.inside + '</td>' +
            '<td class="px-4">' + row.outside + '</td>' +
            '<td class="px-4">' + row.date + '</td>' +
            '<td class="px-4">' + row.score + '</td>' +
          '</tr>';
        }).join("");
        modalMask.classList.add("show");
      }

      function closeDetail() {
        modalMask.classList.remove("show");
      }

      document.getElementById("btn-search").addEventListener("click", searchRows);
      document.getElementById("btn-reset").addEventListener("click", resetFilters);
      initQuickLinks();
      function setupScoreRowClick() {
        if (!window.WHTableRowClick) return window.setTimeout(setupScoreRowClick, 40);
        WHTableRowClick.bindById("score-table-body", {
          getRows: function () { return listRows; },
          onOpen: function (row) { openDetail(row.device); }
        });
      }
      setupScoreRowClick();
      renderList();

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        if (action === "open-detail") openDetail(trigger.getAttribute("data-device"));
        if (action === "close-detail") closeDetail();
      });
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
