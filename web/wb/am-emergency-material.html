<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>应急物资管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/patrol-table-actions.css" />
  <style>
    .material-table th,
    .material-table td {
      height: 52px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .material-table th:last-child,
    .material-table td:last-child { border-right: 0; }
    .material-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
      white-space: nowrap;
    }
    .material-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .material-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 10px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }
    .wh-row-open-tbody tr { cursor: pointer; }
    .wh-row-open-tbody tr:hover > td:not(:last-child) { background: rgba(14, 48, 78, 0.38) !important; }
    .material-modal-mask,
    .confirm-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.56);
      padding: 24px;
    }
    .material-modal-mask.show,
    .confirm-mask.show { display: flex; }
    .material-modal {
      width: min(760px, 90vw);
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .material-form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .material-form-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .material-form-item--textarea {
      align-items: flex-start;
    }
    .material-form-item--textarea .material-form-label {
      line-height: 32px;
    }
    .material-form-label {
      width: 88px;
      flex: 0 0 88px;
      text-align: right;
      color: rgba(226,245,255,.78);
      font-size: 12px;
    }
    .material-form-label.is-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 4px;
    }
    .wh-input--readonly {
      background: rgba(8, 47, 73, 0.55);
      color: #b8d4e8;
      cursor: not-allowed;
    }
    .confirm-card {
      width: 320px;
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.14);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .am-detail-mask {
      position: fixed;
      inset: 0;
      z-index: 115;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 8, 23, 0.72);
    }
    .am-detail-mask.show { display: flex; }
    .am-detail-dialog {
      width: min(760px, 90vw);
      max-height: min(86vh, 900px);
      border-radius: 8px;
      border: 1px solid rgba(34, 211, 238, 0.18);
      background: linear-gradient(180deg, #071525, #020617);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .am-detail-dialog__head {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
    }
    .am-detail-dialog__body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 20px 24px 16px;
    }
    .am-detail-dialog__foot {
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 14px 24px 18px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .detail-value {
      flex: 1;
      min-width: 0;
      min-height: 32px;
      line-height: 32px;
      color: rgba(226, 245, 255, 0.92);
      font-size: 12px;
      word-break: break-word;
    }
    .detail-value--multiline {
      line-height: 1.6;
      padding: 6px 0;
      white-space: pre-wrap;
    }
    .detail-value--empty { color: #64748b; }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="am-emergency-material" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <div class="flex items-center gap-3">
        <button type="button" class="w-8 h-8 rounded-md wh-btn-ghost" data-action="back-warehouse" title="返回">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div>
          <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">应急物资管理</h1>
          <div id="material-warehouse-subtitle" class="text-[11px] text-slate-400 mt-0.5">查看所属仓库物资清单</div>
        </div>
      </div>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">应急物资基础信息维护</span>
    </div>

    <section class="neon-panel neon-panel--tight p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div class="min-w-[220px]">
          <label class="wh-filter-label block mb-1.5">名称</label>
          <input id="filter-name" class="wh-input h-8 w-full px-3" placeholder="请输入物资名称" />
        </div>
        <div class="min-w-[220px]">
          <label class="wh-filter-label block mb-1.5">型号</label>
          <input id="filter-model" class="wh-input h-8 w-full px-3" placeholder="请输入型号" />
        </div>
        <div class="flex gap-2">
          <button id="btn-search-material" type="button" class="px-5 h-8 rounded text-xs wh-btn-primary">搜索</button>
          <button id="btn-reset-material" type="button" class="px-5 h-8 rounded text-xs wh-btn-ghost">重置</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-primary" data-action="new-material">新建</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-ghost">模板导出</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-ghost">导入物资</button>
        </div>
      </div>
    </section>

    <section class="wh-table-shell bg-slate-950/35">
      <div class="overflow-x-auto">
        <table class="material-table min-w-[1200px] w-full text-left">
          <thead>
            <tr>
              <th class="px-4">名称</th>
              <th class="px-4">型号</th>
              <th class="px-4">数量</th>
              <th class="px-4">所属仓库</th>
              <th class="px-4">备注</th>
              <th class="px-4 disease-col-actions">操作</th>
            </tr>
          </thead>
          <tbody id="material-table-body"></tbody>
        </table>
      </div>
      <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
        <span>共 <b id="material-table-total" class="text-cyan-200">0</b> 条</span>
        <div class="flex items-center gap-2 flex-wrap">
          <button class="min-w-[32px] h-8 rounded text-xs wh-btn-primary">1</button>
          <select class="wh-input px-2 py-1 text-[11px]"><option>10 条/页</option></select>
          <span>跳至</span>
          <input class="wh-input w-12 px-1 py-1 text-center text-[11px]" value="1" />
          <span>页</span>
        </div>
      </div>
    </section>
  </div>

  <div id="material-detail-mask" class="am-detail-mask" aria-hidden="true">
    <div class="am-detail-dialog" role="dialog" aria-labelledby="material-detail-title">
      <div class="am-detail-dialog__head">
        <div>
          <h3 id="material-detail-title" class="text-white font-semibold text-sm m-0">查看详情</h3>
          <div id="material-detail-subtitle" class="text-[11px] text-slate-400 mt-0.5">应急物资详情</div>
        </div>
        <button type="button" class="wh-modal-close text-slate-400 hover:text-white text-xl leading-none" data-action="close-material-detail" aria-label="关闭">×</button>
      </div>
      <div id="material-detail-body" class="am-detail-dialog__body"></div>
      <div class="am-detail-dialog__foot">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-material-detail">关闭</button>
      </div>
    </div>
  </div>

  <div id="material-modal-mask" class="material-modal-mask">
    <div class="material-modal">
      <div class="h-14 px-6 flex items-center border-b border-cyan-400/15">
        <h3 id="material-modal-title" class="text-white text-[16px] font-semibold">新增应急物资</h3>
        <button type="button" class="ml-auto text-slate-400 hover:text-slate-200 text-xl leading-none" data-action="close-material-modal">×</button>
      </div>
      <div class="p-6">
        <div class="material-form-grid">
          <label class="material-form-item"><span class="material-form-label is-required">名称：</span><input id="material-name" class="wh-input h-8 flex-1 px-3" placeholder="请输入名称" /></label>
          <label class="material-form-item"><span class="material-form-label is-required">型号：</span><input id="material-model" class="wh-input h-8 flex-1 px-3" placeholder="请输入型号" /></label>
          <label class="material-form-item"><span class="material-form-label is-required">数量：</span><input id="material-qty" class="wh-input h-8 flex-1 px-3" placeholder="请输入数量" /></label>
          <label class="material-form-item"><span class="material-form-label">所属仓库：</span><input id="material-warehouse" type="text" class="wh-input wh-input--readonly h-8 flex-1 px-3" readonly tabindex="-1" /></label>
          <label class="material-form-item material-form-item--textarea"><span class="material-form-label">备注：</span><textarea id="material-remark" class="wh-input flex-1 px-3 py-2 min-h-[72px] resize-y" placeholder="请输入备注"></textarea></label>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-material-modal">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="save-material">确定</button>
      </div>
    </div>
  </div>

  <div id="material-confirm-mask" class="confirm-mask">
    <div class="confirm-card">
      <div class="px-6 py-5 border-b border-cyan-400/15 text-white text-[16px] font-semibold">删除确认</div>
      <div class="px-6 py-6 text-sm text-cyan-100/80">确认删除当前物资记录吗？</div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="cancel-material-delete">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="confirm-material-delete">确定</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/am-emergency-material-data.js"></script>
  <script src="../../assets/js/am-emergency-material-page.js"></script>
  <script>
    (function () {
      document.addEventListener("DOMContentLoaded", function () {
        if (window.WHEmergencyMaterialPage) {
          WHEmergencyMaterialPage.boot({ mobile: false });
        }
      });
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
