<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/todo-modals.css" />
  <link rel="stylesheet" href="../../assets/css/alert-disposal-timeline.css" />
  <link rel="stylesheet" href="../../assets/css/expert-review-modal.css" />
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="wb-todo" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div id="wb-app"></div>
  </div>
  <div id="expert-review-modal-mask" class="expert-modal-mask" role="dialog" aria-modal="true">
    <div class="expert-modal">
      <div class="expert-modal__head">
        <h3 class="expert-modal__title">编辑复核情况</h3>
        <button type="button" class="wh-modal-close expert-modal__close" data-action="close-review-modal" aria-label="关闭">×</button>
      </div>
      <form id="expert-review-form" class="expert-modal__body">
        <div class="expert-form-row">
          <label class="expert-form-label">是否误报</label>
          <div class="expert-radio-group">
            <label><input type="radio" name="review-false-alarm" value="非误报" checked /> 非误报</label>
            <label><input type="radio" name="review-false-alarm" value="误报" /> 误报</label>
          </div>
        </div>
        <div class="expert-form-row" data-review-field-group="detail">
          <label class="expert-form-label" for="review-level-adjust">报警级别调整</label>
          <select id="review-level-adjust" class="expert-select">
            <option value="一级告警">一级告警</option>
            <option value="二级告警">二级告警</option>
            <option value="三级告警">三级告警</option>
          </select>
        </div>
        <div class="expert-form-row" data-review-field-group="detail">
          <label class="expert-form-label" for="review-scene">现场情况</label>
          <textarea id="review-scene" class="expert-textarea" placeholder="请填写现场复核情况"></textarea>
        </div>
        <div class="expert-form-row" data-review-field-group="detail">
          <label class="expert-form-label">现场照片</label>
          <div id="review-modal-photos" class="expert-photo-grid"></div>
          <p class="expert-photo-upload"><input id="review-photo-input" type="file" accept="image/*" multiple /> 支持多图上传</p>
        </div>
      </form>
      <div class="expert-modal__foot">
        <button type="button" class="px-4 h-8 rounded text-[12px] wh-btn-ghost" data-action="close-review-modal">取消</button>
        <button type="button" class="px-4 h-8 rounded bg-[#178df2] text-white text-[12px]" data-action="save-review-modal">保存</button>
      </div>
    </div>
  </div>
  <div id="alert-audit-modal-mask" class="expert-modal-mask" role="dialog" aria-modal="true">
    <div class="expert-modal">
      <div class="expert-modal__head">
        <h3 class="expert-modal__title">告警审核</h3>
        <button type="button" class="wh-modal-close expert-modal__close" data-action="close-audit-modal" aria-label="关闭">×</button>
      </div>
      <div class="expert-modal__body">
        <div class="expert-form-row">
          <label class="expert-form-label" for="audit-opinion">审批意见</label>
          <textarea id="audit-opinion" class="expert-textarea" placeholder="请填写审批意见"></textarea>
        </div>
      </div>
      <div class="expert-modal__foot">
        <button type="button" class="px-4 h-8 rounded text-[12px] border border-rose-400/50 text-rose-200" data-action="audit-reject">驳回</button>
        <button type="button" class="px-4 h-8 rounded bg-[#178df2] text-white text-[12px]" data-action="audit-pass">审批通过</button>
      </div>
    </div>
  </div>
  <div id="expert-toast" class="expert-toast" role="status"></div>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
  <script src="../../assets/js/approval-timeline.js"></script>
  <script src="../../assets/js/alert-disposal-timeline.js"></script>
  <script src="../../assets/js/expert-review-modal.js"></script>
  <script src="../../assets/js/todo-modal-bridge.js"></script>
  <script src="../../assets/js/workbench-module.js"></script>
</body>
</html>
