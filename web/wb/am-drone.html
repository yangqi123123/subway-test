<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无人机设备管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/patrol-table-actions.css" />
  <style>
    .disease-layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px;align-items:start}
    .disease-layout__right{position:sticky;top:72px;align-self:start;width:300px;max-height:calc(100dvh - 88px);display:flex;flex-direction:column;gap:10px}
    .disease-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
    .disease-stat-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:10px;border:1px solid rgba(34,211,238,.22);background:linear-gradient(135deg,rgba(8,15,35,.92),rgba(6,12,28,.88))}
    .disease-stat-card__icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .disease-stat-card--blue .disease-stat-card__icon{background:rgba(59,130,246,.18);color:#93c5fd;border:1px solid rgba(59,130,246,.35)}
    .disease-stat-card--cyan .disease-stat-card__icon{background:rgba(34,211,238,.12);color:#67e8f9;border:1px solid rgba(34,211,238,.35)}
    .disease-stat-card--green .disease-stat-card__icon{background:rgba(74,222,128,.12);color:#86efac;border:1px solid rgba(74,222,128,.35)}
    .disease-stat-card--amber .disease-stat-card__icon{background:rgba(251,191,36,.12);color:#fcd34d;border:1px solid rgba(251,191,36,.35)}
    .disease-stat-card__value{font-size:22px;font-weight:700;color:#f0f9ff;line-height:1.2}
    .disease-stat-card__label{font-size:11px;color:#94a3b8;margin-top:2px}
    .disease-stat-card__trend{font-size:10px;margin-top:4px;color:#94a3b8}
    .disease-filter-panel,.disease-quick-panel{display:flex;flex-direction:column;border-radius:10px;border:1px solid rgba(34,211,238,.2);background:rgba(8,15,35,.78)}
    .disease-panel-title{font-size:12px;font-weight:600;color:#e2f5ff;margin:0;padding:8px 10px 7px;border-bottom:1px solid rgba(34,211,238,.12);background:rgba(8,15,35,.92)}
    .disease-panel-body{padding:8px 10px 10px}
    .disease-filter-panel .disease-panel-body{display:flex;flex-direction:column;gap:6px}
    .disease-filter-panel label{display:flex;flex-direction:column;gap:3px;margin:0;font-size:10px}
    .disease-filter-panel label>span:first-child{color:#94a3b8}
    .disease-filter-panel .wh-input{height:26px!important;min-height:26px;font-size:11px;padding:0 6px}
    .disease-filter-actions{display:flex;gap:6px;margin-top:4px;padding-top:6px;border-top:1px solid rgba(34,211,238,.1)}
    .disease-filter-actions button{flex:1;padding-top:4px;padding-bottom:4px;font-size:11px}
    .disease-list-toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
    .disease-quick-panel .disease-panel-body{padding:6px 10px 8px}
    .disease-quick-link{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;margin-bottom:5px;border-radius:6px;border:1px solid rgba(34,211,238,.14);background:rgba(15,23,42,.45);color:#e2f5ff;font-size:11px;text-decoration:none}
    .disease-quick-link:last-child{margin-bottom:0}
    .disease-quick-link:hover{border-color:rgba(34,211,238,.4);background:rgba(34,211,238,.08);color:#fff}
    .disease-quick-link.is-active{border-color:rgba(34,211,238,.55);background:rgba(34,211,238,.12);color:#a5f3fc}
    .disease-quick-link i{width:16px;text-align:center;color:#67e8f9;font-size:12px}
    @media(max-width:1400px){.disease-layout{grid-template-columns:1fr}.disease-stats{grid-template-columns:repeat(2,minmax(0,1fr))}.disease-layout__right{position:static;width:100%;max-height:none;display:grid;grid-template-columns:1fr 1fr;gap:10px}}
    @media(max-width:768px){.disease-stats{grid-template-columns:1fr}.disease-layout__right{grid-template-columns:1fr}}
    .dr-table th,.dr-table td{height:52px;border-right:1px solid rgba(34,211,238,.08);border-bottom:1px solid rgba(34,211,238,.08);vertical-align:middle}
    .dr-table th:last-child,.dr-table td:last-child{border-right:0}.dr-table thead th{background:rgba(2,8,23,.66);color:rgba(240,249,255,.96);font-size:12px;font-weight:600;white-space:nowrap}.dr-table tbody td{color:rgba(226,245,255,.88);font-size:12px}
    .dr-action{display:inline-flex;align-items:center;gap:4px;margin-right:10px;white-space:nowrap;cursor:pointer;font-size:12px}.dr-dot{display:inline-block;width:8px;height:8px;border-radius:999px;margin-right:6px;box-shadow:0 0 10px currentColor}.online{color:#86efac}.offline{color:#94a3b8}.error{color:#fb7185}.maintain{color:#fde047}.req{color:#fb7185;margin-right:3px}
    .dr-modal-mask{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.58);padding:20px}.dr-modal-mask.show{display:flex}.dr-modal{width:min(960px,94vw);max-height:90vh;overflow:auto;border-radius:8px;border:1px solid rgba(34,211,238,.16);background:#071426;box-shadow:0 24px 80px rgba(0,0,0,.48)}.dr-modal--wide{width:min(1500px,96vw)}
    .dr-form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px 28px}.dr-form-item{display:flex;align-items:center;gap:10px}.dr-form-label{width:120px;flex:0 0 120px;text-align:right;color:rgba(226,245,255,.78);font-size:12px}
    .dr-card{border:1px solid rgba(34,211,238,.18);border-radius:8px;background:rgba(8,15,35,.68);box-shadow:0 12px 32px rgba(0,0,0,.25)}.dr-map{height:220px;border:1px solid rgba(34,211,238,.18);border-radius:8px;position:relative;overflow:hidden;background:#081525}.dr-map img{width:100%;height:100%;object-fit:cover;filter:saturate(1.08) contrast(1.08) brightness(.76)}.dr-map::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(2,8,23,.04),rgba(2,8,23,.48));pointer-events:none}.dr-marker{position:absolute;left:56%;top:45%;z-index:2;width:16px;height:16px;border-radius:999px;background:#fbbf24;box-shadow:0 0 0 8px rgba(251,191,36,.16),0 0 24px rgba(251,191,36,.8)}.dr-photo{height:112px;border-radius:8px;border:1px solid rgba(34,211,238,.16);overflow:hidden;background:#0f172a}.dr-photo img{width:100%;height:100%;object-fit:cover;display:block}.dr-preview{height:360px;border:1px solid rgba(34,211,238,.18);border-radius:8px;background:linear-gradient(135deg,rgba(8,47,73,.55),rgba(15,23,42,.95));display:flex;align-items:center;justify-content:center;color:#bae6fd}
    @media(max-width:860px){.dr-form-grid{grid-template-columns:1fr}.dr-form-label{width:104px;flex-basis:104px}}
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="am-drone" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,.25)">无人机设备管理</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">无人机设备面板</span>
    </div>

    <section id="drone-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="无人机设备统计">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-plane-up"></i></div>
              <div>
                <div id="stat-total" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">设备总数</div>
                <div class="disease-stat-card__trend">当前列表</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-signal"></i></div>
              <div>
                <div id="stat-online" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">在线</div>
                <div class="disease-stat-card__trend">可执行任务</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-screwdriver-wrench"></i></div>
              <div>
                <div id="stat-maintain" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">维护中</div>
                <div class="disease-stat-card__trend">暂停使用</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-train-subway"></i></div>
              <div>
                <div id="stat-lines" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">覆盖线路</div>
                <div class="disease-stat-card__trend">线路去重</div>
              </div>
            </div>
          </div>

          <div class="disease-list-area">
            <div class="disease-list-toolbar">
              <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="new">
                <i class="fa-solid fa-plus mr-1"></i>新增
              </button>
              <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost" data-action="toast">
                <i class="fa-solid fa-file-export mr-1"></i>导出
              </button>
            </div>
            <div class="wh-table-shell bg-slate-950/35">
              <div class="am-table-wrap overflow-x-auto">
                <table class="dr-table min-w-[2000px] w-full text-left">
                  <thead>
                    <tr>
                      <th class="px-4">设备型号</th>
                      <th class="px-4">设备SN</th>
                      <th class="px-4">设备名称</th>
                      <th class="px-4">所属机场</th>
                      <th class="px-4">所属线路</th>
                      <th class="px-4">当前状态</th>
                      <th class="px-4">位置坐标</th>
                      <th class="px-4">最后在线时间</th>
                      <th class="px-4">购买日期</th>
                      <th class="px-4">质保结束日期</th>
                      <th class="px-4">飞手姓名</th>
                      <th class="px-4">厂家</th>
                      <th class="px-4">重量</th>
                      <th class="px-4">配件信息</th>
                      <th class="px-4 disease-col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
              <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
                <span>共 <b id="table-total" class="text-cyan-200">0</b> 条</span>
                <button type="button" class="min-w-[32px] h-8 rounded text-xs wh-btn-primary">1</button>
              </div>
            </div>
          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label>
                <span>设备型号 / 名称</span>
                <input id="search-key" type="search" class="wh-input w-full" placeholder="请输入设备型号或设备名称" />
              </label>
              <div class="disease-filter-actions">
                <button type="button" class="wh-btn-primary" data-action="search">搜索</button>
                <button type="button" class="wh-btn-ghost" data-action="reset">重置</button>
              </div>
            </div>
          </div>
          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link" data-quick-href="wb/am-airport.html" href="am-airport.html"><i class="fa-solid fa-warehouse"></i><span>机场设备管理</span></a>
              <a class="disease-quick-link is-active" data-quick-href="wb/am-drone.html" href="am-drone.html"><i class="fa-solid fa-plane-up"></i><span>无人机设备管理</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <div id="form-mask" class="dr-modal-mask"><div class="dr-modal"><div class="h-14 px-6 flex items-center justify-between gap-3 border-b border-cyan-400/15"><h3 id="form-title" class="text-white text-[16px] font-semibold">新增无人机设备</h3><button type="button" class="wh-modal-close" aria-label="关闭" data-action="close">×</button></div><div class="p-6"><div class="dr-form-grid">
    <label class="dr-form-item"><span class="dr-form-label"><b class="req">*</b>设备型号：</span><input id="f-model" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label"><b class="req">*</b>设备SN：</span><input id="f-sn" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label"><b class="req">*</b>设备名称：</span><input id="f-name" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label"><b class="req">*</b>所属线路：</span><select id="f-line" class="wh-input h-8 flex-1 px-2"><option>8号线</option><option>7号线</option><option>11号线</option></select></label><label class="dr-form-item"><span class="dr-form-label">飞手姓名：</span><input id="f-pilot" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label">经度：</span><input id="f-lng" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label">纬度：</span><input id="f-lat" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label">购买日期：</span><input id="f-buy" type="date" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label">质保结束日期：</span><input id="f-warranty" type="date" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label">厂家：</span><input id="f-maker" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label">重量：</span><input id="f-weight" class="wh-input h-8 flex-1 px-3" /></label><label class="dr-form-item"><span class="dr-form-label">上传照片：</span><input id="f-photo" type="file" accept="image/*" class="wh-input h-8 flex-1 px-2 py-1" /></label><label class="dr-form-item" style="grid-column:1/-1"><span class="dr-form-label">配件信息：</span><input id="f-parts" class="wh-input h-8 flex-1 px-3" /></label>
  </div></div><div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15"><button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close">取消</button><button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="save">确定</button></div></div></div>

  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
  <script src="../../assets/js/drone-detail-shared.js"></script>
  <script src="../../assets/js/drone-form-shared.js"></script>
  <script>
    (function(){
      var rows=[
        {model:"M3TD",sn:"1581F6Q8D246500G10GP",name:"车辆段无人机",airport:"车辆段机场",line:"8号线",status:"在线",lng:"114.31962",lat:"30.57324",last:"2026-05-13 09:28",buy:"2024-11-27",warranty:"2027-11-27",pilot:"张三",maker:"大疆",weight:"345g",parts:"电池3块、桨叶2套"},
        {model:"M3TD",sn:"1581F6Q8D246500G10GQ",name:"青山巡检无人机",airport:"青山机场",line:"8号线",status:"在线",lng:"114.40231",lat:"30.63166",last:"2026-05-13 08:46",buy:"2024-11-27",warranty:"2027-11-27",pilot:"李四",maker:"大疆",weight:"345g",parts:"电池2块、喊话器"},
        {model:"M350 RTK",sn:"1ZNBJ7X00A0098",name:"长江新区无人机",airport:"长江新区机场",line:"11号线",status:"维护中",lng:"114.52108",lat:"30.61589",last:"2026-05-12 18:20",buy:"2025-02-18",warranty:"2028-02-18",pilot:"王五",maker:"大疆",weight:"6.47kg",parts:"禅思相机、探照灯"}
      ];
      var displayRows=rows.slice(),editIndex=-1,body=document.getElementById("table-body"),form=document.getElementById("form-mask");
      function findRowIndex(sn){return rows.findIndex(function(r){return r.sn===sn})}
      function statusHtml(s){var cls=s==="在线"?"online":s==="故障"?"error":s==="维护中"?"maintain":"offline";return '<span class="'+cls+'"><i class="dr-dot"></i>'+s+'</span>'}
      function updateDroneStats(list){
        var lines={},online=0,maintain=0;
        list.forEach(function(r){
          lines[r.line]=true;
          if(r.status==="在线") online++;
          if(r.status==="维护中") maintain++;
        });
        document.getElementById("stat-total").textContent=String(list.length);
        document.getElementById("stat-online").textContent=String(online);
        document.getElementById("stat-maintain").textContent=String(maintain);
        document.getElementById("stat-lines").textContent=String(Object.keys(lines).length);
        var totalEl=document.getElementById("table-total");
        if(totalEl) totalEl.textContent=String(list.length);
      }
      function initQuickLinks(){
        document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach(function(anchor){
          var target=anchor.getAttribute("data-quick-href");
          if(target&&typeof whPageHref==="function") anchor.setAttribute("href",whPageHref(target));
        });
      }
      function render(list){
        body.innerHTML=list.map(function(r,i){
          return '<tr data-drone-sn="'+r.sn+'" class="'+(i%2?'bg-slate-950/10':'bg-slate-950/22')+'"><td class="px-4">'+r.model+'</td><td class="px-4">'+r.sn+'</td><td class="px-4">'+r.name+'</td><td class="px-4">'+(r.airport||'-')+'</td><td class="px-4">'+r.line+'</td><td class="px-4">'+statusHtml(r.status)+'</td><td class="px-4"><span class="text-cyan-300 cursor-pointer" data-action="map" data-drone-sn="'+r.sn+'">GPS坐标或地图标记链接（点击此处跳转地图并居中放大该位置）</span></td><td class="px-4">'+r.last+'</td><td class="px-4">'+r.buy+'</td><td class="px-4">'+r.warranty+'</td><td class="px-4">'+r.pilot+'</td><td class="px-4">'+r.maker+'</td><td class="px-4">'+r.weight+'</td><td class="px-4">'+r.parts+'</td><td class="px-4 disease-col-actions"><div class="disease-op-actions"><span class="dr-action text-cyan-300" data-action="detail" data-drone-sn="'+r.sn+'">详情</span><span class="dr-action text-amber-300" data-action="edit" data-drone-sn="'+r.sn+'">编辑</span><span class="dr-action text-rose-300" data-action="delete" data-drone-sn="'+r.sn+'">删除</span></div></td></tr>';
        }).join("");
        updateDroneStats(list);
      }
      function applyFilter(){
        var key=document.getElementById("search-key").value.trim();
        displayRows=rows.filter(function(r){
          return !key||r.model.indexOf(key)>-1||r.name.indexOf(key)>-1||(r.airport||"").indexOf(key)>-1;
        });
        render(displayRows);
      }
      function openForm(i){editIndex=typeof i==="number"?i:-1;document.getElementById("form-title").textContent=editIndex>-1?"编辑无人机设备":"新增无人机设备";fill(rows[editIndex]);form.classList.add("show")}
      function save(){var need=["model","sn","name"];for(var i=0;i<need.length;i++){if(!document.getElementById("f-"+need[i]).value.trim()){alert("请完善必填项");return}}var line=document.getElementById("f-line").value,r={last:"2026-05-13 10:00",status:"在线"};["model","sn","name","line","pilot","lng","lat","buy","warranty","maker","weight","parts"].forEach(function(k){r[k]=document.getElementById("f-"+k).value});if(editIndex>-1)rows[editIndex]=Object.assign(rows[editIndex],r);else rows.unshift(r);form.classList.remove("show");render(rows)}
      document.addEventListener("click",function(e){
        var a=e.target.closest("[data-action]");if(!a)return;
        var act=a.dataset.action,sn=a.getAttribute("data-drone-sn"),idx=sn?findRowIndex(sn):-1;
        if(act==="new") window.WHDroneForm.open(null,function(data){if(!data.status)data.status="在线";rows.unshift(data);applyFilter()});
        if(act==="edit"&&idx>-1) window.WHDroneForm.open(rows[idx],function(data){rows[idx]=Object.assign(rows[idx],data);applyFilter()});
        if(act==="save") save();
        if(act==="close") form.classList.remove("show");
        if(act==="detail"&&idx>-1) window.WHDroneDetail.open(rows[idx]);
        if(act==="delete"&&idx>-1&&confirm("确认删除该无人机设备？")){rows.splice(idx,1);applyFilter()}
        if(act==="search") applyFilter();
        if(act==="reset"){document.getElementById("search-key").value="";displayRows=rows.slice();render(displayRows)}
        if(["toast","map"].indexOf(act)>-1) alert("原型演示：操作已触发");
      });
      initQuickLinks();
      function setupDroneRowClick() {
        if (!window.WHTableRowClick) return window.setTimeout(setupDroneRowClick, 40);
        WHTableRowClick.bindById("table-body", {
          onOpenByTr: function (tr) {
            var sn = tr.getAttribute("data-drone-sn");
            if (!sn) return;
            var idx = rows.findIndex(function (r) { return r.sn === sn; });
            if (idx > -1 && window.WHDroneDetail) WHDroneDetail.open(rows[idx]);
          }
        });
      }
      setupDroneRowClick();
      render(displayRows);
    })();
  </script>
</body>
</html>
