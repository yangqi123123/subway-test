<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>应急预案管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <style>
    .plan-table th,
    .plan-table td {
      height: 52px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .plan-table th:last-child,
    .plan-table td:last-child { border-right: 0; }
    .plan-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
      white-space: nowrap;
    }
    .plan-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .plan-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 10px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }
    .plan-modal-mask,
    .confirm-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.56);
      padding: 24px;
    }
    .plan-modal-mask.show,
    .confirm-mask.show { display: flex; }
    .plan-modal {
      width: min(860px, 92vw);
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: visible;
    }
    .plan-modal .p-6 { overflow: visible; }
    .plan-form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .plan-form-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .plan-form-label {
      width: 108px;
      flex: 0 0 108px;
      text-align: right;
      color: rgba(226,245,255,.78);
      font-size: 12px;
    }
    .plan-form-label.is-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 4px;
    }
    .confirm-card {
      width: 320px;
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.14);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="am-emergency-plan" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <nav class="neon-panel neon-panel--tight mb-4 px-4 py-2.5 flex flex-wrap items-center gap-2 text-[11px] text-slate-400">
      <span class="text-cyan-400"><i class="fa-solid fa-location-crosshairs"></i></span>
      <span>我的工作台</span>
      <span class="text-slate-600">&gt;&gt;</span>
      <span class="text-cyan-50 font-semibold tracking-wide">应急预案管理</span>
    </nav>

    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">应急预案管理</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">应急预案信息维护</span>
    </div>

    <section class="neon-panel neon-panel--tight p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div class="min-w-[240px]">
          <label class="wh-filter-label block mb-1.5">名称</label>
          <input class="wh-input h-8 w-full px-3" placeholder="请输入预案名称" />
        </div>
        <div class="flex gap-2">
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-primary">搜索</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-ghost">重置</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-primary" data-action="new-plan">新建</button>
        </div>
      </div>
    </section>

    <section class="wh-table-shell bg-slate-950/35">
      <div class="overflow-x-auto">
        <table class="plan-table min-w-[1200px] w-full text-left">
          <thead>
            <tr>
              <th class="px-4">名称</th>
              <th class="px-4">应急部门</th>
              <th class="px-4">备注</th>
              <th class="px-4">操作</th>
            </tr>
          </thead>
          <tbody id="plan-table-body"></tbody>
        </table>
      </div>
      <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
        <span>共 <b class="text-cyan-200">4</b> 条</span>
        <div class="flex items-center gap-2 flex-wrap">
          <button class="min-w-[32px] h-8 rounded text-xs wh-btn-primary">1</button>
          <select class="wh-input px-2 py-1 text-[11px]"><option>10 条/页</option></select>
          <span>跳至</span>
          <input class="wh-input w-12 px-1 py-1 text-center text-[11px]" value="1" />
          <span>页</span>
        </div>
      </div>
    </section>
  </div>

  <div id="plan-modal-mask" class="plan-modal-mask">
    <div class="plan-modal">
      <div class="h-14 px-6 flex items-center justify-between gap-3 border-b border-cyan-400/15">
        <h3 id="plan-modal-title" class="text-white text-[16px] font-semibold">新增应急预案</h3>
        <button type="button" class="wh-modal-close" aria-label="关闭" data-action="close-plan-modal">×</button>
      </div>
      <div class="p-6">
        <div class="plan-form-grid">
          <label class="plan-form-item"><span class="plan-form-label is-required">名称：</span><input id="plan-name" class="wh-input h-8 flex-1 px-3" placeholder="请输入名称" /></label>
          <label class="plan-form-item wh-form-item--select"><span class="plan-form-label is-required">应急部门：</span><div id="plan-dept-select" class="wh-search-select flex-1 min-w-0" data-input-id="plan-dept"></div></label>
          <label class="plan-form-item"><span class="plan-form-label">备注：</span><input id="plan-remark" class="wh-input h-8 flex-1 px-3" placeholder="请输入备注" /></label>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-plan-modal">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="save-plan">确定</button>
      </div>
    </div>
  </div>

  <div id="confirm-mask" class="confirm-mask">
    <div class="confirm-card">
      <div class="px-6 py-5 border-b border-cyan-400/15 text-white text-[16px] font-semibold">删除确认</div>
      <div class="px-6 py-6 text-sm text-cyan-100/80">确认删除当前预案记录吗？</div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="cancel-plan-delete">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="confirm-plan-delete">确定</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/search-select.js"></script>
  <script>
    (function () {
      var deptSelect = WHSearchSelect.mountById("plan-dept-select", "请搜索或选择部门", WHSearchSelect.DEPT_OPTIONS);

      var rows = [
        { name:"土建", dept:"应急中心", remark:"适用于土建施工相关突发事件处置" },
        { name:"隧道结构涌水涌沙", dept:"巡检部", remark:"适用于隧道结构突发涌水涌沙场景" },
        { name:"道床变形", dept:"应急中心", remark:"适用于道床变形抢修处置" },
        { name:"胀轨", dept:"巡检部", remark:"适用于高温胀轨应急处置" },
        { name:"雨水倒灌", dept:"应急中心", remark:"适用于强降雨倒灌抢险处置" },
        { name:"钢轨折断", dept:"物资部", remark:"适用于钢轨折断应急抢修" },
        { name:"道岔挤岔", dept:"调度部", remark:"适用于道岔异常挤岔处置" },
        { name:"其他", dept:"应急中心", remark:"适用于未归类应急场景" }
      ];

      var editIndex = -1;
      var deleteIndex = -1;
      var tableBody = document.getElementById("plan-table-body");
      var modalMask = document.getElementById("plan-modal-mask");
      var confirmMask = document.getElementById("confirm-mask");
      var modalTitle = document.getElementById("plan-modal-title");

      function renderRows() {
        tableBody.innerHTML = rows.map(function (row, index) {
          return '<tr class="' + (index % 2 ? 'bg-slate-950/10' : 'bg-slate-950/22') + '">' +
            '<td class="px-4">' + row.name + '</td>' +
            '<td class="px-4">' + row.dept + '</td>' +
            '<td class="px-4">' + row.remark + '</td>' +
            '<td class="px-4">' +
              '<span class="plan-action text-amber-300" data-action="edit-plan" data-index="' + index + '"><i class="fa-regular fa-pen-to-square"></i>编辑</span>' +
              '<span class="plan-action text-sky-300" onclick="location.href=\'am-emergency-material.html\'"><i class="fa-regular fa-boxes-stacked"></i>查看物资调配</span>' +
              '<span class="plan-action text-rose-300" data-action="delete-plan" data-index="' + index + '"><i class="fa-regular fa-trash-can"></i>删除</span>' +
            '</td>' +
          '</tr>';
        }).join("");
      }

      function normalizeDeptValue(dept) {
        if (!dept) return "";
        var parts = String(dept).split("、");
        return parts[0] ? parts[0].trim() : dept;
      }

      function openModal(mode, index) {
        WHSearchSelect.closeAll(null);
        editIndex = mode === "edit" ? index : -1;
        modalTitle.textContent = mode === "edit" ? "编辑应急预案" : "新增应急预案";
        var row = index > -1 ? rows[index] : null;
        document.getElementById("plan-name").value = row ? row.name : "";
        document.getElementById("plan-remark").value = row ? row.remark : "";
        if (deptSelect) deptSelect.setValue(row ? normalizeDeptValue(row.dept) : "");
        modalMask.classList.add("show");
      }

      function savePlan() {
        var name = document.getElementById("plan-name").value.trim();
        var dept = deptSelect ? deptSelect.getValue() : "";
        if (!name) {
          alert("请完善必填项：名称");
          return;
        }
        if (!dept) {
          alert("请选择应急部门");
          return;
        }
        var row = {
          name: name,
          dept: dept,
          remark: document.getElementById("plan-remark").value.trim() || "-"
        };
        if (editIndex > -1) rows[editIndex] = row;
        else rows.unshift(row);
        modalMask.classList.remove("show");
        renderRows();
      }

      renderRows();

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        var index = Number(trigger.getAttribute("data-index"));
        if (action === "new-plan") openModal("new");
        if (action === "edit-plan") openModal("edit", index);
        if (action === "delete-plan") {
          deleteIndex = index;
          confirmMask.classList.add("show");
        }
        if (action === "close-plan-modal") modalMask.classList.remove("show");
        if (action === "save-plan") savePlan();
        if (action === "cancel-plan-delete") {
          deleteIndex = -1;
          confirmMask.classList.remove("show");
        }
        if (action === "confirm-plan-delete") {
          if (deleteIndex > -1) rows.splice(deleteIndex, 1);
          deleteIndex = -1;
          confirmMask.classList.remove("show");
          renderRows();
        }
      });
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
