<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>应急仓库管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/patrol-table-actions.css" />
  <style>
    .disease-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }
    .disease-layout__right {
      position: sticky;
      top: 72px;
      align-self: start;
      width: 300px;
      max-height: calc(100dvh - 88px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .disease-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .disease-stat-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.22);
      background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88));
    }
    .disease-stat-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel,
    .disease-quick-panel {
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.2);
      background: rgba(8, 15, 35, 0.78);
    }
    .disease-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #e2f5ff;
      margin: 0;
      padding: 8px 10px 7px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      background: rgba(8, 15, 35, 0.92);
    }
    .disease-panel-body { padding: 8px 10px 10px; }
    .disease-filter-panel .disease-panel-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .disease-filter-panel label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin: 0;
      font-size: 10px;
    }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input {
      height: 26px !important;
      min-height: 26px;
      font-size: 11px;
      padding: 0 6px;
    }
    .disease-filter-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .disease-filter-actions button {
      flex: 1;
      padding-top: 4px;
      padding-bottom: 4px;
      font-size: 11px;
    }
    .disease-list-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .disease-quick-panel .disease-panel-body { padding: 6px 10px 8px; }
    .disease-quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 5px;
      border-radius: 6px;
      border: 1px solid rgba(34, 211, 238, 0.14);
      background: rgba(15, 23, 42, 0.45);
      color: #e2f5ff;
      font-size: 11px;
      text-decoration: none;
    }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover {
      border-color: rgba(34, 211, 238, 0.4);
      background: rgba(34, 211, 238, 0.08);
      color: #fff;
    }
    .disease-quick-link.is-active {
      border-color: rgba(34, 211, 238, 0.55);
      background: rgba(34, 211, 238, 0.12);
      color: #a5f3fc;
    }
    .disease-quick-link i {
      width: 16px;
      text-align: center;
      color: #67e8f9;
      font-size: 12px;
    }
    @media (max-width: 1400px) {
      .disease-layout { grid-template-columns: 1fr; }
      .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .disease-layout__right {
        position: static;
        width: 100%;
        max-height: none;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }
    @media (max-width: 768px) {
      .disease-stats { grid-template-columns: 1fr; }
      .disease-layout__right { grid-template-columns: 1fr; }
    }
    .warehouse-table th,
    .warehouse-table td {
      height: 52px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .warehouse-table th:last-child,
    .warehouse-table td:last-child { border-right: 0; }
    .warehouse-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
      white-space: nowrap;
    }
    .warehouse-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .warehouse-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 10px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }
    .warehouse-modal-mask,
    .confirm-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.56);
      padding: 24px;
    }
    .warehouse-modal-mask.show,
    .confirm-mask.show { display: flex; }
    .warehouse-modal {
      width: min(980px, 94vw);
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: visible;
    }
    .warehouse-modal .p-6 { overflow: visible; }
    .warehouse-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 28px;
    }
    .warehouse-form-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .warehouse-form-label {
      width: 108px;
      flex: 0 0 108px;
      text-align: right;
      color: rgba(226,245,255,.78);
      font-size: 12px;
    }
    .warehouse-form-label.is-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 4px;
    }
    .confirm-card {
      width: 320px;
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.14);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .am-detail-mask {
      position: fixed;
      inset: 0;
      z-index: 115;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 8, 23, 0.72);
    }
    .am-detail-mask.show { display: flex; }
    .am-detail-dialog {
      width: min(980px, 96vw);
      max-height: min(86vh, 900px);
      border-radius: 8px;
      border: 1px solid rgba(34, 211, 238, 0.18);
      background: linear-gradient(180deg, #071525, #020617);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .am-detail-dialog__head {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
    }
    .am-detail-dialog__body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 20px 24px 16px;
    }
    .am-detail-dialog__foot {
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 14px 24px 18px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .detail-value {
      flex: 1;
      min-width: 0;
      min-height: 32px;
      line-height: 32px;
      color: rgba(226, 245, 255, 0.92);
      font-size: 12px;
      word-break: break-word;
    }
    .detail-value--empty { color: #64748b; }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="am-emergency-warehouse" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">应急仓库管理</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">应急仓库面板</span>
    </div>

    <section id="warehouse-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="应急仓库统计">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-warehouse"></i></div>
              <div>
                <div id="stat-total" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">仓库总数</div>
                <div class="disease-stat-card__trend">应急台账</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-train-subway"></i></div>
              <div>
                <div id="stat-lines" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">覆盖线路</div>
                <div class="disease-stat-card__trend">线路去重</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-building"></i></div>
              <div>
                <div id="stat-dept" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">覆盖部门</div>
                <div class="disease-stat-card__trend">部门去重</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-user-tie"></i></div>
              <div>
                <div id="stat-owners" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">负责人</div>
                <div class="disease-stat-card__trend">去重统计</div>
              </div>
            </div>
          </div>

          <div class="disease-list-area">
            <div class="disease-list-toolbar">
              <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="new-warehouse">
                <i class="fa-solid fa-plus mr-1"></i>新建
              </button>
            </div>
            <div class="wh-table-shell bg-slate-950/35">
              <div class="am-table-wrap overflow-x-auto">
                <table class="warehouse-table min-w-[2100px] w-full text-left">
                  <thead>
                    <tr>
                      <th class="px-4">名称</th>
                      <th class="px-4">所属部门</th>
                      <th class="px-4">所属线路</th>
                      <th class="px-4">仓库地址</th>
                      <th class="px-4">仓库地址经度</th>
                      <th class="px-4">仓库地址纬度</th>
                      <th class="px-4">负责人</th>
                      <th class="px-4">联系电话</th>
                      <th class="px-4">备注</th>
                      <th class="px-4 disease-col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="warehouse-table-body"></tbody>
                </table>
              </div>
              <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
                <span>共 <b id="table-total" class="text-cyan-200">0</b> 条</span>
                <div class="flex items-center gap-2 flex-wrap">
                  <button type="button" class="min-w-[32px] h-8 rounded text-xs wh-btn-primary">1</button>
                  <select class="wh-input px-2 py-1 text-[11px]"><option>10 条/页</option></select>
                  <span>跳至</span>
                  <input class="wh-input w-12 px-1 py-1 text-center text-[11px]" value="1" />
                  <span>页</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label><span>所属线路</span>
                <select id="filter-line" class="wh-input w-full px-2">
                  <option value="">全部</option>
                  <option value="2号线">2号线</option>
                  <option value="5号线">5号线</option>
                  <option value="7号线">7号线</option>
                </select>
              </label>
              <label><span>名称</span><input id="filter-name" class="wh-input w-full" placeholder="请输入仓库名称" /></label>
              <label><span>所属部门</span>
                <select id="filter-dept" class="wh-input w-full px-2">
                  <option value="">全部</option>
                  <option value="物资部">物资部</option>
                  <option value="巡检部">巡检部</option>
                  <option value="应急中心">应急中心</option>
                </select>
              </label>
              <div class="disease-filter-actions">
                <button id="btn-search" type="button" class="wh-btn-primary">搜索</button>
                <button id="btn-reset" type="button" class="wh-btn-ghost">重置</button>
              </div>
            </div>
          </div>
          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link" data-quick-href="wb/am-emergency-staff.html" href="am-emergency-staff.html"><i class="fa-solid fa-user-shield"></i><span>应急人员</span></a>
              <a class="disease-quick-link is-active" data-quick-href="wb/am-emergency-warehouse.html" href="am-emergency-warehouse.html"><i class="fa-solid fa-warehouse"></i><span>应急仓库</span></a>
              <a class="disease-quick-link" data-quick-href="wb/am-emergency-plan.html" href="am-emergency-plan.html"><i class="fa-solid fa-file-shield"></i><span>应急预案</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <div id="warehouse-detail-mask" class="am-detail-mask" aria-hidden="true">
    <div class="am-detail-dialog" role="dialog" aria-labelledby="warehouse-detail-title">
      <div class="am-detail-dialog__head">
        <div>
          <h3 id="warehouse-detail-title" class="text-white font-semibold text-sm m-0">查看详情</h3>
          <div id="warehouse-detail-subtitle" class="text-[11px] text-slate-400 mt-0.5">应急仓库详情</div>
        </div>
        <button type="button" class="wh-modal-close text-slate-400 hover:text-white text-xl leading-none" data-action="close-warehouse-detail" aria-label="关闭">×</button>
      </div>
      <div id="warehouse-detail-body" class="am-detail-dialog__body"></div>
      <div class="am-detail-dialog__foot">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-warehouse-detail">关闭</button>
      </div>
    </div>
  </div>

  <div id="warehouse-modal-mask" class="warehouse-modal-mask">
    <div class="warehouse-modal">
      <div class="h-14 px-6 flex items-center justify-between gap-3 border-b border-cyan-400/15">
        <h3 id="warehouse-modal-title" class="text-white text-[16px] font-semibold">新增应急仓库</h3>
        <button type="button" class="wh-modal-close" aria-label="关闭" data-action="close-warehouse-modal">×</button>
      </div>
      <div class="p-6">
        <div class="warehouse-form-grid">
          <label class="warehouse-form-item"><span class="warehouse-form-label is-required">名称：</span><input id="warehouse-name" class="wh-input h-8 flex-1 px-3" placeholder="请输入名称" /></label>
          <label class="warehouse-form-item wh-form-item--select"><span class="warehouse-form-label is-required">所属部门：</span><div id="warehouse-dept-select" class="wh-search-select flex-1 min-w-0" data-input-id="warehouse-dept"></div></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label">所属线路：</span><select id="warehouse-line" class="wh-input h-8 flex-1 px-2"><option>2号线</option><option>5号线</option><option>7号线</option></select></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label is-required">仓库地址：</span><input id="warehouse-address" class="wh-input h-8 flex-1 px-3" placeholder="请输入仓库地址" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label">地址经度：</span><input id="warehouse-lng" class="wh-input h-8 flex-1 px-3" placeholder="请输入仓库地址经度" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label">地址纬度：</span><input id="warehouse-lat" class="wh-input h-8 flex-1 px-3" placeholder="请输入仓库地址纬度" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label is-required">负责人：</span><input id="warehouse-owner" class="wh-input h-8 flex-1 px-3" placeholder="请输入负责人" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label is-required">联系电话：</span><input id="warehouse-phone" class="wh-input h-8 flex-1 px-3" placeholder="请输入联系电话" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label">备注：</span><input id="warehouse-remark" class="wh-input h-8 flex-1 px-3" placeholder="请输入备注" /></label>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-warehouse-modal">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="save-warehouse">确定</button>
      </div>
    </div>
  </div>

  <div id="warehouse-confirm-mask" class="confirm-mask">
    <div class="confirm-card">
      <div class="px-6 py-5 border-b border-cyan-400/15 text-white text-[16px] font-semibold">删除确认</div>
      <div class="px-6 py-6 text-sm text-cyan-100/80">确认删除当前仓库记录吗？</div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="cancel-warehouse-delete">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="confirm-warehouse-delete">确定</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/search-select.js"></script>
  <script>
    (function () {
      var deptSelect = WHSearchSelect.mountById("warehouse-dept-select", "请搜索或选择部门", WHSearchSelect.DEPT_OPTIONS);

      var rows = [

        { name:"金银潭应急仓", dept:"巡检部", line:"2号线", address:"江汉区常青一路 66 号", lng:"114.2406", lat:"30.6479", owner:"李倩", phone:"13800002003", remark:"防汛物资" },
        { name:"光谷东应急仓", dept:"物资部", line:"7号线", address:"东湖高新区高新大道 188 号", lng:"114.4215", lat:"30.4896", owner:"陈涛", phone:"13800002004", remark:"无人机备件" }

      var displayRows = rows.slice();
      var editIndex = -1;
      var deleteName = "";
      var tableBody = document.getElementById("warehouse-table-body");
      var tableTotal = document.getElementById("table-total");
      var modalMask = document.getElementById("warehouse-modal-mask");
      var confirmMask = document.getElementById("warehouse-confirm-mask");
      var modalTitle = document.getElementById("warehouse-modal-title");
      var detailMask = document.getElementById("warehouse-detail-mask");
      var detailBody = document.getElementById("warehouse-detail-body");
      var detailSubtitle = document.getElementById("warehouse-detail-subtitle");

      function escHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (char) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
        });
      }
      function detailValue(value) {
        var text = value === undefined || value === null || value === "" ? "—" : String(value);
        return '<div class="detail-value' + (text === "—" ? " detail-value--empty" : "") + '">' + escHtml(text) + "</div>";
      }
      function detailRow(label, value) {
        return '<label class="warehouse-form-item"><span class="warehouse-form-label">' + escHtml(label) + "：</span>" + detailValue(value) + "</label>";
      }
      function buildDetailHtml(row) {
        return (
          '<div class="warehouse-form-grid">' +
          detailRow("名称", row.name) +
          detailRow("所属部门", row.dept) +
          detailRow("所属线路", row.line) +
          detailRow("仓库地址", row.address) +
          detailRow("地址经度", row.lng) +
          detailRow("地址纬度", row.lat) +
          detailRow("负责人", row.owner) +
          detailRow("联系电话", row.phone) +
          detailRow("备注", row.remark) +
          "</div>"
        );
      }
      function openDetail(displayIndex) {
        var row = displayRows[displayIndex];
        if (!row || !detailMask || !detailBody) return;
        if (detailSubtitle) detailSubtitle.textContent = row.name || "应急仓库详情";
        detailBody.innerHTML = buildDetailHtml(row);
        detailMask.classList.add("show");
        detailMask.setAttribute("aria-hidden", "false");
      }
      function closeDetail() {
        if (!detailMask) return;
        detailMask.classList.remove("show");
        detailMask.setAttribute("aria-hidden", "true");
      }

      function materialHref(warehouseName) {
        var base = typeof whPageHref === "function" ? whPageHref("wb/am-emergency-material.html") : "am-emergency-material.html";
        if (!warehouseName) return base;
        return base + "?warehouse=" + encodeURIComponent(warehouseName);
      }

      function findRowIndex(name) {
        return rows.findIndex(function (row) { return row.name === name; });
      }

      function updateWarehouseStats(data) {
        var list = data || [];
        var lines = {};
        var depts = {};
        var owners = {};
        list.forEach(function (row) {
          lines[row.line] = true;
          depts[row.dept] = true;
          owners[row.owner] = true;
        });
        document.getElementById("stat-total").textContent = String(list.length);
        document.getElementById("stat-lines").textContent = String(Object.keys(lines).length);
        document.getElementById("stat-dept").textContent = String(Object.keys(depts).length);
        document.getElementById("stat-owners").textContent = String(Object.keys(owners).length);
        if (tableTotal) tableTotal.textContent = String(list.length);
      }

      function initQuickLinks() {
        document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach(function (anchor) {
          var target = anchor.getAttribute("data-quick-href");
          if (target && typeof whPageHref === "function") anchor.setAttribute("href", whPageHref(target));
        });
      }

      function renderRows() {
        tableBody.innerHTML = displayRows.map(function (row, index) {
          return '<tr class="wh-row-open ' + (index % 2 ? 'bg-slate-950/10' : 'bg-slate-950/22') + '" data-row-index="' + index + '">' +
            '<td class="px-4">' + row.name + '</td>' +
            '<td class="px-4">' + row.dept + '</td>' +
            '<td class="px-4">' + row.line + '</td>' +
            '<td class="px-4">' + row.address + '</td>' +
            '<td class="px-4">' + row.lng + '</td>' +
            '<td class="px-4">' + row.lat + '</td>' +
            '<td class="px-4">' + row.owner + '</td>' +
            '<td class="px-4">' + row.phone + '</td>' +
            '<td class="px-4">' + row.remark + '</td>' +
            '<td class="px-4 disease-col-actions"><div class="disease-op-actions">' +
              '<span class="warehouse-action text-amber-300" data-action="edit-warehouse" data-warehouse-name="' + row.name + '"><i class="fa-regular fa-pen-to-square"></i>编辑</span>' +
              '<span class="warehouse-action text-sky-300" data-action="view-material" data-warehouse-name="' + row.name + '"><i class="fa-regular fa-boxes-stacked"></i>查看物资</span>' +
              '<span class="warehouse-action text-rose-300" data-action="delete-warehouse" data-warehouse-name="' + row.name + '"><i class="fa-regular fa-trash-can"></i>删除</span>' +
            '</div></td>' +
          '</tr>';
        }).join("");
        updateWarehouseStats(displayRows);
      }

      function applyFilter() {
        var line = document.getElementById("filter-line").value;
        var name = document.getElementById("filter-name").value.trim();
        var dept = document.getElementById("filter-dept").value;
        displayRows = rows.filter(function (row) {
          if (line && row.line !== line) return false;
          if (name && row.name.indexOf(name) === -1) return false;
          if (dept && row.dept !== dept) return false;
          return true;
        });
        renderRows();
      }

      function resetFilters() {
        document.getElementById("filter-line").value = "";
        document.getElementById("filter-name").value = "";
        document.getElementById("filter-dept").value = "";
        displayRows = rows.slice();
        renderRows();
      }

      function openModal(mode, index) {
        WHSearchSelect.closeAll(null);
        editIndex = mode === "edit" ? index : -1;
        modalTitle.textContent = mode === "edit" ? "编辑应急仓库" : "新增应急仓库";
        var row = index > -1 ? rows[index] : null;
        document.getElementById("warehouse-name").value = row ? row.name : "";
        if (deptSelect) deptSelect.setValue(row ? row.dept : "");
        document.getElementById("warehouse-line").value = row ? row.line : "2号线";
        document.getElementById("warehouse-address").value = row ? row.address : "";
        document.getElementById("warehouse-lng").value = row ? row.lng : "";
        document.getElementById("warehouse-lat").value = row ? row.lat : "";
        document.getElementById("warehouse-owner").value = row ? row.owner : "";
        document.getElementById("warehouse-phone").value = row ? row.phone : "";
        document.getElementById("warehouse-remark").value = row ? row.remark : "";
        modalMask.classList.add("show");
      }

      function saveWarehouse() {
        var name = document.getElementById("warehouse-name").value.trim();
        var address = document.getElementById("warehouse-address").value.trim();
        var owner = document.getElementById("warehouse-owner").value.trim();
        var phone = document.getElementById("warehouse-phone").value.trim();
        var dept = deptSelect ? deptSelect.getValue() : "";
        if (!name || !address || !owner || !phone) {
          alert("请完善必填项：名称、仓库地址、负责人、联系电话");
          return;
        }
        if (!dept) {
          alert("请选择所属部门");
          return;
        }
        var row = {
          name: name,
          dept: dept,
          line: document.getElementById("warehouse-line").value,
          address: address,
          lng: document.getElementById("warehouse-lng").value.trim() || "-",
          lat: document.getElementById("warehouse-lat").value.trim() || "-",
          owner: owner,
          phone: phone,
          remark: document.getElementById("warehouse-remark").value.trim() || "-"
        };
        if (editIndex > -1) rows[editIndex] = row;
        else rows.unshift(row);
        modalMask.classList.remove("show");
        applyFilter();
      }

      document.getElementById("btn-search").addEventListener("click", applyFilter);
      document.getElementById("btn-reset").addEventListener("click", resetFilters);
      initQuickLinks();
      function setupListRowClick() {
        if (!window.WHTableRowClick) return window.setTimeout(setupListRowClick, 40);
        WHTableRowClick.bindById("warehouse-table-body", {
          getRows: function () { return displayRows; },
          onOpen: function (row, index) { openDetail(index); }
        });
      }
      setupListRowClick();
      displayRows = rows.slice();
      renderRows();
      (function () {
        var params = new URLSearchParams(location.search);
        var warehouseName = params.get("name");
        if (!warehouseName) return;
        var idx = displayRows.findIndex(function (row) { return row.name === warehouseName; });
        if (idx >= 0) setTimeout(function () { openDetail(idx); }, 120);
      })();

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        var warehouseName = trigger.getAttribute("data-warehouse-name");
        var index = warehouseName ? findRowIndex(warehouseName) : -1;
        if (action === "new-warehouse") openModal("new");
        if (action === "edit-warehouse" && index > -1) openModal("edit", index);
        if (action === "view-material") {
          var materialWarehouse = trigger.getAttribute("data-warehouse-name") || "";
          location.href = materialHref(materialWarehouse);
        }
        if (action === "delete-warehouse" && warehouseName) {
          deleteName = warehouseName;
          confirmMask.classList.add("show");
        }
        if (action === "close-warehouse-modal") modalMask.classList.remove("show");
        if (action === "close-warehouse-detail") closeDetail();
        if (action === "save-warehouse") saveWarehouse();
        if (action === "cancel-warehouse-delete") {
          deleteName = "";
          confirmMask.classList.remove("show");
        }
        if (action === "confirm-warehouse-delete") {
          var deleteIndex = deleteName ? findRowIndex(deleteName) : -1;
          if (deleteIndex > -1) rows.splice(deleteIndex, 1);
          deleteName = "";
          confirmMask.classList.remove("show");
          applyFilter();
        }
      });
      if (detailMask) {
        detailMask.addEventListener("click", function (event) {
          if (event.target === detailMask) closeDetail();
        });
      }
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
