<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人员轨迹</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/map-gis.css" />
  <style>
    .track-shell { min-height: 100%; }
    .track-split {
      display: grid;
      grid-template-columns: 460px minmax(0, 1fr);
      gap: 16px;
      min-height: 620px;
    }
    .track-base-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
    }
    .track-info-card {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.16);
      background: rgba(15, 23, 42, 0.5);
    }
    .track-info-label {
      font-size: 11px;
      color: rgba(148, 226, 255, 0.72);
      margin-bottom: 6px;
    }
    .track-info-value {
      font-size: 13px;
      color: #ecfeff;
      font-weight: 600;
    }
    .track-record-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding-right: 2px;
    }
    .track-record-item {
      border: 1px solid rgba(34, 211, 238, 0.14);
      background: rgba(10, 19, 38, 0.84);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
    }
    .track-record-item:hover {
      border-color: rgba(34, 211, 238, 0.38);
      box-shadow: 0 0 16px rgba(34, 211, 238, 0.14);
      transform: translateY(-1px);
    }
    .track-record-item.is-active {
      border-color: rgba(34, 211, 238, 0.7);
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.14), rgba(8, 47, 73, 0.92));
      box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.24), 0 0 18px rgba(34, 211, 238, 0.18);
    }
    .track-record-code {
      font-size: 13px;
      font-weight: 700;
      color: #ecfeff;
    }
    .track-record-time {
      margin-top: 6px;
      font-size: 12px;
      color: #9cc6df;
    }
    .track-map-shell {
      position: relative;
      min-height: 620px;
      overflow: hidden;
    }
    .track-map-toolbar {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 420;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .track-map-panel {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 420;
      min-width: 210px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.18);
      background: rgba(6, 12, 28, 0.88);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .track-map-panel__row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: #cdeeff;
      margin-bottom: 8px;
    }
    .track-map-panel__row:last-child { margin-bottom: 0; }
    .track-map-panel__label { color: rgba(148, 226, 255, 0.72); }
    .track-play-dot {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #38bdf8;
      border: 2px solid #fff;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.28), 0 0 16px rgba(56, 189, 248, 0.48);
      position: relative;
    }
    .track-play-dot::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 999px;
      border: 1px solid rgba(56, 189, 248, 0.4);
      animation: trackPulse 1.8s infinite ease-out;
    }
    @keyframes trackPulse {
      0% { transform: scale(0.4); opacity: 0.9; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    #person-track-map,
    #person-track-map .leaflet-container {
      width: 100%;
      height: 100%;
      background: #edf3f8;
    }
    #person-track-map .leaflet-control-attribution { display: none; }
    #person-track-map .leaflet-control-zoom a {
      width: 28px;
      height: 28px;
      line-height: 27px;
      color: #fff;
      background: rgba(9, 18, 36, 0.78);
    }
    @media (max-width: 1400px) {
      .track-split { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .track-base-grid { grid-template-columns: 1fr; }
    }

    .disease-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }
    .disease-layout__right {
      position: sticky;
      top: 72px;
      align-self: start;
      width: 300px;
      max-height: calc(100dvh - 88px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .disease-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .disease-stat-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.22);
      background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88));
    }
    .disease-stat-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel,
    .disease-quick-panel {
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.2);
      background: rgba(8, 15, 35, 0.78);
    }
    .disease-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #e2f5ff;
      margin: 0;
      padding: 8px 10px 7px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      background: rgba(8, 15, 35, 0.92);
    }
    .disease-panel-body {
      padding: 8px 10px 10px;
    }
    .disease-filter-panel .disease-panel-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .disease-filter-panel label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin: 0;
      font-size: 10px;
    }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input {
      height: 26px !important;
      min-height: 26px;
      font-size: 11px;
      padding: 0 6px;
    }
    .disease-filter-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .disease-filter-actions button {
      flex: 1;
      padding-top: 4px;
      padding-bottom: 4px;
      font-size: 11px;
    }
    .disease-list-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .disease-quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 5px;
      border-radius: 6px;
      border: 1px solid rgba(34, 211, 238, 0.14);
      background: rgba(15, 23, 42, 0.45);
      color: #e2f5ff;
      font-size: 11px;
      text-decoration: none;
    }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover {
      border-color: rgba(34, 211, 238, 0.4);
      background: rgba(34, 211, 238, 0.08);
      color: #fff;
    }
    .disease-quick-link.is-active {
      border-color: rgba(34, 211, 238, 0.55);
      background: rgba(34, 211, 238, 0.12);
      color: #a5f3fc;
    }
    .disease-quick-link i {
      width: 16px;
      text-align: center;
      color: #67e8f9;
      font-size: 12px;
    }
    .track-table-shell th,
    .track-table-shell td {
      height: 45px;
      border-right: 1px solid rgba(34, 211, 238, 0.08);
      border-bottom: 1px solid rgba(34, 211, 238, 0.1);
      vertical-align: middle;
      padding: 0 12px;
      font-size: 11px;
    }
    .track-table-shell th:last-child,
    .track-table-shell td:last-child { border-right: 0; }
    @media (max-width: 1400px) {
      .disease-layout { grid-template-columns: 1fr; }
      .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .disease-layout__right {
        position: static;
        width: 100%;
        max-height: none;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }
    @media (max-width: 768px) {
      .disease-stats { grid-template-columns: 1fr; }
      .disease-layout__right { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="in-track-person" data-wb-view="page">
  <div id="page-root" class="track-shell max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">人员轨迹</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">人员轨迹面板</span>
    </div>

    <section id="track-list-view">

          <div class="disease-stats" aria-label="人员轨迹统计">

              <div class="disease-stat-card__icon"><i class="fa-solid fa-users"></i></div>

                <div id="stat-total" class="disease-stat-card__value">0</div>

              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-signal"></i></div>
              <div>
                <div id="stat-online" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">在线</div>
                <div class="disease-stat-card__trend">实时在线</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-power-off"></i></div>

              </div>

          </div>

          <div class="disease-list-area">
            <div class="disease-list-toolbar">
              <button id="btn-export" type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost">
                <i class="fa-solid fa-file-export mr-1"></i>导出

        </div>
      </div>
    </section>
  </div>

    const detailStatusBadge = document.getElementById("detail-status-badge");
    const mapStatusText = document.getElementById("map-status-text");
    const mapCurrentName = document.getElementById("map-current-name");
    const mapCurrentTime = document.getElementById("map-current-time");

    let currentRow = null;
    let currentPointIndex = 0;
    let playbackTimer = null;
    let trackMap = null;
    let trackLine = null;
    let startMarker = null;
    let endMarker = null;
    let playMarker = null;

    function updateTrackStats(rows) {
      const list = rows || trackRows;
      const online = list.filter((r) => r.status === "在线").length;
      const offline = list.filter((r) => r.status === "离线").length;
      const points = list.reduce((sum, r) => sum + (r.points ? r.points.length : 0), 0);
      const set = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.textContent = String(val);
      };
      set("stat-total", list.length);
      set("stat-online", online);
      set("stat-offline", offline);
      set("stat-points", points);
      set("table-total", list.length);
    }

    function initQuickLinks() {
      document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach((anchor) => {
        const target = anchor.getAttribute("data-quick-href");
        if (target && typeof whPageHref === "function") {
          anchor.setAttribute("href", whPageHref(target));
        }
      });
    }

    function renderTable(rows) {
      tableBody.innerHTML = rows.map((row, index) => `
        <tr data-row-index="${index}" style="background:${index % 2 === 0 ? 'var(--row-a)' : 'var(--row-b)'}">
          <td>${index + 1}</td>
          <td>${row.personName}</td>
          <td>${row.deviceCode}</td>
          <td>${row.dept}</td>
          <td>${row.line}</td>
          <td>${row.latestTime}</td>
          <td><span class="wh-status ${row.status === "在线" ? "wh-status--done" : "wh-status--pending"}">${row.status}</span></td>
          <td><button type="button" class="wh-link" data-detail-id="${row.id}">详情</button></td>
        </tr>
      `).join("");

      tableBody.querySelectorAll("[data-detail-id]").forEach((btn) => {
        btn.addEventListener("click", () => openDetail(Number(btn.dataset.detailId)));
      });
      updateTrackStats(rows);
    }

    function buildBaseInfo(row) {
      const fields = [
        { label: "人员姓名", value: row.personName },
        { label: "设备编号", value: row.deviceCode },
        { label: "所属部门", value: row.dept },
        { label: "所属线路", value: row.line },
        { label: "最新定位时间", value: row.latestTime },
        { label: "当前状态", value: row.status }
      ];
      detailBaseGrid.innerHTML = fields.map((field) => `
        <div class="track-info-card">
          <div class="track-info-label">${field.label}</div>
          <div class="track-info-value">${field.value}</div>
        </div>
      `).join("");
      detailStatusBadge.className = `wh-status ${row.status === "在线" ? "wh-status--done" : "wh-status--pending"}`;
      detailStatusBadge.textContent = row.status;
    }

    function renderRecords(row) {
      recordList.innerHTML = row.points.map((point, index) => `
        <div class="track-record-item ${index === currentPointIndex ? "is-active" : ""}" data-point-index="${index}">
          <div class="track-record-code">${point.id}</div>
          <div class="track-record-time">${point.time}</div>
        </div>
      `).join("");

      recordList.querySelectorAll("[data-point-index]").forEach((item) => {
        item.addEventListener("click", () => {
          stopPlayback();
          focusPoint(Number(item.dataset.pointIndex), true);
        });
      });
    }

    function makeTrackIcon(color, iconClass) {
      return L.divIcon({
        className: "",
        html: `<div style="width:28px;height:28px;border-radius:999px;background:${color};border:2px solid rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 0 0 2px rgba(34,211,238,.18),0 0 18px ${color};"><i class="${iconClass}"></i></div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
    }

    function makePlayIcon() {
      return L.divIcon({
        className: "",
        html: '<div class="track-play-dot"><i class="fa-solid fa-person-walking" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:9px;color:#fff;"></i></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });
    }

    function initMap() {
      if (trackMap) return;
      trackMap = window.WuhanGIS && window.WuhanGIS.createSharedMap
        ? window.WuhanGIS.createSharedMap("person-track-map", { center: [30.5928, 114.3055], zoom: 12, zoomControl: true })
        : L.map("person-track-map").setView([30.5928, 114.3055], 12);
    }

    function drawTrack(row) {
      if (!trackMap) return;
      stopPlayback(false);
      if (trackLine) trackMap.removeLayer(trackLine);
      if (startMarker) trackMap.removeLayer(startMarker);
      if (endMarker) trackMap.removeLayer(endMarker);
      if (playMarker) trackMap.removeLayer(playMarker);

      const latlngs = row.points.map((point) => [point.lat, point.lng]);
      trackLine = L.polyline(latlngs, {
        color: "#38bdf8",
        weight: 5,
        opacity: 0.95,
        lineCap: "round",
        lineJoin: "round",
        className: "person-track-polyline"
      }).addTo(trackMap);

      startMarker = L.marker(latlngs[0], { icon: makeTrackIcon("#22c55e", "fa-solid fa-play") })
        .bindTooltip(`起点<br>${row.points[0].time}<br>${row.points[0].name}`, { direction: "top" })
        .addTo(trackMap);
      endMarker = L.marker(latlngs[latlngs.length - 1], { icon: makeTrackIcon("#ef4444", "fa-solid fa-flag-checkered") })
        .bindTooltip(`终点<br>${row.points[row.points.length - 1].time}<br>${row.points[row.points.length - 1].name}`, { direction: "top" })
        .addTo(trackMap);
      playMarker = L.marker(latlngs[0], { icon: makePlayIcon() }).addTo(trackMap);

      row.points.forEach((point) => {
        L.circleMarker([point.lat, point.lng], {
          radius: 5,
          color: "#7dd3fc",
          weight: 2,
          fillColor: "#0ea5e9",
          fillOpacity: 0.9
        }).bindTooltip(`${point.time}<br>${point.lat.toFixed(4)}, ${point.lng.toFixed(4)}<br>${point.name}`, {
          direction: "top",
          opacity: 1
        }).addTo(trackMap);
      });

      trackMap.fitBounds(trackLine.getBounds(), { padding: [40, 40] });
      focusPoint(0, false);
    }

    function focusPoint(index, panMap) {
      currentPointIndex = index;
      const point = currentRow.points[index];
      if (playMarker) playMarker.setLatLng([point.lat, point.lng]);
      mapStatusText.textContent = playbackTimer ? "播放中" : "已定位";
      mapCurrentName.textContent = point.name;
      mapCurrentTime.textContent = point.time;
      renderRecords(currentRow);
      if (panMap && trackMap) {
        trackMap.flyTo([point.lat, point.lng], Math.max(trackMap.getZoom(), 15), { duration: 0.8 });
      }
    }

    function playTrack() {
      if (!currentRow) return;
      stopPlayback(false);
      mapStatusText.textContent = "播放中";
      currentPointIndex = 0;
      focusPoint(0, true);
      playbackTimer = setInterval(() => {
        currentPointIndex += 1;
        if (currentPointIndex >= currentRow.points.length) {
          stopPlayback(false);
          mapStatusText.textContent = "播放完成";
          currentPointIndex = currentRow.points.length - 1;
          focusPoint(currentPointIndex, true);
          return;
        }
        focusPoint(currentPointIndex, true);
      }, 1200);
    }

    function stopPlayback(resetStatus = true) {
      if (playbackTimer) {
        clearInterval(playbackTimer);
        playbackTimer = null;
      }
      if (resetStatus) mapStatusText.textContent = "待播放";
    }

    function openDetail(id) {
      const row = trackRows.find((item) => item.id === id);
      if (!row) return;
      currentRow = row;
      currentPointIndex = 0;
      listView.classList.add("hidden");
      detailView.classList.remove("hidden");
      buildBaseInfo(row);
      initMap();
      drawTrack(row);
      renderRecords(row);
    }

    function resetFilters() {
      document.getElementById("filter-name").value = "";
      document.getElementById("filter-device").value = "";
      document.getElementById("filter-line").value = "";
      document.getElementById("filter-dept").value = "";
      document.getElementById("filter-date").value = "";
      renderTable(trackRows);
    }

    function searchRows() {
      const name = document.getElementById("filter-name").value.trim();
      const device = document.getElementById("filter-device").value.trim();
      const line = document.getElementById("filter-line").value;
      const dept = document.getElementById("filter-dept").value;
      const date = document.getElementById("filter-date").value;
      const rows = trackRows.filter((row) => {
        if (name && !row.personName.includes(name)) return false;
        if (device && !row.deviceCode.includes(device)) return false;
        if (line && row.line !== line) return false;
        if (dept && row.dept !== dept) return false;
        if (date && !row.latestTime.startsWith(date)) return false;
        return true;
      });
      renderTable(rows);
    }

    document.getElementById("btn-search").addEventListener("click", searchRows);
    document.getElementById("btn-reset").addEventListener("click", resetFilters);
    document.getElementById("btn-export").addEventListener("click", () => {
      alert("已按当前筛选条件导出示例数据");
    });
    document.getElementById("btn-back-list").addEventListener("click", () => {
      stopPlayback();
      detailView.classList.add("hidden");
      listView.classList.remove("hidden");
    });
    document.getElementById("btn-play-track").addEventListener("click", playTrack);
    document.getElementById("btn-map-reset").addEventListener("click", () => {
      if (trackLine && trackMap) trackMap.fitBounds(trackLine.getBounds(), { padding: [40, 40] });
    });

    initQuickLinks();
    function setupTrackRowClick() {
      if (!window.WHTableRowClick) return window.setTimeout(setupTrackRowClick, 40);
      WHTableRowClick.bindById("track-table-body", {
        getRows: function () { return trackRows; },
        getIndex: function (tr) { return Number(tr.getAttribute("data-row-index")); },
        onOpen: function (row) { openDetail(row.id); }
      });
    }
    setupTrackRowClick();
    renderTable(trackRows);
    (function () {
      var params = new URLSearchParams(location.search);
      var id = params.get("id");
      if (id) {
        setTimeout(function () { openDetail(Number(id)); }, 120);
        return;
      }
      var device = params.get("device");
      if (device) {
        var row = trackRows.find(function (item) { return item.deviceCode === device; });
        if (row) setTimeout(function () { openDetail(row.id); }, 120);
      }
    })();
  </script>
</body>
</html>
