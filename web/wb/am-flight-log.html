<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞行日志管理</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/patrol-table-actions.css" />
  <link rel="stylesheet" href="../../assets/css/flight-report-modal.css" />
  <style>
    .fl-toolbar-btn { min-width: 88px; height: 32px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .fl-op-btn { color: #38bdf8; font-size: 12px; }
    .fl-op-btn:hover { color: #67e8f9; text-decoration: underline; }
    .fl-search { height: 32px; }
    .fl-modal-mask { position: fixed; inset: 0; background: rgba(2, 8, 23, 0.72); display: none; align-items: flex-start; justify-content: center; z-index: 1200; padding: 72px 20px 32px; overflow-y: auto; box-sizing: border-box; }
    .fl-modal-mask.show { display: flex; }
    .fl-modal { width: min(1260px, 96vw); max-height: calc(100vh - 104px); margin: 0 auto; overflow: auto; flex-shrink: 0; background: #071b33; border: 1px solid rgba(34, 211, 238, 0.22); border-radius: 10px; box-shadow: 0 18px 56px rgba(0, 0, 0, 0.45); }
    .fl-dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
    .fl-detail-grid { display: grid; grid-template-columns: 330px 1fr; gap: 20px; }
    .fl-map-shell { position: relative; }
    .fl-map { width: 100%; height: 520px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(34, 211, 238, 0.14); }
    .fl-detail-link { color: #38bdf8; text-decoration: none; cursor: pointer; }
    .fl-detail-link:hover { text-decoration: underline; }
    .fl-detail-list { display: flex; flex-direction: column; gap: 10px; }
    .fl-detail-row { display: flex; align-items: flex-start; gap: 4px; font-size: 13px; line-height: 1.55; }
    .fl-detail-row__label { flex-shrink: 0; width: 92px; color: #94a3b8; white-space: nowrap; }
    .fl-detail-row__value { flex: 1; min-width: 0; color: #e2e8f0; word-break: break-word; }
    .fl-landing-warn { color: #f87171; }
    .fl-detail-status { display: inline-flex; align-items: center; gap: 6px; }
    .leaflet-container { background: #e8ecf1; }
    @media (max-width: 1180px) {
      .fl-detail-grid { grid-template-columns: 1fr; }
      .fl-map { height: 420px; }
    }
    .disease-layout { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
    .disease-layout__right { position: sticky; top: 72px; align-self: start; width: 300px; max-height: calc(100dvh - 88px); display: flex; flex-direction: column; gap: 10px; }
    .disease-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .disease-stat-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 10px; border: 1px solid rgba(34, 211, 238, 0.22); background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88)); }
    .disease-stat-card__icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card--rose .disease-stat-card__icon { background: rgba(251, 113, 133, 0.12); color: #fda4af; border: 1px solid rgba(251, 113, 133, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel, .disease-quick-panel { display: flex; flex-direction: column; border-radius: 10px; border: 1px solid rgba(34, 211, 238, 0.2); background: rgba(8, 15, 35, 0.78); }
    .disease-panel-title { font-size: 12px; font-weight: 600; color: #e2f5ff; margin: 0; padding: 8px 10px 7px; border-bottom: 1px solid rgba(34, 211, 238, 0.12); background: rgba(8, 15, 35, 0.92); }
    .disease-panel-body { padding: 8px 10px 10px; }
    .disease-filter-panel .disease-panel-body { display: flex; flex-direction: column; gap: 6px; }
    .disease-filter-panel label { display: flex; flex-direction: column; gap: 3px; margin: 0; font-size: 10px; }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input { height: 26px !important; min-height: 26px; font-size: 11px; padding: 0 6px; }
    .disease-filter-actions { display: flex; gap: 6px; margin-top: 4px; padding-top: 6px; border-top: 1px solid rgba(34, 211, 238, 0.1); }
    .disease-filter-actions button { flex: 1; padding-top: 4px; padding-bottom: 4px; font-size: 11px; }
    .disease-list-toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .disease-quick-panel .disease-panel-body { padding: 6px 10px 8px; }
    .disease-quick-link { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 10px; margin-bottom: 5px; border-radius: 6px; border: 1px solid rgba(34, 211, 238, 0.14); background: rgba(15, 23, 42, 0.45); color: #e2f5ff; font-size: 11px; text-decoration: none; }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover { border-color: rgba(34, 211, 238, 0.4); background: rgba(34, 211, 238, 0.08); color: #fff; }
    .disease-quick-link.is-active { border-color: rgba(34, 211, 238, 0.55); background: rgba(34, 211, 238, 0.12); color: #a5f3fc; }
    .disease-quick-link i { width: 16px; text-align: center; color: #67e8f9; font-size: 12px; }
    @media (max-width: 1400px) { .disease-layout { grid-template-columns: 1fr; } .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } .disease-layout__right { position: static; width: 100%; max-height: none; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } }
    @media (max-width: 768px) { .disease-stats { grid-template-columns: 1fr; } .disease-layout__right { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="am-flight-log" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">飞行日志记录</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">飞行日志面板</span>
    </div>

    <section id="flight-log-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="飞行日志统计">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-plane"></i></div>
              <div>
                <div id="stat-total" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">日志总数</div>
                <div class="disease-stat-card__trend">当前列表</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-circle-check"></i></div>
              <div>
                <div id="stat-success" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">成功</div>
                <div class="disease-stat-card__trend">飞行状态</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
              <div>
                <div id="stat-abnormal" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">异常/取消</div>
                <div class="disease-stat-card__trend">需关注</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--rose">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-circle-xmark"></i></div>
              <div>
                <div id="stat-fail" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">失败</div>
                <div class="disease-stat-card__trend">飞行状态</div>
              </div>
            </div>
          </div>

          <div class="disease-list-area">
            <div class="disease-list-toolbar">
              <button id="export-btn" type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost">
                <i class="fa-solid fa-file-export mr-1"></i>导出
              </button>
            </div>
            <div class="wh-table-shell bg-slate-950/35">
              <div class="am-table-wrap overflow-x-auto">
                <table class="w-full min-w-[1560px] text-left">
                  <thead>
                    <tr>
                      <th class="px-3">飞行任务ID</th>
                      <th class="px-3">设备名称</th>
                      <th class="px-3">任务类型</th>
                      <th class="px-3">关联计划</th>
                      <th class="px-3">起飞时间</th>
                      <th class="px-3">降落时间</th>
                      <th class="px-3">飞行状态</th>
                      <th class="px-3">最大飞行高度（单位：米）</th>
                      <th class="px-3">电池消耗</th>
                      <th class="px-3">操作员姓名</th>
                      <th class="px-3 disease-col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
              <div class="flex flex-wrap items-center justify-between gap-3 px-3 py-2.5 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
                <span>共 <b id="table-total" class="text-cyan-200">0</b> 条</span>
                <div class="flex items-center gap-2 flex-wrap">
                  <button class="min-w-[28px] h-8 rounded text-xs wh-btn-ghost" type="button"><i class="fa-solid fa-angle-left"></i></button>
                  <button class="min-w-[32px] h-8 rounded text-xs wh-btn-primary" type="button">1</button>
                  <button class="min-w-[28px] h-8 rounded text-xs wh-btn-ghost" type="button"><i class="fa-solid fa-angle-right"></i></button>
                  <select class="wh-input px-2 py-1 text-[11px]"><option>10 条/页</option></select>
                  <span>跳至</span>
                  <input class="wh-input w-12 px-1 py-1 text-center text-[11px]" value="1" />
                  <span>页</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label>
                <span>任务ID / 无人机 / 操作员</span>
                <input id="search-keyword" class="wh-input w-full" placeholder="请输入任务ID、无人机编号、操作员姓名关键词" />
              </label>
              <div class="disease-filter-actions">
                <button id="search-btn" type="button" class="wh-btn-primary">搜索</button>
                <button id="reset-btn" type="button" class="wh-btn-ghost">重置</button>
              </div>
            </div>
          </div>
          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link" data-quick-href="wb/am-maintenance.html" href="am-maintenance.html"><i class="fa-solid fa-screwdriver-wrench"></i><span>维修与检修记录</span></a>
              <a class="disease-quick-link is-active" data-quick-href="wb/am-flight-log.html" href="am-flight-log.html"><i class="fa-solid fa-plane"></i><span>飞行日志记录</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <div id="detail-modal" class="fl-modal-mask">
    <div class="fl-modal">
      <div class="flex items-center justify-between gap-3 px-6 py-4 border-b border-white/10">
        <h3 class="text-base font-semibold text-white">飞行日志详情</h3>
        <button type="button" class="wh-modal-close" data-close="detail-modal" aria-label="关闭">×</button>
      </div>
      <div class="p-6">
        <div class="fl-detail-grid">
          <section>
            <h4 class="text-sm font-semibold text-white mb-4">基本信息</h4>
            <div id="detail-info" class="text-sm"></div>
          </section>
          <section>
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
              <h4 class="text-sm font-semibold text-white">飞行轨迹</h4>
              <div class="flex flex-wrap gap-2">
                <button id="detail-play-track-btn" type="button" class="wh-btn-primary px-4 py-2 text-sm"><i class="fa-solid fa-play mr-1"></i>播放轨迹</button>
                <button id="detail-map-reset-btn" type="button" class="wh-btn-ghost px-4 py-2 text-sm"><i class="fa-solid fa-location-crosshairs mr-1"></i>重置视角</button>
                <button id="detail-export-btn" type="button" class="wh-btn-ghost px-4 py-2 text-sm"><i class="fa-solid fa-file-export mr-1"></i>导出</button>
              </div>
            </div>
            <div class="fl-map-shell track-map-shell">
              <div id="detail-map" class="fl-map"></div>
              <div class="track-map-panel">
                <div class="track-map-panel__row"><span class="track-map-panel__label">轨迹状态</span><span id="fl-map-status-text">待播放</span></div>
                <div class="track-map-panel__row"><span class="track-map-panel__label">当前位置</span><span id="fl-map-current-name">--</span></div>
                <div class="track-map-panel__row"><span class="track-map-panel__label">定位时间</span><span id="fl-map-current-time">--</span></div>
              </div>
            </div>
          </section>
        </div>
        <div class="mt-6 pt-4 border-t border-white/10 flex justify-center">
          <button type="button" class="wh-btn-ghost px-6 py-2 text-sm" data-close="detail-modal">返回</button>
        </div>
      </div>
    </div>
  </div>


  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="../../assets/js/am-flight-log-data.js"></script>
  <script src="../../assets/js/am-flight-log-page.js"></script>
  <script src="../../assets/js/track-playback.js"></script>
  <script src="../../assets/js/flight-report-modal.js"></script>
  <script>
    (function () {
      document.addEventListener("DOMContentLoaded", function () {
        if (window.WHFlightLogPage) {
          WHFlightLogPage.boot({ mobile: false });
        }
        document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach(function (anchor) {
          var target = anchor.getAttribute("data-quick-href");
          if (target && typeof whPageHref === "function") anchor.setAttribute("href", whPageHref(target));
        });
      });
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
