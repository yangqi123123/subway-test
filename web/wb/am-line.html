<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>线路管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/patrol-table-actions.css" />
  <style>
    .disease-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }
    .disease-layout__right {
      position: sticky;
      top: 72px;
      align-self: start;
      width: 300px;
      max-height: calc(100dvh - 88px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .disease-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .disease-stat-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.22);
      background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88));
    }
    .disease-stat-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card--rose .disease-stat-card__icon { background: rgba(251, 113, 133, 0.12); color: #fda4af; border: 1px solid rgba(251, 113, 133, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel,
    .disease-quick-panel {
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.2);
      background: rgba(8, 15, 35, 0.78);
    }
    .disease-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #e2f5ff;
      margin: 0;
      padding: 8px 10px 7px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      background: rgba(8, 15, 35, 0.92);
    }
    .disease-panel-body { padding: 8px 10px 10px; }
    .disease-filter-panel .disease-panel-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .disease-filter-panel label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin: 0;
      font-size: 10px;
    }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input {
      height: 26px !important;
      min-height: 26px;
      font-size: 11px;
      padding: 0 6px;
    }
    .disease-filter-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .disease-filter-actions button {
      flex: 1;
      padding-top: 4px;
      padding-bottom: 4px;
      font-size: 11px;
    }
    .disease-list-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .disease-quick-panel .disease-panel-body { padding: 6px 10px 8px; }
    .disease-quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 5px;
      border-radius: 6px;
      border: 1px solid rgba(34, 211, 238, 0.14);
      background: rgba(15, 23, 42, 0.45);
      color: #e2f5ff;
      font-size: 11px;
      text-decoration: none;
    }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover {
      border-color: rgba(34, 211, 238, 0.4);
      background: rgba(34, 211, 238, 0.08);
      color: #fff;
    }
    .disease-quick-link.is-active {
      border-color: rgba(34, 211, 238, 0.55);
      background: rgba(34, 211, 238, 0.12);
      color: #a5f3fc;
    }
    .disease-quick-link i {
      width: 16px;
      text-align: center;
      color: #67e8f9;
      font-size: 12px;
    }
    @media (max-width: 1400px) {
      .disease-layout { grid-template-columns: 1fr; }
      .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .disease-layout__right {
        position: static;
        width: 100%;
        max-height: none;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }
    @media (max-width: 768px) {
      .disease-stats { grid-template-columns: 1fr; }
      .disease-layout__right { grid-template-columns: 1fr; }
    }
    .line-table th,
    .line-table td {
      height: 52px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .line-table th:last-child,
    .line-table td:last-child { border-right: 0; }
    .line-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
      white-space: nowrap;
    }
    .line-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .line-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 10px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }
    .line-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid rgba(34,211,238,.18);
      background: rgba(8,15,35,.66);
    }
    .line-status--enabled {
      color: #86efac;
      border-color: rgba(74,222,128,.24);
    }
    .line-status--disabled {
      color: #fda4af;
      border-color: rgba(251,113,133,.24);
    }
    .line-color {
      width: 28px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .line-modal-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.56);
      padding: 24px;
    }
    .line-modal-mask.show { display: flex; }
    .line-modal {
      width: min(920px, 92vw);
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .line-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 28px;
    }
    .line-form-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .line-form-item--full {
      grid-column: 1 / -1;
    }
    .line-form-label {
      width: 96px;
      flex: 0 0 96px;
      text-align: right;
      color: rgba(226,245,255,.78);
      font-size: 12px;
    }
    .line-form-label.is-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 4px;
    }
    .am-detail-mask {
      position: fixed;
      inset: 0;
      z-index: 115;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 8, 23, 0.72);
    }
    .am-detail-mask.show { display: flex; }
    .am-detail-dialog {
      width: min(920px, 96vw);
      max-height: min(86vh, 900px);
      border-radius: 8px;
      border: 1px solid rgba(34, 211, 238, 0.18);
      background: linear-gradient(180deg, #071525, #020617);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .am-detail-dialog__head {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
    }
    .am-detail-dialog__body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 20px 24px 16px;
    }
    .am-detail-dialog__foot {
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 14px 24px 18px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .detail-value {
      flex: 1;
      min-width: 0;
      min-height: 32px;
      line-height: 32px;
      color: rgba(226, 245, 255, 0.92);
      font-size: 12px;
      word-break: break-word;
    }
    .detail-value--empty { color: #64748b; }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="am-line" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">线路管理</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">线路管理面板</span>
    </div>

    <section id="line-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="线路统计">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-train-subway"></i></div>
              <div>
                <div id="stat-total" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">线路总数</div>
                <div class="disease-stat-card__trend">基础台账</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-circle-check"></i></div>
              <div>
                <div id="stat-enabled" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">可用线路</div>
                <div class="disease-stat-card__trend">正常运营</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--rose">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-ban"></i></div>
              <div>
                <div id="stat-disabled" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">禁用线路</div>
                <div class="disease-stat-card__trend">暂停使用</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-location-dot"></i></div>
              <div>
                <div id="stat-stations" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">站点合计</div>
                <div class="disease-stat-card__trend">全线站点数</div>
              </div>
            </div>
          </div>

          <div class="disease-list-area">
            <div class="disease-list-toolbar">
              <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="new-line">
                <i class="fa-solid fa-plus mr-1"></i>新增
              </button>
            </div>
            <div class="wh-table-shell bg-slate-950/35">
              <div class="am-table-wrap overflow-x-auto">
                <table class="line-table min-w-[1680px] w-full text-left">
                  <thead>
                    <tr>
                      <th class="px-4">编号</th>
                      <th class="px-4">线路名称</th>
                      <th class="px-4">起始站</th>
                      <th class="px-4">终点站</th>
                      <th class="px-4">站点数</th>
                      <th class="px-4">里程</th>
                      <th class="px-4">车辆编组</th>
                      <th class="px-4">线路标志色</th>
                      <th class="px-4">创建时间</th>
                      <th class="px-4">线路状态</th>
                      <th class="px-4 disease-col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="line-table-body"></tbody>
                </table>
              </div>
              <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
                <span>共 <b id="table-total" class="text-cyan-200">0</b> 条</span>
                <div class="flex items-center gap-2 flex-wrap">
                  <button type="button" class="min-w-[32px] h-8 rounded text-xs wh-btn-primary">1</button>
                  <select class="wh-input px-2 py-1 text-[11px]"><option>10 条/页</option></select>
                  <span>跳至</span>
                  <input class="wh-input w-12 px-1 py-1 text-center text-[11px]" value="1" />
                  <span>页</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label>
                <span>线路名称</span>
                <input id="filter-name" class="wh-input w-full" placeholder="请输入线路名称" />
              </label>
              <label>
                <span>线路状态</span>
                <select id="filter-status" class="wh-input w-full px-2">
                  <option value="">全部</option>
                  <option value="可用">可用</option>
                  <option value="禁用">禁用</option>
                </select>
              </label>
              <div class="disease-filter-actions">
                <button id="btn-search" type="button" class="wh-btn-primary">搜索</button>
                <button id="btn-reset" type="button" class="wh-btn-ghost">重置</button>
              </div>
            </div>
          </div>

          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link is-active" data-quick-href="wb/am-line.html" href="am-line.html"><i class="fa-solid fa-train-subway"></i><span>线路管理</span></a>
              <a class="disease-quick-link" data-quick-href="wb/am-station.html" href="am-station.html"><i class="fa-solid fa-train"></i><span>站点管理</span></a>
              <a class="disease-quick-link" data-quick-href="wb/am-section.html" href="am-section.html"><i class="fa-solid fa-road"></i><span>区间管理</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <div id="line-detail-mask" class="am-detail-mask" aria-hidden="true">
    <div class="am-detail-dialog" role="dialog" aria-labelledby="line-detail-title">
      <div class="am-detail-dialog__head">
        <div>
          <h3 id="line-detail-title" class="text-white font-semibold text-sm m-0">查看详情</h3>
          <div id="line-detail-subtitle" class="text-[11px] text-slate-400 mt-0.5">线路详情</div>
        </div>
        <button type="button" class="wh-modal-close text-slate-400 hover:text-white text-xl leading-none" data-action="close-line-detail" aria-label="关闭">×</button>
      </div>
      <div id="line-detail-body" class="am-detail-dialog__body"></div>
      <div class="am-detail-dialog__foot">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-line-detail">关闭</button>
      </div>
    </div>
  </div>

  <div id="line-modal-mask" class="line-modal-mask">
    <div class="line-modal">
      <div class="h-14 px-6 flex items-center justify-between gap-3 border-b border-cyan-400/15">
        <h3 id="line-modal-title" class="text-white text-[16px] font-semibold">新增线路</h3>
        <button type="button" class="wh-modal-close" data-action="close-line-modal" aria-label="关闭">×</button>
      </div>
      <div class="p-6">
        <div class="line-form-grid">
          <label class="line-form-item"><span class="line-form-label is-required">编号：</span><input id="line-id" class="wh-input h-8 flex-1 px-3" placeholder="请输入编号" required /></label>
          <label class="line-form-item"><span class="line-form-label is-required">线路名称：</span><input id="line-name" class="wh-input h-8 flex-1 px-3" placeholder="请输入线路名称" required /></label>
          <label class="line-form-item"><span class="line-form-label is-required">起始站：</span><input id="line-start" class="wh-input h-8 flex-1 px-3" placeholder="请输入起始站" required /></label>
          <label class="line-form-item"><span class="line-form-label is-required">终点站：</span><input id="line-end" class="wh-input h-8 flex-1 px-3" placeholder="请输入终点站" required /></label>
          <label class="line-form-item"><span class="line-form-label is-required">站点数：</span><input id="line-stations" class="wh-input h-8 flex-1 px-3" placeholder="请输入站点数" required /></label>
          <label class="line-form-item"><span class="line-form-label is-required">里程：</span><input id="line-mileage" class="wh-input h-8 flex-1 px-3" placeholder="请输入里程" required /></label>
          <label class="line-form-item"><span class="line-form-label is-required">车辆编组：</span><input id="line-trainset" class="wh-input h-8 flex-1 px-3" placeholder="请输入车辆编组" required /></label>
          <label class="line-form-item"><span class="line-form-label is-required">线路标志色：</span><input id="line-color" type="color" class="wh-input h-8 w-full px-1" value="#009fe8" required /></label>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-line-modal">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="save-line">确定</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var rows = [
        { id:"L02", name:"2号线", start:"天河机场", end:"佛祖岭", stationCount:"38", mileage:"60.8km", trainset:"6A", color:"#ffcc00", createdAt:"2026-05-01 09:20", status:"可用" },
        { id:"L05", name:"5号线", start:"武汉站东广场", end:"青菱", stationCount:"25", mileage:"34.5km", trainset:"6A", color:"#a162f7", createdAt:"2026-05-01 09:26", status:"可用" },
        { id:"L07", name:"7号线", start:"园博园北", end:"青龙山地铁小镇", stationCount:"27", mileage:"68km", trainset:"8A", color:"#f59e0b", createdAt:"2026-05-01 09:32", status:"可用" },
        { id:"L11", name:"11号线", start:"东吴大道", end:"葛店南站", stationCount:"31", mileage:"65.4km", trainset:"6A", color:"#ef4444", createdAt:"2026-05-01 09:40", status:"禁用" },
        { id:"L19", name:"19号线", start:"武汉站西广场", end:"高新二路", stationCount:"7", mileage:"23.3km", trainset:"6A", color:"#22c55e", createdAt:"2026-05-01 09:46", status:"可用" }
      ];
      var displayRows = rows.slice();

      var editIndex = -1;
      var tableBody = document.getElementById("line-table-body");
      var tableTotal = document.getElementById("table-total");
      var modalMask = document.getElementById("line-modal-mask");
      var modalTitle = document.getElementById("line-modal-title");
      var detailMask = document.getElementById("line-detail-mask");
      var detailBody = document.getElementById("line-detail-body");
      var detailSubtitle = document.getElementById("line-detail-subtitle");

      function escHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (char) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
        });
      }
      function detailValue(value) {
        var text = value === undefined || value === null || value === "" ? "—" : String(value);
        return '<div class="detail-value' + (text === "—" ? " detail-value--empty" : "") + '">' + escHtml(text) + "</div>";
      }
      function detailRow(label, value) {
        return '<label class="line-form-item"><span class="line-form-label">' + escHtml(label) + "：</span>" + detailValue(value) + "</label>";
      }
      function buildDetailHtml(row) {
        return (
          '<div class="line-form-grid">' +
          detailRow("编号", row.id) +
          detailRow("线路名称", row.name) +
          detailRow("起始站", row.start) +
          detailRow("终点站", row.end) +
          detailRow("站点数", row.stationCount) +
          detailRow("里程", row.mileage) +
          detailRow("车辆编组", row.trainset) +
          '<label class="line-form-item"><span class="line-form-label">线路标志色：</span><div class="detail-value flex items-center gap-2"><span class="line-color inline-block" style="background:' +
          escHtml(row.color) +
          '"></span>' +
          escHtml(row.color) +
          "</div></label>" +
          detailRow("创建时间", row.createdAt) +
          detailRow("线路状态", row.status) +
          "</div>"
        );
      }
      function openDetail(displayIndex) {
        var row = displayRows[displayIndex];
        if (!row || !detailMask || !detailBody) return;
        if (detailSubtitle) detailSubtitle.textContent = row.name || "线路详情";
        detailBody.innerHTML = buildDetailHtml(row);
        detailMask.classList.add("show");
        detailMask.setAttribute("aria-hidden", "false");
      }
      function closeDetail() {
        if (!detailMask) return;
        detailMask.classList.remove("show");
        detailMask.setAttribute("aria-hidden", "true");
      }

      function findRowIndex(id) {
        return rows.findIndex(function (row) { return row.id === id; });
      }

      function updateLineStats(data) {
        var list = data || [];
        var enabled = 0;
        var disabled = 0;
        var stations = 0;
        list.forEach(function (row) {
          if (row.status === "可用") enabled += 1;
          else disabled += 1;
          stations += Number(row.stationCount) || 0;
        });
        document.getElementById("stat-total").textContent = String(list.length);
        document.getElementById("stat-enabled").textContent = String(enabled);
        document.getElementById("stat-disabled").textContent = String(disabled);
        document.getElementById("stat-stations").textContent = String(stations);
        if (tableTotal) tableTotal.textContent = String(list.length);
      }

      function initQuickLinks() {
        document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach(function (anchor) {
          var target = anchor.getAttribute("data-quick-href");
          if (target && typeof whPageHref === "function") {
            anchor.setAttribute("href", whPageHref(target));
          }
        });
      }

      function renderRows() {
        tableBody.innerHTML = displayRows.map(function (row, index) {
          var statusClass = row.status === "可用" ? "line-status line-status--enabled" : "line-status line-status--disabled";
          var toggleText = row.status === "可用" ? "禁用" : "启用";
          return '<tr class="wh-row-open ' + (index % 2 ? 'bg-slate-950/10' : 'bg-slate-950/22') + '" data-row-index="' + index + '">' +
            '<td class="px-4">' + row.id + '</td>' +
            '<td class="px-4">' + row.name + '</td>' +
            '<td class="px-4">' + row.start + '</td>' +
            '<td class="px-4">' + row.end + '</td>' +
            '<td class="px-4">' + row.stationCount + '</td>' +
            '<td class="px-4">' + row.mileage + '</td>' +
            '<td class="px-4">' + row.trainset + '</td>' +
            '<td class="px-4"><span class="line-color inline-block" style="background:' + row.color + '"></span></td>' +
            '<td class="px-4">' + row.createdAt + '</td>' +
            '<td class="px-4"><span class="' + statusClass + '">' + row.status + '</span></td>' +
            '<td class="px-4 disease-col-actions"><div class="disease-op-actions">' +
              '<span class="line-action text-amber-300" data-action="edit-line" data-line-id="' + row.id + '"><i class="fa-regular fa-pen-to-square"></i>编辑</span>' +
              '<span class="line-action text-rose-300" data-action="delete-line" data-line-id="' + row.id + '"><i class="fa-regular fa-trash-can"></i>删除</span>' +
              '<span class="line-action text-cyan-300" data-action="toggle-line" data-line-id="' + row.id + '"><i class="fa-solid fa-power-off"></i>' + toggleText + '</span>' +
            '</div></td>' +
          '</tr>';
        }).join("");
        updateLineStats(displayRows);
      }

      function applyFilter() {
        var name = document.getElementById("filter-name").value.trim();
        var status = document.getElementById("filter-status").value;
        displayRows = rows.filter(function (row) {
          if (name && row.name.indexOf(name) === -1 && row.id.indexOf(name) === -1) return false;
          if (status && row.status !== status) return false;
          return true;
        });
        renderRows();
      }

      function resetFilters() {
        document.getElementById("filter-name").value = "";
        document.getElementById("filter-status").value = "";
        displayRows = rows.slice();
        renderRows();
      }

      function openModal(mode, index) {
        editIndex = mode === "edit" ? index : -1;
        modalTitle.textContent = mode === "edit" ? "编辑线路" : "新增线路";
        var row = index > -1 ? rows[index] : null;
        document.getElementById("line-id").value = row ? row.id : "";
        document.getElementById("line-name").value = row ? row.name : "";
        document.getElementById("line-start").value = row ? row.start : "";
        document.getElementById("line-end").value = row ? row.end : "";
        document.getElementById("line-stations").value = row ? row.stationCount : "";
        document.getElementById("line-mileage").value = row ? row.mileage : "";
        document.getElementById("line-trainset").value = row ? row.trainset : "";
        document.getElementById("line-color").value = row ? row.color : "#009fe8";
        modalMask.classList.add("show");
      }

      function closeModal() {
        modalMask.classList.remove("show");
      }

      function saveLine() {
        var id = document.getElementById("line-id").value.trim();
        var name = document.getElementById("line-name").value.trim();
        var start = document.getElementById("line-start").value.trim();
        var end = document.getElementById("line-end").value.trim();
        var stationCount = document.getElementById("line-stations").value.trim();
        var mileage = document.getElementById("line-mileage").value.trim();
        var trainset = document.getElementById("line-trainset").value.trim();
        var color = document.getElementById("line-color").value.trim();
        if (!id) return alert("请填写编号");
        if (!name) return alert("请填写线路名称");
        if (!start) return alert("请填写起始站");
        if (!end) return alert("请填写终点站");
        if (!stationCount) return alert("请填写站点数");
        if (!mileage) return alert("请填写里程");
        if (!trainset) return alert("请填写车辆编组");
        if (!color) return alert("请选择线路标志色");
        var row = {
          id: id,
          name: name,
          start: start,
          end: end,
          stationCount: stationCount,
          mileage: mileage,
          trainset: trainset,
          color: color,
          createdAt: editIndex > -1 ? rows[editIndex].createdAt : "2026-05-12 19:10",
          status: editIndex > -1 ? rows[editIndex].status : "可用"
        };
        if (editIndex > -1) rows[editIndex] = row;
        else rows.unshift(row);
        closeModal();
        applyFilter();
      }

      document.getElementById("btn-search").addEventListener("click", applyFilter);
      document.getElementById("btn-reset").addEventListener("click", resetFilters);
      initQuickLinks();
      function setupListRowClick() {
        if (!window.WHTableRowClick) return window.setTimeout(setupListRowClick, 40);
        WHTableRowClick.bindById("line-table-body", {
          getRows: function () { return displayRows; },
          onOpen: function (row, index) { openDetail(index); }
        });
      }
      setupListRowClick();
      displayRows = rows.slice();
      renderRows();

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        var lineId = trigger.getAttribute("data-line-id");
        var index = lineId ? findRowIndex(lineId) : -1;
        if (action === "new-line") openModal("new");
        if (action === "edit-line" && index > -1) openModal("edit", index);
        if (action === "delete-line" && index > -1) {
          rows.splice(index, 1);
          applyFilter();
        }
        if (action === "toggle-line" && index > -1) {
          rows[index].status = rows[index].status === "可用" ? "禁用" : "可用";
          applyFilter();
        }
        if (action === "close-line-modal") closeModal();
        if (action === "close-line-detail") closeDetail();
        if (action === "save-line") saveLine();
      });
      if (detailMask) {
        detailMask.addEventListener("click", function (event) {
          if (event.target === detailMask) closeDetail();
        });
      }
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
