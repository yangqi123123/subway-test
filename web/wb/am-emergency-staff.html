<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>应急人员管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/patrol-table-actions.css" />
  <style>
    .disease-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }
    .disease-layout__right {
      position: sticky;
      top: 72px;
      align-self: start;
      width: 300px;
      max-height: calc(100dvh - 88px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .disease-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .disease-stat-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.22);
      background: linear-gradient(135deg, rgba(8, 15, 35, 0.92), rgba(6, 12, 28, 0.88));
    }
    .disease-stat-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .disease-stat-card--blue .disease-stat-card__icon { background: rgba(59, 130, 246, 0.18); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.35); }
    .disease-stat-card--cyan .disease-stat-card__icon { background: rgba(34, 211, 238, 0.12); color: #67e8f9; border: 1px solid rgba(34, 211, 238, 0.35); }
    .disease-stat-card--amber .disease-stat-card__icon { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.35); }
    .disease-stat-card--green .disease-stat-card__icon { background: rgba(74, 222, 128, 0.12); color: #86efac; border: 1px solid rgba(74, 222, 128, 0.35); }
    .disease-stat-card__value { font-size: 22px; font-weight: 700; color: #f0f9ff; line-height: 1.2; }
    .disease-stat-card__label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .disease-stat-card__trend { font-size: 10px; margin-top: 4px; color: #94a3b8; }
    .disease-filter-panel,
    .disease-quick-panel {
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.2);
      background: rgba(8, 15, 35, 0.78);
    }
    .disease-panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #e2f5ff;
      margin: 0;
      padding: 8px 10px 7px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      background: rgba(8, 15, 35, 0.92);
    }
    .disease-panel-body { padding: 8px 10px 10px; }
    .disease-filter-panel .disease-panel-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .disease-filter-panel label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin: 0;
      font-size: 10px;
    }
    .disease-filter-panel label > span:first-child { color: #94a3b8; }
    .disease-filter-panel .wh-input {
      height: 26px !important;
      min-height: 26px;
      font-size: 11px;
      padding: 0 6px;
    }
    .disease-filter-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .disease-filter-actions button {
      flex: 1;
      padding-top: 4px;
      padding-bottom: 4px;
      font-size: 11px;
    }
    .disease-list-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .disease-quick-panel .disease-panel-body { padding: 6px 10px 8px; }
    .disease-quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 5px;
      border-radius: 6px;
      border: 1px solid rgba(34, 211, 238, 0.14);
      background: rgba(15, 23, 42, 0.45);
      color: #e2f5ff;
      font-size: 11px;
      text-decoration: none;
    }
    .disease-quick-link:last-child { margin-bottom: 0; }
    .disease-quick-link:hover {
      border-color: rgba(34, 211, 238, 0.4);
      background: rgba(34, 211, 238, 0.08);
      color: #fff;
    }
    .disease-quick-link.is-active {
      border-color: rgba(34, 211, 238, 0.55);
      background: rgba(34, 211, 238, 0.12);
      color: #a5f3fc;
    }
    .disease-quick-link i {
      width: 16px;
      text-align: center;
      color: #67e8f9;
      font-size: 12px;
    }
    @media (max-width: 1400px) {
      .disease-layout { grid-template-columns: 1fr; }
      .disease-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .disease-layout__right {
        position: static;
        width: 100%;
        max-height: none;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }
    @media (max-width: 768px) {
      .disease-stats { grid-template-columns: 1fr; }
      .disease-layout__right { grid-template-columns: 1fr; }
    }
    .staff-table th,
    .staff-table td {
      height: 52px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .staff-table th:last-child,
    .staff-table td:last-child { border-right: 0; }
    .staff-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
      white-space: nowrap;
    }
    .staff-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .staff-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 10px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }
    .staff-modal-mask,
    .confirm-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.56);
      padding: 24px;
    }
    .staff-modal-mask.show,
    .confirm-mask.show { display: flex; }
    .staff-modal {
      width: min(980px, 94vw);
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: visible;
    }
    .staff-modal .p-6 { overflow: visible; }
    .staff-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 28px;
    }
    .staff-form-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .staff-form-label {
      width: 108px;
      flex: 0 0 108px;
      text-align: right;
      color: rgba(226,245,255,.78);
      font-size: 12px;
    }
    .staff-form-label.is-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 4px;
    }
    .confirm-card {
      width: 320px;
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.14);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .am-detail-mask {
      position: fixed;
      inset: 0;
      z-index: 115;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 8, 23, 0.72);
    }
    .am-detail-mask.show { display: flex; }
    .am-detail-dialog {
      width: min(980px, 96vw);
      max-height: min(86vh, 900px);
      border-radius: 8px;
      border: 1px solid rgba(34, 211, 238, 0.18);
      background: linear-gradient(180deg, #071525, #020617);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .am-detail-dialog__head {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
    }
    .am-detail-dialog__body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 20px 24px 16px;
    }
    .am-detail-dialog__foot {
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 14px 24px 18px;
      border-top: 1px solid rgba(34, 211, 238, 0.1);
    }
    .detail-value {
      flex: 1;
      min-width: 0;
      min-height: 32px;
      line-height: 32px;
      color: rgba(226, 245, 255, 0.92);
      font-size: 12px;
      word-break: break-word;
    }
    .detail-value--empty { color: #64748b; }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="am-emergency-staff" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">应急人员管理</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">应急人员面板</span>
    </div>

    <section id="staff-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="应急人员统计">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-user-shield"></i></div>
              <div>
                <div id="stat-total" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">人员总数</div>
                <div class="disease-stat-card__trend">应急台账</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-building"></i></div>
              <div>
                <div id="stat-dept" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">覆盖部门</div>
                <div class="disease-stat-card__trend">部门去重</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-train-subway"></i></div>
              <div>
                <div id="stat-lines" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">覆盖线路</div>
                <div class="disease-stat-card__trend">线路去重</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-headset"></i></div>
              <div>
                <div id="stat-emergency" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">应急中心</div>
                <div class="disease-stat-card__trend">本部门人数</div>
              </div>
            </div>
          </div>

          <div class="disease-list-area">
            <div class="disease-list-toolbar">
              <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="new-staff">
                <i class="fa-solid fa-plus mr-1"></i>新建
              </button>
              <button id="btn-export-template" type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost">
                <i class="fa-solid fa-file-export mr-1"></i>模板导出
              </button>
              <button id="btn-import" type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost">
                <i class="fa-solid fa-file-import mr-1"></i>导入人员
              </button>
            </div>
            <div class="wh-table-shell bg-slate-950/35">
              <div class="am-table-wrap overflow-x-auto">
                <table class="staff-table min-w-[2100px] w-full text-left">
                  <thead>
                    <tr>
                      <th class="px-4">姓名</th>
                      <th class="px-4">部门</th>
                      <th class="px-4">工号</th>
                      <th class="px-4">岗位</th>
                      <th class="px-4">所属线路</th>
                      <th class="px-4">联系方式</th>
                      <th class="px-4">常驻地址</th>
                      <th class="px-4">常驻地址经度</th>
                      <th class="px-4">常驻地址纬度</th>
                      <th class="px-4">备注</th>
                      <th class="px-4 disease-col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="staff-table-body"></tbody>
                </table>
              </div>
              <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
                <span>共 <b id="table-total" class="text-cyan-200">0</b> 条</span>
                <div class="flex items-center gap-2 flex-wrap">
                  <button type="button" class="min-w-[32px] h-8 rounded text-xs wh-btn-primary">1</button>
                  <select class="wh-input px-2 py-1 text-[11px]"><option>10 条/页</option></select>
                  <span>跳至</span>
                  <input class="wh-input w-12 px-1 py-1 text-center text-[11px]" value="1" />
                  <span>页</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <aside class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label><span>姓名</span><input id="filter-name" class="wh-input w-full" placeholder="请输入姓名" /></label>
              <label><span>部门</span>
                <select id="filter-dept" class="wh-input w-full px-2">
                  <option value="">全部</option>
                  <option value="应急中心">应急中心</option>
                  <option value="巡检部">巡检部</option>
                  <option value="调度部">调度部</option>
                </select>
              </label>
              <label><span>工号</span><input id="filter-no" class="wh-input w-full" placeholder="请输入工号" /></label>
              <label><span>所属线路</span>
                <select id="filter-line" class="wh-input w-full px-2">
                  <option value="">全部</option>
                  <option value="2号线">2号线</option>
                  <option value="5号线">5号线</option>
                  <option value="7号线">7号线</option>
                  <option value="11号线">11号线</option>
                </select>
              </label>
              <div class="disease-filter-actions">
                <button id="btn-search" type="button" class="wh-btn-primary">搜索</button>
                <button id="btn-reset" type="button" class="wh-btn-ghost">重置</button>
              </div>
            </div>
          </div>
          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link is-active" data-quick-href="wb/am-emergency-staff.html" href="am-emergency-staff.html"><i class="fa-solid fa-user-shield"></i><span>应急人员</span></a>
              <a class="disease-quick-link" data-quick-href="wb/am-emergency-warehouse.html" href="am-emergency-warehouse.html"><i class="fa-solid fa-warehouse"></i><span>应急仓库</span></a>
              <a class="disease-quick-link" data-quick-href="wb/am-emergency-plan.html" href="am-emergency-plan.html"><i class="fa-solid fa-file-shield"></i><span>应急预案</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <div id="staff-detail-mask" class="am-detail-mask" aria-hidden="true">
    <div class="am-detail-dialog" role="dialog" aria-labelledby="staff-detail-title">
      <div class="am-detail-dialog__head">
        <div>
          <h3 id="staff-detail-title" class="text-white font-semibold text-sm m-0">查看详情</h3>
          <div id="staff-detail-subtitle" class="text-[11px] text-slate-400 mt-0.5">应急人员详情</div>
        </div>
        <button type="button" class="wh-modal-close text-slate-400 hover:text-white text-xl leading-none" data-action="close-staff-detail" aria-label="关闭">×</button>
      </div>
      <div id="staff-detail-body" class="am-detail-dialog__body"></div>
      <div class="am-detail-dialog__foot">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-staff-detail">关闭</button>
      </div>
    </div>
  </div>

  <div id="staff-modal-mask" class="staff-modal-mask">
    <div class="staff-modal">
      <div class="h-14 px-6 flex items-center justify-between gap-3 border-b border-cyan-400/15">
        <h3 id="staff-modal-title" class="text-white text-[16px] font-semibold">新增应急人员</h3>
        <button type="button" class="wh-modal-close" aria-label="关闭" data-action="close-staff-modal">×</button>
      </div>
      <div class="p-6">
        <div class="staff-form-grid">
          <label class="staff-form-item"><span class="staff-form-label is-required">姓名：</span><input id="staff-name" class="wh-input h-8 flex-1 px-3" placeholder="请输入姓名" /></label>
          <label class="staff-form-item wh-form-item--select"><span class="staff-form-label is-required">部门：</span><div id="staff-dept-select" class="wh-search-select flex-1 min-w-0" data-input-id="staff-dept"></div></label>
          <label class="staff-form-item"><span class="staff-form-label is-required">工号：</span><input id="staff-no" class="wh-input h-8 flex-1 px-3" placeholder="请输入工号" /></label>
          <label class="staff-form-item"><span class="staff-form-label">岗位：</span><input id="staff-post" class="wh-input h-8 flex-1 px-3" placeholder="请输入岗位" /></label>
          <label class="staff-form-item"><span class="staff-form-label">所属线路：</span><select id="staff-line" class="wh-input h-8 flex-1 px-2"><option>2号线</option><option>5号线</option><option>7号线</option><option>11号线</option></select></label>
          <label class="staff-form-item"><span class="staff-form-label is-required">联系方式：</span><input id="staff-phone" class="wh-input h-8 flex-1 px-3" placeholder="请输入联系方式" /></label>
          <label class="staff-form-item"><span class="staff-form-label">常驻地址：</span><input id="staff-address" class="wh-input h-8 flex-1 px-3" placeholder="请输入常驻地址" /></label>
          <label class="staff-form-item"><span class="staff-form-label">地址经度：</span><input id="staff-lng" class="wh-input h-8 flex-1 px-3" placeholder="请输入常驻地址经度" /></label>
          <label class="staff-form-item"><span class="staff-form-label">地址纬度：</span><input id="staff-lat" class="wh-input h-8 flex-1 px-3" placeholder="请输入常驻地址纬度" /></label>
          <label class="staff-form-item"><span class="staff-form-label">备注：</span><input id="staff-remark" class="wh-input h-8 flex-1 px-3" placeholder="请输入备注" /></label>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-staff-modal">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="save-staff">确定</button>
      </div>
    </div>
  </div>

  <div id="confirm-mask" class="confirm-mask">
    <div class="confirm-card">
      <div class="px-6 py-5 border-b border-cyan-400/15 text-white text-[16px] font-semibold">删除确认</div>
      <div class="px-6 py-6 text-sm text-cyan-100/80">确认删除当前应急人员记录吗？</div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="cancel-delete">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="confirm-delete">确定</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/search-select.js"></script>
  <script>
    (function () {
      var deptSelect = WHSearchSelect.mountById("staff-dept-select", "请搜索或选择部门", WHSearchSelect.DEPT_OPTIONS);

      var rows = [
        { name:"王强", dept:"应急中心", no:"E1029", post:"应急主管", line:"7号线", phone:"13800001001", address:"洪山区民族大道 188 号", lng:"114.4035", lat:"30.5112", remark:"夜间值守" },
        { name:"李倩", dept:"巡检部", no:"E1038", post:"巡检专员", line:"2号线", phone:"13800001002", address:"江汉区常青一路 56 号", lng:"114.2418", lat:"30.6492", remark:"常备无人机证照" },
        { name:"刘凯", dept:"调度部", no:"E1046", post:"调度员", line:"5号线", phone:"13800001003", address:"武昌区白沙洲大道 78 号", lng:"114.3141", lat:"30.5078", remark:"白班" },
        { name:"赵敏", dept:"应急中心", no:"E1052", post:"联络员", line:"11号线", phone:"13800001004", address:"东湖高新区高新大道 99 号", lng:"114.4498", lat:"30.4853", remark:"节假日待命" },
        { name:"陈涛", dept:"巡检部", no:"E1059", post:"设备员", line:"7号线", phone:"13800001005", address:"洪山区雄楚大道 120 号", lng:"114.3782", lat:"30.5071", remark:"设备维护" }
      ];

      var displayRows = rows.slice();
      var editIndex = -1;
      var deleteNo = "";
      var tableBody = document.getElementById("staff-table-body");
      var tableTotal = document.getElementById("table-total");
      var modalMask = document.getElementById("staff-modal-mask");
      var confirmMask = document.getElementById("confirm-mask");
      var modalTitle = document.getElementById("staff-modal-title");
      var detailMask = document.getElementById("staff-detail-mask");
      var detailBody = document.getElementById("staff-detail-body");
      var detailSubtitle = document.getElementById("staff-detail-subtitle");

      function escHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (char) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
        });
      }
      function detailValue(value) {
        var text = value === undefined || value === null || value === "" ? "—" : String(value);
        return '<div class="detail-value' + (text === "—" ? " detail-value--empty" : "") + '">' + escHtml(text) + "</div>";
      }
      function detailRow(label, value) {
        return '<label class="staff-form-item"><span class="staff-form-label">' + escHtml(label) + "：</span>" + detailValue(value) + "</label>";
      }
      function buildDetailHtml(row) {
        return (
          '<div class="staff-form-grid">' +
          detailRow("姓名", row.name) +
          detailRow("部门", row.dept) +
          detailRow("工号", row.no) +
          detailRow("岗位", row.post) +
          detailRow("所属线路", row.line) +
          detailRow("联系方式", row.phone) +
          detailRow("常驻地址", row.address) +
          detailRow("地址经度", row.lng) +
          detailRow("地址纬度", row.lat) +
          detailRow("备注", row.remark) +
          "</div>"
        );
      }
      function openDetailRow(row) {
        if (!row || !detailMask || !detailBody) return;
        if (detailSubtitle) detailSubtitle.textContent = row.name || "应急人员详情";
        detailBody.innerHTML = buildDetailHtml(row);
        detailMask.classList.add("show");
        detailMask.setAttribute("aria-hidden", "false");
      }
      function openDetail(displayIndex) {
        openDetailRow(displayRows[displayIndex]);
      }
      function closeDetail() {
        if (!detailMask) return;
        detailMask.classList.remove("show");
        detailMask.setAttribute("aria-hidden", "true");
      }

      function openDetailFromQuery() {
        var params = new URLSearchParams(location.search);
        if (params.get("view") !== "detail") return;
        var name = params.get("name");
        var no = params.get("no");
        if (!name && !no) return;
        var idx = displayRows.findIndex(function (row) {
          return (no && row.no === no) || (name && row.name === name);
        });
        if (idx >= 0) {
          openDetail(idx);
          return;
        }
        openDetailRow({
          name: name || "—",
          dept: params.get("dept") || "—",
          no: no || "—",
          post: params.get("post") || "—",
          line: params.get("line") || "—",
          phone: params.get("phone") || "—",
          address: params.get("address") || "—",
          lng: params.get("lng") || "—",
          lat: params.get("lat") || "—",
          remark: params.get("remark") || "—",
        });
      }

      function findRowIndex(no) {
        return rows.findIndex(function (row) { return row.no === no; });
      }

      function updateStaffStats(data) {
        var list = data || [];
        var depts = {};
        var lines = {};
        var emergency = 0;
        list.forEach(function (row) {
          depts[row.dept] = true;
          lines[row.line] = true;
          if (row.dept === "应急中心") emergency += 1;
        });
        document.getElementById("stat-total").textContent = String(list.length);
        document.getElementById("stat-dept").textContent = String(Object.keys(depts).length);
        document.getElementById("stat-lines").textContent = String(Object.keys(lines).length);
        document.getElementById("stat-emergency").textContent = String(emergency);
        if (tableTotal) tableTotal.textContent = String(list.length);
      }

      function initQuickLinks() {
        document.querySelectorAll(".disease-quick-link[data-quick-href]").forEach(function (anchor) {
          var target = anchor.getAttribute("data-quick-href");
          if (target && typeof whPageHref === "function") anchor.setAttribute("href", whPageHref(target));
        });
      }

      function renderRows() {
        tableBody.innerHTML = displayRows.map(function (row, index) {
          return '<tr class="wh-row-open ' + (index % 2 ? 'bg-slate-950/10' : 'bg-slate-950/22') + '" data-row-index="' + index + '">' +
            '<td class="px-4">' + row.name + '</td>' +
            '<td class="px-4">' + row.dept + '</td>' +
            '<td class="px-4">' + row.no + '</td>' +
            '<td class="px-4">' + row.post + '</td>' +
            '<td class="px-4">' + row.line + '</td>' +
            '<td class="px-4">' + row.phone + '</td>' +
            '<td class="px-4">' + row.address + '</td>' +
            '<td class="px-4">' + row.lng + '</td>' +
            '<td class="px-4">' + row.lat + '</td>' +
            '<td class="px-4">' + row.remark + '</td>' +
            '<td class="px-4 disease-col-actions"><div class="disease-op-actions">' +
              '<span class="staff-action text-amber-300" data-action="edit-staff" data-staff-no="' + row.no + '"><i class="fa-regular fa-pen-to-square"></i>编辑</span>' +
              '<span class="staff-action text-rose-300" data-action="delete-staff" data-staff-no="' + row.no + '"><i class="fa-regular fa-trash-can"></i>删除</span>' +
            '</div></td>' +
          '</tr>';
        }).join("");
        updateStaffStats(displayRows);
      }

      function applyFilter() {
        var name = document.getElementById("filter-name").value.trim();
        var dept = document.getElementById("filter-dept").value;
        var no = document.getElementById("filter-no").value.trim();
        var line = document.getElementById("filter-line").value;
        displayRows = rows.filter(function (row) {
          if (name && row.name.indexOf(name) === -1) return false;
          if (dept && row.dept !== dept) return false;
          if (no && row.no.indexOf(no) === -1) return false;
          if (line && row.line !== line) return false;
          return true;
        });
        renderRows();
      }

      function resetFilters() {
        document.getElementById("filter-name").value = "";
        document.getElementById("filter-dept").value = "";
        document.getElementById("filter-no").value = "";
        document.getElementById("filter-line").value = "";
        displayRows = rows.slice();
        renderRows();
      }

      function openModal(mode, index) {
        WHSearchSelect.closeAll(null);
        editIndex = mode === "edit" ? index : -1;
        modalTitle.textContent = mode === "edit" ? "编辑应急人员" : "新增应急人员";
        var row = index > -1 ? rows[index] : null;
        document.getElementById("staff-name").value = row ? row.name : "";
        if (deptSelect) deptSelect.setValue(row ? row.dept : "");
        document.getElementById("staff-no").value = row ? row.no : "";
        document.getElementById("staff-post").value = row ? row.post : "";
        document.getElementById("staff-line").value = row ? row.line : "2号线";
        document.getElementById("staff-phone").value = row ? row.phone : "";
        document.getElementById("staff-address").value = row ? row.address : "";
        document.getElementById("staff-lng").value = row ? row.lng : "";
        document.getElementById("staff-lat").value = row ? row.lat : "";
        document.getElementById("staff-remark").value = row ? row.remark : "";
        modalMask.classList.add("show");
      }

      function closeModal() {
        modalMask.classList.remove("show");
      }

      function saveStaff() {
        var name = document.getElementById("staff-name").value.trim();
        var no = document.getElementById("staff-no").value.trim();
        var phone = document.getElementById("staff-phone").value.trim();
        var dept = deptSelect ? deptSelect.getValue() : "";
        if (!name || !no || !phone) {
          alert("请完善必填项：姓名、工号、联系方式");
          return;
        }
        if (!dept) {
          alert("请选择部门");
          return;
        }
        var row = {
          name: name,
          dept: dept,
          no: no,
          post: document.getElementById("staff-post").value.trim() || "-",
          line: document.getElementById("staff-line").value,
          phone: phone,
          address: document.getElementById("staff-address").value.trim() || "-",
          lng: document.getElementById("staff-lng").value.trim() || "-",
          lat: document.getElementById("staff-lat").value.trim() || "-",
          remark: document.getElementById("staff-remark").value.trim() || "-"
        };
        if (editIndex > -1) rows[editIndex] = row;
        else rows.unshift(row);
        closeModal();
        applyFilter();
      }

      document.getElementById("btn-search").addEventListener("click", applyFilter);
      document.getElementById("btn-reset").addEventListener("click", resetFilters);
      document.getElementById("btn-export-template").addEventListener("click", function () { alert("模板导出（原型演示）"); });
      document.getElementById("btn-import").addEventListener("click", function () { alert("导入人员（原型演示）"); });
      initQuickLinks();
      function setupListRowClick() {
        if (!window.WHTableRowClick) return window.setTimeout(setupListRowClick, 40);
        WHTableRowClick.bindById("staff-table-body", {
          getRows: function () { return displayRows; },
          onOpen: function (row, index) { openDetail(index); }
        });
      }
      setupListRowClick();
      displayRows = rows.slice();
      renderRows();
      setTimeout(openDetailFromQuery, 80);

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        var staffNo = trigger.getAttribute("data-staff-no");
        var index = staffNo ? findRowIndex(staffNo) : -1;
        if (action === "new-staff") openModal("new");
        if (action === "edit-staff" && index > -1) openModal("edit", index);
        if (action === "delete-staff" && staffNo) {
          deleteNo = staffNo;
          confirmMask.classList.add("show");
        }
        if (action === "close-staff-modal") closeModal();
        if (action === "close-staff-detail") closeDetail();
        if (action === "save-staff") saveStaff();
        if (action === "cancel-delete") {
          deleteNo = "";
          confirmMask.classList.remove("show");
        }
        if (action === "confirm-delete") {
          var deleteIndex = deleteNo ? findRowIndex(deleteNo) : -1;
          if (deleteIndex > -1) rows.splice(deleteIndex, 1);
          deleteNo = "";
          confirmMask.classList.remove("show");
          applyFilter();
        }
      });
      if (detailMask) {
        detailMask.addEventListener("click", function (event) {
          if (event.target === detailMask) closeDetail();
        });
      }
    })();
  </script>
  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/workbench-mega.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
