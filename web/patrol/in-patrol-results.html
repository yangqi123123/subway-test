<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>巡检成果</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="../../assets/css/in-patrol-results.css" />
  <link rel="stylesheet" href="../../assets/css/card-grid-pager.css" />
</head>
<body data-shell="default" data-top="patrol" data-sidebar-key="in-patrol-results">
  <script src="../../assets/js/page-embed-bootstrap.js"></script>
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">巡检成果</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">无人机与人工巡检媒体汇总</span>
    </div>

    <section id="pr-list-view">
      <div class="disease-layout">
        <div class="disease-layout__left">
          <div class="disease-stats" aria-label="巡检成果统计">
            <div class="disease-stat-card disease-stat-card--blue">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-photo-film"></i></div>
              <div>
                <div id="stat-total" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">成果总数</div>
                <div class="disease-stat-card__trend">全库</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--cyan">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-list"></i></div>
              <div>
                <div id="stat-filtered" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">当前列表</div>
                <div class="disease-stat-card__trend">筛选结果</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--green">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-calendar-check"></i></div>
              <div>
                <div id="stat-plans" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">计划数量</div>
                <div class="disease-stat-card__trend">按计划统计</div>
              </div>
            </div>
            <div class="disease-stat-card disease-stat-card--amber">
              <div class="disease-stat-card__icon"><i class="fa-solid fa-building"></i></div>
              <div>
                <div id="stat-projects" class="disease-stat-card__value">0</div>
                <div class="disease-stat-card__label">关联项目</div>
                <div class="disease-stat-card__trend">按项目统计</div>
              </div>
            </div>
          </div>

          <div class="disease-list-area">
            <div class="disease-list-toolbar">
              <label class="flex items-center gap-2 cursor-pointer text-[11px] text-slate-400 mr-2">
                <input id="pr-select-all" type="checkbox" class="accent-cyan-400" />
                全选
              </label>
              <span class="pr-toolbar__spacer flex-1"></span>
              <button type="button" class="px-3 py-1.5 rounded text-xs wh-btn-success" data-action="export-list"><i class="fa-solid fa-file-export mr-1"></i>导出</button>
              <button type="button" class="px-3 py-1.5 rounded text-xs wh-btn-danger-soft" data-action="batch-download"><i class="fa-solid fa-download mr-1"></i>批量下载</button>
            </div>

            <section class="lib-layout lib-layout--nested">
              <aside class="neon-panel neon-panel--tight p-4 lib-tree-panel pr-tree-panel">
                <div class="lib-tree-head">
                  <span id="pr-tree-title" class="text-sm font-semibold text-cyan-100">计划分组</span>
                  <div class="pr-tree-mode" role="tablist" aria-label="分组方式">
                    <button type="button" class="pr-tree-mode-btn is-active" data-action="group-plan" title="按计划分组">计划</button>
                    <button type="button" class="pr-tree-mode-btn" data-action="group-project" title="按项目分组">项目</button>
                  </div>
                </div>
                <div id="pr-tree-root" class="lib-tree-scroll"></div>
              </aside>

              <div class="lib-main">
                <section class="neon-panel neon-panel--tight p-4 pr-results-panel">
                  <div class="pr-main-head">
                    <h2 class="pr-main-head__title"><i class="fa-solid fa-photo-film"></i>巡检成果列表</h2>
                    <span class="text-xs text-slate-400">共 <b id="pr-result-count" class="text-cyan-200">0</b> 项</span>
                  </div>
                  <div class="pr-card-scroll" aria-label="巡检成果卡片列表">
                    <div id="pr-card-grid" class="lib-card-grid pr-card-grid"></div>
                  </div>
                  <div id="pr-card-pager"></div>
                </section>
              </div>
            </section>
          </div>
        </div>

        <aside data-embed-hide class="disease-layout__right" aria-label="筛选与快捷操作">
          <div class="disease-filter-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-filter mr-2 text-cyan-400"></i>快捷筛选</div>
            <div class="disease-panel-body">
              <label>
                <span>计划名称</span>
                <input id="f-plan-name" type="text" class="wh-input w-full" placeholder="请输入计划名称" />
              </label>
              <label>
                <span>成果类型</span>
                <select id="f-media-type" class="wh-input w-full">
                  <option value="全部">全部</option>
                  <option value="视频">视频</option>
                  <option value="照片">照片</option>
                </select>
              </label>
              <label>
                <span>成果子类型</span>
                <select id="f-sub-type" class="wh-input w-full">
                  <option value="全部">全部</option>
                  <option value="热成像">热成像</option>
                  <option value="自然光">自然光</option>
                </select>
              </label>
              <label>
                <span>上传时间（起）</span>
                <input id="f-date-start" type="date" class="wh-input w-full" />
              </label>
              <label>
                <span>上传时间（止）</span>
                <input id="f-date-end" type="date" class="wh-input w-full" />
              </label>
              <label>
                <span>关联项目</span>
                <select id="f-project" class="wh-input w-full">
                  <option value="全部">全部</option>
                  <option value="新建商业文化设施项目">新建商业文化设施项目</option>
                  <option value="洪山路至小洪山商业公寓项目">洪山路至小洪山商业公寓项目</option>
                  <option value="三金潭车辆段上盖物业综合开发项目">三金潭车辆段上盖物业综合开发项目</option>
                </select>
              </label>
              <div class="disease-filter-actions">
                <button type="button" class="wh-btn-primary" data-action="search">搜索</button>
                <button type="button" class="wh-btn-ghost" data-action="reset">重置</button>
              </div>
            </div>
          </div>

          <div class="disease-quick-panel">
            <div class="disease-panel-title"><i class="fa-solid fa-bolt mr-2 text-cyan-400"></i>快捷操作</div>
            <div class="disease-panel-body">
              <a class="disease-quick-link" data-quick-href="patrol/in-disease.html" href="in-disease.html"><i class="fa-solid fa-stethoscope"></i><span>病害巡查</span></a>
              <a class="disease-quick-link" data-quick-href="patrol/in-night.html" href="in-night.html"><i class="fa-solid fa-moon"></i><span>夜班作业</span></a>
              <a class="disease-quick-link" data-quick-href="patrol/in-uav-report.html" href="in-uav-report.html"><i class="fa-solid fa-helicopter"></i><span>无人机巡查记录</span></a>
              <a class="disease-quick-link" data-quick-href="patrol/in-manual.html" href="in-manual.html"><i class="fa-solid fa-person-walking"></i><span>人工巡查记录</span></a>
              <a class="disease-quick-link is-active" data-quick-href="patrol/in-patrol-results.html" href="in-patrol-results.html"><i class="fa-solid fa-images"></i><span>巡检成果</span></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <div id="pr-toast" class="pr-toast" role="status" aria-live="polite"></div>

  <div id="pr-detail-mask" class="pr-detail-mask" aria-hidden="true">
    <div class="pr-detail-dialog" role="dialog" aria-modal="true" aria-labelledby="pr-detail-title">
      <header class="pr-detail-dialog__head">
        <h3 id="pr-detail-title" class="pr-detail-dialog__title">成果详情</h3>
        <button type="button" class="pr-detail-dialog__close" data-action="close-detail" aria-label="关闭">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </header>
      <div class="pr-detail-dialog__body">
        <div class="pr-detail-media">
          <div class="pr-detail-media__stage" id="pr-detail-stage">
            <div class="pr-detail-media__inner" id="pr-detail-media-inner">
              <img id="pr-detail-img" class="pr-detail-media__img" alt="" />
              <video id="pr-detail-video" class="pr-detail-media__video hidden" controls playsinline></video>
            </div>
          </div>
          <div id="pr-detail-thumbs" class="pr-detail-thumbs hidden" role="tablist" aria-label="照片缩略图"></div>
          <div class="pr-detail-toolbar" role="toolbar" aria-label="媒体操作">
            <button type="button" class="pr-detail-tool" data-action="media-zoom-in" title="放大"><i class="fa-solid fa-magnifying-glass-plus"></i><span>放大</span></button>
            <button type="button" class="pr-detail-tool" data-action="media-zoom-out" title="缩小"><i class="fa-solid fa-magnifying-glass-minus"></i><span>缩小</span></button>
            <button type="button" class="pr-detail-tool" data-action="media-rotate-left" title="左转"><i class="fa-solid fa-rotate-left"></i><span>左转</span></button>
            <button type="button" class="pr-detail-tool" data-action="media-rotate-right" title="右转"><i class="fa-solid fa-rotate-right"></i><span>右转</span></button>
            <button type="button" class="pr-detail-tool" data-action="media-reset" title="重置"><i class="fa-solid fa-arrows-rotate"></i><span>重置</span></button>
            <button type="button" class="pr-detail-tool" data-action="media-view-large" title="查看大图"><i class="fa-solid fa-up-right-and-down-left-from-center"></i><span>查看大图</span></button>
            <button type="button" class="pr-detail-tool pr-detail-tool--primary" data-action="media-download" title="下载"><i class="fa-solid fa-download"></i><span>下载</span></button>
          </div>
        </div>
        <aside class="pr-detail-info">
          <h4 class="pr-detail-info__title">基本信息</h4>
          <div id="pr-detail-info-grid" class="pr-detail-info__grid"></div>
        </aside>
      </div>
    </div>
  </div>

  <div id="pr-lightbox-mask" class="pr-lightbox-mask" aria-hidden="true">
    <button type="button" class="pr-lightbox-close" data-action="close-lightbox" aria-label="关闭"><i class="fa-solid fa-xmark"></i></button>
    <img id="pr-lightbox-img" class="pr-lightbox-img" alt="" />
  </div>

  <script src="../../assets/js/menu-config.js"></script>
  <script src="../../assets/js/card-grid-pager.js"></script>
  <script src="../../assets/js/in-patrol-results.js"></script>
  <script src="../../assets/js/shell.js"></script>
</body>
</html>
