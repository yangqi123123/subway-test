<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人工巡查记录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <style>
    .page-table th, .page-table td { height: 46px; border-right: 1px solid rgba(34,211,238,.08); border-bottom: 1px solid rgba(34,211,238,.1); }
    .page-table th:last-child, .page-table td:last-child { border-right: 0; }
    .row-action { display:inline-flex; align-items:center; gap:3px; margin-right:8px; white-space:nowrap; font-size:11px; cursor:pointer; }
    .thumb { width: 28px; height: 28px; flex:0 0 28px; object-fit: cover; border-radius: 3px; border: 1px solid rgba(34,211,238,.24); margin-right: 4px; background: rgba(15,23,42,.8); }
    .form-label { width:128px; flex:0 0 128px; text-align:right; color:rgba(226,245,255,.88); font-size:12px; line-height:32px; }
    .required::before { content:"*"; color:#fb7185; margin-right:3px; }
    .confirm-pop { position:fixed; z-index:120; width:132px; padding:12px 12px 10px; border-radius:4px; background:#fff; box-shadow:0 8px 24px rgba(15,23,42,.28); color:#333; }
    .confirm-pop.hidden { display:none; }
    .confirm-pop::after { content:""; position:absolute; left:50%; bottom:-8px; width:14px; height:14px; background:#fff; transform:translateX(-50%) rotate(45deg); }
    .record-mask { position:fixed; inset:0; z-index:110; display:none; align-items:center; justify-content:center; background:rgba(15,23,42,.45); padding:24px; }
    .record-mask.show { display:flex; }
    .record-dialog { width:min(760px,92vw); min-height:230px; border-radius:4px; background:#fff; color:#333; box-shadow:0 20px 60px rgba(15,23,42,.28); }
    .record-item { position:relative; padding-left:24px; margin-bottom:18px; font-size:14px; color:#333; }
    .record-item::before { content:""; position:absolute; left:0; top:6px; width:8px; height:8px; border-radius:999px; border:1px solid #2563eb; background:#fff; }
    .upload-tile {
      width: 88px; height: 88px; border: 1px dashed rgba(34, 211, 238, 0.28); border-radius: 6px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      color: #67e8f9; font-size: 12px; cursor: pointer; background: rgba(2, 8, 23, 0.45); flex-shrink: 0;
    }
    .upload-tile:hover { border-color: #22d3ee; background: rgba(34, 211, 238, 0.08); }
    .upload-tile.is-disabled { opacity: 0.45; pointer-events: none; cursor: not-allowed; }
    .upload-tile input { display: none; }
    .upload-hint { margin-top: 6px; font-size: 11px; color: #64748b; line-height: 1.5; }
    .upload-chip {
      display: inline-flex; align-items: center; gap: 6px; max-width: 220px; padding: 4px 8px;
      border-radius: 4px; border: 1px solid rgba(34, 211, 238, 0.2); background: rgba(15, 23, 42, 0.6);
      font-size: 11px; color: #e2f5ff;
    }
    .upload-chip button { color: #fb7185; padding: 0 2px; line-height: 1; }
    .upload-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .upload-preview { width: 72px; height: 72px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(34,211,238,.24); }
    .wh-input--readonly { background: rgba(8, 47, 73, 0.55); color: #b8d4e8; cursor: not-allowed; }
  </style>
</head>
<body data-shell="default" data-top="patrol" data-sidebar-key="in-manual">
  <script src="../../assets/js/page-embed-bootstrap.js"></script>
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <section id="list-view">
      <nav data-embed-hide class="neon-panel neon-panel--tight mb-4 px-4 py-2.5 flex flex-wrap items-center gap-2 text-[11px] text-slate-400">
        <span class="text-cyan-400"><i class="fa-solid fa-user-check"></i></span>
        <span>巡查记录</span><span class="text-slate-600">&gt;&gt;</span><span class="text-cyan-50 font-semibold tracking-wide">人工巡查记录</span>
      </nav>
      <div data-embed-hide class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
        <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,.25)">人工巡查记录</h1>
        <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="new-item"><i class="fa-solid fa-plus mr-1"></i>新增</button>
      </div>
      <div class="neon-panel neon-panel--tight p-4 mb-4">
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-x-12 gap-y-3 text-xs">
          <label class="flex items-center gap-2"><span class="w-20 text-right text-cyan-100/75">所属线路：</span><select class="wh-input h-8 flex-1 px-2"><option>8号线</option><option>2号线</option><option>7号线</option></select></label>
          <label class="flex items-center gap-2"><span class="w-20 text-right text-cyan-100/75">上下行：</span><select class="wh-input h-8 flex-1 px-2"><option>全部</option><option>上行</option><option>下行</option></select></label>
          <label class="flex items-center gap-2"><span class="w-20 text-right text-cyan-100/75">所属区间：</span><select class="wh-input h-8 flex-1 px-2"><option>请选择区间</option><option>水果湖-洪山路</option><option>洪山路-小洪山</option></select></label>
          <label class="flex items-center gap-2"><span class="w-20 text-right text-cyan-100/75">所在站点：</span><select class="wh-input h-8 flex-1 px-2"><option>请选择站点</option><option>洪山路</option><option>小洪山</option></select></label>
          <label class="flex items-center gap-2"><span class="w-20 text-right text-cyan-100/75">项目名称：</span><select class="wh-input h-8 flex-1 px-2"><option>请选择项目</option><option>新建商业文化设施项目</option><option>碧水大道</option></select></label>
          <label class="flex items-center gap-2"><span class="w-20 text-right text-cyan-100/75">时间范围：</span><input class="wh-input h-8 flex-1 px-2" value="2026-02-03 15:38:31 至 2026-03-05 15:38:31" /></label>
          <div class="flex items-center gap-2 pl-[88px]"><button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary">搜索</button><button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost">重置</button><button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost">导出</button></div>
        </div>
      </div>
      <div class="wh-table-shell bg-slate-950/35">
        <div class="overflow-x-auto">
          <table class="page-table min-w-[1540px] w-full text-left text-[11px]">
            <thead><tr class="bg-slate-950/75"><th class="px-3 text-cyan-50/95">编号</th><th class="px-3 text-cyan-50/95">所属线路</th><th class="px-3 text-cyan-50/95">所在区间/站点</th><th class="px-3 text-cyan-50/95">项目名称</th><th class="px-3 text-cyan-50/95">项目进展</th><th class="px-3 text-cyan-50/95">巡查照片</th><th class="px-3 text-cyan-50/95">巡查视频</th><th class="px-3 text-cyan-50/95">巡查日期</th><th class="px-3 text-cyan-50/95">巡查人</th><th class="px-3 text-cyan-50/95">更新时间</th><th class="px-3 text-cyan-50/95">操作</th></tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="form-view" class="hidden">
      <div class="mb-5 flex items-center gap-3">
        <button type="button" class="w-8 h-8 rounded-md wh-btn-ghost" data-action="back-list"><i class="fa-solid fa-arrow-left"></i></button>
        <div><h1 id="form-page-title" class="text-base font-semibold text-white tracking-tight">新建人工巡查记录</h1><div class="text-[11px] text-slate-400 mt-0.5">新增/编辑人工巡查记录</div></div>
      </div>
      <div class="neon-panel neon-panel--tight p-6">
        <div class="max-w-[1280px] space-y-4 text-xs">
          <div class="flex items-center gap-4"><label class="form-label required">编号：</label><input id="f-id" type="text" class="wh-input wh-input--readonly h-8 w-[360px] px-2" readonly tabindex="-1" placeholder="自动生成" /></div>
          <div class="flex items-center gap-4"><label class="form-label required">所属线路：</label><select id="f-line" class="wh-input h-8 w-[360px] px-2"><option value="">请选择</option><option value="8号线">8号线</option><option value="2号线">2号线</option><option value="7号线">7号线</option></select></div>
          <div class="flex items-center gap-4"><label class="form-label required">上下行：</label><select id="f-direction" class="wh-input h-8 w-[360px] px-2"><option value="">请选择</option><option value="上行">上行</option><option value="下行">下行</option></select></div>
          <div class="flex items-center gap-4"><label class="form-label">所在区间：</label><select id="f-section" class="wh-input h-8 w-[360px] px-2"><option value="">请选择</option><option value="水果湖-洪山路">水果湖-洪山路</option><option value="洪山路-小洪山">洪山路-小洪山</option></select></div>
          <div class="flex items-center gap-4"><label class="form-label">站点：</label><select id="f-station" class="wh-input h-8 w-[360px] px-2"><option value="">请选择</option><option value="洪山路">洪山路</option><option value="小洪山">小洪山</option></select></div>
          <div class="flex items-center gap-4"><label class="form-label required">所在项目：</label><select id="f-project" class="wh-input h-8 flex-1 max-w-[720px] px-2"><option value="">请选择项目</option><option value="新建商业文化设施项目">新建商业文化设施项目</option><option value="洪山路至小洪山商业公寓项目">洪山路至小洪山商业公寓项目</option></select></div>
          <div class="flex items-center gap-4"><label class="form-label required">巡查日期：</label><input id="f-patrol-date" class="wh-input h-8 w-[360px] px-2" placeholder="巡查日期" /></div>
          <div class="flex items-start gap-4">
            <label class="form-label pt-2">巡查照片：</label>
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap gap-3 items-start">
                <label id="f-photo-tile" class="upload-tile"><i class="fa-solid fa-plus text-lg"></i><span>上传</span><input id="f-photo-input" type="file" multiple accept="image/jpeg,image/png,image/webp,image/gif,.jpg,.jpeg,.png,.webp,.gif" /></label>
                <div id="f-photo-list" class="flex flex-wrap gap-2 flex-1 min-w-0"></div>
              </div>
              <p id="f-photo-hint" class="upload-hint">支持 JPG、PNG、WEBP、GIF，最多上传 9 张，单张不超过 20MB</p>
            </div>
          </div>
          <div class="flex items-start gap-4">
            <label class="form-label pt-2">巡查视频：</label>
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap gap-3 items-start">
                <label id="f-video-tile" class="upload-tile"><i class="fa-solid fa-plus text-lg"></i><span>上传</span><input id="f-video-input" type="file" multiple accept="video/mp4,video/webm,video/quicktime,.mp4,.webm,.mov" /></label>
                <div id="f-video-list" class="flex flex-wrap gap-2 flex-1 min-w-0"></div>
              </div>
              <p id="f-video-hint" class="upload-hint">支持 MP4、WEBM、MOV，最多上传 9 个，单个不超过 200MB</p>
            </div>
          </div>
          <div class="flex items-start gap-4"><label class="form-label required">项目进展：</label><textarea id="f-progress" class="wh-input min-h-[86px] flex-1 px-2 py-2" placeholder="请输入项目进展"></textarea></div>
          <div class="flex items-start gap-4"><label class="form-label">协调情况及备注：</label><textarea id="f-remark" class="wh-input min-h-[86px] flex-1 px-2 py-2" placeholder="协调情况及备注"></textarea></div>
          <div class="flex justify-center gap-3 pt-5 border-t border-cyan-400/10"><button type="button" class="px-6 py-2 rounded text-xs wh-btn-primary" data-action="save-item">保存</button><button type="button" class="px-6 py-2 rounded text-xs wh-btn-ghost" data-action="back-list">取消</button></div>
        </div>
      </div>
    </section>

  </div>
  <div id="confirm-pop" class="confirm-pop hidden">
    <div class="text-[15px] text-slate-700 flex items-center gap-2 mb-3"><i id="confirm-icon" class="fa-solid fa-star text-amber-400"></i><span id="confirm-text">确定通过？</span></div>
    <div class="flex items-center justify-end gap-2 relative z-[1]"><button type="button" class="px-3 py-1.5 text-[13px] border border-slate-300 text-slate-700 bg-white" data-action="cancel-confirm">取消</button><button type="button" class="px-3 py-1.5 text-[13px] text-white bg-[#ff5a5f]" data-action="submit-confirm">确定</button></div>
  </div>
  <div id="record-mask" class="record-mask">
    <div class="record-dialog"><div class="flex items-center justify-between px-8 py-5"><h3 class="text-[18px] font-semibold text-slate-800">操作记录</h3><button type="button" class="text-slate-400 hover:text-slate-600 text-xl leading-none" data-action="close-record">×</button></div><div id="record-body" class="px-8 pb-8 pt-2"></div></div>
  </div>
  <script>
    (function () {
      var rows = [
        { id:"122820", line:"8号线", place:"水果湖-洪山路 / 洪山路", projectName:"新建商业文化设施项目", progress:"负二层消防泵房施工，负一层通风安装作业同步推进，现场文明施工情况正常。", user:"李玲", patrolDate:"2026-03-05 12:19", updatedAt:"2026-03-05 12:07", logs:[{ action:"新增人工巡查", user:"鲍雄澎", time:"2026-05-12 14:40:31" }] },
        { id:"122819", line:"8号线", place:"洪山路-小洪山 / 小洪山", projectName:"洪山路至小洪山商业公寓项目", progress:"现场暂未施工，围挡完好，出入口封闭正常。", user:"李玲", patrolDate:"2026-03-05 12:19", updatedAt:"2026-03-05 12:07", logs:[{ action:"新增人工巡查", user:"鲍雄澎", time:"2026-05-12 14:40:31" }] },
        { id:"122704", line:"8号线", place:"金潭路-宏图大道 / 宏图大道", projectName:"三金潭车辆段上盖物业综合开发项目", progress:"B区一期、三期停工巡查完成，周边沉降监测点状态正常。", user:"徐克强", patrolDate:"2026-03-04 17:05", updatedAt:"2026-03-04 16:53", logs:[{ action:"新增人工巡查", user:"鲍雄澎", time:"2026-05-12 14:40:31" }] }
      ];
      var nextId = 122821;
      var editingIndex = null;
      var uploadStores = { photo: [], video: [] };
      var PHOTO_EXT = ["jpg", "jpeg", "png", "webp", "gif"];
      var VIDEO_EXT = ["mp4", "webm", "mov"];
      var PHOTO_MAX = 20 * 1024 * 1024;
      var VIDEO_MAX = 200 * 1024 * 1024;
      var MEDIA_MAX = 9;
      var tbody = document.getElementById("table-body");
      var confirmPop = document.getElementById("confirm-pop");
      var confirmText = document.getElementById("confirm-text");
      var confirmIcon = document.getElementById("confirm-icon");
      var recordMask = document.getElementById("record-mask");
      var recordBody = document.getElementById("record-body");
      var pendingConfirm = null;

      function $(id) { return document.getElementById(id); }
      function extOf(name) {
        var p = (name || "").lastIndexOf(".");
        return p >= 0 ? name.slice(p + 1).toLowerCase() : "";
      }
      function formatSize(n) {
        if (n < 1024) return n + " B";
        if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
        return (n / (1024 * 1024)).toFixed(1) + " MB";
      }
      function validateFile(file, kind) {
        var ext = extOf(file.name);
        if (kind === "photo") {
          if (PHOTO_EXT.indexOf(ext) < 0) return "照片仅支持 JPG、PNG、WEBP、GIF 格式";
          if (file.size > PHOTO_MAX) return "单张照片不能超过 20MB";
        }
        if (kind === "video") {
          if (VIDEO_EXT.indexOf(ext) < 0) return "视频仅支持 MP4、WEBM、MOV 格式";
          if (file.size > VIDEO_MAX) return "单个视频不能超过 200MB";
        }
        return "";
      }
      function renderUploadList(kind) {
        var list = uploadStores[kind];
        var listEl = $(kind === "photo" ? "f-photo-list" : "f-video-list");
        var tile = $(kind === "photo" ? "f-photo-tile" : "f-video-tile");
        var hint = kind === "photo" ? $("f-photo-hint") : $("f-video-hint");
        if (!listEl) return;
        listEl.innerHTML = list
          .map(function (file, idx) {
            if (kind === "photo" && file._url) {
              return (
                '<div class="relative">' +
                '<img class="upload-preview" src="' +
                file._url +
                '" alt="" />' +
                '<button type="button" class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-rose-500 text-white text-[10px] leading-4" data-action="remove-upload" data-kind="' +
                kind +
                '" data-idx="' +
                idx +
                '">×</button></div>'
              );
            }
            return (
              '<span class="upload-chip"><span title="' +
              file.name +
              '">' +
              file.name +
              " (" +
              formatSize(file.size) +
              ')</span><button type="button" data-action="remove-upload" data-kind="' +
              kind +
              '" data-idx="' +
              idx +
              '">×</button></span>'
            );
          })
          .join("");
        if (tile) tile.classList.toggle("is-disabled", list.length >= MEDIA_MAX);
        if (hint) {
          hint.textContent =
            (kind === "photo"
              ? "支持 JPG、PNG、WEBP、GIF，最多上传 9 张，单张不超过 20MB"
              : "支持 MP4、WEBM、MOV，最多上传 9 个，单个不超过 200MB") +
            "（已选 " +
            list.length +
            "/" +
            MEDIA_MAX +
            "）";
        }
      }
      function bindUploader(kind, inputId) {
        var input = $(inputId);
        if (!input) return;
        input.addEventListener("change", function () {
          var files = Array.from(input.files || []);
          input.value = "";
          var store = uploadStores[kind];
          files.forEach(function (file) {
            if (store.length >= MEDIA_MAX) {
              alert(kind === "photo" ? "巡查照片最多上传 9 张" : "巡查视频最多上传 9 个");
              return;
            }
            var err = validateFile(file, kind);
            if (err) return alert(err);
            if (kind === "photo") file._url = URL.createObjectURL(file);
            store.push(file);
          });
          renderUploadList(kind);
        });
      }
      function clearUploads() {
        uploadStores.photo.forEach(function (f) {
          if (f._url) URL.revokeObjectURL(f._url);
        });
        uploadStores.photo = [];
        uploadStores.video = [];
        ["photo", "video"].forEach(renderUploadList);
      }
      function genId() { return String(nextId++); }
      function lockIdField() {
        var el = $("f-id");
        if (!el) return;
        el.readOnly = true;
        el.setAttribute("readonly", "readonly");
      }
      function renderRows() {
        tbody.innerHTML = rows.map(function (row, index) {
          var photoCell = window.WHPatrolMediaGallery
            ? WHPatrolMediaGallery.renderCell({
                kind: "photo",
                projectName: row.projectName,
                rowKey: row.id,
                previewCount: index === 0 ? 3 : 2,
              })
            : "";
          var videoCell = window.WHPatrolMediaGallery
            ? WHPatrolMediaGallery.renderCell({
                kind: "video",
                projectName: row.projectName,
                rowKey: row.id,
                previewCount: 2,
              })
            : '<span class="text-slate-500">—</span>';
          return (
            '<tr class="' +
            (index % 2 ? "bg-slate-900/35" : "bg-slate-950/25") +
            '">' +
            '<td class="px-3 text-slate-100/95">' +
            row.id +
            '</td><td class="px-3 text-slate-100/95">' +
            row.line +
            '</td><td class="px-3 text-slate-100/95">' +
            row.place +
            '</td><td class="px-3 text-slate-100/95">' +
            row.projectName +
            '</td><td class="px-3 text-slate-100/95 max-w-[260px] truncate" title="' +
            row.progress +
            '">' +
            row.progress +
            '</td><td class="px-3">' +
            photoCell +
            '</td><td class="px-3">' +
            videoCell +
            '</td><td class="px-3 text-slate-100/95">' +
            row.patrolDate +
            '</td><td class="px-3 text-slate-100/95">' +
            row.user +
            '</td><td class="px-3 text-slate-100/95">' +
            row.updatedAt +
            '</td><td class="px-3"><span class="row-action text-sky-300" data-action="edit-item" data-index="' +
            index +
            '"><i class="fa-regular fa-pen-to-square"></i>编辑</span><span class="row-action text-cyan-300" data-action="confirm-item" data-index="' +
            index +
            '"><i class="fa-regular fa-circle-check"></i>工班确认</span><span class="row-action text-rose-300" data-action="reject-item" data-index="' +
            index +
            '"><i class="fa-regular fa-circle-xmark"></i>拒绝</span><span class="row-action text-rose-300"><i class="fa-regular fa-trash-can"></i>删除</span><span class="row-action text-sky-300" data-action="view-records" data-index="' +
            index +
            '"><i class="fa-regular fa-clock"></i>操作记录</span></td></tr>'
          );
        }).join("");
      }
      function showForm(){ document.getElementById("list-view").classList.add("hidden"); document.getElementById("form-view").classList.remove("hidden"); }
      function showList(){ document.getElementById("form-view").classList.add("hidden"); document.getElementById("list-view").classList.remove("hidden"); }
      function openConfirm(kind, index, trigger){
        pendingConfirm = { kind: kind, index: index };
        confirmText.textContent = kind === "confirm" ? "确定通过？" : "确定拒绝？";
        confirmIcon.className = "fa-solid fa-star " + (kind === "confirm" ? "text-amber-400" : "text-red-400");
        var rect = trigger.getBoundingClientRect();
        confirmPop.style.left = Math.max(16, rect.left + rect.width / 2 - 66) + "px";
        confirmPop.style.top = Math.max(16, rect.top - 92) + "px";
        confirmPop.classList.remove("hidden");
      }
      function closeConfirm(){ confirmPop.classList.add("hidden"); pendingConfirm = null; }
      function openRecords(index){
        recordBody.innerHTML = rows[index].logs.map(function(log){ return '<div class="record-item"><div class="mb-3">' + log.action + '</div><div class="text-[13px] text-slate-400 mb-3">日期：' + log.time + '</div><div class="text-[13px] text-slate-400">操作者：' + log.user + '</div></div>'; }).join("");
        recordMask.classList.add("show");
      }
      renderRows();
      if (window.WHPatrolMediaGallery) {
        WHPatrolMediaGallery.bind(document.getElementById("page-root") || document);
      }
      document.addEventListener("click", function (event) {
        var target = event.target.closest("[data-action]"); if (!target) return;
        var action = target.getAttribute("data-action");
        var index = target.hasAttribute("data-index") ? Number(target.getAttribute("data-index")) : null;
        if (action === "new-item") showForm("new");
        if (action === "edit-item") showForm("edit", index);
        if (action === "save-item") saveItem();
        if (action === "remove-upload") {
          var kind = target.getAttribute("data-kind");
          var idx = Number(target.getAttribute("data-idx"));
          var removed = uploadStores[kind].splice(idx, 1)[0];
          if (removed && removed._url) URL.revokeObjectURL(removed._url);
          renderUploadList(kind);
          return;
        }
        if (action === "back-list") showList();
        if (action === "confirm-item") openConfirm("confirm", Number(target.getAttribute("data-index")), target);
        if (action === "reject-item") openConfirm("reject", Number(target.getAttribute("data-index")), target);
        if (action === "cancel-confirm") closeConfirm();
        if (action === "submit-confirm" && pendingConfirm) {
          rows[pendingConfirm.index].logs.push({ action: pendingConfirm.kind === "confirm" ? "工班确认" : "拒绝", user: "鲍雄澎", time: "2026-05-12 14:40:31" });
          closeConfirm();
        }
        if (action === "view-records") openRecords(Number(target.getAttribute("data-index")));
        if (action === "close-record") recordMask.classList.remove("show");
      });
    })();
  </script>
