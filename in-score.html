<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>巡查打分</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <style>
    .score-filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px 24px;
    }
    .score-filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .score-filter-label {
      color: rgba(226,245,255,.78);
      font-size: 12px;
      white-space: nowrap;
    }
    .score-table th,
    .score-table td {
      height: 55px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .score-table th:last-child,
    .score-table td:last-child {
      border-right: 0;
    }
    .score-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
    }
    .score-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .score-action-link {
      color: #60a5fa;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .score-modal-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.52);
      padding: 24px;
    }
    .score-modal-mask.show {
      display: flex;
    }
    .score-modal {
      width: min(1860px, 96vw);
      min-height: 380px;
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .score-detail-wrap {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 430px;
      border-top: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
    }
    .score-detail-table th,
    .score-detail-table td {
      height: 54px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
      white-space: nowrap;
    }
    .score-detail-table th:last-child,
    .score-detail-table td:last-child {
      border-right: 0;
    }
    .score-detail-table thead th {
      background: rgba(2,8,23,.66);
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
    }
    .score-detail-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .score-pager {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .score-page-btn {
      min-width: 30px;
      height: 30px;
      padding: 0 8px;
      border: 1px solid rgba(148,163,184,.26);
      background: rgba(15,23,42,.5);
      color: rgba(226,245,255,.82);
      font-size: 12px;
      border-radius: 3px;
    }
    .score-page-btn.is-active {
      border-color: rgba(96,165,250,.66);
      color: #dbeafe;
      background: rgba(37,99,235,.18);
    }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="in-score" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <nav class="neon-panel neon-panel--tight mb-4 px-4 py-2.5 flex flex-wrap items-center gap-2 text-[11px] text-slate-400">
      <span class="text-cyan-400"><i class="fa-solid fa-location-crosshairs"></i></span>
      <span>我的工作台</span>
      <span class="text-slate-600">&gt;&gt;</span>
      <span class="text-cyan-50 font-semibold tracking-wide">巡查打分</span>
    </nav>

    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">巡查打分</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">巡查评分记录台账</span>
    </div>

    <section class="neon-panel neon-panel--tight p-4 mb-4">
      <div class="score-filter-bar">
        <div class="score-filter-item">
          <span class="score-filter-label">时间范围：</span>
          <div class="flex items-center gap-2">
            <input class="wh-input h-8 w-[160px] px-3" value="2026-03-09 10:44:15" />
            <span class="text-slate-500">至</span>
            <input class="wh-input h-8 w-[160px] px-3" value="2026-04-08 10:44:15" />
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-primary">搜索</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-ghost">重置</button>
        </div>
      </div>
    </section>

    <section class="wh-table-shell bg-slate-950/35">
      <div class="overflow-x-auto">
        <table class="score-table min-w-[1600px] w-full text-left">
          <thead>
            <tr>
              <th class="px-4">账号</th>
              <th class="px-4">巡查人员</th>
              <th class="px-4">负责线路</th>
              <th class="px-4">设备号</th>
              <th class="px-4">巡查日期</th>
              <th class="px-4">最低分数</th>
              <th class="px-4">操作</th>
            </tr>
          </thead>
          <tbody id="score-table-body"></tbody>
        </table>
      </div>
      <div class="flex flex-wrap items-center justify-end gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
        <span>共 <b class="text-cyan-200">7</b> 条</span>
        <div class="score-pager">
          <button class="score-page-btn text-slate-500">&lt;</button>
          <button class="score-page-btn is-active">1</button>
          <button class="score-page-btn text-slate-500">&gt;</button>
          <select class="wh-input h-[30px] px-2 text-[11px]">
            <option>10 条/页</option>
            <option>20 条/页</option>
          </select>
          <span>跳至</span>
          <input class="wh-input h-[30px] w-12 px-2 text-center text-[11px]" value="1" />
          <span>页</span>
        </div>
      </div>
    </section>
  </div>

  <div id="score-modal-mask" class="score-modal-mask">
    <div class="score-modal">
      <div class="h-14 px-6 flex items-center justify-between gap-3 border-b border-cyan-400/15">
        <h3 class="text-white text-[16px] font-semibold">巡查详情</h3>
        <button type="button" class="wh-modal-close" data-action="close-detail" aria-label="关闭">×</button>
      </div>
      <div class="p-6">
        <div class="score-detail-wrap">
          <table class="score-detail-table min-w-[1520px] w-full text-left">
            <thead>
              <tr>
                <th class="px-4">设备号</th>
                <th class="px-4">巡查人员</th>
                <th class="px-4">区间名称</th>
                <th class="px-4">所属线路</th>
                <th class="px-4">线内时长（分钟）</th>
                <th class="px-4">线外时长（分钟）</th>
                <th class="px-4">巡查日期</th>
                <th class="px-4">得分</th>
              </tr>
            </thead>
            <tbody id="score-detail-body"></tbody>
          </table>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-3">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-detail">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="close-detail">确定</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var listRows = [
        { account:"yanghaotian", user:"杨昊天", line:"5号线", device:"Y18807", date:"2026-04-13 00:00:00", minScore:50 },
        { account:"yanghaotian", user:"杨昊天", line:"5号线", device:"Y18807", date:"2026-04-12 00:00:00", minScore:56 },
        { account:"zhangwei", user:"张伟", line:"2号线", device:"Y15502", date:"2026-04-11 00:00:00", minScore:61 },
        { account:"liulei", user:"刘磊", line:"7号线", device:"Y17328", date:"2026-04-10 00:00:00", minScore:58 },
        { account:"wangjun", user:"王军", line:"2号线", device:"Y12216", date:"2026-04-09 00:00:00", minScore:65 },
        { account:"zhaomin", user:"赵敏", line:"11号线", device:"Y19831", date:"2026-04-08 00:00:00", minScore:63 },
        { account:"chenkai", user:"陈凯", line:"5号线", device:"Y18810", date:"2026-04-07 00:00:00", minScore:67 }
      ];

      var detailMap = {
        Y18807: [
          { device:"Y18807", user:"杨昊天", section:"红霞-黄家湖", line:"5号线", inside:26.75, outside:10.75, date:"2026-04-13 00:00:00", score:70 },
          { device:"Y18807", user:"杨昊天", section:"中医药大学-白沙六路", line:"5号线", inside:57.67, outside:19.25, date:"2026-04-13 00:00:00", score:60 },
          { device:"Y18807", user:"杨昊天", section:"黄家湖-中医药大学", line:"5号线", inside:8.08, outside:0, date:"2026-04-13 00:00:00", score:50 }
        ],
        Y15502: [
          { device:"Y15502", user:"张伟", section:"常青花园-长港路", line:"2号线", inside:31.2, outside:5.4, date:"2026-04-11 00:00:00", score:82 },
          { device:"Y15502", user:"张伟", section:"长港路-汉口火车站", line:"2号线", inside:24.5, outside:7.2, date:"2026-04-11 00:00:00", score:61 }
        ],
        Y17328: [
          { device:"Y17328", user:"刘磊", section:"园博园-园博大道", line:"7号线", inside:22.14, outside:11.3, date:"2026-04-10 00:00:00", score:58 }
        ],
        Y12216: [
          { device:"Y12216", user:"王军", section:"金银潭-常青车辆段", line:"2号线", inside:39.5, outside:4.8, date:"2026-04-09 00:00:00", score:65 }
        ],
        Y19831: [
          { device:"Y19831", user:"赵敏", section:"光谷五路-左岭", line:"11号线", inside:41.9, outside:8.6, date:"2026-04-08 00:00:00", score:63 }
        ],
        Y18810: [
          { device:"Y18810", user:"陈凯", section:"白沙六路-青菱", line:"5号线", inside:44.12, outside:6.35, date:"2026-04-07 00:00:00", score:67 }
        ]
      };

      var tableBody = document.getElementById("score-table-body");
      var detailBody = document.getElementById("score-detail-body");
      var modalMask = document.getElementById("score-modal-mask");

      function renderList() {
        tableBody.innerHTML = listRows.map(function (row, index) {
          return '<tr class="' + (index % 2 ? "bg-slate-950/10" : "bg-slate-950/22") + '">' +
            '<td class="px-4">' + row.account + '</td>' +
            '<td class="px-4">' + row.user + '</td>' +
            '<td class="px-4">' + row.line + '</td>' +
            '<td class="px-4">' + row.device + '</td>' +
            '<td class="px-4">' + row.date + '</td>' +
            '<td class="px-4">' + row.minScore + '</td>' +
            '<td class="px-4"><span class="score-action-link" data-action="open-detail" data-device="' + row.device + '">详情</span></td>' +
          '</tr>';
        }).join("");
      }

      function openDetail(device) {
        var rows = detailMap[device] || [];
        detailBody.innerHTML = rows.map(function (row, index) {
          return '<tr class="' + (index % 2 ? "bg-slate-950/10" : "bg-slate-950/22") + '">' +
            '<td class="px-4">' + row.device + '</td>' +
            '<td class="px-4">' + row.user + '</td>' +
            '<td class="px-4">' + row.section + '</td>' +
            '<td class="px-4">' + row.line + '</td>' +
            '<td class="px-4">' + row.inside + '</td>' +
            '<td class="px-4">' + row.outside + '</td>' +
            '<td class="px-4">' + row.date + '</td>' +
            '<td class="px-4">' + row.score + '</td>' +
          '</tr>';
        }).join("");
        modalMask.classList.add("show");
      }

      function closeDetail() {
        modalMask.classList.remove("show");
      }

      renderList();

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        if (action === "open-detail") openDetail(trigger.getAttribute("data-device"));
        if (action === "close-detail") closeDetail();
      });
    })();
  </script>
  <script src="assets/js/menu-config.js"></script>
  <script src="assets/js/workbench-mega.js"></script>
  <script src="assets/js/shell.js"></script>
</body>
</html>
