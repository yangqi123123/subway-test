<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全景地图 · 飞行计划管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/theme.css" />
    <style>
      .map-breadcrumb { margin:16px 16px 0; padding:10px 16px; display:flex; flex-wrap:wrap; align-items:center; gap:8px; font-size:11px; color:#94a3b8; }
      .map-breadcrumb__icon { color:#22d3ee; }
      .map-breadcrumb__sep { color:#475569; }
      .map-breadcrumb__current { color:#f8fafc; font-weight:600; letter-spacing:.02em; }
      .field-label { color:#9cc6df; font-size:12px; margin-bottom:6px; display:block; }
      .req::before { content:"*"; color:#fb7185; margin-right:3px; }
      .op-btn { color:#67e8f9; border:1px solid rgba(34,211,238,.26); background:rgba(8,47,73,.55); padding:4px 8px; border-radius:6px; white-space:nowrap; }
      .op-btn:hover { background:rgba(34,211,238,.14); }
      .modal-mask { position:fixed; inset:0; z-index:80; background:rgba(2,8,23,.72); display:none; align-items:center; justify-content:center; padding:22px; }
      .modal-mask.show { display:flex; }
      .modal-card { width:min(1080px,96vw); max-height:88vh; overflow:auto; background:#071b33; border:1px solid rgba(34,211,238,.25); border-radius:10px; box-shadow:0 20px 60px rgba(0,0,0,.55); }
      .status-dot { width:7px; height:7px; border-radius:999px; display:inline-block; margin-right:6px; }
      .step-line { display:grid; grid-template-columns:110px 1fr 120px; gap:12px; align-items:center; border-bottom:1px solid rgba(148,163,184,.12); padding:10px 0; }
      .approval-item { position:relative; padding:0 0 18px 28px; border-left:1px solid rgba(34,211,238,.28); }
      .approval-item:last-child { padding-bottom:0; }
      .approval-item::before { content:""; position:absolute; left:-6px; top:2px; width:11px; height:11px; border-radius:50%; background:#64748b; box-shadow:0 0 0 4px rgba(100,116,139,.15); }
      .approval-item.pass::before { background:#22c55e; box-shadow:0 0 0 4px rgba(34,197,94,.16); }
      .approval-item.wait::before { background:#f59e0b; box-shadow:0 0 0 4px rgba(245,158,11,.16); }
      .approval-item.reject::before { background:#ef4444; box-shadow:0 0 0 4px rgba(239,68,68,.16); }
      .nowrap-cell { white-space:nowrap; }
      .exec-strategy-block { display:none; }
      .exec-strategy-block.is-active { display:block; }
      .exec-cycle-sub { display:none; }
      .exec-cycle-sub.is-active { display:block; }
      .weekday-grid { display:flex; flex-wrap:wrap; gap:10px 14px; }
      .weekday-grid label { display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12px; color:#cdeeff; user-select:none; }
      .weekday-grid input { accent-color:#22d3ee; width:14px; height:14px; }
      .month-days-select { min-height: 168px; max-width: 28rem; }
    </style>
  </head>
  <body data-shell="fullscreen" data-top="map">
    <div id="page-root" class="h-[calc(100vh-64px)] flex flex-col bg-[#061528] text-[#e2f5ff]">
      <nav class="neon-panel neon-panel--tight map-breadcrumb">
        <span class="map-breadcrumb__icon"><i class="fa-solid fa-location-crosshairs"></i></span>
        <span>全景地图</span>
        <span class="map-breadcrumb__sep">&gt;&gt;</span>
        <span class="map-breadcrumb__current">飞行计划</span>
      </nav>
      <section class="neon-panel neon-panel--tight m-4 mb-3 p-4">
        <div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-9 gap-3 items-end">
          <label><span class="field-label">计划名称</span><input id="f-name" class="wh-input w-full px-3 py-2" placeholder="请输入" /></label>
          <label><span class="field-label">计划类型</span><select id="f-type" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>常规巡检</option><option>告警复核</option><option>临时任务</option></select></label>
          <label><span class="field-label">所属线路</span><select id="f-line" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>8号线</option><option>2号线</option><option>5号线</option></select></label>
          <label><span class="field-label">飞行策略</span><select id="f-strategy" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>立即起飞</option><option>单次定时</option><option>周期定时</option></select></label>
          <label><span class="field-label">起降机场</span><select id="f-airport" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>车辆段机场</option><option>梨园机场</option><option>青山机场</option></select></label>
          <label><span class="field-label">计划状态</span><select id="f-exec" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>已执行</option><option>未执行</option><option>执行失败</option><option>执行终止</option></select></label>
          <label><span class="field-label">申请人</span><input id="f-applicant" class="wh-input w-full px-3 py-2" placeholder="请输入" /></label>
          <label><span class="field-label">审核状态</span><select id="f-audit" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>审核通过</option><option>审核中</option><option>已驳回</option></select></label>
          <div class="flex gap-2"><button id="search-btn" class="wh-btn-primary px-4 py-2 text-sm">搜索</button><button id="reset-btn" class="wh-btn-ghost px-4 py-2 text-sm">重置</button></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-3 mt-3 items-end">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <label><span class="field-label">执行开始时间</span><input id="f-start" type="datetime-local" class="wh-input w-full px-3 py-2" /></label>
            <label><span class="field-label">执行结束时间</span><input id="f-end" type="datetime-local" class="wh-input w-full px-3 py-2" /></label>
          </div>
          <div class="flex gap-2 justify-end"><button id="add-btn" class="wh-btn-gold px-4 py-2 text-sm"><i class="fa-solid fa-plus mr-1"></i>新增</button><button id="batch-approve-btn" class="wh-btn-primary px-4 py-2 text-sm">批量审批</button></div>
        </div>
      </section>

      <main class="flex-1 overflow-hidden px-4 pb-4">
        <div class="wh-table-shell h-full overflow-auto bg-[#071b33]/80">
          <table class="min-w-[2240px] w-full text-left">
            <thead><tr>
              <th class="w-10"><input id="check-all" type="checkbox" /></th><th>计划名称</th><th>航线名称</th><th>起降机场</th><th>无人机设备</th><th>计划类型</th><th>飞行策略</th><th>所属线路</th><th>申请人</th><th>提交时间</th><th>审核状态</th><th>执行状态</th><th>计划执行时间</th><th>实际执行时间</th><th>实际结束时间</th><th class="w-[360px]">操作</th>
            </tr></thead>
            <tbody id="plan-body"></tbody>
          </table>
        </div>
      </main>

    </div>

    <div id="form-modal" class="modal-mask">
      <div class="modal-card">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/10"><h3 id="form-title" class="text-base font-semibold">新增飞行计划</h3><button class="op-btn" data-close="form-modal">关闭</button></div>
        <div class="p-5 space-y-4">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <label><span class="field-label req">计划名称</span><input id="p-name" class="wh-input w-full px-3 py-2" /></label>
            <label><span class="field-label">所属线路</span><select id="p-line" class="wh-input w-full px-3 py-2"></select></label>
            <label><span class="field-label">航线名称</span><select id="p-route" class="wh-input w-full px-3 py-2"></select></label>
            <label><span class="field-label">起降机场</span><select id="p-airport" class="wh-input w-full px-3 py-2"></select></label>
            <label><span class="field-label">无人机设备</span><select id="p-drone" class="wh-input w-full px-3 py-2"></select></label>
            <label><span class="field-label">计划类型</span><select id="p-type" class="wh-input w-full px-3 py-2"><option>常规巡检</option><option>告警复核</option><option>临时任务</option></select></label>
            <label><span class="field-label">飞行策略</span><select id="p-strategy" class="wh-input w-full px-3 py-2"><option>立即起飞</option><option>单次定时</option><option>周期定时</option></select></label>
            <label><span class="field-label">申请人</span><input id="p-applicant" class="wh-input w-full px-3 py-2" value="当前用户" readonly /></label>
          </div>

          <section id="exec-time-panel" class="rounded border border-cyan-400/20 bg-slate-950/25 p-4 mt-4 space-y-3" aria-labelledby="exec-time-heading">
            <h4 id="exec-time-heading" class="text-sm font-semibold text-cyan-100">执行时间</h4>

            <div id="exec-block-single" class="exec-strategy-block">
              <label><span class="field-label req">计划执行时间</span><input id="p-single-datetime" type="datetime-local" class="wh-input w-full max-w-md px-3 py-2" /></label>
            </div>

            <div id="exec-block-periodic" class="exec-strategy-block space-y-4">
              <label><span class="field-label req">周期类型</span><select id="p-cycle-type" class="wh-input w-full max-w-xs px-3 py-2"><option value="日">日</option><option value="周">周</option><option value="月">月</option></select></label>

              <div id="exec-cycle-day" class="exec-cycle-sub">
                <label><span class="field-label req">每天执行时间</span><input id="p-cycle-daily-time" type="time" class="wh-input w-full max-w-xs px-3 py-2" /></label>
              </div>

              <div id="exec-cycle-week" class="exec-cycle-sub space-y-3">
                <div>
                  <span class="field-label req">执行星期（可多选）</span>
                  <div class="weekday-grid mt-2" id="p-weekday-wrap">
                    <label><input type="checkbox" class="p-weekday" value="1" />周一</label>
                    <label><input type="checkbox" class="p-weekday" value="2" />周二</label>
                    <label><input type="checkbox" class="p-weekday" value="3" />周三</label>
                    <label><input type="checkbox" class="p-weekday" value="4" />周四</label>
                    <label><input type="checkbox" class="p-weekday" value="5" />周五</label>
                    <label><input type="checkbox" class="p-weekday" value="6" />周六</label>
                    <label><input type="checkbox" class="p-weekday" value="7" />周日</label>
                  </div>
                </div>
                <label><span class="field-label req">执行时间</span><input id="p-cycle-week-time" type="time" class="wh-input w-full max-w-xs px-3 py-2" /></label>
              </div>

              <div id="exec-cycle-month" class="exec-cycle-sub space-y-3">
                <label class="block"><span class="field-label req">每月执行日期（可多选）</span>
                  <select id="p-cycle-month-days" class="wh-input w-full px-2 py-1 text-sm month-days-select" multiple size="8" aria-label="选择每月几号执行"></select>
                </label>
                <label><span class="field-label req">执行时间</span><input id="p-cycle-month-time" type="time" class="wh-input w-full max-w-xs px-3 py-2" /></label>
              </div>
            </div>
          </section>

          <div class="rounded border border-cyan-400/20 bg-cyan-950/20 p-3 text-xs text-cyan-100 leading-6">
            业务校验：仅可选择审批通过且空域许可有效的航线；计划需完成“提交 → 工长 → 工务 → 物管 → 车间主任 → 部门领导”审批后才允许执行；空域许可临期自动预警。
          </div>
        </div>
        <div class="px-5 py-4 border-t border-white/10 flex justify-end gap-2"><button class="wh-btn-ghost px-4 py-2" data-close="form-modal">取消</button><button id="save-plan-btn" class="wh-btn-primary px-4 py-2">保存</button></div>
      </div>
    </div>

    <div id="detail-modal" class="modal-mask"><div class="modal-card"><div class="flex items-center justify-between px-5 py-4 border-b border-white/10"><h3 class="text-base font-semibold">查阅计划</h3><button class="op-btn" data-close="detail-modal">关闭</button></div><div id="detail-box" class="p-5"></div></div></div>
    <div id="approval-modal" class="modal-mask"><div class="modal-card"><div class="flex items-center justify-between px-5 py-4 border-b border-white/10"><h3 class="text-base font-semibold">飞行计划审批</h3><button class="op-btn" data-close="approval-modal">关闭</button></div><div id="approval-box" class="p-5"></div></div></div>
    <div id="report-modal" class="modal-mask"><div class="modal-card"><div class="flex items-center justify-between px-5 py-4 border-b border-white/10"><h3 class="text-base font-semibold">飞行报告</h3><button class="op-btn" data-close="report-modal">关闭</button></div><div id="report-box" class="p-5"></div></div></div>
    <div id="toast" class="fixed right-5 bottom-5 z-[100] hidden rounded bg-cyan-500 text-slate-950 px-4 py-2 text-sm font-semibold shadow-lg"></div>

    <script src="assets/js/menu-config.js"></script>
    <script src="assets/js/shell.js"></script>
    <script>
      const linkData = {
        "8号线": { airports:["车辆段机场"], drones:{"车辆段机场":["车辆段无人机 M350","长江新区无人机 M300"]}, routes:["车辆段日常巡查航线","涉铁施工复核航线"] },
        "2号线": { airports:["梨园机场"], drones:{"梨园机场":["梨园巡检无人机 M30T"]}, routes:["梨园-中南医院演示航线"] },
        "5号线": { airports:["青山机场"], drones:{"青山机场":["青山巡检无人机 M350"]}, routes:["青山站周期巡检航线"] }
      };
      let plans = [
        {id:1,name:"8号线车辆段常规巡检",route:"车辆段日常巡查航线",airport:"车辆段机场",drone:"车辆段无人机 M350",type:"常规巡检",strategy:"单次定时",line:"8号线",applicant:"张三",submit:"2026-05-13 09:20",audit:"审核通过",exec:"未执行",planTime:"2026-05-13 15:30",actualStart:"-",actualEnd:"-",execMeta:{singleAt:"2026-05-13T15:30"}},
        {id:2,name:"梨园站告警复核",route:"梨园-中南医院演示航线",airport:"梨园机场",drone:"梨园巡检无人机 M30T",type:"告警复核",strategy:"立即起飞",line:"2号线",applicant:"李四",submit:"2026-05-13 10:15",audit:"审核中",exec:"未执行",planTime:"2026-05-13 16:00（即时起飞）",actualStart:"-",actualEnd:"-",execMeta:{immediateAt:"2026-05-13T16:00"}},
        {id:3,name:"长江新区临时巡检",route:"涉铁施工复核航线",airport:"车辆段机场",drone:"长江新区无人机 M300",type:"临时任务",strategy:"立即起飞",line:"8号线",applicant:"王五",submit:"2026-05-12 18:40",audit:"已驳回",exec:"执行终止",planTime:"2026-05-13 08:30（即时起飞）",actualStart:"-",actualEnd:"-",execMeta:{immediateAt:"2026-05-13T08:30"}},
        {id:4,name:"青山站周期巡检",route:"青山站周期巡检航线",airport:"青山机场",drone:"青山巡检无人机 M350",type:"常规巡检",strategy:"周期定时",line:"5号线",applicant:"赵六",submit:"2026-05-11 14:05",audit:"审核通过",exec:"已执行",planTime:"每日 09:00",actualStart:"2026-05-12 09:02",actualEnd:"2026-05-12 09:38",execMeta:{cycleType:"日",cycleDailyTime:"09:00"}}
      ];
      let editingId = null;
      let approvalId = null;
      const $ = id => document.getElementById(id);
      const WEEKDAY_LABELS = ["","周一","周二","周三","周四","周五","周六","周日"];
      function pad2(n){ return String(n).padStart(2,"0"); }
      function getNowDatetimeLocal(){
        const d = new Date();
        return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate())+"T"+pad2(d.getHours())+":"+pad2(d.getMinutes());
      }
      function clearWeekdayChecks(){ document.querySelectorAll(".p-weekday").forEach(c=>{ c.checked=false; }); }
      function syncCycleTypeUI(){
        const t = $("p-cycle-type").value;
        ["exec-cycle-day","exec-cycle-week","exec-cycle-month"].forEach(id=>{ $(id).classList.remove("is-active"); });
        if(t==="日") $("exec-cycle-day").classList.add("is-active");
        else if(t==="周") $("exec-cycle-week").classList.add("is-active");
        else $("exec-cycle-month").classList.add("is-active");
      }
      function syncStrategyExecUI(){
        const strategy = $("p-strategy").value;
        const panel = $("exec-time-panel");
        if(panel){
          if(strategy==="立即起飞") panel.classList.add("hidden");
          else panel.classList.remove("hidden");
        }
        ["exec-block-single","exec-block-periodic"].forEach(id=>{ $(id).classList.remove("is-active"); });
        if(strategy==="立即起飞") { /* 执行时间整块隐藏 */ }
        else if(strategy==="单次定时") $("exec-block-single").classList.add("is-active");
        else $("exec-block-periodic").classList.add("is-active");
        if(strategy==="周期定时") syncCycleTypeUI();
      }
      function onStrategyChangeForExec(){
        syncStrategyExecUI();
      }
      function clearMonthDayMulti(){
        const sel = $("p-cycle-month-days");
        if(!sel) return;
        Array.from(sel.options).forEach(function(o){ o.selected = false; });
      }
      function initMonthDayMulti(){
        const sel = $("p-cycle-month-days");
        if(!sel || sel.options.length) return;
        for(var i=1;i<=31;i++){
          var o = document.createElement("option");
          o.value = String(i);
          o.textContent = i + "号";
          sel.appendChild(o);
        }
      }
      function fillExecFormFromPlan(p){
        clearWeekdayChecks();
        clearMonthDayMulti();
        $("p-cycle-type").value = "日";
        $("p-cycle-daily-time").value = "";
        $("p-cycle-week-time").value = "";
        $("p-cycle-month-time").value = "";
        $("p-single-datetime").value = "";
        if(!p){
          $("p-single-datetime").value = getNowDatetimeLocal();
          return;
        }
        const ex = p.execMeta;
        if(p.strategy==="立即起飞"){
          /* 无表单字段 */
        } else if(p.strategy==="单次定时"){
          if(ex && ex.singleAt) $("p-single-datetime").value = ex.singleAt;
          else $("p-single-datetime").value = String(p.planTime||"").replace(" ","T").slice(0,16);
        } else if(p.strategy==="周期定时"){
          if(ex){
            $("p-cycle-type").value = ex.cycleType || "日";
            $("p-cycle-daily-time").value = ex.cycleDailyTime || "";
            $("p-cycle-week-time").value = ex.cycleWeekTime || "";
            $("p-cycle-month-time").value = ex.cycleMonthTime || "";
            (ex.cycleWeekdays||[]).forEach(function(v){
              var cb = document.querySelector('.p-weekday[value="'+v+'"]');
              if(cb) cb.checked = true;
            });
            var days = ex.cycleMonthDays || (ex.cycleMonthDay ? [String(ex.cycleMonthDay)] : []);
            var sel = $("p-cycle-month-days");
            days.forEach(function(d){
              var opt = sel.querySelector('option[value="'+d+'"]');
              if(opt) opt.selected = true;
            });
          } else {
            var m = String(p.planTime||"").match(/(\d{1,2}:\d{2})/);
            $("p-cycle-daily-time").value = m ? m[1] : "";
          }
        }
      }
      function collectExecTimeFromForm(){
        const strategy = $("p-strategy").value;
        const execMeta = { strategy };
        let planTime = "";
        if(strategy==="立即起飞"){
          var v = getNowDatetimeLocal();
          execMeta.immediateAt = v;
          planTime = v.replace("T"," ") + "（即时起飞）";
        } else if(strategy==="单次定时"){
          const v = $("p-single-datetime").value;
          if(!v) return toast("请选择计划执行时间"), null;
          execMeta.singleAt = v;
          planTime = v.replace("T"," ");
        } else {
          const cycle = $("p-cycle-type").value;
          execMeta.cycleType = cycle;
          if(cycle==="日"){
            const t = $("p-cycle-daily-time").value;
            if(!t) return toast("请填写每天执行时间"), null;
            execMeta.cycleDailyTime = t;
            planTime = "每日 " + t;
          } else if(cycle==="周"){
            const days = [...document.querySelectorAll(".p-weekday:checked")].map(c=>c.value).sort((a,b)=>Number(a)-Number(b));
            const t = $("p-cycle-week-time").value;
            if(!days.length) return toast("请至少选择一个执行星期"), null;
            if(!t) return toast("请填写执行时间"), null;
            execMeta.cycleWeekdays = days;
            execMeta.cycleWeekTime = t;
            planTime = "每周" + days.map(d=>WEEKDAY_LABELS[Number(d)]).join("、") + " " + t;
          } else {
            var monthSel = $("p-cycle-month-days");
            var mDays = Array.from(monthSel.selectedOptions).map(function(o){ return o.value; }).sort(function(a,b){ return Number(a)-Number(b); });
            var mt = $("p-cycle-month-time").value;
            if(!mDays.length) return toast("请至少选择每月执行日期"), null;
            if(!mt) return toast("请填写执行时间"), null;
            execMeta.cycleMonthDays = mDays;
            execMeta.cycleMonthTime = mt;
            planTime = "每月" + mDays.map(function(d){ return d + "号"; }).join("、") + " " + mt;
          }
        }
        return { planTime, execMeta };
      }
      const badge = (text, type) => `<span class="wh-status ${type}"><span class="status-dot" style="background:currentColor"></span>${text}</span>`;
      const auditBadge = s => badge(s, s === "审核通过" ? "wh-status--done" : s === "审核中" ? "wh-status--progress" : "wh-status--pending");
      const execBadge = s => badge(s, s === "已执行" ? "wh-status--done" : s === "未执行" ? "wh-status--progress" : "wh-status--pending");
      function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.remove("hidden"); setTimeout(()=>t.classList.add("hidden"),1800); }
      function rows(){
        const name=$("f-name").value.trim(), type=$("f-type").value, line=$("f-line").value, strategy=$("f-strategy").value, airport=$("f-airport").value, exec=$("f-exec").value, applicant=$("f-applicant").value.trim(), audit=$("f-audit").value;
        return plans.filter(p=>(!name||p.name.includes(name))&&(!type||p.type===type)&&(!line||p.line===line)&&(!strategy||p.strategy===strategy)&&(!airport||p.airport===airport)&&(!exec||p.exec===exec)&&(!applicant||p.applicant.includes(applicant))&&(!audit||p.audit===audit));
      }
      function render(){
        $("plan-body").innerHTML = rows().map((p,i)=>`<tr style="background:${i%2?"#08213d":"#071b33"}"><td><input class="row-check" type="checkbox" value="${p.id}"></td><td class="font-medium text-cyan-100 nowrap-cell">${p.name}</td><td class="nowrap-cell">${p.route}</td><td>${p.airport}</td><td>${p.drone}</td><td>${p.type}</td><td>${p.strategy}</td><td>${p.line}</td><td>${p.applicant}</td><td class="nowrap-cell">${p.submit}</td><td>${auditBadge(p.audit)}</td><td>${execBadge(p.exec)}</td><td class="nowrap-cell">${p.planTime}</td><td class="nowrap-cell">${p.actualStart}</td><td class="nowrap-cell">${p.actualEnd}</td><td class="space-x-1 nowrap-cell"><button class="op-btn" onclick="showDetail(${p.id})">查阅计划</button><button class="op-btn" onclick="openCockpit(${p.id})">虚拟座舱</button><button class="op-btn" onclick="copyPlan(${p.id})">复制计划</button><button class="op-btn" onclick="showApproval(${p.id})">审批</button><button class="op-btn" onclick="showReport(${p.id})">查看报告</button></td></tr>`).join("");
      }
      function openModal(id){ $(id).classList.add("show"); }
      function closeModal(id){ $(id).classList.remove("show"); }
      document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>closeModal(b.dataset.close));
      function fillSelect(id, arr){ $(id).innerHTML = arr.map(v=>`<option>${v}</option>`).join(""); }
      function syncLine(){ const line=$("p-line").value; const data=linkData[line]; fillSelect("p-route", data.routes); fillSelect("p-airport", data.airports); syncAirport(); }
      function syncAirport(){ const line=$("p-line").value, airport=$("p-airport").value; fillSelect("p-drone", linkData[line].drones[airport] || []); }
      $("p-line").onchange=syncLine;
      $("p-airport").onchange=syncAirport;
      $("p-strategy").addEventListener("change", onStrategyChangeForExec);
      $("p-cycle-type").addEventListener("change", syncCycleTypeUI);
      initMonthDayMulti();
      function openForm(p){
        editingId = p ? p.id : null;
        $("form-title").textContent = p ? "编辑飞行计划" : "新增飞行计划";
        fillSelect("p-line", Object.keys(linkData));
        $("p-line").value = p?.line || "8号线";
        syncLine();
        if(p){
          $("p-name").value=p.name; $("p-route").value=p.route; $("p-airport").value=p.airport; syncAirport(); $("p-drone").value=p.drone; $("p-type").value=p.type; $("p-strategy").value=p.strategy; $("p-applicant").value=p.applicant;
        } else {
          $("p-name").value="";
          $("p-type").value="常规巡检";
          $("p-strategy").value="单次定时";
          $("p-applicant").value="当前用户";
        }
        fillExecFormFromPlan(p);
        syncStrategyExecUI();
        openModal("form-modal");
      }
      function savePlan(){
        if(!$("p-name").value.trim()) return toast("请填写计划名称");
        const exec = collectExecTimeFromForm();
        if(!exec) return;
        const data={name:$("p-name").value.trim(),line:$("p-line").value,route:$("p-route").value,airport:$("p-airport").value,drone:$("p-drone").value,type:$("p-type").value,strategy:$("p-strategy").value,applicant:$("p-applicant").value,planTime:exec.planTime,execMeta:exec.execMeta};
        if(editingId){ Object.assign(plans.find(p=>p.id===editingId), data, {audit:"审核中", exec:"未执行"}); }
        else { plans.unshift({id:Date.now(),...data,submit:"2026-05-13 11:30",audit:"审核中",exec:"未执行",actualStart:"-",actualEnd:"-"}); }
        closeModal("form-modal"); render(); toast("已保存，进入审批流程");
      }
      function detailHtml(p){
        const vals=[p.name,p.route,p.airport,p.drone,p.type,p.strategy,p.line,p.applicant,p.submit,p.audit,p.exec,p.planTime];
        return `<div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">${["计划名称","航线名称","起降机场","无人机设备","计划类型","飞行策略","所属线路","申请人","提交时间","审核状态","执行状态","计划执行时间"].map((k,i)=>`<div class="rounded border border-cyan-400/15 bg-slate-900/35 p-3"><div class="text-cyan-300 text-xs mb-1">${k}</div><div>${vals[i]}</div></div>`).join("")}</div><div class="mt-4 rounded border border-cyan-400/15 p-3 text-xs leading-6">审批流程：提交 → 工长 → 工务 → 物管 → 车间主任 → 部门领导。当前计划${p.audit === "审核通过" ? "已满足执行条件，系统将在计划时间自动校验并执行。" : p.audit === "已驳回" ? "已退回，可复制或编辑后重新提交。" : "正在审批中，未通过前不能起飞。"}</div>`;
      }
      function showDetail(id){ const p=plans.find(x=>x.id===id); $("detail-box").innerHTML = detailHtml(p); openModal("detail-modal"); }
      function approvalRecords(p){
        const base = [
          {person:"张工", time:"2026-05-13 09:24", status:"审批通过", opinion:"申请资料完整，航线与空域许可匹配。"},
          {person:"李工", time:"2026-05-13 09:42", status:"审批通过", opinion:"施工保护区范围核对无误，同意执行。"},
          {person:"陈工", time:"2026-05-13 10:05", status:"审核中", opinion:"待核验无人机电池与载荷状态。"},
          {person:"王主任", time:"-", status:"待审批", opinion:"-"},
          {person:"赵经理", time:"-", status:"待审批", opinion:"-"}
        ];
        if(p.audit === "审核通过") return base.map(r=>({...r,status:"审批通过",time:r.time === "-" ? "2026-05-13 10:36" : r.time,opinion:r.opinion === "-" ? "审批通过，同意按计划执行。" : r.opinion}));
        if(p.audit === "已驳回") return base.map((r,i)=>i === 2 ? {...r,status:"已驳回",time:"2026-05-13 10:12",opinion:"空域许可临期，请补充续期材料后重新提交。"} : r);
        return base;
      }
      function recordClass(status){
        if(status === "审批通过") return "pass";
        if(status === "审核中") return "wait";
        if(status === "已驳回") return "reject";
        return "";
      }
      function renderApprovalRecords(p){
        return approvalRecords(p).map(r=>`<div class="approval-item ${recordClass(r.status)}"><div class="flex flex-wrap items-center gap-3"><span class="font-semibold text-cyan-100">${r.person}</span>${auditBadge(r.status === "待审批" ? "审核中" : r.status)}<span class="text-xs text-slate-400">${r.time}</span></div><div class="mt-2 text-xs text-slate-300 leading-5">审批意见：${r.opinion}</div></div>`).join("");
      }
      function showApproval(id){
        approvalId=id;
        const p=plans.find(x=>x.id===id);
        $("approval-box").innerHTML=`<div class="mb-4 flex items-center justify-between gap-3"><div><div class="text-cyan-100 font-semibold">${p.name}</div><div class="mt-1 text-xs text-slate-400">审批流程：提交 → 工长 → 工务 → 物管 → 车间主任 → 部门领导</div></div>${auditBadge(p.audit)}</div><div class="grid md:grid-cols-[360px_1fr] gap-4"><section class="rounded border border-cyan-400/20 bg-slate-950/25 p-4"><div class="text-sm font-semibold text-cyan-100 mb-3">审批意见</div><label><span class="field-label">审批意见</span><textarea id="approval-opinion" class="wh-input w-full px-3 py-2 min-h-[132px]" placeholder="请输入审批意见">同意该飞行计划按审批流程继续执行。</textarea></label><div class="mt-4 flex justify-end gap-2"><button id="reject-btn" class="wh-btn-ghost px-4 py-2">驳回</button><button id="approve-btn" class="wh-btn-primary px-4 py-2">审批通过</button></div><div class="mt-3 text-xs text-cyan-100 leading-6">系统校验：空域许可有效、无人机状态正常、航线审批通过后才允许起飞。</div></section><section class="rounded border border-cyan-400/20 bg-slate-950/25 p-4"><div class="text-sm font-semibold text-cyan-100 mb-4">审批记录</div><div id="approval-records">${renderApprovalRecords(p)}</div></section></div>`;
        $("approve-btn").onclick=()=>submitApproval("审批通过");
        $("reject-btn").onclick=()=>submitApproval("已驳回");
        openModal("approval-modal");
      }
      function showReport(id){
        const p=plans.find(x=>x.id===id);
        $("report-box").innerHTML=`<div class="grid md:grid-cols-3 gap-3"><div class="neon-panel p-4"><div class="text-cyan-300 text-xs">飞行日志</div><div class="mt-2">起飞 ${p.actualStart}<br/>降落 ${p.actualEnd}<br/>航程 6.8 km</div></div><div class="neon-panel p-4"><div class="text-cyan-300 text-xs">AI识别结果</div><div class="mt-2">发现施工围挡 2 处，疑似堆土 1 处</div></div><div class="neon-panel p-4"><div class="text-cyan-300 text-xs">告警信息</div><div class="mt-2">空域许可剩余 6 天，请提前续期</div></div></div><div class="mt-4 grid grid-cols-4 gap-3"><img class="h-24 w-full object-cover rounded border border-cyan-400/20" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=600&q=80"><img class="h-24 w-full object-cover rounded border border-cyan-400/20" src="https://images.unsplash.com/photo-1465447142348-e9952c393450?auto=format&fit=crop&w=600&q=80"></div>`;
        openModal("report-modal");
      }
      function openCockpit(id){ const p=plans.find(x=>x.id===id); if(p.audit!=="审核通过") return toast("飞行计划未审批通过，不能进入虚拟座舱"); location.href="map-cockpit-prep.html"; }
      function copyPlan(id){ const p=plans.find(x=>x.id===id); plans.unshift({...p,id:Date.now(),name:p.name+"（复制）",audit:"审核中",exec:"未执行",actualStart:"-",actualEnd:"-",submit:"2026-05-13 11:35",execMeta:p.execMeta?JSON.parse(JSON.stringify(p.execMeta)):undefined}); render(); toast("已复制计划，可继续编辑提交"); }
      function submitApproval(status){
        const p=plans.find(x=>x.id===approvalId);
        const opinion=($("approval-opinion")?.value || "").trim();
        if(!opinion) return toast("请填写审批意见");
        p.audit=status;
        if(status === "已驳回") p.exec="执行终止";
        if(status === "审批通过" && p.exec === "执行终止") p.exec="未执行";
        closeModal("approval-modal");
        render();
        toast(status === "审批通过" ? "审批通过，已写入审批记录" : "已驳回，审批意见已记录");
      }
      $("add-btn").onclick=()=>openForm();
      $("save-plan-btn").onclick=savePlan;
      $("search-btn").onclick=render;
      $("reset-btn").onclick=()=>{ document.querySelectorAll("input,select").forEach(el=>{ if(el.id!=="check-all"&&!el.closest("#form-modal")) el.value=""; }); render(); };
      $("check-all").onchange=e=>document.querySelectorAll(".row-check").forEach(c=>c.checked=e.target.checked);
      $("batch-approve-btn").onclick=()=>{ const ids=[...document.querySelectorAll(".row-check:checked")].map(c=>Number(c.value)); if(!ids.length) return toast("请选择需要审批的计划"); plans.forEach(p=>{ if(ids.includes(p.id)) p.audit="审核通过"; }); render(); toast("已批量审批通过"); };
      window.showDetail=showDetail;
      window.showApproval=showApproval;
      window.showReport=showReport;
      window.copyPlan=copyPlan;
      window.openCockpit=openCockpit;
      render();
    </script>
  </body>
</html>
