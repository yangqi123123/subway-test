<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全景地图 · 飞行计划管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/flight-report-modal.css" />
    <style>
      .map-breadcrumb { margin:16px 16px 0; padding:10px 16px; display:flex; flex-wrap:wrap; align-items:center; gap:8px; font-size:11px; color:#94a3b8; }
      .map-breadcrumb__icon { color:#22d3ee; }
      .map-breadcrumb__sep { color:#475569; }
      .map-breadcrumb__current { color:#f8fafc; font-weight:600; letter-spacing:.02em; }
      .field-label { color:#9cc6df; font-size:12px; margin-bottom:6px; display:block; }
      .req::before { content:"*"; color:#fb7185; margin-right:3px; }
      .op-btn { color:#67e8f9; border:1px solid rgba(34,211,238,.26); background:rgba(8,47,73,.55); padding:4px 8px; border-radius:6px; white-space:nowrap; }
      .op-btn:hover { background:rgba(34,211,238,.14); }
      .modal-mask { position:fixed; inset:0; z-index:80; background:rgba(2,8,23,.72); display:none; align-items:center; justify-content:center; padding:22px; }
      .modal-mask.show { display:flex; }
      .modal-card { width:min(1080px,96vw); max-height:88vh; overflow:auto; background:#071b33; border:1px solid rgba(34,211,238,.25); border-radius:10px; box-shadow:0 20px 60px rgba(0,0,0,.55); }
      .modal-card.modal-card--report { overflow-x:hidden; overflow-y:hidden; }
      .status-dot { width:7px; height:7px; border-radius:999px; display:inline-block; margin-right:6px; }
      .step-line { display:grid; grid-template-columns:110px 1fr 120px; gap:12px; align-items:center; border-bottom:1px solid rgba(148,163,184,.12); padding:10px 0; }
      .approval-records-scroll { max-height:min(520px,58vh); overflow-y:auto; padding:2px 8px 2px 2px; }
      .approval-item { display:flex; gap:12px; align-items:stretch; padding:0 0 18px; border:none; }
      .approval-item--last { padding-bottom:0; }
      .approval-item__rail { display:flex; flex-direction:column; align-items:center; width:20px; flex-shrink:0; }
      .approval-item__dot {
        width:12px; height:12px; min-width:12px; min-height:12px;
        border-radius:50%; background:#64748b; flex-shrink:0;
        box-sizing:border-box;
      }
      .approval-item__line { flex:1; width:2px; min-height:14px; margin-top:4px; background:rgba(148,163,184,.22); border-radius:1px; }
      .approval-item.pass .approval-item__dot { background:#22c55e; }
      .approval-item.wait .approval-item__dot { background:#f59e0b; }
      .approval-item.reject .approval-item__dot { background:#ef4444; }
      .approval-item__content { flex:1; min-width:0; }
      .nowrap-cell { white-space:nowrap; }
      .exec-strategy-block { display: none !important; }
      #exec-block-single.exec-strategy-block.is-active { display: block !important; }
      #exec-block-periodic.exec-strategy-block.is-active {
        display: flex !important;
        flex-direction: column;
        gap: 12px;
      }
      .exec-cycle-sub { display: none !important; }
      .exec-cycle-sub.is-active { display: block !important; }
      #exec-cycle-week.exec-cycle-sub.is-active { display: block !important; }
      .plan-exec-week-row {
        display: grid;
        grid-template-columns: 1fr minmax(148px, 200px);
        gap: 12px 20px;
        align-items: end;
      }
      .plan-exec-week-time { min-width: 0; }
      @media (max-width: 720px) {
        .plan-exec-week-row { grid-template-columns: 1fr; align-items: stretch; }
      }
      .exec-cycle-sub:not(.is-active) .plan-exec-fields { display: none !important; }
      .plan-cycle-type-field { max-width: 280px; margin-bottom: 4px; }
      #exec-cycle-month.exec-cycle-sub.is-active { display: block !important; }

      .weekday-grid { display:flex; flex-wrap:wrap; gap:10px 14px; }
      .weekday-grid label { display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12px; color:#cdeeff; user-select:none; }
      .weekday-grid input { accent-color:#22d3ee; width:14px; height:14px; }
      .modal-card--plan { width: min(920px, 96vw); }
      .modal-card--detail { width: min(960px, 96vw); }
      .plan-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
      .plan-detail-field__label { font-size: 12px; color: #9cc6df; margin-bottom: 4px; }
      .plan-detail-field__value { font-size: 13px; color: #e2f5ff; line-height: 1.45; word-break: break-word; }
      .plan-detail-field--full { grid-column: 1 / -1; }
      @media (max-width: 720px) { .plan-detail-layout { grid-template-columns: 1fr !important; } }
      .plan-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 20px; }
      .plan-form-name-row { margin-bottom: 2px; }
      .plan-form-exec-row {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid rgba(34, 211, 238, 0.22);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(8, 33, 61, 0.72) 0%, rgba(6, 27, 51, 0.45) 100%);
      }
      .plan-form-exec-row.hidden { display: none; }
      .plan-exec-title {
        font-size: 12px;
        font-weight: 600;
        color: #9cc6df;
        margin: 0 0 12px;
      }
      .plan-exec-inner { display: flex; flex-direction: column; gap: 12px; }
      .plan-exec-fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px 20px;
        align-items: end;
      }
      .plan-exec-fields--single { grid-template-columns: minmax(0, 320px); }
      .plan-ms { position: relative; width: 100%; }
      .plan-ms__trigger {
        width: 100%;
        min-height: 36px;
        padding: 6px 32px 6px 12px;
        text-align: left;
        display: flex;
        align-items: center;
        cursor: pointer;
        position: relative;
      }
      .plan-ms__label {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
        color: #e2f5ff;
      }
      .plan-ms__label.is-placeholder { color: #64748b; }
      .plan-ms__arrow {
        position: absolute;
        right: 10px;
        font-size: 10px;
        color: #67e8f9;
        pointer-events: none;
        transition: transform 0.15s ease;
      }
      .plan-ms.is-open .plan-ms__arrow { transform: rotate(180deg); }
      .plan-ms__dropdown {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 4px);
        z-index: 90;
        border: 1px solid rgba(34, 211, 238, 0.28);
        border-radius: 8px;
        background: #071b33;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
        overflow: hidden;
      }
      .plan-ms__dropdown[hidden] { display: none !important; }
      .plan-ms__toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.14);
        background: rgba(8, 47, 73, 0.45);
      }
      .plan-ms__link {
        border: none;
        background: none;
        padding: 0;
        font-size: 11px;
        color: #67e8f9;
        cursor: pointer;
      }
      .plan-ms__link:hover { color: #a5f3fc; text-decoration: underline; }
      .plan-ms__list {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px 8px;
        max-height: 200px;
        overflow-y: auto;
        padding: 10px 12px;
      }
      .plan-ms__option {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #cdeeff;
        cursor: pointer;
        user-select: none;
        padding: 4px 6px;
        border-radius: 4px;
      }
      .plan-ms__option:hover { background: rgba(34, 211, 238, 0.1); }
      .plan-ms__option input { accent-color: #22d3ee; width: 14px; height: 14px; flex-shrink: 0; }
      @media (max-width: 720px) { .plan-exec-fields { grid-template-columns: 1fr; } }
      .wh-input--readonly { background: rgba(8, 47, 73, 0.55); color: #b8d4e8; cursor: not-allowed; }
      @media (max-width: 720px) { .plan-form-grid { grid-template-columns: 1fr; } }
      .plan-form-toggle { width: 100%; text-align: center; font-size: 12px; color: #67e8f9; background: transparent; border: none; cursor: pointer; padding: 4px 0; }
      .plan-form-toggle:hover { color: #a5f3fc; text-decoration: underline; }
      #plan-form-advanced.is-collapsed { display: none; }
      .hidden-field { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
      .num-stepper { display: flex; align-items: center; gap: 0; border: 1px solid rgba(34, 211, 238, 0.22); border-radius: 6px; overflow: hidden; background: rgba(8, 47, 73, 0.35); }
      .num-stepper__btn { width: 32px; height: 36px; flex-shrink: 0; border: none; background: rgba(15, 55, 85, 0.9); color: #e2f5ff; font-size: 16px; cursor: pointer; line-height: 1; }
      .num-stepper__btn:hover { background: rgba(34, 211, 238, 0.18); }
      .num-stepper__input { flex: 1; min-width: 0; border: none !important; border-radius: 0 !important; text-align: center; box-shadow: none !important; }
      .num-stepper--suffix { position: relative; padding-right: 28px; }
      .num-stepper__unit { position: absolute; right: 38px; font-size: 12px; color: #9cc6df; pointer-events: none; }
      .month-days-select { min-height: 168px; max-width: 28rem; }
    </style>
  </head>
  <body data-shell="fullscreen" data-top="map">
    <div id="page-root" class="h-[calc(100vh-64px)] flex flex-col bg-[#061528] text-[#e2f5ff]">
      <nav class="neon-panel neon-panel--tight map-breadcrumb">
        <span class="map-breadcrumb__icon"><i class="fa-solid fa-location-crosshairs"></i></span>
        <span>全景地图</span>
        <span class="map-breadcrumb__sep">&gt;&gt;</span>
        <span class="map-breadcrumb__current">飞行计划</span>
      </nav>
      <section class="neon-panel neon-panel--tight m-4 mb-3 p-4">
        <div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-9 gap-3 items-end">
          <label><span class="field-label">计划名称</span><input id="f-name" class="wh-input w-full px-3 py-2" placeholder="请输入" /></label>
          <label><span class="field-label">计划类型</span><select id="f-type" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>常规巡检</option><option>告警复核</option><option>临时任务</option></select></label>
          <label><span class="field-label">所属线路</span><select id="f-line" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>8号线</option><option>2号线</option><option>5号线</option></select></label>
          <label><span class="field-label">飞行策略</span><select id="f-strategy" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>立即起飞</option><option>单次定时</option><option>周期定时</option></select></label>
          <label><span class="field-label">起降机场</span><select id="f-airport" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>车辆段机场</option><option>梨园机场</option><option>青山机场</option></select></label>
          <label><span class="field-label">计划状态</span><select id="f-exec" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>已执行</option><option>未执行</option><option>执行失败</option><option>执行终止</option></select></label>
          <label><span class="field-label">申请人</span><input id="f-applicant" class="wh-input w-full px-3 py-2" placeholder="请输入" /></label>
          <label><span class="field-label">审核状态</span><select id="f-audit" class="wh-input w-full px-3 py-2"><option value="">全部</option><option>审核通过</option><option>审核中</option><option>已驳回</option></select></label>
          <div class="flex gap-2"><button id="search-btn" class="wh-btn-primary px-4 py-2 text-sm">搜索</button><button id="reset-btn" class="wh-btn-ghost px-4 py-2 text-sm">重置</button></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-3 mt-3 items-end">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <label><span class="field-label">执行开始时间</span><input id="f-start" type="datetime-local" class="wh-input w-full px-3 py-2" /></label>
            <label><span class="field-label">执行结束时间</span><input id="f-end" type="datetime-local" class="wh-input w-full px-3 py-2" /></label>
          </div>
          <div class="flex gap-2 justify-end"><button id="add-btn" class="wh-btn-gold px-4 py-2 text-sm"><i class="fa-solid fa-plus mr-1"></i>新增</button><button id="batch-approve-btn" class="wh-btn-primary px-4 py-2 text-sm">批量审批</button></div>
        </div>
      </section>

      <main class="flex-1 overflow-hidden px-4 pb-4">
        <div class="wh-table-shell h-full overflow-auto bg-[#071b33]/80">
          <table class="min-w-[2240px] w-full text-left">
            <thead><tr>
              <th class="w-10"><input id="check-all" type="checkbox" /></th><th>计划名称</th><th>航线名称</th><th>起降机场</th><th>无人机设备</th><th>计划类型</th><th>飞行策略</th><th>所属线路</th><th>申请人</th><th>提交时间</th><th>审核状态</th><th>执行状态</th><th>计划执行时间</th><th>实际执行时间</th><th>实际结束时间</th><th class="w-[360px]">操作</th>
            </tr></thead>
            <tbody id="plan-body"></tbody>
          </table>
        </div>
      </main>

    </div>

    <div id="form-modal" class="modal-mask">
      <div class="modal-card modal-card--plan">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/10"><h3 id="form-title" class="text-base font-semibold">新增计划</h3><button type="button" class="wh-modal-close" data-close="form-modal" aria-label="关闭">×</button></div>
        <div class="p-5 space-y-4">
          <label class="plan-form-name-row block"><span class="field-label req">计划名称</span><input id="p-name" class="wh-input w-full px-3 py-2" placeholder="请输入计划名称" /></label>
          <div class="plan-form-grid">
            <label><span class="field-label req">飞行航线</span><select id="p-route" class="wh-input w-full px-3 py-2"><option value="">请选择飞行航线</option></select></label>
            <label><span class="field-label req">适用机场</span><input id="p-airport" type="text" class="wh-input wh-input--readonly w-full px-3 py-2" readonly placeholder="选择航线后自动带出" tabindex="-1" /></label>
            <label><span class="field-label req">适用航空器</span><input id="p-drone" type="text" class="wh-input wh-input--readonly w-full px-3 py-2" readonly placeholder="选择航线后自动带出" tabindex="-1" /></label>
            <label><span class="field-label req">返航高度(ALT)</span><div class="num-stepper"><button type="button" class="num-stepper__btn" data-step="-10" data-target="p-rth-alt">−</button><input id="p-rth-alt" type="number" class="wh-input num-stepper__input" value="100" min="20" max="500" step="10" /><button type="button" class="num-stepper__btn" data-step="10" data-target="p-rth-alt">+</button></div></label>
            <label><span class="field-label">AI识别模型</span><select id="p-ai-model" class="wh-input w-full px-3 py-2"><option value="">请选择AI模型</option><option>地铁保护区通用模型</option><option>施工机械识别模型</option><option>堆土围挡识别模型</option></select></label>
            <label><span class="field-label">电量限制</span><div class="num-stepper num-stepper--suffix"><button type="button" class="num-stepper__btn" data-step="-5" data-target="p-battery">−</button><input id="p-battery" type="number" class="wh-input num-stepper__input" value="30" min="10" max="100" step="5" /><button type="button" class="num-stepper__btn" data-step="5" data-target="p-battery">+</button><span class="num-stepper__unit">%</span></div></label>
            <label><span class="field-label">巡查类型</span><select id="p-inspect-type" class="wh-input w-full px-3 py-2"><option>日常巡查</option><option>项目巡查</option><option>其他巡查</option></select></label>
            <label><span class="field-label req">飞行策略</span><select id="p-strategy" class="wh-input w-full px-3 py-2"><option>立即起飞</option><option>单次定时</option><option>周期定时</option></select></label>
          </div>
          <section id="exec-time-panel" class="plan-form-exec-row" aria-labelledby="exec-time-heading">
            <h4 id="exec-time-heading" class="plan-exec-title">执行时间</h4>
            <div class="plan-exec-inner">
              <div id="exec-block-single" class="exec-strategy-block">
                <div class="plan-exec-fields plan-exec-fields--single">
                  <label><span class="field-label req">计划执行时间</span><input id="p-single-datetime" type="datetime-local" class="wh-input w-full px-3 py-2" /></label>
                </div>
              </div>
              <div id="exec-block-periodic" class="exec-strategy-block plan-exec-inner">
                <label class="block plan-cycle-type-field">
                  <span class="field-label req">周期类型</span>
                  <select id="p-cycle-type" class="wh-input w-full max-w-xs px-3 py-2"><option value="日">日</option><option value="周">周</option><option value="月">月</option></select>
                </label>
                <div id="exec-cycle-day" class="exec-cycle-sub">
                  <div class="plan-exec-fields plan-exec-fields--single">
                    <label><span class="field-label req">每天执行时间</span><input id="p-cycle-daily-time" type="time" class="wh-input w-full px-3 py-2" /></label>
                  </div>
                </div>
                <div id="exec-cycle-week" class="exec-cycle-sub">
                  <div class="plan-exec-week-row">
                    <label class="block min-w-0"><span class="field-label req">执行星期（可多选）</span>
                      <div class="weekday-grid mt-2" id="p-weekday-wrap">
                        <label><input type="checkbox" class="p-weekday" value="1" />周一</label>
                        <label><input type="checkbox" class="p-weekday" value="2" />周二</label>
                        <label><input type="checkbox" class="p-weekday" value="3" />周三</label>
                        <label><input type="checkbox" class="p-weekday" value="4" />周四</label>
                        <label><input type="checkbox" class="p-weekday" value="5" />周五</label>
                        <label><input type="checkbox" class="p-weekday" value="6" />周六</label>
                        <label><input type="checkbox" class="p-weekday" value="7" />周日</label>
                      </div>
                    </label>
                    <label class="plan-exec-week-time block"><span class="field-label req">执行时间</span><input id="p-cycle-week-time" type="time" class="wh-input w-full px-3 py-2" /></label>
                  </div>
                </div>
                <div id="exec-cycle-month" class="exec-cycle-sub">
                  <div class="plan-exec-fields">
                    <label class="block"><span class="field-label req">每月执行日期（可多选）</span>
                      <div class="plan-ms" id="month-days-ms">
                        <button type="button" class="plan-ms__trigger wh-input" id="month-days-ms-trigger" aria-expanded="false" aria-haspopup="listbox">
                          <span class="plan-ms__label is-placeholder" id="month-days-ms-label">请选择每月执行日期</span>
                          <span class="plan-ms__arrow" aria-hidden="true">▼</span>
                        </button>
                        <div class="plan-ms__dropdown" id="month-days-ms-dropdown" hidden>
                          <div class="plan-ms__toolbar">
                            <button type="button" class="plan-ms__link" data-month-ms="all">全选</button>
                            <button type="button" class="plan-ms__link" data-month-ms="clear">清空</button>
                          </div>
                          <div class="plan-ms__list" id="p-cycle-month-days-list" role="listbox" aria-multiselectable="true"></div>
                        </div>
                      </div>
                    </label>
                    <label><span class="field-label req">执行时间</span><input id="p-cycle-month-time" type="time" class="wh-input w-full px-3 py-2" /></label>
                  </div>
                </div>
              </div>
            </div>
          </section>
          <button type="button" id="plan-form-toggle" class="plan-form-toggle">收起</button>
          <div id="plan-form-advanced" class="plan-form-grid">
            <label><span class="field-label req">计划类型</span><select id="p-type" class="wh-input w-full px-3 py-2"><option>常规计划</option><option>告警复核</option><option>临时任务</option></select></label>
            <label><span class="field-label req">执行方式</span><select id="p-exec-method" class="wh-input w-full px-3 py-2"><option>自主飞行</option><option>遥控飞行</option></select></label>
            <label><span class="field-label req">任务精度</span><select id="p-task-precision" class="wh-input w-full px-3 py-2"><option>GNSS</option><option>高精度RTK</option></select></label>
            <label><span class="field-label">飞行模式</span><select id="p-flight-mode" class="wh-input w-full px-3 py-2"><option>超视距</option><option>视距内</option></select></label>
            <label><span class="field-label">遥控器失控动作</span><input id="p-rc-lost" type="text" class="wh-input wh-input--readonly w-full px-3 py-2" readonly value="返航" tabindex="-1" /></label>
            <label><span class="field-label">返航高度模式</span><input id="p-rth-mode" type="text" class="wh-input wh-input--readonly w-full px-3 py-2" readonly value="设定高度" tabindex="-1" /></label>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="assets/js/menu-config.js"></script>
    <script src="assets/js/shell.js"></script>
    <script src="assets/js/map-gis.js"></script>
    <script src="assets/js/track-playback.js"></script>
    <script src="assets/js/approval-timeline.js"></script>
    <script src="assets/js/flight-report-modal.js"></script>
    <script>
      const linkData = {
        "8号线": { airports:["车辆段机场"], drones:{"车辆段机场":["车辆段无人机 M350","长江新区无人机 M300"]}, routes:["车辆段日常巡查航线","涉铁施工复核航线"] },
        "2号线": { airports:["梨园机场"], drones:{"梨园机场":["梨园巡检无人机 M30T"]}, routes:["梨园-中南医院演示航线"] },
        "5号线": { airports:["青山机场"], drones:{"青山机场":["青山巡检无人机 M350"]}, routes:["青山站周期巡检航线"] }
      };
      let plans = [
        {id:1,name:"8号线车辆段常规巡检",route:"车辆段日常巡查航线",airport:"车辆段机场",drone:"车辆段无人机 M350",type:"常规巡检",strategy:"单次定时",line:"8号线",applicant:"张三",submit:"2026-05-13 09:20",audit:"审核通过",airspaceValid:true,exec:"未执行",planTime:"2026-05-13 15:30",actualStart:"-",actualEnd:"-",execMeta:{singleAt:"2026-05-13T15:30"}},
        {id:2,name:"梨园站告警复核",route:"梨园-中南医院演示航线",airport:"梨园机场",drone:"梨园巡检无人机 M30T",type:"告警复核",strategy:"立即起飞",line:"2号线",applicant:"李四",submit:"2026-05-13 10:15",audit:"审核中",exec:"未执行",planTime:"2026-05-13 16:00（即时起飞）",actualStart:"-",actualEnd:"-",execMeta:{immediateAt:"2026-05-13T16:00"}},
        {id:3,name:"长江新区临时巡检",route:"涉铁施工复核航线",airport:"车辆段机场",drone:"长江新区无人机 M300",type:"临时任务",strategy:"立即起飞",line:"8号线",applicant:"王五",submit:"2026-05-12 18:40",audit:"已驳回",exec:"执行终止",planTime:"2026-05-13 08:30（即时起飞）",actualStart:"-",actualEnd:"-",execMeta:{immediateAt:"2026-05-13T08:30"}},
        {id:4,name:"青山站周期巡检",route:"青山站周期巡检航线",airport:"青山机场",drone:"青山巡检无人机 M350",type:"常规巡检",strategy:"周期定时",line:"5号线",applicant:"赵六",submit:"2026-05-11 14:05",audit:"审核通过",airspaceValid:false,exec:"已执行",planTime:"每日 09:00",actualStart:"2026-05-12 09:02",actualEnd:"2026-05-12 09:38",execMeta:{cycleType:"日",cycleDailyTime:"09:00"}},
        {id:5,name:"涉铁施工夜间复核",route:"涉铁施工复核航线",airport:"车辆段机场",drone:"长江新区无人机 M300",type:"告警复核",strategy:"单次定时",line:"8号线",applicant:"周七",submit:"2026-05-13 11:00",audit:"审核中",exec:"未执行",planTime:"2026-05-14 02:00",actualStart:"-",actualEnd:"-",execMeta:{singleAt:"2026-05-14T02:00"}}
      ];
      let editingId = null;
      let approvalId = null;
      let approvalBatchIds = null;
      const $ = id => document.getElementById(id);
      const WEEKDAY_LABELS = ["","周一","周二","周三","周四","周五","周六","周日"];
      function pad2(n){ return String(n).padStart(2,"0"); }
      function getNowDatetimeLocal(){
        const d = new Date();
        return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate())+"T"+pad2(d.getHours())+":"+pad2(d.getMinutes());
      }
      function clearWeekdayChecks(){ document.querySelectorAll(".p-weekday").forEach(c=>{ c.checked=false; }); }
      function syncCycleTypeUI(){
        const t = $("p-cycle-type").value;
        ["exec-cycle-day","exec-cycle-week","exec-cycle-month"].forEach(id=>{ $(id).classList.remove("is-active"); });
        if(t==="日") $("exec-cycle-day").classList.add("is-active");
        else if(t==="周") $("exec-cycle-week").classList.add("is-active");
        else $("exec-cycle-month").classList.add("is-active");
      }
      function syncStrategyExecUI(){
        const strategy = $("p-strategy").value;
        const panel = $("exec-time-panel");
        if(panel){
          if(strategy==="立即起飞") panel.classList.add("hidden");
          else panel.classList.remove("hidden");
        }
        ["exec-block-single","exec-block-periodic"].forEach(id=>{ $(id).classList.remove("is-active"); });
        ["exec-cycle-day","exec-cycle-week","exec-cycle-month"].forEach(id=>{ $(id).classList.remove("is-active"); });
        if(strategy==="立即起飞") { /* 执行时间整块隐藏 */ }
        else if(strategy==="单次定时") {
          $("exec-block-single").classList.add("is-active");
        } else if(strategy==="周期定时") {
          $("exec-block-periodic").classList.add("is-active");
          syncCycleTypeUI();
        }
      }
      function onStrategyChangeForExec(){
        syncStrategyExecUI();
      }
      function getSelectedMonthDays(){
        return Array.from(document.querySelectorAll(".p-cycle-month-day:checked"))
          .map(function (c) { return c.value; })
          .sort(function (a, b) { return Number(a) - Number(b); });
      }
      function updateMonthDaysMsLabel(){
        const label = $("month-days-ms-label");
        if (!label) return;
        const days = getSelectedMonthDays();
        if (!days.length) {
          label.textContent = "请选择每月执行日期";
          label.classList.add("is-placeholder");
          return;
        }
        label.textContent = days.map(function (d) { return d + "号"; }).join("、");
        label.classList.remove("is-placeholder");
      }
      function setSelectedMonthDays(days){
        const set = new Set((days || []).map(String));
        document.querySelectorAll(".p-cycle-month-day").forEach(function (cb) {
          cb.checked = set.has(cb.value);
        });
        updateMonthDaysMsLabel();
      }
      function clearMonthDayMulti(){
        setSelectedMonthDays([]);
      }
      function closeMonthDaysMs(){
        const root = $("month-days-ms");
        const panel = $("month-days-ms-dropdown");
        const trigger = $("month-days-ms-trigger");
        if (panel) panel.hidden = true;
        if (root) root.classList.remove("is-open");
        if (trigger) trigger.setAttribute("aria-expanded", "false");
      }
      function openMonthDaysMs(){
        const root = $("month-days-ms");
        const panel = $("month-days-ms-dropdown");
        const trigger = $("month-days-ms-trigger");
        if (panel) panel.hidden = false;
        if (root) root.classList.add("is-open");
        if (trigger) trigger.setAttribute("aria-expanded", "true");
      }
      function toggleMonthDaysMs(){
        const panel = $("month-days-ms-dropdown");
        if (!panel) return;
        if (panel.hidden) openMonthDaysMs();
        else closeMonthDaysMs();
      }
      function initMonthDayMulti(){
        const list = $("p-cycle-month-days-list");
        if (!list || list.dataset.inited === "1") return;
        list.dataset.inited = "1";
        for (var i = 1; i <= 31; i++) {
          var label = document.createElement("label");
          label.className = "plan-ms__option";
          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.className = "p-cycle-month-day";
          cb.value = String(i);
          label.appendChild(cb);
          label.appendChild(document.createTextNode(i + "号"));
          list.appendChild(label);
        }
        list.addEventListener("change", updateMonthDaysMsLabel);
        var trigger = $("month-days-ms-trigger");
        if (trigger) trigger.addEventListener("click", function (e) {
          e.stopPropagation();
          toggleMonthDaysMs();
        });
        var toolbar = list.closest(".plan-ms__dropdown");
        if (toolbar) {
          toolbar.addEventListener("click", function (e) {
            var btn = e.target.closest("[data-month-ms]");
            if (!btn) return;
            e.stopPropagation();
            if (btn.dataset.monthMs === "all") {
              setSelectedMonthDays(Array.from({ length: 31 }, function (_, idx) { return String(idx + 1); }));
            } else {
              clearMonthDayMulti();
            }
          });
        }
        document.addEventListener("click", function (e) {
          var root = $("month-days-ms");
          if (!root || root.contains(e.target)) return;
          closeMonthDaysMs();
        });
      }
      function fillExecFormFromPlan(p){
        clearWeekdayChecks();
        clearMonthDayMulti();
        $("p-cycle-type").value = "日";
        $("p-cycle-daily-time").value = "";
        $("p-cycle-week-time").value = "";
        $("p-cycle-month-time").value = "";
        $("p-single-datetime").value = "";
        if(!p){
          $("p-single-datetime").value = getNowDatetimeLocal();
          return;
        }
        const ex = p.execMeta;
        if(p.strategy==="立即起飞"){
          /* 无表单字段 */
        } else if(p.strategy==="单次定时"){
          if(ex && ex.singleAt) $("p-single-datetime").value = ex.singleAt;
          else $("p-single-datetime").value = String(p.planTime||"").replace(" ","T").slice(0,16);
        } else if(p.strategy==="周期定时"){
          if(ex){
            $("p-cycle-type").value = ex.cycleType || "日";
            $("p-cycle-daily-time").value = ex.cycleDailyTime || "";
            $("p-cycle-week-time").value = ex.cycleWeekTime || "";
            $("p-cycle-month-time").value = ex.cycleMonthTime || "";
            (ex.cycleWeekdays||[]).forEach(function(v){
              var cb = document.querySelector('.p-weekday[value="'+v+'"]');
              if(cb) cb.checked = true;
            });
            var days = ex.cycleMonthDays || (ex.cycleMonthDay ? [String(ex.cycleMonthDay)] : []);
            setSelectedMonthDays(days);
          } else {
            var m = String(p.planTime||"").match(/(\d{1,2}:\d{2})/);
            $("p-cycle-daily-time").value = m ? m[1] : "";
          }
        }
      }
      function collectExecTimeFromForm(){
        const strategy = $("p-strategy").value;
        const execMeta = { strategy };
        let planTime = "";
        if(strategy==="立即起飞"){
          var v = getNowDatetimeLocal();
          execMeta.immediateAt = v;
          planTime = v.replace("T"," ") + "（即时起飞）";
        } else if(strategy==="单次定时"){
          const v = $("p-single-datetime").value;
          if(!v) return toast("请选择计划执行时间"), null;
          execMeta.singleAt = v;
          planTime = v.replace("T"," ");
        } else {
          const cycle = $("p-cycle-type").value;
          execMeta.cycleType = cycle;
          if(cycle==="日"){
            const t = $("p-cycle-daily-time").value;
            if(!t) return toast("请填写每天执行时间"), null;
            execMeta.cycleDailyTime = t;
            planTime = "每日 " + t;
          } else if(cycle==="周"){
            const days = [...document.querySelectorAll(".p-weekday:checked")].map(c=>c.value).sort((a,b)=>Number(a)-Number(b));
            const t = $("p-cycle-week-time").value;
            if(!days.length) return toast("请至少选择一个执行星期"), null;
            if(!t) return toast("请填写执行时间"), null;
            execMeta.cycleWeekdays = days;
            execMeta.cycleWeekTime = t;
            planTime = "每周" + days.map(d=>WEEKDAY_LABELS[Number(d)]).join("、") + " " + t;
          } else {
            var mDays = getSelectedMonthDays();
            var mt = $("p-cycle-month-time").value;
            if(!mDays.length) return toast("请至少选择每月执行日期"), null;
            if(!mt) return toast("请填写执行时间"), null;
            execMeta.cycleMonthDays = mDays;
            execMeta.cycleMonthTime = mt;
            planTime = "每月" + mDays.map(function(d){ return d + "号"; }).join("、") + " " + mt;
          }
        }
        return { planTime, execMeta };
      }
      const badge = (text, type) => `<span class="wh-status ${type}"><span class="status-dot" style="background:currentColor"></span>${text}</span>`;
      const auditBadge = s => badge(s, s === "审核通过" ? "wh-status--done" : s === "审核中" ? "wh-status--progress" : "wh-status--pending");
      const execBadge = s => badge(s, s === "已执行" ? "wh-status--done" : s === "未执行" ? "wh-status--progress" : "wh-status--pending");
      function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.remove("hidden"); setTimeout(()=>t.classList.add("hidden"),1800); }
      function rows(){
        const name=$("f-name").value.trim(), type=$("f-type").value, line=$("f-line").value, strategy=$("f-strategy").value, airport=$("f-airport").value, exec=$("f-exec").value, applicant=$("f-applicant").value.trim(), audit=$("f-audit").value;
        return plans.filter(p=>(!name||p.name.includes(name))&&(!type||p.type===type)&&(!line||p.line===line)&&(!strategy||p.strategy===strategy)&&(!airport||p.airport===airport)&&(!exec||p.exec===exec)&&(!applicant||p.applicant.includes(applicant))&&(!audit||p.audit===audit));
      }
      function planRowActions(p){
        const detail=`<button class="op-btn" onclick="showDetail(${p.id})">查阅计划</button>`;
        const copy=`<button class="op-btn" onclick="copyPlan(${p.id})">复制计划</button>`;
        const approve=`<button class="op-btn" onclick="showApproval(${p.id})">审批</button>`;
        const cockpit=`<button class="op-btn" onclick="openCockpit(${p.id})">虚拟座舱</button>`;
        const report=`<button class="op-btn" onclick="showReport(${p.id})">查看报告</button>`;
        if(p.audit==="审核中") return detail+copy+approve;
        if(p.audit==="已驳回") return detail+copy;
        if(p.audit==="审核通过") return detail+cockpit+copy+report;
        return detail+copy;
      }
      function render(){
        $("plan-body").innerHTML = rows().map((p,i)=>{ const canSelect=p.audit==="审核中"; return `<tr style="background:${i%2?"#08213d":"#071b33"}"><td><input class="row-check" type="checkbox" value="${p.id}"${canSelect?"":" disabled title=\"仅审核中计划可批量审批\""}></td><td class="font-medium text-cyan-100 nowrap-cell">${p.name}</td><td class="nowrap-cell">${p.route}</td><td>${p.airport}</td><td>${p.drone}</td><td>${p.type}</td><td>${p.strategy}</td><td>${p.line}</td><td>${p.applicant}</td><td class="nowrap-cell">${p.submit}</td><td>${auditBadge(p.audit)}</td><td>${execBadge(p.exec)}</td><td class="nowrap-cell">${p.planTime}</td><td class="nowrap-cell">${p.actualStart}</td><td class="nowrap-cell">${p.actualEnd}</td><td class="space-x-1 nowrap-cell">${planRowActions(p)}</td></tr>`; }).join("");
        syncCheckAllState();
      }
      function syncCheckAllState(){
        const all=$("check-all");
        if(!all) return;
        const enabled=[...document.querySelectorAll(".row-check:not(:disabled)")];
        const checked=enabled.filter(c=>c.checked);
        all.checked=enabled.length>0&&checked.length===enabled.length;
        all.indeterminate=checked.length>0&&checked.length<enabled.length;
        all.disabled=!enabled.length;
      }
      function openModal(id){ $(id).classList.add("show"); }
      function closeModal(id){
        if(id==="report-modal"&&window.WHFlightReportModal) WHFlightReportModal.close();
        else $(id).classList.remove("show");
      }
      document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>closeModal(b.dataset.close));
      $("cockpit-launch-btn").onclick=()=>{ closeModal("cockpit-airspace-modal"); location.href="map-cockpit-prep.html"; };
      function fillSelect(id, arr, placeholder){
        const ph = placeholder ? '<option value="">' + placeholder + "</option>" : "";
        $(id).innerHTML = ph + arr.map(function (v) { return "<option>" + v + "</option>"; }).join("");
      }
      const routeDroneMap = {
        "车辆段日常巡查航线": "车辆段无人机 M350",
        "涉铁施工复核航线": "长江新区无人机 M300",
        "梨园-中南医院演示航线": "梨园巡检无人机 M30T",
        "青山站周期巡检航线": "青山巡检无人机 M350",
      };
      const routeIndex = (function () {
        const idx = {};
        Object.keys(linkData).forEach(function (line) {
          const data = linkData[line];
          data.routes.forEach(function (route) {
            const airport = data.airports[0];
            const drones = data.drones[airport] || [];
            idx[route] = {
              line: line,
              airport: airport,
              drone: routeDroneMap[route] || drones[0] || "",
            };
          });
        });
        return idx;
      })();
      function allRoutes() {
        return Object.keys(routeIndex);
      }
      function lineFromAirport(airport) {
        return Object.keys(linkData).find(function (line) {
          return linkData[line].airports.indexOf(airport) >= 0;
        }) || "8号线";
      }
      function syncFromRoute() {
        const route = $("p-route").value;
        if (!route) {
          $("p-airport").value = "";
          $("p-drone").value = "";
          $("p-line").value = "";
          return;
        }
        const meta = routeIndex[route];
        if (!meta) return;
        $("p-line").value = meta.line;
        $("p-airport").value = meta.airport;
        $("p-drone").value = meta.drone || "";
      }
      function normalizeTaskPrecision(v) {
        if (v === "RTK") return "高精度RTK";
        return v || "GNSS";
      }
      function normalizeExecMethod(v) {
        if (v === "手动飞行") return "遥控飞行";
        return v || "自主飞行";
      }
      function normalizeVideoMode(v) {
        if (v === "红外" || v === "红外线") return "红外线";
        if (v === "可见光" || v === "双光") return "默认";
        return v || "默认";
      }
      function normalizePlanType(type){ return type === "常规巡检" ? "常规计划" : type || "常规计划"; }
      function displayPlanType(type){ return type === "常规计划" ? "常规巡检" : type; }
      function setPlanFormDefaults(){
        $("p-type").value = "常规计划";
        $("p-strategy").value = "立即起飞";
        $("p-inspect-type").value = "日常巡查";
        $("p-flight-mode").value = "超视距";
        $("p-rth-mode").value = "设定高度";
        $("p-route-lost").value = "返航";
        $("p-rth-alt").value = "100";
        $("p-battery").value = "30";
        $("p-exec-method").value = "自主飞行";
        $("p-task-precision").value = "GNSS";
        $("p-rc-lost").value = "返航";
        $("p-pilot").value = "武汉地保1";
        $("p-video-mode").value = "默认";
        $("p-ai-model").value = "";
        $("p-mount").value = "";
      }
      function readPlanExtraFields(){
        return {
          aiModel: $("p-ai-model").value,
          inspectType: $("p-inspect-type").value,
          flightMode: $("p-flight-mode").value,
          rthMode: $("p-rth-mode").value,
          routeLostAction: $("p-route-lost").value,
          mountDevice: $("p-mount").value,
          rthAlt: Number($("p-rth-alt").value),
          batteryLimit: Number($("p-battery").value),
          execMethod: $("p-exec-method").value,
          taskPrecision: $("p-task-precision").value,
          rcLostAction: $("p-rc-lost").value,
          pilot: $("p-pilot").value,
          videoMode: $("p-video-mode").value,
        };
      }
      function applyPlanExtraFields(p){
        if (!p) { setPlanFormDefaults(); return; }
        const x = p.planExtra || {};
        $("p-ai-model").value = x.aiModel || "";
        $("p-inspect-type").value = x.inspectType || "日常巡查";
        $("p-flight-mode").value = x.flightMode || "超视距";
        $("p-rth-mode").value = "设定高度";
        $("p-rc-lost").value = "返航";
        var routeLost = x.routeLostAction || "返航";
        $("p-route-lost").value = routeLost === "继续执行" ? "继续执行" : "返航";
        $("p-mount").value = x.mountDevice || "";
        $("p-rth-alt").value = x.rthAlt != null ? x.rthAlt : 100;
        $("p-battery").value = x.batteryLimit != null ? x.batteryLimit : 30;
        $("p-exec-method").value = normalizeExecMethod(x.execMethod);
        $("p-task-precision").value = normalizeTaskPrecision(x.taskPrecision);
        $("p-pilot").value = x.pilot || "武汉地保1";
        $("p-video-mode").value = normalizeVideoMode(x.videoMode);
        if (x.inspectType === "专项巡查" || x.inspectType === "应急巡查") {
          $("p-inspect-type").value = "其他巡查";
        }
      }
      function initNumSteppers(){
        document.querySelectorAll(".num-stepper__btn").forEach(function (btn) {
          btn.onclick = function () {
            const input = $(btn.dataset.target);
            if (!input) return;
            const step = Number(btn.dataset.step) || 0;
            const min = input.min === "" ? -Infinity : Number(input.min);
            const max = input.max === "" ? Infinity : Number(input.max);
            const next = Math.min(max, Math.max(min, Number(input.value || 0) + step));
            input.value = String(next);
          };
        });
      }
      function initFormCollapse(){
        const toggle = $("plan-form-toggle");
        const panel = $("plan-form-advanced");
        if (!toggle || !panel) return;
        toggle.onclick = function () {
          const collapsed = panel.classList.toggle("is-collapsed");
          toggle.textContent = collapsed ? "展开" : "收起";
        };
      }
      $("p-route").onchange = syncFromRoute;
      $("p-strategy").addEventListener("change", onStrategyChangeForExec);
      $("p-cycle-type").addEventListener("change", syncCycleTypeUI);
      initMonthDayMulti();
      initNumSteppers();
      initFormCollapse();
      function openForm(p){
        editingId = p ? p.id : null;
        $("form-title").textContent = p ? "编辑计划" : "新增计划";
        fillSelect("p-line", Object.keys(linkData));
        fillSelect("p-route", allRoutes(), "请选择飞行航线");
        if (p) {
          $("p-name").value = p.name;
          $("p-route").value = p.route;
          syncFromRoute();
          if (p.drone) $("p-drone").value = p.drone;
          $("p-type").value = normalizePlanType(p.type);
          $("p-strategy").value = p.strategy;
          $("p-applicant").value = p.applicant;
          applyPlanExtraFields(p);
        } else {
          $("p-name").value = "";
          $("p-applicant").value = "当前用户";
          $("p-line").value = "";
          $("p-airport").value = "";
          fillSelect("p-route", allRoutes(), "请选择飞行航线");
          $("p-route").value = "";
          $("p-drone").value = "";
          setPlanFormDefaults();
        }
        const panel = $("plan-form-advanced");
        const toggle = $("plan-form-toggle");
        if (panel) panel.classList.remove("is-collapsed");
        if (toggle) toggle.textContent = "收起";
        fillExecFormFromPlan(p);
        syncStrategyExecUI();
        closeMonthDaysMs();
        openModal("form-modal");
      }
      function savePlan(){
        if(!$("p-name").value.trim()) return toast("请填写计划名称");
        if(!$("p-route").value) return toast("请选择飞行航线");
        if(!$("p-airport").value) return toast("请先选择飞行航线以带出适用机场");
        if(!$("p-drone").value) return toast("请先选择飞行航线以带出适用航空器");
        if(!$("p-rth-alt").value) return toast("请填写返航高度");
        const exec = collectExecTimeFromForm();
        if(!exec) return;
        const line = $("p-line").value || lineFromAirport($("p-airport").value);
        const data={
          name:$("p-name").value.trim(),
          line:line,
          route:$("p-route").value,
          airport:$("p-airport").value,
          drone:$("p-drone").value,
          type:displayPlanType($("p-type").value),
          strategy:$("p-strategy").value,
          applicant:$("p-applicant").value,
          planTime:exec.planTime,
          execMeta:exec.execMeta,
          planExtra:readPlanExtraFields()
        };
        if(editingId){ Object.assign(plans.find(p=>p.id===editingId), data, {audit:"审核中", exec:"未执行"}); }
        else { plans.unshift({id:Date.now(),...data,submit:"2026-05-13 11:30",audit:"审核中",exec:"未执行",actualStart:"-",actualEnd:"-"}); }
        closeModal("form-modal"); render(); toast("已保存，进入审批流程");
      }
      function getPlanExtraDisplay(p){
        const x=p.planExtra||{};
        return {
          aiModel:x.aiModel||"—",
          inspectType:x.inspectType||"日常巡查",
          flightMode:x.flightMode||"超视距",
          rthMode:x.rthMode||"设定高度",
          routeLostAction:x.routeLostAction||"返航",
          mountDevice:x.mountDevice||"—",
          rthAlt:x.rthAlt!=null?x.rthAlt+" m":"100 m",
          batteryLimit:x.batteryLimit!=null?x.batteryLimit+"%":"30%",
          execMethod:normalizeExecMethod(x.execMethod),
          taskPrecision:normalizeTaskPrecision(x.taskPrecision),
          rcLostAction:x.rcLostAction||"返航",
          pilot:x.pilot||"武汉地保1",
          videoMode:normalizeVideoMode(x.videoMode),
        };
      }
      function airspaceStatusText(p){
        if(p.audit!=="审核通过") return "—";
        return isAirspaceValid(p)?"有效期内":"不在有效期内";
      }
      function detailField(label,value,full){
        const v=value===undefined||value===null||value===""?"—":value;
        return `<div class="plan-detail-field${full?" plan-detail-field--full":""}"><div class="plan-detail-field__label">${label}</div><div class="plan-detail-field__value">${v}</div></div>`;
      }
      function approvalRecordsInner(p){
        return `<div class="text-sm font-semibold text-cyan-100 mb-4">审批记录</div>` + renderApprovalRecords(p);
      }
      function detailHtml(p){
        const x=getPlanExtraDisplay(p);
        const fields=[
          detailField("计划名称",p.name,true),
          detailField("飞行航线",p.route),
          detailField("适用机场",p.airport),
          detailField("适用航空器",p.drone),
          detailField("返航高度(ALT)",x.rthAlt),
          detailField("AI识别模型",x.aiModel),
          detailField("电量限制",x.batteryLimit),
          detailField("巡查类型",x.inspectType),
          detailField("飞行策略",p.strategy),
          detailField("执行时间",p.planTime,true),
          detailField("计划类型",displayPlanType(normalizePlanType(p.type))),
          detailField("执行方式",x.execMethod),
          detailField("任务精度",x.taskPrecision),
          detailField("飞行模式",x.flightMode),
          detailField("遥控器失控动作",x.rcLostAction),
          detailField("返航高度模式",x.rthMode),
          detailField("飞手",x.pilot),
          detailField("航线失控动作",x.routeLostAction),
          detailField("视频模式",x.videoMode),
          detailField("适用挂载设备",x.mountDevice),
          detailField("所属线路",p.line),
          detailField("申请人",p.applicant),
          detailField("提交时间",p.submit),
          detailField("审核状态",p.audit),
          detailField("执行状态",p.exec),
          detailField("计划执行时间",p.planTime),
          detailField("实际执行时间",p.actualStart),
          detailField("实际结束时间",p.actualEnd),
          detailField("空域许可",airspaceStatusText(p)),
        ];
        return `<div class="mb-4 flex items-center justify-between gap-3"><div><div class="text-cyan-100 font-semibold">${p.name}</div><div class="mt-1 text-xs text-slate-400">审批流程：提交 → 工长 → 工务 → 物管 → 车间主任 → 部门领导</div></div>${auditBadge(p.audit)}</div><div class="grid plan-detail-layout md:grid-cols-[1fr_340px] gap-4"><section class="rounded border border-cyan-400/20 bg-slate-950/25 p-4"><div class="text-sm font-semibold text-cyan-100 mb-3">计划详情</div><div class="plan-detail-grid">${fields.join("")}</div></section><section class="rounded border border-cyan-400/20 bg-slate-950/25 p-4">${approvalRecordsInner(p)}</section></div>`;
      }
      function showDetail(id){
        const p=plans.find(x=>x.id===id);
        if(!p) return;
        $("detail-box").innerHTML=detailHtml(p);
        openModal("detail-modal");
      }
      function approvalRecords(p){
        const base = [
          {person:"张工", time:"2026-05-13 09:24", status:"审批通过", opinion:"申请资料完整，航线与空域许可匹配。"},
          {person:"李工", time:"2026-05-13 09:42", status:"审批通过", opinion:"施工保护区范围核对无误，同意执行。"},
          {person:"陈工", time:"2026-05-13 10:05", status:"审核中", opinion:"待核验无人机电池与载荷状态。"},
          {person:"王主任", time:"-", status:"待审批", opinion:"-"},
          {person:"赵经理", time:"-", status:"待审批", opinion:"-"}
        ];
        if(p.audit === "审核通过") return base.map(r=>({...r,status:"审批通过",time:r.time === "-" ? "2026-05-13 10:36" : r.time,opinion:r.opinion === "-" ? "审批通过，同意按计划执行。" : r.opinion}));
        if(p.audit === "已驳回") return base.map((r,i)=>i === 2 ? {...r,status:"已驳回",time:"2026-05-13 10:12",opinion:"空域许可临期，请补充续期材料后重新提交。"} : r);
        return base;
      }
      function renderApprovalRecords(p){
        if (window.ApprovalTimeline) return ApprovalTimeline.renderApprovalRecords(approvalRecords(p));
        return "";
      }
      function approvalActionSection(){
        return `<section class="rounded border border-cyan-400/20 bg-slate-950/25 p-4"><div class="text-sm font-semibold text-cyan-100 mb-3">审批意见</div><label><span class="field-label">审批意见</span><textarea id="approval-opinion" class="wh-input w-full px-3 py-2 min-h-[132px]" placeholder="请输入审批意见">同意该飞行计划按审批流程继续执行。</textarea></label><div class="mt-4 flex justify-end gap-2"><button type="button" id="reject-btn" class="wh-btn-ghost px-4 py-2">驳回</button><button type="button" id="approve-btn" class="wh-btn-primary px-4 py-2">审批通过</button></div><div class="mt-3 text-xs text-cyan-100 leading-6">系统校验：飞行计划审批通过、航线空域许可有效、无人机满足起飞条件才允许起飞。</div></section>`;
      }
      function bindApprovalActions(){
        $("approve-btn").onclick=()=>submitApproval("审核通过");
        $("reject-btn").onclick=()=>submitApproval("已驳回");
      }
      function renderBatchApprovalList(selected){
        return selected.map(p=>`<div class="py-2 border-b border-cyan-400/10 last:border-0"><div class="text-cyan-100 font-medium truncate">${p.name}</div><div class="text-xs text-slate-400 mt-0.5">${p.route} · ${p.line}</div></div>`).join("");
      }
      function openApprovalModal(headerHtml, sideHtml){
        $("approval-box").innerHTML=headerHtml+`<div class="grid md:grid-cols-[360px_1fr] gap-4">`+approvalActionSection()+`<section class="rounded border border-cyan-400/20 bg-slate-950/25 p-4">`+sideHtml+`</section></div>`;
        bindApprovalActions();
        openModal("approval-modal");
      }
      function showApproval(id){
        const p=plans.find(x=>x.id===id);
        if(!p) return;
        if(p.audit!=="审核中") return toast("仅「审核中」状态的计划可审批");
        approvalId=id;
        approvalBatchIds=null;
        const header=`<div class="mb-4 flex items-center justify-between gap-3"><div><div class="text-cyan-100 font-semibold">${p.name}</div><div class="mt-1 text-xs text-slate-400">审批流程：提交 → 工长 → 工务 → 物管 → 车间主任 → 部门领导</div></div>${auditBadge(p.audit)}</div>`;
        const side=approvalRecordsInner(p);
        openApprovalModal(header, side);
      }
      function openBatchApproval(){
        const ids=[...document.querySelectorAll(".row-check:checked:not(:disabled)")].map(c=>Number(c.value));
        if(!ids.length) return toast("请选择需要审批的计划");
        const selected=ids.map(id=>plans.find(x=>x.id===id)).filter(Boolean);
        const invalid=selected.filter(p=>p.audit!=="审核中");
        if(invalid.length) return toast("批量审批仅支持「审核中」状态的飞行计划");
        approvalId=null;
        approvalBatchIds=ids;
        const header=`<div class="mb-4 flex items-center justify-between gap-3"><div><div class="text-cyan-100 font-semibold">批量审批（${selected.length} 条）</div><div class="mt-1 text-xs text-slate-400">审批流程：提交 → 工长 → 工务 → 物管 → 车间主任 → 部门领导</div></div>${auditBadge("审核中")}</div>`;
        const side=`<div class="text-sm font-semibold text-cyan-100 mb-3">待审批计划</div><div class="max-h-[320px] overflow-y-auto pr-1">${renderBatchApprovalList(selected)}</div>`;
        openApprovalModal(header, side);
      }
      function showReport(id){
        const p=plans.find(x=>x.id===id);
        if(!p) return;
        if(window.WHFlightReportModal){
          WHFlightReportModal.open(p,{
            renderApprovalRecords: approvalRecords,
            editable: true,
            onSave: function(){ toast("飞行报告补充说明已保存"); },
            onExport: function(){ toast("飞行报告已导出"); }
          });
        }
      }
      function isAirspaceValid(p){ return p.airspaceValid !== false; }
      function showCockpitAirspaceModal(mode){
        const blocked=$("cockpit-airspace-actions-blocked");
        const confirm=$("cockpit-airspace-actions-confirm");
        if(mode==="blocked"){
          $("cockpit-airspace-msg").textContent="相关空域不在有效期内，无法起飞";
          blocked.classList.remove("hidden");
          confirm.classList.add("hidden");
        } else {
          $("cockpit-airspace-msg").textContent="相关空域在有效期内，请确认是否立即起飞";
          blocked.classList.add("hidden");
          confirm.classList.remove("hidden");
        }
        openModal("cockpit-airspace-modal");
      }
      function openCockpit(id){
        const p=plans.find(x=>x.id===id);
        if(!p||p.audit!=="审核通过") return toast("飞行计划未审批通过，不能进入虚拟座舱");
        if(isAirspaceValid(p)) showCockpitAirspaceModal("confirm");
        else showCockpitAirspaceModal("blocked");
      }
      function copyPlan(id){ const p=plans.find(x=>x.id===id); plans.unshift({...p,id:Date.now(),name:p.name+"（复制）",audit:"审核中",exec:"未执行",actualStart:"-",actualEnd:"-",submit:"2026-05-13 11:35",execMeta:p.execMeta?JSON.parse(JSON.stringify(p.execMeta)):undefined}); render(); toast("已复制计划，可继续编辑提交"); }
      function submitApproval(status){
        const ids=approvalBatchIds && approvalBatchIds.length ? approvalBatchIds.slice() : approvalId ? [approvalId] : [];
        if(!ids.length) return;
        const opinion=($("approval-opinion")?.value || "").trim();
        if(!opinion) return toast("请填写审批意见");
        const isBatch=ids.length>1;
        let applied=0;
        ids.forEach(function(id){
          const p=plans.find(x=>x.id===id);
          if(!p||p.audit!=="审核中") return;
          p.audit=status;
          if(status==="已驳回") p.exec="执行终止";
          if(status==="审核通过"&&p.exec==="执行终止") p.exec="未执行";
          applied++;
        });
        approvalId=null;
        approvalBatchIds=null;
        closeModal("approval-modal");
        render();
        if(!applied) return toast("所选计划均不可审批");
        if(isBatch){
          toast(status==="审核通过" ? "已批量审批通过 "+applied+" 条" : "已批量驳回 "+applied+" 条");
        } else {
          toast(status==="审核通过" ? "审批通过，已写入审批记录" : "已驳回，审批意见已记录");
        }
      }
      $("add-btn").onclick=()=>openForm();
      $("save-plan-btn").onclick=savePlan;
      $("search-btn").onclick=render;
      $("reset-btn").onclick=()=>{ document.querySelectorAll("input,select").forEach(el=>{ if(el.id!=="check-all"&&!el.closest("#form-modal")) el.value=""; }); render(); };
      $("check-all").onchange=e=>document.querySelectorAll(".row-check:not(:disabled)").forEach(c=>c.checked=e.target.checked);
      document.addEventListener("change",e=>{ if(e.target.classList&&e.target.classList.contains("row-check")) syncCheckAllState(); });
      $("batch-approve-btn").onclick=openBatchApproval;
      
      window.showDetail=showDetail;
      window.showApproval=showApproval;
      window.showReport=showReport;
      window.copyPlan=copyPlan;
      window.openCockpit=openCockpit;
      render();
    </script>
  </body>
</html>
