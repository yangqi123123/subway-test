<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全景地图 · GIS 地图首页</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/map-gis.css" />
  </head>
  <body data-shell="fullscreen" data-top="map">
    <div id="page-root" class="relative h-[calc(100vh-64px)] bg-[#030712]">
      <div id="map-container" class="absolute inset-0 z-0" aria-label="GIS 地图"></div>

      <aside class="gis-filter-panel" aria-label="GIS 筛选">
        <div class="gis-panel-head">
          <div>
            <div class="gis-panel-title">全景地图控制</div>
            <div class="gis-panel-subtitle">图层筛选 · 区域定位 · 快速切换</div>
          </div>
          <button type="button" class="gis-panel-toggle" data-action="panel-toggle" title="收起面板">
            <i class="fa-solid fa-angles-left" data-panel-toggle-icon></i>
          </button>
        </div>

        <div class="gis-filter-scroll">
          <section class="gis-sec gis-sec--search">
            <div class="gis-sec-head">
              <span class="gis-sec-title">快速搜索</span>
            </div>
            <div class="gis-search-row">
              <input type="text" class="gis-input" data-action="search-input" placeholder="输入站点、项目或区域名称" />
              <button type="button" class="gis-btn-jump" data-action="search-jump">定位</button>
            </div>
          </section>

          <section class="gis-sec">
            <button type="button" class="gis-sec-head gis-sec-head--toggle" data-section-toggle>
              <span class="gis-sec-title">地图标注</span>
              <span class="gis-head-switch" data-batch-switch="anno">
                <span class="gis-head-switch__text">全部显示</span>
                <span class="gis-head-switch__track"><span class="gis-head-switch__thumb"></span></span>
                <span class="gis-head-switch__text gis-head-switch__text--off">不显示</span>
              </span>
              <i class="fa-solid fa-chevron-down gis-sec-arrow"></i>
            </button>
            <div class="gis-sec-body">
              <div class="gis-tag-row">
                <button type="button" class="gis-toggle gis-c--station" data-anno="stations">站点</button>
                <button type="button" class="gis-toggle gis-c--project" data-anno="projects">项目</button>
                <button type="button" class="gis-toggle gis-c--staff" data-anno="staff">人员</button>
                <button type="button" class="gis-toggle gis-c--alarm" data-anno="alarms">告警点</button>
              </div>
            </div>
          </section>

          <section class="gis-sec">
            <button type="button" class="gis-sec-head gis-sec-head--toggle" data-section-toggle>
              <span class="gis-sec-title">机场与无人机</span>
              <i class="fa-solid fa-chevron-down gis-sec-arrow"></i>
            </button>
            <div class="gis-sec-body">
              <div class="gis-subblock">
                <div class="gis-subtitle">机场</div>
                <div class="gis-tag-row gis-tag-row--2">
                  <button type="button" class="gis-toggle gis-c--show" data-airport="show">显示</button>
                  <button type="button" class="gis-toggle gis-c--hide" data-airport="hide">隐藏</button>
                </div>
              </div>
              <div class="gis-subblock">
                <div class="gis-subtitle">无人机</div>
                <div class="gis-tag-row gis-tag-row--2">
                  <button type="button" class="gis-toggle gis-c--show" data-drone="show">显示</button>
                  <button type="button" class="gis-toggle gis-c--hide" data-drone="hide">隐藏</button>
                </div>
              </div>
            </div>
          </section>

          <section class="gis-sec">
            <button type="button" class="gis-sec-head gis-sec-head--toggle" data-section-toggle>
              <span class="gis-sec-title">巡查区域</span>
              <span class="gis-head-switch" data-batch-switch="patrol">
                <span class="gis-head-switch__text">全部显示</span>
                <span class="gis-head-switch__track"><span class="gis-head-switch__thumb"></span></span>
                <span class="gis-head-switch__text gis-head-switch__text--off">不显示</span>
              </span>
              <i class="fa-solid fa-chevron-down gis-sec-arrow"></i>
            </button>
            <div class="gis-sec-body">
              <div class="gis-tag-row">
                <button type="button" class="gis-toggle gis-c--patrolled" data-patrol="done">已巡查</button>
                <button type="button" class="gis-toggle gis-c--topatrol" data-patrol="todo">待巡查</button>
              </div>
            </div>
          </section>

          <section class="gis-sec">
            <button type="button" class="gis-sec-head gis-sec-head--toggle" data-section-toggle>
              <span class="gis-sec-title">地铁线路</span>
              <span class="gis-head-switch" data-batch-switch="metro">
                <span class="gis-head-switch__text">全部显示</span>
                <span class="gis-head-switch__track"><span class="gis-head-switch__thumb"></span></span>
                <span class="gis-head-switch__text gis-head-switch__text--off">不显示</span>
              </span>
              <i class="fa-solid fa-chevron-down gis-sec-arrow"></i>
            </button>
            <div class="gis-sec-body">
              <div class="gis-grid-4">
                <button type="button" class="gis-line-btn gis-l1" data-metro="l1">1号线</button>
                <button type="button" class="gis-line-btn gis-l2" data-metro="l2">2号线</button>
                <button type="button" class="gis-line-btn gis-l3" data-metro="l3">3号线</button>
                <button type="button" class="gis-line-btn gis-l4" data-metro="l4">4号线</button>
                <button type="button" class="gis-line-btn gis-l5" data-metro="l5">5号线</button>
                <button type="button" class="gis-line-btn gis-l6" data-metro="l6">6号线</button>
                <button type="button" class="gis-line-btn gis-l7" data-metro="l7">7号线</button>
                <button type="button" class="gis-line-btn gis-l8" data-metro="l8">8号线</button>
                <button type="button" class="gis-line-btn gis-l11" data-metro="l11">11号线</button>
                <button type="button" class="gis-line-btn gis-l16" data-metro="l16">16号线</button>
                <button type="button" class="gis-line-btn gis-l19" data-metro="l19">19号线</button>
                <button type="button" class="gis-line-btn gis-lyl" data-metro="lyl">阳逻线</button>
              </div>
            </div>
          </section>

          <section class="gis-sec gis-sec--collapsed">
            <button type="button" class="gis-sec-head gis-sec-head--toggle" data-section-toggle>
              <span class="gis-sec-title">应急资源</span>
              <span class="gis-head-switch" data-batch-switch="emergency">
                <span class="gis-head-switch__text">全部显示</span>
                <span class="gis-head-switch__track"><span class="gis-head-switch__thumb"></span></span>
                <span class="gis-head-switch__text gis-head-switch__text--off">不显示</span>
              </span>
              <i class="fa-solid fa-chevron-down gis-sec-arrow"></i>
            </button>
            <div class="gis-sec-body">
              <div class="gis-grid-2x4">
                <button type="button" class="gis-em-btn gis-e1" data-emergency="e1">道岔挤岔</button>
                <button type="button" class="gis-em-btn gis-e2" data-emergency="e2">钢轨折断</button>
                <button type="button" class="gis-em-btn gis-e3" data-emergency="e3">雨水倒灌</button>
                <button type="button" class="gis-em-btn gis-e4" data-emergency="e4">胀轨</button>
                <button type="button" class="gis-em-btn gis-e5" data-emergency="e5">道床变形</button>
                <button type="button" class="gis-em-btn gis-e6" data-emergency="e6">隧道结构</button>
                <button type="button" class="gis-em-btn gis-e7" data-emergency="e7">其他</button>
                <button type="button" class="gis-em-btn gis-e8" data-emergency="e8">土建</button>
              </div>
            </div>
          </section>
        </div>
      </aside>

      <div class="gis-toolbar" role="toolbar" aria-label="地图工具">
        <button type="button" class="gis-toolbar__btn" data-tool="base" title="当前：道路地图，点击切换为卫星影像">
          <i class="fa-solid fa-layer-group" data-base-icon></i>
          <span>地图切换</span>
        </button>
        <button type="button" class="gis-toolbar__btn" data-tool="pick" title="坐标拾取">
          <i class="fa-solid fa-crosshairs"></i>
          <span>坐标拾取</span>
        </button>
        <button type="button" class="gis-toolbar__btn" data-tool="distance" title="测量距离">
          <i class="fa-solid fa-ruler"></i>
          <span>测量距离</span>
        </button>
        <button type="button" class="gis-toolbar__btn" data-tool="area" title="测量面积">
          <i class="fa-solid fa-draw-polygon"></i>
          <span>测量面积</span>
        </button>
        <button type="button" class="gis-toolbar__btn" data-tool="reset" title="重置视图与工具">
          <i class="fa-solid fa-arrow-rotate-left"></i>
          <span>重置</span>
        </button>
      </div>

      <div id="gis-detail-panel" class="gis-detail-panel hidden" aria-live="polite">
        <div class="gis-detail-head">
          <div class="gis-detail-title" id="gis-detail-title">详情</div>
          <button type="button" class="gis-detail-close" id="gis-detail-close">×</button>
        </div>
        <div class="gis-detail-body" id="gis-detail-body"></div>
      </div>


      <div id="gis-coord-panel" class="gis-coord-panel hidden" aria-live="polite">
        <div class="gis-detail-head">
          <div class="gis-detail-title">坐标拾取</div>
          <button type="button" class="gis-detail-close" id="gis-coord-close" aria-label="关闭">×</button>
        </div>
        <div class="gis-coord-body">
          <label class="gis-coord-field">
            <span class="gis-coord-label">经度</span>
            <input type="text" id="gis-coord-lng" class="gis-coord-input" placeholder="如 114.305500" inputmode="decimal" />
          </label>
          <label class="gis-coord-field">
            <span class="gis-coord-label">纬度</span>
            <input type="text" id="gis-coord-lat" class="gis-coord-input" placeholder="如 30.592800" inputmode="decimal" />
          </label>
          <label class="gis-coord-field">
            <span class="gis-coord-label">高程</span>
            <input type="text" id="gis-coord-alt" class="gis-coord-input" placeholder="如 28.5（米）" inputmode="decimal" />
          </label>
        </div>
        <div class="gis-coord-foot">
          <button type="button" class="gis-coord-btn gis-coord-btn--ghost" id="gis-coord-pick-map">图上拾取</button>
          <button type="button" class="gis-coord-btn gis-coord-btn--primary" id="gis-coord-locate">坐标定位</button>
        </div>
      </div>

      <div id="gis-hud" class="gis-hud hidden" role="status" aria-live="polite"></div>

      <div class="absolute bottom-4 left-1/2 z-[410] flex max-w-[98vw] -translate-x-1/2 flex-wrap justify-center gap-2 px-3">
        <a href="map-situation.html" class="gis-fab py-2 text-[11px] no-underline">态势感知</a>
        <a href="map-flight-plan.html" class="gis-fab py-2 text-[11px] no-underline">飞行计划</a>
        <a href="map-alerts.html" class="gis-fab py-2 text-[11px] no-underline">告警信息</a>
      </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="assets/js/menu-config.js"></script>
    <script src="assets/js/shell.js"></script>
    <script src="assets/js/map-metro-data.js"></script>
    <script src="assets/js/map-patrol-overlay.js"></script>
    <script src="assets/js/map-gis.js"></script>
  </body>
</html>
