<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>应急仓库管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <style>
    .warehouse-table th,
    .warehouse-table td {
      height: 52px;
      border-right: 1px solid rgba(34,211,238,.08);
      border-bottom: 1px solid rgba(34,211,238,.08);
      vertical-align: middle;
    }
    .warehouse-table th:last-child,
    .warehouse-table td:last-child { border-right: 0; }
    .warehouse-table thead th {
      color: rgba(240,249,255,.96);
      font-size: 12px;
      font-weight: 600;
      background: rgba(2,8,23,.66);
      white-space: nowrap;
    }
    .warehouse-table tbody td {
      color: rgba(226,245,255,.88);
      font-size: 12px;
    }
    .warehouse-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 10px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }
    .warehouse-modal-mask,
    .confirm-mask {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.56);
      padding: 24px;
    }
    .warehouse-modal-mask.show,
    .confirm-mask.show { display: flex; }
    .warehouse-modal {
      width: min(980px, 94vw);
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.16);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .warehouse-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 28px;
    }
    .warehouse-form-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .warehouse-form-label {
      width: 108px;
      flex: 0 0 108px;
      text-align: right;
      color: rgba(226,245,255,.78);
      font-size: 12px;
    }
    .warehouse-form-label.is-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 4px;
    }
    .confirm-card {
      width: 320px;
      border-radius: 8px;
      border: 1px solid rgba(34,211,238,.14);
      background: #071426;
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
      overflow: hidden;
    }
  </style>
</head>
<body data-shell="default" data-top="am" data-sidebar-key="am-emergency-warehouse">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <nav class="neon-panel neon-panel--tight mb-4 px-4 py-2.5 flex flex-wrap items-center gap-2 text-[11px] text-slate-400">
      <span class="text-cyan-400"><i class="fa-solid fa-location-crosshairs"></i></span>
      <span>资产管理</span>
      <span class="text-slate-600">&gt;&gt;</span>
      <span class="text-cyan-50 font-semibold tracking-wide">应急仓库管理</span>
    </nav>

    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">应急仓库管理</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">应急仓库基础信息维护</span>
    </div>

    <section class="neon-panel neon-panel--tight p-4 mb-4">
      <div class="flex flex-wrap items-end gap-4">
        <div class="min-w-[180px]">
          <label class="wh-filter-label block mb-1.5">所属线路</label>
          <select class="wh-input h-8 w-full px-2">
            <option>全部</option>
            <option>2号线</option>
            <option>5号线</option>
            <option>7号线</option>
          </select>
        </div>
        <div class="min-w-[220px]">
          <label class="wh-filter-label block mb-1.5">名称</label>
          <input class="wh-input h-8 w-full px-3" placeholder="请输入仓库名称" />
        </div>
        <div class="min-w-[180px]">
          <label class="wh-filter-label block mb-1.5">所属部门</label>
          <select class="wh-input h-8 w-full px-2">
            <option>全部</option>
            <option>物资部</option>
            <option>巡检部</option>
            <option>应急中心</option>
          </select>
        </div>
        <div class="flex gap-2">
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-primary">搜索</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-ghost">重置</button>
          <button type="button" class="px-5 h-8 rounded text-xs wh-btn-primary" data-action="new-warehouse">新建</button>
        </div>
      </div>
    </section>

    <section class="wh-table-shell bg-slate-950/35">
      <div class="overflow-x-auto">
        <table class="warehouse-table min-w-[2100px] w-full text-left">
          <thead>
            <tr>
              <th class="px-4">名称</th>
              <th class="px-4">所属部门</th>
              <th class="px-4">所属线路</th>
              <th class="px-4">仓库地址</th>
              <th class="px-4">仓库地址经度</th>
              <th class="px-4">仓库地址纬度</th>
              <th class="px-4">负责人</th>
              <th class="px-4">联系电话</th>
              <th class="px-4">备注</th>
              <th class="px-4">操作</th>
            </tr>
          </thead>
          <tbody id="warehouse-table-body"></tbody>
        </table>
      </div>
      <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
        <span>共 <b class="text-cyan-200">4</b> 条</span>
        <div class="flex items-center gap-2 flex-wrap">
          <button class="min-w-[32px] h-8 rounded text-xs wh-btn-primary">1</button>
          <select class="wh-input px-2 py-1 text-[11px]"><option>10 条/页</option></select>
          <span>跳至</span>
          <input class="wh-input w-12 px-1 py-1 text-center text-[11px]" value="1" />
          <span>页</span>
        </div>
      </div>
    </section>
  </div>

  <div id="warehouse-modal-mask" class="warehouse-modal-mask">
    <div class="warehouse-modal">
      <div class="h-14 px-6 flex items-center border-b border-cyan-400/15">
        <h3 id="warehouse-modal-title" class="text-white text-[16px] font-semibold">新增应急仓库</h3>
        <button type="button" class="ml-auto text-slate-400 hover:text-slate-200 text-xl leading-none" data-action="close-warehouse-modal">×</button>
      </div>
      <div class="p-6">
        <div class="warehouse-form-grid">
          <label class="warehouse-form-item"><span class="warehouse-form-label is-required">名称：</span><input id="warehouse-name" class="wh-input h-8 flex-1 px-3" placeholder="请输入名称" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label">所属部门：</span><select id="warehouse-dept" class="wh-input h-8 flex-1 px-2"><option>物资部</option><option>巡检部</option><option>应急中心</option></select></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label">所属线路：</span><select id="warehouse-line" class="wh-input h-8 flex-1 px-2"><option>2号线</option><option>5号线</option><option>7号线</option></select></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label is-required">仓库地址：</span><input id="warehouse-address" class="wh-input h-8 flex-1 px-3" placeholder="请输入仓库地址" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label">地址经度：</span><input id="warehouse-lng" class="wh-input h-8 flex-1 px-3" placeholder="请输入仓库地址经度" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label">地址纬度：</span><input id="warehouse-lat" class="wh-input h-8 flex-1 px-3" placeholder="请输入仓库地址纬度" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label is-required">负责人：</span><input id="warehouse-owner" class="wh-input h-8 flex-1 px-3" placeholder="请输入负责人" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label is-required">联系电话：</span><input id="warehouse-phone" class="wh-input h-8 flex-1 px-3" placeholder="请输入联系电话" /></label>
          <label class="warehouse-form-item"><span class="warehouse-form-label">备注：</span><input id="warehouse-remark" class="wh-input h-8 flex-1 px-3" placeholder="请输入备注" /></label>
        </div>
      </div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="close-warehouse-modal">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="save-warehouse">确定</button>
      </div>
    </div>
  </div>

  <div id="warehouse-confirm-mask" class="confirm-mask">
    <div class="confirm-card">
      <div class="px-6 py-5 border-b border-cyan-400/15 text-white text-[16px] font-semibold">删除确认</div>
      <div class="px-6 py-6 text-sm text-cyan-100/80">确认删除当前仓库记录吗？</div>
      <div class="px-6 py-4 flex justify-end gap-3 border-t border-cyan-400/15">
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-ghost" data-action="cancel-warehouse-delete">取消</button>
        <button type="button" class="px-6 h-8 rounded text-xs wh-btn-primary" data-action="confirm-warehouse-delete">确定</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var rows = [
        { name:"南湖应急仓", dept:"物资部", line:"7号线", address:"洪山区南湖大道 88 号", lng:"114.3521", lat:"30.5184", owner:"赵敏", phone:"13800002001", remark:"主仓库" },
        { name:"白沙洲应急仓", dept:"应急中心", line:"5号线", address:"武昌区白沙洲大道 120 号", lng:"114.3148", lat:"30.5081", owner:"刘凯", phone:"13800002002", remark:"夜间值守" },
        { name:"金银潭应急仓", dept:"巡检部", line:"2号线", address:"江汉区常青一路 66 号", lng:"114.2406", lat:"30.6479", owner:"李倩", phone:"13800002003", remark:"防汛物资" },
        { name:"光谷东应急仓", dept:"物资部", line:"7号线", address:"东湖高新区高新大道 188 号", lng:"114.4215", lat:"30.4896", owner:"陈涛", phone:"13800002004", remark:"无人机备件" }
      ];

      var editIndex = -1;
      var deleteIndex = -1;
      var tableBody = document.getElementById("warehouse-table-body");
      var modalMask = document.getElementById("warehouse-modal-mask");
      var confirmMask = document.getElementById("warehouse-confirm-mask");
      var modalTitle = document.getElementById("warehouse-modal-title");

      function renderRows() {
        tableBody.innerHTML = rows.map(function (row, index) {
          return '<tr class="' + (index % 2 ? 'bg-slate-950/10' : 'bg-slate-950/22') + '">' +
            '<td class="px-4">' + row.name + '</td>' +
            '<td class="px-4">' + row.dept + '</td>' +
            '<td class="px-4">' + row.line + '</td>' +
            '<td class="px-4">' + row.address + '</td>' +
            '<td class="px-4">' + row.lng + '</td>' +
            '<td class="px-4">' + row.lat + '</td>' +
            '<td class="px-4">' + row.owner + '</td>' +
            '<td class="px-4">' + row.phone + '</td>' +
            '<td class="px-4">' + row.remark + '</td>' +
            '<td class="px-4">' +
              '<span class="warehouse-action text-amber-300" data-action="edit-warehouse" data-index="' + index + '"><i class="fa-regular fa-pen-to-square"></i>编辑</span>' +
              '<span class="warehouse-action text-sky-300" onclick="location.href=\'am-emergency-material.html\'"><i class="fa-regular fa-boxes-stacked"></i>查看物资</span>' +
              '<span class="warehouse-action text-rose-300" data-action="delete-warehouse" data-index="' + index + '"><i class="fa-regular fa-trash-can"></i>删除</span>' +
            '</td>' +
          '</tr>';
        }).join("");
      }

      function openModal(mode, index) {
        editIndex = mode === "edit" ? index : -1;
        modalTitle.textContent = mode === "edit" ? "编辑应急仓库" : "新增应急仓库";
        var row = index > -1 ? rows[index] : null;
        document.getElementById("warehouse-name").value = row ? row.name : "";
        document.getElementById("warehouse-dept").value = row ? row.dept : "物资部";
        document.getElementById("warehouse-line").value = row ? row.line : "2号线";
        document.getElementById("warehouse-address").value = row ? row.address : "";
        document.getElementById("warehouse-lng").value = row ? row.lng : "";
        document.getElementById("warehouse-lat").value = row ? row.lat : "";
        document.getElementById("warehouse-owner").value = row ? row.owner : "";
        document.getElementById("warehouse-phone").value = row ? row.phone : "";
        document.getElementById("warehouse-remark").value = row ? row.remark : "";
        modalMask.classList.add("show");
      }

      function saveWarehouse() {
        var name = document.getElementById("warehouse-name").value.trim();
        var address = document.getElementById("warehouse-address").value.trim();
        var owner = document.getElementById("warehouse-owner").value.trim();
        var phone = document.getElementById("warehouse-phone").value.trim();
        if (!name || !address || !owner || !phone) {
          alert("请完善必填项：名称、仓库地址、负责人、联系电话");
          return;
        }
        var row = {
          name: name,
          dept: document.getElementById("warehouse-dept").value,
          line: document.getElementById("warehouse-line").value,
          address: address,
          lng: document.getElementById("warehouse-lng").value.trim() || "-",
          lat: document.getElementById("warehouse-lat").value.trim() || "-",
          owner: owner,
          phone: phone,
          remark: document.getElementById("warehouse-remark").value.trim() || "-"
        };
        if (editIndex > -1) rows[editIndex] = row;
        else rows.unshift(row);
        modalMask.classList.remove("show");
        renderRows();
      }

      renderRows();

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        var index = Number(trigger.getAttribute("data-index"));
        if (action === "new-warehouse") openModal("new");
        if (action === "edit-warehouse") openModal("edit", index);
        if (action === "delete-warehouse") {
          deleteIndex = index;
          confirmMask.classList.add("show");
        }
        if (action === "close-warehouse-modal") modalMask.classList.remove("show");
        if (action === "save-warehouse") saveWarehouse();
        if (action === "cancel-warehouse-delete") {
          deleteIndex = -1;
          confirmMask.classList.remove("show");
        }
        if (action === "confirm-warehouse-delete") {
          if (deleteIndex > -1) rows.splice(deleteIndex, 1);
          deleteIndex = -1;
          confirmMask.classList.remove("show");
          renderRows();
        }
      });
    })();
  </script>
  <script src="assets/js/menu-config.js"></script>
  <script src="assets/js/shell.js"></script>
</body>
</html>
