<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>完工项目</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <style>
    .project-table th,
    .project-table td {
      height: 43px;
      border-right: 1px solid rgba(34, 211, 238, 0.08);
      border-bottom: 1px solid rgba(34, 211, 238, 0.1);
      vertical-align: middle;
    }

    .project-table th:last-child,
    .project-table td:last-child {
      border-right: 0;
    }

    .project-action {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-right: 8px;
      color: #38bdf8;
      white-space: nowrap;
      cursor: pointer;
      font-size: 11px;
    }

    .project-action--danger {
      color: #fb7185;
    }

    .done-tabs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 34px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      margin-bottom: 28px;
      overflow-x: auto;
    }

    .done-tab,
    .project-tab {
      height: 44px;
      border-bottom: 2px solid transparent;
      color: rgba(226, 245, 255, 0.78);
      white-space: nowrap;
      font-size: 13px;
    }

    .done-tab.active,
    .project-tab.active {
      color: #67e8f9;
      border-color: #38bdf8;
    }

    .project-form-label {
      width: 148px;
      flex: 0 0 148px;
      text-align: right;
      color: rgba(226, 245, 255, 0.88);
      font-size: 12px;
      line-height: 32px;
    }

    .project-required::before {
      content: "*";
      color: #fb7185;
      margin-right: 3px;
    }

    .project-empty {
      min-height: 86px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.38);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(148, 163, 184, 0.6);
      font-size: 12px;
    }

    .done-modal-mask {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.58);
      padding: 24px;
    }

    .done-modal-mask.show {
      display: flex;
    }

    .project-modal {
      width: min(760px, 96vw);
      max-height: min(86vh, 820px);
      overflow: auto;
      border: 1px solid rgba(34, 211, 238, 0.24);
      border-radius: 8px;
      background: #071426;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), 0 0 30px rgba(34, 211, 238, 0.12);
    }

    .done-toast {
      position: fixed;
      right: 28px;
      bottom: 28px;
      z-index: 90;
      display: none;
      padding: 10px 14px;
      border: 1px solid rgba(34, 211, 238, 0.28);
      border-radius: 8px;
      background: rgba(8, 15, 35, 0.94);
      color: #cffafe;
      font-size: 12px;
      box-shadow: var(--shadow-card);
    }

    .done-toast.show {
      display: block;
    }

    .project-readonly .wh-input,
    .project-readonly textarea,
    .project-readonly select {
      pointer-events: none;
      opacity: 0.78;
    }

    .project-hidden-when-readonly {
      display: inline-flex;
    }

    .project-readonly .project-hidden-when-readonly {
      display: none !important;
    }

    .unit-row {
      padding: 18px 0 22px;
    }

    .unit-row__head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
    }

    .unit-contact-panel {
      border: 1px solid rgba(34, 211, 238, 0.14);
      border-radius: 8px;
      background: rgba(8, 15, 35, 0.5);
      overflow: hidden;
      margin: 14px 0 0 146px;
    }

    .unit-contact-panel__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
    }

    .unit-contact-list {
      padding: 10px 18px 16px;
    }

    .unit-contact-table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 12px;
      color: rgba(226, 245, 255, 0.92);
    }

    .unit-contact-table th,
    .unit-contact-table td {
      padding: 11px 12px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.1);
      text-align: left;
      vertical-align: middle;
    }

    .unit-contact-table th {
      color: rgba(207, 250, 254, 0.82);
      background: rgba(2, 8, 23, 0.45);
      font-weight: 600;
    }

    .project-link-action {
      color: #67e8f9;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .project-upload {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px dashed rgba(34, 211, 238, 0.26);
      border-radius: 8px;
      background: rgba(2, 8, 23, 0.38);
    }

    .project-upload__btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      color: #cffafe;
      background: rgba(14, 116, 144, 0.3);
      border: 1px solid rgba(34, 211, 238, 0.2);
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }

    .project-upload__name {
      min-width: 0;
      color: rgba(226, 245, 255, 0.8);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-preview-shell {
      max-width: 860px;
      margin: 0 auto;
      border: 1px solid rgba(34, 211, 238, 0.16);
      border-radius: 10px;
      background: rgba(2, 8, 23, 0.45);
      overflow: hidden;
    }

    .project-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
      color: rgba(226, 245, 255, 0.86);
      font-size: 12px;
    }

    .project-preview-body {
      padding: 18px;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(2, 8, 23, 0.94));
    }

    .project-preview-image {
      max-width: 100%;
      max-height: 62vh;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
    }

    .project-preview-frame {
      width: 100%;
      height: 62vh;
      border: 0;
      border-radius: 8px;
      background: #fff;
    }

    .project-preview-file {
      width: min(520px, 100%);
      padding: 28px 24px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.14);
      background: rgba(8, 15, 35, 0.72);
      text-align: center;
      color: rgba(226, 245, 255, 0.88);
    }

    .project-preview-file i {
      font-size: 42px;
      color: #67e8f9;
      margin-bottom: 14px;
    }

    .unit-contact-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .unit-panel-note {
      color: rgba(148, 163, 184, 0.78);
      font-size: 11px;
    }

    .unit-inline-action {
      color: #38bdf8;
      font-size: 12px;
      cursor: pointer;
    }

    .unit-inline-action.unit-inline-action--danger {
      color: #fb7185;
    }
  </style>
</head>
<body data-shell="default" data-top="in" data-sidebar-key="in-project-done">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <section id="done-list-view">
      <nav class="neon-panel neon-panel--tight mb-4 px-4 py-2.5 flex flex-wrap items-center gap-2 text-[11px] text-slate-400">
        <span class="text-cyan-400"><i class="fa-solid fa-diagram-project"></i></span>
        <span>保护区项目</span>
        <span class="text-slate-600">&gt;&gt;</span>
        <span class="text-cyan-50 font-semibold tracking-wide">完工项目</span>
      </nav>

      <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
        <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,0.25)">完工项目列表</h1>
        <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="new-done-project">
          <i class="fa-solid fa-plus mr-1"></i>新增
        </button>
      </div>

      <div class="neon-panel neon-panel--tight p-4 mb-4">
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-x-12 gap-y-3 text-xs">
          <div class="space-y-3">
            <label class="flex items-center gap-2">
              <span class="w-24 text-right text-cyan-100/75">项目名称：</span>
              <input class="wh-input h-8 flex-1 px-2" data-filter placeholder="请输入搜索项目名称" />
            </label>
            <label class="flex items-center gap-2">
              <span class="w-24 text-right text-cyan-100/75">所属区间：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>请选择区间</option><option>洪山路~小洪山</option><option>松槐路~天阳大道</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-24 text-right text-cyan-100/75">工程类别：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>钻孔、地勘、打桩</option><option>道路排水工程</option><option>房建工程</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-24 text-right text-cyan-100/75">是否降水：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>是</option><option>否</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-24 text-right text-cyan-100/75">地质类型：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>长江三级阶地</option></select>
            </label>
          </div>

          <div class="space-y-3">
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">所属线路：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>7号线</option><option>8号线</option><option>19号线</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">所在站点：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>请选择站点</option><option>洪山路</option><option>小洪山</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">是否发函：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>是</option><option>否</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">评估报告风险：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>低风险</option><option>中风险</option><option>高风险</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">地铁结构类型：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>盾构结构</option><option>明挖结构</option></select>
            </label>
          </div>

          <div class="space-y-3">
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">上下行：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>上行</option><option>下行</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">项目类型：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>一般项目</option><option>重点项目</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">是否监测：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>是</option><option>否</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">是否与车站接驳：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>是</option><option>否</option></select>
            </label>
            <label class="flex items-center gap-2">
              <span class="w-28 text-right text-cyan-100/75">是否签订安全协议：</span>
              <select class="wh-input h-8 flex-1 px-2" data-filter><option>全部</option><option>是</option><option>否</option></select>
            </label>
          </div>
        </div>
        <div class="mt-4 flex items-center gap-2 pl-[104px]">
          <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="search-done-project">搜索</button>
          <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost" data-action="reset-done-filter">重置</button>
          <button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost" data-action="export-done-project">导出</button>
        </div>
      </div>

      <div class="wh-table-shell bg-slate-950/35">
        <div class="overflow-x-auto">
          <table class="project-table min-w-[1680px] w-full text-left text-[11px]">
            <thead>
              <tr class="bg-slate-950/75">
                <th class="px-3 text-cyan-50/95">编号</th>
                <th class="px-3 text-cyan-50/95">项目名称</th>
                <th class="px-3 text-cyan-50/95">项目类型</th>
                <th class="px-3 text-cyan-50/95">工程类别</th>
                <th class="px-3 text-cyan-50/95">所属线路</th>
                <th class="px-3 text-cyan-50/95">所在区间/站点</th>
                <th class="px-3 text-cyan-50/95">上下行</th>
                <th class="px-3 text-cyan-50/95">更新时间</th>
                <th class="px-3 text-cyan-50/95">经度</th>
                <th class="px-3 text-cyan-50/95">纬度</th>
                <th class="px-3 text-cyan-50/95">开始时间</th>
                <th class="px-3 text-cyan-50/95">结束时间</th>
                <th class="px-3 text-cyan-50/95">工程概况</th>
                <th class="px-3 text-cyan-50/95">操作</th>
              </tr>
            </thead>
            <tbody id="done-table-body"></tbody>
          </table>
        </div>
        <div class="flex flex-wrap items-center justify-end gap-2 px-3 py-2.5 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
          <span>共 <b class="text-cyan-200">685</b> 条</span>
          <button class="min-w-[28px] h-7 rounded wh-btn-ghost text-slate-500">&lt;</button>
          <button class="min-w-[28px] h-7 rounded wh-btn-primary">1</button>
          <button class="min-w-[28px] h-7 rounded wh-btn-ghost">2</button>
          <button class="min-w-[28px] h-7 rounded wh-btn-ghost">3</button>
          <button class="min-w-[28px] h-7 rounded wh-btn-ghost">4</button>
          <button class="min-w-[28px] h-7 rounded wh-btn-ghost">5</button>
          <span>...</span>
          <button class="min-w-[28px] h-7 rounded wh-btn-ghost">69</button>
          <button class="min-w-[28px] h-7 rounded wh-btn-ghost">&gt;</button>
          <select class="wh-input h-7 px-2"><option>10 条/页</option><option>20 条/页</option></select>
          <span>跳至</span>
          <input class="wh-input h-7 w-12 px-2 text-center" />
          <span>页</span>
        </div>
      </div>
    </section>

    <section id="done-form-view" class="hidden">
      <div class="mb-5 flex items-center gap-3">
        <button type="button" class="w-8 h-8 rounded-md wh-btn-ghost" data-action="back-done-list" title="返回">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div>
          <h1 id="done-view-title" class="text-base font-semibold text-white tracking-tight">完工项目详情</h1>
          <div id="done-view-subtitle" class="text-[11px] text-slate-400 mt-0.5">完工项目信息</div>
        </div>
        <div class="ml-auto flex gap-2">
          <button type="button" class="px-5 py-2 rounded text-xs wh-btn-primary project-hidden-when-readonly" data-action="save-done-project">保存</button>
          <button type="button" class="px-5 py-2 rounded text-xs wh-btn-ghost" data-action="back-done-list" id="done-back-btn">返回</button>
        </div>
      </div>

      <div class="neon-panel neon-panel--tight p-5" id="done-detail-shell">
        <div class="done-tabs" id="done-tabs">
          <button type="button" class="done-tab active" data-tab="base">项目基本信息</button>
          <button type="button" class="done-tab" data-tab="status">项目状态信息</button>
          <button type="button" class="done-tab" data-tab="units">参建单位信息</button>
          <button type="button" class="done-tab" data-tab="docs">项目相关资料</button>
          <button type="button" class="done-tab" data-tab="exchange">项目交底及交涉信息</button>
        </div>

        <div class="done-tab-panel" data-panel="base">
          <div class="grid grid-cols-1 xl:grid-cols-3 gap-x-10 gap-y-4">
            <div class="flex items-center gap-3">
              <label class="project-form-label project-required">项目编号：</label>
              <input class="wh-input h-8 flex-1 px-2" value="1401" />
            </div>
            <div class="flex items-center gap-3 xl:col-span-2">
              <label class="project-form-label project-required">项目名称：</label>
              <input class="wh-input h-8 flex-1 px-2" value="花山河口公园湖心岛地勘施工项目" />
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">开始时间：</label>
              <input type="date" class="wh-input h-8 flex-1 px-2" />
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">结束时间：</label>
              <input type="date" class="wh-input h-8 flex-1 px-2" />
            </div>
            <div></div>
            <div class="flex items-center gap-3">
              <label class="project-form-label project-required">所属线路：</label>
              <select class="wh-input h-8 flex-1 px-2"><option>19号线</option><option>8号线</option></select>
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label project-required">上下行：</label>
              <select class="wh-input h-8 flex-1 px-2"><option>下行</option><option>上行</option></select>
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">所在区间：</label>
              <input class="wh-input h-8 flex-1 px-2" value="花山车辆段出入段线" />
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">站点：</label>
              <select class="wh-input h-8 flex-1 px-2"><option>请选择站点</option></select>
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label project-required">项目类型：</label>
              <select class="wh-input h-8 flex-1 px-2"><option>重点项目</option><option>一般项目</option></select>
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">评估报告风险等级：</label>
              <select class="wh-input h-8 flex-1 px-2"><option>请选择评估报告风险等级</option><option>中风险</option></select>
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label project-required">工程类别：</label>
              <select class="wh-input h-8 flex-1 px-2"><option>钻孔、地勘、打桩</option></select>
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">经度：</label>
              <input class="wh-input h-8 flex-1 px-2" placeholder="经度" />
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">纬度：</label>
              <input class="wh-input h-8 flex-1 px-2" placeholder="纬度" />
            </div>
            <div></div>
            <div class="flex items-start gap-3 xl:col-span-3">
              <label class="project-form-label">位置关系：</label>
              <textarea class="wh-input min-h-[86px] flex-1 px-2 py-2" placeholder="请输入工程概况"></textarea>
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label">距离地铁结构最小净距：</label>
              <input class="wh-input h-8 flex-1 px-2" value="43" />
            </div>
            <div class="flex items-center gap-3">
              <label class="project-form-label project-required">是否与车站接驳：</label>
              <select class="wh-input h-8 flex-1 px-2"><option>否</option><option>是</option></select>

            '<div class="flex items-center mb-3">' +
              '<h3 class="text-sm font-semibold text-cyan-50">' + name + '</h3>' +
              '<button type="button" class="ml-auto px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="open-done-doc-modal" data-doc="' + name + '"><i class="fa-solid fa-plus mr-1"></i>新增</button>' +
            '</div>' +
            (
              files.length
                ? '<div class="overflow-x-auto"><table class="unit-contact-table">' +
                    '<thead><tr><th>' + docFieldLabel(name, '名称') + '</th><th>' + docFieldLabel(name, '日期') + '</th><th>' + docFieldLabel(name, '文件') + '</th><th>操作</th></tr></thead><tbody>' +
                    files.map(function (file, index) {
                      return '<tr>' +
                        '<td>' + file.name + '</td>' +
                        '<td>' + file.date + '</td>' +
                        '<td><span class="project-link-action" data-action="preview-done-doc" data-doc="' + name + '" data-index="' + index + '">' + (file.fileName || file.name) + '</span></td>' +
                        '<td><div class="unit-contact-actions"><span class="unit-inline-action" data-action="edit-done-doc" data-doc="' + name + '" data-index="' + index + '">编辑</span><span class="unit-inline-action unit-inline-action--danger" data-action="delete-done-doc" data-doc="' + name + '" data-index="' + index + '">删除</span></div></td>' +
                      '</tr>';
                    }).join("") +
                    '</tbody></table></div>'
                : '<div class="project-empty"><i class="fa-regular fa-folder-open text-2xl mb-1"></i>暂无上传文件</div>'
            ) +
          '</section>';
        }).join('');
      }

      function renderExchangeRows() {
        var shell = document.getElementById("done-exchange-list");
        if (!exchangeRecords.length) {
          shell.innerHTML = '<div class="project-empty"><i class="fa-regular fa-folder-open text-2xl mb-1"></i>暂无数据</div>';
          return;
        }
        shell.innerHTML = '<div class="overflow-x-auto"><table class="unit-contact-table">' +
          '<thead><tr><th>项目交涉日期</th><th>项目交涉单位</th><th>项目交涉内容</th><th>是否履行保护区程序</th><th>交涉现场图片</th><th>交涉资料</th><th>操作</th></tr></thead><tbody>' +
          exchangeRecords.map(function (record, index) {
            return '<tr>' +
              '<td>' + record.date + '</td>' +
              '<td>' + record.unit + '</td>' +
              '<td class="max-w-[320px] truncate" title="' + record.content + '">' + record.content + '</td>' +
              '<td>' + record.procedure + '</td>' +
              '<td><span class="project-link-action" data-action="preview-done-exchange-image" data-index="' + index + '">' + record.image + '</span></td>' +
              '<td><span class="project-link-action" data-action="preview-done-exchange-file" data-index="' + index + '">' + record.attachment + '</span></td>' +
              '<td><div class="unit-contact-actions"><span class="unit-inline-action" data-action="edit-done-exchange" data-index="' + index + '">编辑</span><span class="unit-inline-action unit-inline-action--danger" data-action="delete-done-exchange" data-index="' + index + '">删除</span></div></td>' +
            '</tr>';
          }).join("") +
          '</tbody></table></div>';
      }

      function openModal(type, title) {
        modalType = type;
        modalTitle.textContent = title;
        if (type === "contact") {
          var editContact = contactEditIndex > -1 ? (unitContacts[activeUnit] || [])[contactEditIndex] || {} : {};
          modalBody.innerHTML = '<div class="space-y-4 max-w-[520px] mx-auto">' +
            '<div class="text-xs text-cyan-200/75 bg-slate-950/35 border border-cyan-400/10 rounded px-3 py-2">当前单位：' + activeUnit + '</div>' +
            '<label class="flex items-center gap-3"><span class="project-form-label project-required">联系人姓名：</span><input id="contact-name" class="wh-input h-8 flex-1 px-2" placeholder="请输入联系人姓名" value="' + (editContact.name || '') + '" /></label>' +
            '<label class="flex items-center gap-3"><span class="project-form-label project-required">联系电话：</span><input id="contact-phone" class="wh-input h-8 flex-1 px-2" placeholder="请输入联系电话" value="' + (editContact.phone || '') + '" /></label>' +
            '<label class="flex items-center gap-3"><span class="project-form-label">职务：</span><input id="contact-role" class="wh-input h-8 flex-1 px-2" placeholder="请输入职务" value="' + (editContact.role || '') + '" /></label>' +
            '<label class="flex items-start gap-3"><span class="project-form-label">备注：</span><textarea id="contact-remark" class="wh-input min-h-[90px] flex-1 px-2 py-2" placeholder="请输入备注">' + (editContact.remark || '') + '</textarea></label>' +
          '</div>';
        } else if (type === "doc") {
          var docItem = currentDocEditIndex > -1 ? ((docLibrary[currentDocCategory] || [])[currentDocEditIndex] || {}) : {};
          modalBody.innerHTML = '<div class="space-y-4 max-w-[560px] mx-auto">' +
            '<div class="text-xs text-cyan-200/75 bg-slate-950/35 border border-cyan-400/10 rounded px-3 py-2">资料类别：' + title + '</div>' +
            '<label class="flex items-center gap-3"><span class="project-form-label project-required">' + docFieldLabel(title, '名称：') + '</span><input id="doc-name" class="wh-input h-8 flex-1 px-2" placeholder="请输入' + docFieldLabel(title, '名称') + '" value="' + escapeHtml(docItem.name || '') + '" /></label>' +
            '<label class="flex items-center gap-3"><span class="project-form-label project-required">' + docFieldLabel(title, '日期：') + '</span><input id="doc-date" type="date" class="wh-input h-8 flex-1 px-2" value="' + escapeHtml(docItem.date || '') + '" /></label>' +
            '<label class="flex items-start gap-3"><span class="project-form-label">' + docFieldLabel(title, '文件：') + '</span><div class="flex-1">' + uploadField('doc-file', docItem.fileName || '', '未上传文件') + '</div></label>' +
          '</div>';
        } else if (type === "exchange") {
          var exchangeItem = currentExchangeEditIndex > -1 ? (exchangeRecords[currentExchangeEditIndex] || {}) : {};
          modalBody.innerHTML = '<div class="space-y-4 max-w-[620px] mx-auto">' +
            '<label class="flex items-center gap-3"><span class="project-form-label project-required">项目交涉日期：</span><input id="exchange-date" type="date" class="wh-input h-8 flex-1 px-2" value="' + escapeHtml(exchangeItem.date || '') + '" /></label>' +
            '<label class="flex items-center gap-3"><span class="project-form-label project-required">项目交涉单位：</span><input id="exchange-unit" class="wh-input h-8 flex-1 px-2" placeholder="请输入项目交涉单位" value="' + escapeHtml(exchangeItem.unit || '') + '" /></label>' +
            '<label class="flex items-start gap-3"><span class="project-form-label">项目交涉内容：</span><textarea id="exchange-content" class="wh-input min-h-[96px] flex-1 px-2 py-2" placeholder="请输入项目交涉内容">' + escapeHtml(exchangeItem.content || '') + '</textarea></label>' +
            '<label class="flex items-center gap-3"><span class="project-form-label project-required">是否履行保护区程序：</span><select id="exchange-procedure" class="wh-input h-8 flex-1 px-2"><option' + ((exchangeItem.procedure || '') === '否' ? ' selected' : '') + '>否</option><option' + ((exchangeItem.procedure || '') !== '否' ? ' selected' : '') + '>是</option></select></label>' +
            '<label class="flex items-start gap-3"><span class="project-form-label">交涉现场图片：</span><div class="flex-1">' + uploadField('exchange-image', exchangeItem.image || '', '未上传图片') + '</div></label>' +
            '<label class="flex items-start gap-3"><span class="project-form-label">交涉资料：</span><div class="flex-1">' + uploadField('exchange-file', exchangeItem.attachment || '', '未上传文件') + '</div></label>' +
          '</div>';
        } else if (type === "preview") {
          modalBody.innerHTML = previewMarkup();
        }
        modalMask.classList.add("show");
      }

      function closeModal() {
        modalMask.classList.remove("show");
        contactEditIndex = -1;
        currentDocEditIndex = -1;
        currentExchangeEditIndex = -1;
        previewPayload = null;
      }

      renderRows();
      unitRows();
      docRows();
      renderExchangeRows();

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        if (action === "new-done-project") showProjectView("new");
        if (action === "detail-done-project") showProjectView("detail");
        if (action === "edit-done-project") showProjectView("edit");
        if (action === "back-done-list") showList();
        if (action === "save-done-project") {
          showToast("项目已保存");
          showList();
        }
        if (action === "delete-done-project") {
          var row = trigger.closest("tr");
          if (row) row.remove();
          showToast("项目已删除");
        }
        if (action === "refresh-done-project") showToast("已刷新当前项目");
        if (action === "patrol-done-project") window.location.href = "in-project-patrol.html";
        if (action === "search-done-project") showToast("已按当前条件筛选");
        if (action === "reset-done-filter") {
          document.querySelectorAll("[data-filter]").forEach(function (el) {
            if (el.tagName === "SELECT") el.selectedIndex = 0;
            else el.value = "";
          });
          showToast("筛选条件已重置");
        }
        if (action === "export-done-project") showToast("已生成导出任务");
        if ((action === "open-done-contact-modal" || action === "open-done-doc-modal" || action === "open-done-exchange-modal") && currentProjectMode === "detail") return;
        if (action === "open-done-contact-modal") {
          activeUnit = trigger.getAttribute("data-unit") || activeUnit;
          contactEditIndex = -1;
          unitRows();
          openModal("contact", "添加联系人 - " + activeUnit);
        }
        if (action === "open-done-doc-modal") {
          currentDocCategory = trigger.getAttribute("data-doc") || "资料";
          currentDocEditIndex = -1;
          openModal("doc", currentDocCategory);
        }
        if (action === "edit-done-doc") {
          if (currentProjectMode === "detail") return;
          currentDocCategory = trigger.getAttribute("data-doc") || "资料";
          currentDocEditIndex = Number(trigger.getAttribute("data-index"));
          openModal("doc", currentDocCategory);
        }
        if (action === "delete-done-doc") {
          if (currentProjectMode === "detail") return;
          var deleteDocCategory = trigger.getAttribute("data-doc") || "";
          var deleteDocIndex = Number(trigger.getAttribute("data-index"));
          if (docLibrary[deleteDocCategory]) docLibrary[deleteDocCategory].splice(deleteDocIndex, 1);
          docRows();
          showToast("文件已删除");
        }
        if (action === "preview-done-doc") {
          var previewDocCategory = trigger.getAttribute("data-doc") || "";
          var previewDocIndex = Number(trigger.getAttribute("data-index"));
          var previewDoc = ((docLibrary[previewDocCategory] || [])[previewDocIndex] || {});
          previewPayload = {
            kind: "file",
            title: "文件预览",
            category: previewDocCategory,
            name: previewDoc.fileName || previewDoc.name,
            date: previewDoc.date,
            url: previewDoc.fileUrl || "",
            mimeType: previewDoc.mimeType || "",
            tip: previewDoc.name || "资料文件预览"
          };
          openModal("preview", "文件预览");
        }
        if (action === "open-done-exchange-modal") {
          currentExchangeEditIndex = -1;
          openModal("exchange", "交涉记录");
        }
        if (action === "edit-done-exchange") {
          if (currentProjectMode === "detail") return;
          currentExchangeEditIndex = Number(trigger.getAttribute("data-index"));
          openModal("exchange", "编辑交涉记录");
        }
        if (action === "delete-done-exchange") {
          if (currentProjectMode === "detail") return;
          var deleteExchangeIndex = Number(trigger.getAttribute("data-index"));
          exchangeRecords.splice(deleteExchangeIndex, 1);
          renderExchangeRows();
          showToast("交涉记录已删除");
        }
        if (action === "preview-done-exchange-image") {
          var previewImageIndex = Number(trigger.getAttribute("data-index"));
          var previewImageItem = exchangeRecords[previewImageIndex] || {};
          previewPayload = {
            kind: "image",
            title: "图片预览",
            name: previewImageItem.image || "现场图片",
            unit: previewImageItem.unit,
            date: previewImageItem.date,
            url: previewImageItem.imageUrl || "",
            mimeType: previewImageItem.imageMimeType || "",
            tip: "交涉现场图片预览"
          };
          openModal("preview", "图片预览");
        }
        if (action === "preview-done-exchange-file") {
          var previewFileIndex = Number(trigger.getAttribute("data-index"));
          var previewFileItem = exchangeRecords[previewFileIndex] || {};
          previewPayload = {
            kind: "file",
            title: "文件预览",
            name: previewFileItem.attachment || "交涉资料",
            unit: previewFileItem.unit,
            date: previewFileItem.date,
            url: previewFileItem.attachmentUrl || "",
            mimeType: previewFileItem.attachmentMimeType || "",
            tip: "交涉资料预览"
          };
          openModal("preview", "文件预览");
        }
        if (action === "edit-contact") {
          if (currentProjectMode === "detail") return;
          activeUnit = trigger.getAttribute("data-unit") || activeUnit;
          contactEditIndex = Number(trigger.getAttribute("data-index"));
          openModal("contact", "编辑联系人 - " + activeUnit);
        }
        if (action === "delete-contact") {
          if (currentProjectMode === "detail") return;
          activeUnit = trigger.getAttribute("data-unit") || activeUnit;
          var deleteIndex = Number(trigger.getAttribute("data-index"));
          if (!unitContacts[activeUnit]) unitContacts[activeUnit] = [];
          unitContacts[activeUnit].splice(deleteIndex, 1);
          unitRows();
          showToast("联系人已删除");
        }
        if (action === "close-done-modal") closeModal();
        if (action === "save-done-modal") {
          if (modalType === "contact") {
            var nameInput = document.getElementById("contact-name");
            var phoneInput = document.getElementById("contact-phone");
            var roleInput = document.getElementById("contact-role");
            var remarkInput = document.getElementById("contact-remark");
            var contact = {
              name: nameInput ? nameInput.value.trim() : "",
              phone: phoneInput ? phoneInput.value.trim() : "",
              role: roleInput ? roleInput.value.trim() : "",
              remark: remarkInput ? remarkInput.value.trim() : ""
            };
            if (!contact.name || !contact.phone) {
              showToast("请先填写联系人和电话");
              return;
            }
            if (!unitContacts[activeUnit]) unitContacts[activeUnit] = [];
            if (contactEditIndex > -1) unitContacts[activeUnit][contactEditIndex] = contact;
            else unitContacts[activeUnit].push(contact);
            unitRows();
          } else if (modalType === "doc") {
            var docName = document.getElementById("doc-name");
            var docDate = document.getElementById("doc-date");
            var docFileInput = document.getElementById("doc-file-input");
            var existingDoc = currentDocEditIndex > -1 ? ((docLibrary[currentDocCategory] || [])[currentDocEditIndex] || {}) : {};
            var docPickedFile = docFileInput && docFileInput.files && docFileInput.files[0] ? docFileInput.files[0] : null;
            var docRecord = {
              name: docName ? docName.value.trim() : "",
              date: docDate ? docDate.value.trim() : "",
              fileName: docPickedFile ? docPickedFile.name : (existingDoc.fileName || ""),
              fileUrl: docPickedFile ? URL.createObjectURL(docPickedFile) : (existingDoc.fileUrl || ""),
              mimeType: docPickedFile ? docPickedFile.type : (existingDoc.mimeType || "")
            };
            if (!docRecord.name || !docRecord.date) {
              showToast("请先填写资料名称和日期");
              return;
            }
            if (!docRecord.fileName) {
              showToast("请先上传资料文件");
              return;
            }
            if (!docLibrary[currentDocCategory]) docLibrary[currentDocCategory] = [];
            if (currentDocEditIndex > -1) docLibrary[currentDocCategory][currentDocEditIndex] = docRecord;
            else docLibrary[currentDocCategory].push(docRecord);
            docRows();
          } else if (modalType === "exchange") {
            var exchangeImageInput = document.getElementById("exchange-image-input");
            var exchangeFileInput = document.getElementById("exchange-file-input");
            var existingExchange = currentExchangeEditIndex > -1 ? (exchangeRecords[currentExchangeEditIndex] || {}) : {};
            var pickedImage = exchangeImageInput && exchangeImageInput.files && exchangeImageInput.files[0] ? exchangeImageInput.files[0] : null;
            var pickedAttachment = exchangeFileInput && exchangeFileInput.files && exchangeFileInput.files[0] ? exchangeFileInput.files[0] : null;
            var exchangeRecord = {
              date: document.getElementById("exchange-date") ? document.getElementById("exchange-date").value.trim() : "",
              unit: document.getElementById("exchange-unit") ? document.getElementById("exchange-unit").value.trim() : "",
              content: document.getElementById("exchange-content") ? document.getElementById("exchange-content").value.trim() : "",
              procedure: document.getElementById("exchange-procedure") ? document.getElementById("exchange-procedure").value : "是",
              image: pickedImage ? pickedImage.name : (existingExchange.image || ""),
              imageUrl: pickedImage ? URL.createObjectURL(pickedImage) : (existingExchange.imageUrl || ""),
              imageMimeType: pickedImage ? pickedImage.type : (existingExchange.imageMimeType || ""),
              attachment: pickedAttachment ? pickedAttachment.name : (existingExchange.attachment || ""),
              attachmentUrl: pickedAttachment ? URL.createObjectURL(pickedAttachment) : (existingExchange.attachmentUrl || ""),
              attachmentMimeType: pickedAttachment ? pickedAttachment.type : (existingExchange.attachmentMimeType || "")
            };
            if (!exchangeRecord.date || !exchangeRecord.unit) {
              showToast("请先填写交涉日期和交涉单位");
              return;
            }
            if (currentExchangeEditIndex > -1) exchangeRecords[currentExchangeEditIndex] = exchangeRecord;
            else exchangeRecords.push(exchangeRecord);
            renderExchangeRows();
          }
          closeModal();
          showToast("已保存");
        }
      });

      document.getElementById("done-tabs").addEventListener("click", function (event) {
        var btn = event.target.closest("[data-tab]");
        if (!btn) return;
        switchTab(btn.getAttribute("data-tab"));
      });

      document.addEventListener("change", function (event) {
        var target = event.target;
        if (!target) return;
        if (target.getAttribute("data-unit-select") === "company") {
          if (currentProjectMode === "detail") return;
          var selectedUnit = target.getAttribute("data-unit");
          if (!selectedUnit) return;
          unitSelections[selectedUnit] = target.value || unitSelections[selectedUnit];
          unitRows();
        }
        if (target.getAttribute("data-upload-input")) {
          var uploadKey = target.getAttribute("data-upload-input");
          var nameEl = document.getElementById(uploadKey + "-name");
          var chosen = target.files && target.files[0] ? target.files[0].name : "未选择文件";
          if (nameEl) nameEl.textContent = chosen;
        }
      });

    })();
  </script>
  <script src="assets/js/menu-config.js"></script>
  <script src="assets/js/shell.js"></script>
</body>
</html>
