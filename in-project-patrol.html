<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目巡查</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <style>
    .patrol-table th, .patrol-table td { height: 46px; border-right: 1px solid rgba(34,211,238,.08); border-bottom: 1px solid rgba(34,211,238,.08); vertical-align: middle; }
    .patrol-table th:last-child, .patrol-table td:last-child { border-right: 0; }
    .patrol-filter-label { display:block; margin-bottom:6px; color:rgba(207,250,254,.74); font-size:11px; }
    .patrol-media-row { display:flex; align-items:center; gap:6px; max-width:170px; overflow-x:auto; padding-bottom:2px; }
    .patrol-media-row::-webkit-scrollbar, .record-list::-webkit-scrollbar { height:5px; width:5px; }
    .patrol-media-row::-webkit-scrollbar-thumb, .record-list::-webkit-scrollbar-thumb { background:rgba(34,211,238,.28); border-radius:999px; }
    .patrol-thumb, .patrol-video-thumb { position:relative; width:34px; height:24px; flex:0 0 34px; border-radius:4px; overflow:hidden; border:1px solid rgba(34,211,238,.16); background:rgba(15,23,42,.66); cursor:pointer; }
    .patrol-thumb img, .patrol-video-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .patrol-video-thumb::after { content:"\f04b"; font-family:"Font Awesome 6 Free"; font-weight:900; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.9); font-size:9px; background:rgba(2,8,23,.28); }
    .patrol-actions { display:flex; align-items:center; gap:10px; white-space:nowrap; }
    .patrol-action { display:inline-flex; align-items:center; gap:3px; cursor:pointer; font-size:11px; color:#67e8f9; }
    .patrol-action--confirm { color:#60a5fa; }
    .patrol-action--reject, .patrol-action--delete { color:#fb7185; }
    .patrol-badge { display:inline-flex; align-items:center; justify-content:center; min-width:52px; height:22px; padding:0 10px; border-radius:999px; font-size:11px; border:1px solid rgba(34,211,238,.22); background:rgba(8,15,35,.72); color:rgba(226,245,255,.9); }
    .patrol-badge--manual { border-color:rgba(96,165,250,.28); color:#bfdbfe; }
    .patrol-badge--drone { border-color:rgba(45,212,191,.28); color:#99f6e4; }
    .patrol-modal-mask { position:fixed; inset:0; z-index:90; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.58); padding:24px; }
    .patrol-modal-mask.show { display:flex; }
    .patrol-modal { width:min(860px,96vw); max-height:min(88vh,860px); overflow:auto; border:1px solid rgba(34,211,238,.2); border-radius:10px; background:#071426; box-shadow:0 24px 80px rgba(0,0,0,.55), 0 0 30px rgba(34,211,238,.12); }
    .patrol-form-label { width:118px; flex:0 0 118px; text-align:right; color:rgba(226,245,255,.88); font-size:12px; line-height:32px; }
    .patrol-required::before { content:"*"; color:#fb7185; margin-right:3px; }
    .patrol-upload { display:flex; align-items:center; gap:10px; min-height:42px; width:100%; padding:8px 10px; border:1px dashed rgba(34,211,238,.26); border-radius:8px; background:rgba(2,8,23,.38); }
    .patrol-upload__btn { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:6px; color:#cffafe; background:rgba(14,116,144,.3); border:1px solid rgba(34,211,238,.2); cursor:pointer; white-space:nowrap; font-size:12px; }
    .patrol-upload__name { min-width:0; color:rgba(226,245,255,.8); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .patrol-preview-shell { max-width:860px; margin:0 auto; border:1px solid rgba(34,211,238,.16); border-radius:10px; background:rgba(2,8,23,.45); overflow:hidden; }
    .patrol-preview-head { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px 18px; border-bottom:1px solid rgba(34,211,238,.12); color:rgba(226,245,255,.86); font-size:12px; }
    .patrol-preview-body { padding:18px; min-height:420px; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg, rgba(15,23,42,.82), rgba(2,8,23,.94)); }
    .patrol-preview-image { max-width:100%; max-height:62vh; border-radius:8px; object-fit:contain; box-shadow:0 20px 48px rgba(0,0,0,.35); }
    .patrol-preview-file { width:min(520px,100%); padding:28px 24px; border-radius:10px; border:1px solid rgba(34,211,238,.14); background:rgba(8,15,35,.72); text-align:center; color:rgba(226,245,255,.88); }
    .patrol-preview-file i { font-size:42px; color:#67e8f9; margin-bottom:14px; }
    .patrol-empty { min-height:160px; border:1px solid rgba(148,163,184,.18); border-radius:8px; background:rgba(15,23,42,.38); display:flex; flex-direction:column; align-items:center; justify-content:center; color:rgba(148,163,184,.6); font-size:12px; }
    .patrol-toast { position:fixed; right:28px; bottom:28px; z-index:100; display:none; padding:10px 14px; border:1px solid rgba(34,211,238,.28); border-radius:8px; background:rgba(8,15,35,.94); color:#cffafe; font-size:12px; box-shadow:var(--shadow-card); }
    .patrol-toast.show { display:block; }
    .confirm-pop { position:fixed; z-index:120; width:132px; padding:12px 12px 10px; border-radius:4px; background:#fff; box-shadow:0 8px 24px rgba(15,23,42,.28); color:#333; }
    .confirm-pop.hidden { display:none; }
    .confirm-pop::after { content:""; position:absolute; left:50%; bottom:-8px; width:14px; height:14px; background:#fff; transform:translateX(-50%) rotate(45deg); }
    .record-mask { position:fixed; inset:0; z-index:110; display:none; align-items:center; justify-content:center; background:rgba(15,23,42,.45); padding:24px; }
    .record-mask.show { display:flex; }
    .record-dialog { width:min(760px,92vw); min-height:230px; border-radius:4px; background:#fff; color:#333; box-shadow:0 20px 60px rgba(15,23,42,.28); }
    .record-list { max-height:60vh; overflow:auto; }
    .record-item { position:relative; padding-left:24px; margin-bottom:18px; font-size:14px; color:#333; }
    .record-item::before { content:""; position:absolute; left:0; top:6px; width:8px; height:8px; border-radius:999px; border:1px solid #2563eb; background:#fff; }
  </style>
</head>
<body data-shell="default" data-top="wb" data-sidebar-key="in-project-patrol" data-wb-view="page">
  <div id="page-root" class="max-w-[1920px] mx-auto min-h-full">
    <nav class="neon-panel neon-panel--tight mb-4 px-4 py-2.5 flex flex-wrap items-center gap-2 text-[11px] text-slate-400">
      <span class="text-cyan-400"><i class="fa-solid fa-location-crosshairs"></i></span>
      <span>我的工作台</span><span class="text-slate-600">&gt;&gt;</span><span class="text-cyan-50 font-semibold tracking-wide">项目巡查</span>
    </nav>

    <div class="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-cyan-400/10 pb-3">
      <h1 class="text-base md:text-lg font-semibold text-white tracking-tight" style="text-shadow:0 0 20px rgba(34,211,238,.25)">项目巡查</h1>
      <span class="text-[10px] px-2 py-1 rounded-md border border-cyan-400/25 text-cyan-100/80 bg-cyan-500/5">项目巡查业务台账</span>
    </div>

    <div class="neon-panel neon-panel--tight p-4 mb-4">
      <div class="grid grid-cols-1 xl:grid-cols-5 gap-x-8 gap-y-3 text-xs">
        <div><label class="patrol-filter-label">所属线路</label><select id="filter-line" class="wh-input h-8 w-full px-2"><option value="">全部</option><option value="8号线">8号线</option><option value="7号线">7号线</option><option value="19号线">19号线</option></select></div>
        <div><label class="patrol-filter-label">上下行</label><select id="filter-direction" class="wh-input h-8 w-full px-2"><option value="">全部</option><option value="上行">上行</option><option value="下行">下行</option></select></div>
        <div><label class="patrol-filter-label">所属区间</label><select id="filter-section" class="wh-input h-8 w-full px-2"><option value="">全部</option><option value="洪山路-徐家棚">洪山路-徐家棚</option><option value="洪山路-小洪山">洪山路-小洪山</option><option value="花山河">花山河</option></select></div>
        <div><label class="patrol-filter-label">所在站点</label><select id="filter-station" class="wh-input h-8 w-full px-2"><option value="">全部</option><option value="徐家棚">徐家棚</option><option value="小洪山">小洪山</option><option value="花山河">花山河</option></select></div>
        <div><label class="patrol-filter-label">巡查类型</label><select id="filter-type" class="wh-input h-8 w-full px-2"><option value="">全部</option><option value="无人机">无人机</option><option value="人工">人工</option></select></div>
        <div class="xl:col-span-2"><label class="patrol-filter-label">时间范围</label><div class="flex items-center gap-2"><input id="filter-start" type="datetime-local" class="wh-input h-8 flex-1 px-2" /><span class="text-slate-500">至</span><input id="filter-end" type="datetime-local" class="wh-input h-8 flex-1 px-2" /></div></div>
        <div class="xl:col-span-3 flex items-end justify-end gap-2"><button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-primary" data-action="search-patrol">搜索</button><button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost" data-action="reset-patrol">重置</button><button type="button" class="px-4 py-1.5 rounded text-xs wh-btn-ghost" data-action="export-patrol">导出</button></div>
      </div>
    </div>

    <div class="neon-panel neon-panel--tight p-3 flex flex-wrap items-center gap-2 mb-4">
      <button type="button" class="px-4 py-2 rounded-md text-xs font-semibold transition-ui wh-btn-primary" data-action="add-patrol"><i class="fa-solid fa-plus mr-1"></i>新增</button>
      <button type="button" class="px-3 py-2 rounded-md text-xs wh-btn-ghost transition-ui" data-action="batch-refresh-patrol"><i class="fa-solid fa-rotate-right mr-1"></i>刷新</button>
      <div class="ml-auto flex flex-wrap gap-2 items-center justify-end">
        <input id="filter-keyword" type="search" placeholder="输入编号 / 项目名称 / 巡查人" class="wh-input px-3 py-1.5 w-44 sm:w-56 lg:w-72 text-xs" />
        <button type="button" class="px-3 py-1.5 rounded-md text-xs wh-btn-primary" data-action="search-patrol">筛选</button>
        <button type="button" class="px-3 py-1.5 rounded-md text-xs wh-btn-ghost" data-action="reset-patrol">清空</button>
      </div>
    </div>

    <div class="wh-table-shell bg-slate-950/35">
      <div class="overflow-x-auto">
        <table class="patrol-table min-w-[1750px] w-full text-left text-[11px]">
          <thead>
            <tr class="bg-slate-950/75">
              <th class="px-3 text-cyan-50/95">编号</th>
              <th class="px-3 text-cyan-50/95">巡查类型</th>
              <th class="px-3 text-cyan-50/95">所属线路</th>
              <th class="px-3 text-cyan-50/95">所在区间/站点</th>
              <th class="px-3 text-cyan-50/95">项目名称</th>
              <th class="px-3 text-cyan-50/95">项目进度</th>
              <th class="px-3 text-cyan-50/95">巡查照片</th>
              <th class="px-3 text-cyan-50/95">巡查视频</th>
              <th class="px-3 text-cyan-50/95">巡查日期</th>
              <th class="px-3 text-cyan-50/95">巡查人</th>
              <th class="px-3 text-cyan-50/95">更新时间</th>
              <th class="px-3 text-cyan-50/95">操作</th>
            </tr>
          </thead>
          <tbody id="patrol-table-body"></tbody>
        </table>
      </div>
      <div class="flex flex-wrap items-center justify-between gap-3 px-3 py-2.5 border-t border-cyan-400/15 bg-slate-950/55 text-[11px] text-slate-400">
        <span>共 <b class="text-cyan-200" id="patrol-total">0</b> 条</span>
        <div class="flex items-center gap-2 flex-wrap">
          <button class="min-w-[28px] h-7 rounded wh-btn-ghost text-slate-500" data-action="page-prev">&lt;</button>
          <button class="min-w-[28px] h-7 rounded wh-btn-primary" id="page-current">1</button>
          <button class="min-w-[28px] h-7 rounded wh-btn-ghost text-slate-500" data-action="page-next">&gt;</button>
          <select id="page-size" class="wh-input h-7 px-2"><option value="7">7 条/页</option><option value="10">10 条/页</option><option value="20">20 条/页</option></select>
          <span>跳至</span>
          <input id="page-jump" class="wh-input h-7 w-12 px-2 text-center" value="1" />
          <span>页</span>
          <button class="px-2.5 h-7 rounded wh-btn-ghost" data-action="page-jump">确定</button>
        </div>
      </div>
    </div>
  </div>

  <div class="patrol-modal-mask" id="patrol-modal-mask">
    <div class="patrol-modal">
      <div class="h-12 px-5 flex items-center border-b border-cyan-400/15">
        <h3 class="text-white font-semibold" id="patrol-modal-title">新增项目巡查</h3>
        <button type="button" class="ml-auto text-slate-300 hover:text-white text-lg" data-action="close-patrol-modal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="p-6" id="patrol-modal-body"></div>
      <div class="px-6 py-4 border-t border-cyan-400/15 flex justify-end gap-2">
        <button type="button" class="px-5 py-2 rounded text-xs wh-btn-ghost" data-action="close-patrol-modal">取消</button>
        <button type="button" class="px-5 py-2 rounded text-xs wh-btn-primary" data-action="save-patrol-modal">保存</button>
      </div>
    </div>
  </div>

  <div id="confirm-pop" class="confirm-pop hidden">
    <div class="text-[15px] text-slate-700 flex items-center gap-2 mb-3"><i id="confirm-icon" class="fa-solid fa-star text-amber-400"></i><span id="confirm-text">确定通过？</span></div>
    <div class="flex items-center justify-end gap-2 relative z-[1]"><button type="button" class="px-3 py-1.5 text-[13px] border border-slate-300 text-slate-700 bg-white" data-action="cancel-confirm">取消</button><button type="button" class="px-3 py-1.5 text-[13px] text-white bg-[#ff5a5f]" data-action="submit-confirm">确定</button></div>
  </div>

  <div id="record-mask" class="record-mask">
    <div class="record-dialog"><div class="flex items-center justify-between px-8 py-5"><h3 class="text-[18px] font-semibold text-slate-800">操作记录</h3><button type="button" class="text-slate-400 hover:text-slate-600 text-xl leading-none" data-action="close-record">×</button></div><div id="record-body" class="record-list px-8 pb-8 pt-2"></div></div>
  </div>

  <div class="patrol-toast" id="patrol-toast">已完成</div>

  <script>
    (function () {
      var photoLibrary = [
        "https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=120&q=80",
        "https://images.unsplash.com/photo-1513828583688-c52646db42da?auto=format&fit=crop&w=120&q=80",
        "https://images.unsplash.com/photo-1541888946425-d81bb19240f5?auto=format&fit=crop&w=120&q=80",
        "https://images.unsplash.com/photo-1599707254554-027aeb4deacd?auto=format&fit=crop&w=120&q=80",
        "https://images.unsplash.com/photo-1541976590-713941681591?auto=format&fit=crop&w=120&q=80"
      ];
      var videoPosters = [
        "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=120&q=80",
        "https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=120&q=80",
        "https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=120&q=80"
      ];
      var patrolRecords = [
        { id:"XC20260305001", type:"无人机", line:"19号线", direction:"上行", section:"花山河", station:"花山河", projectName:"花山河保护区外部管廊项目", progress:"航线复飞完成，围挡、堆载及临边作业情况已回传。", photos:[photoLibrary[0], photoLibrary[1], photoLibrary[2]], videos:[{ name:"花山河航拍复核.mp4", poster:videoPosters[0] }], patrolDate:"2026-03-05 09:20", patrolUser:"鲍雄澎", updatedAt:"2026-03-05 09:28", status:"待确认", logs:[{ action:"新增项目巡查", user:"鲍雄澎", time:"2026-05-12 14:40:31" }] },
        { id:"XC20260304008", type:"人工", line:"8号线", direction:"下行", section:"洪山路-徐家棚", station:"徐家棚", projectName:"徐家棚商业综合体项目", progress:"现场围挡封闭正常，基坑口防护补强已完成。", photos:[photoLibrary[2], photoLibrary[3]], videos:[{ name:"徐家棚现场走查.mp4", poster:videoPosters[1] }], patrolDate:"2026-03-04 16:35", patrolUser:"李玲", updatedAt:"2026-03-04 16:48", status:"已确认", logs:[{ action:"新增项目巡查", user:"李玲", time:"2026-05-12 14:40:31" }, { action:"工班确认", user:"鲍雄澎", time:"2026-05-12 14:45:20" }] },
        { id:"XC20260304005", type:"人工", line:"8号线", direction:"上行", section:"洪山路-小洪山", station:"小洪山", projectName:"小洪山地下商业项目", progress:"现场无施工，沉降点位完整，监护日志已补录。", photos:[photoLibrary[1], photoLibrary[4]], videos:[{ name:"小洪山复核视频.mp4", poster:videoPosters[2] }], patrolDate:"2026-03-04 10:15", patrolUser:"徐克强", updatedAt:"2026-03-04 10:26", status:"待确认", logs:[{ action:"新增项目巡查", user:"徐克强", time:"2026-05-12 14:40:31" }] },
        { id:"XC20260303002", type:"无人机", line:"7号线", direction:"下行", section:"洪山路-徐家棚", station:"徐家棚", projectName:"沿线市政迁改项目", progress:"航拍发现材料临时堆放靠近保护区边界，已转人工复核。", photos:[photoLibrary[0], photoLibrary[3], photoLibrary[4]], videos:[{ name:"沿线迁改航拍.mp4", poster:videoPosters[0] }], patrolDate:"2026-03-03 14:10", patrolUser:"董治昊", updatedAt:"2026-03-03 14:19", status:"已拒绝", logs:[{ action:"新增项目巡查", user:"董治昊", time:"2026-05-12 14:40:31" }, { action:"拒绝", user:"鲍雄澎", time:"2026-05-12 14:48:55" }] }
      ];
      var editIndex = -1;
      var previewPayload = null;
      var modalMode = "";
      var pendingConfirm = null;
      var filteredRecords = patrolRecords.slice();
      var currentPage = 1;
      var pageSize = 7;
      var tableBody = document.getElementById("patrol-table-body");
      var totalEl = document.getElementById("patrol-total");
      var currentPageEl = document.getElementById("page-current");
      var toastEl = document.getElementById("patrol-toast");
      var modalMask = document.getElementById("patrol-modal-mask");
      var modalTitle = document.getElementById("patrol-modal-title");
      var modalBody = document.getElementById("patrol-modal-body");
      var confirmPop = document.getElementById("confirm-pop");
      var confirmText = document.getElementById("confirm-text");
      var confirmIcon = document.getElementById("confirm-icon");
      var recordMask = document.getElementById("record-mask");
      var recordBody = document.getElementById("record-body");

      function showToast(text) {
        toastEl.textContent = text;
        toastEl.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function () { toastEl.classList.remove("show"); }, 1800);
      }

      function escapeHtml(text) {
        return String(text == null ? "" : text).replace(/[&<>"']/g, function (char) {
          return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char];
        });
      }

      function projectNameOptions(selectedName) {
        var names = [];
        patrolRecords.forEach(function (record) {
          if (record.projectName && names.indexOf(record.projectName) === -1) names.push(record.projectName);
        });
        if (selectedName && names.indexOf(selectedName) === -1) names.unshift(selectedName);
        return '<option value="">请选择项目名称</option>' + names.map(function (name) {
          return '<option value="' + escapeHtml(name) + '"' + (name === selectedName ? ' selected' : '') + '>' + escapeHtml(name) + '</option>';
        }).join("");
      }

      function parseDateValue(value) {
        return value ? new Date(String(value).replace(" ", "T")).getTime() : 0;
      }

      function badge(type) {
        return '<span class="patrol-badge ' + (type === "人工" ? "patrol-badge--manual" : "patrol-badge--drone") + '">' + type + '</span>';
      }

      function uploadField(id, name, emptyText) {
        return '<div class="patrol-upload">' +
          '<label class="patrol-upload__btn"><i class="fa-solid fa-upload"></i>上传文件<input id="' + id + '-input" data-upload-input="' + id + '" type="file" class="hidden"></label>' +
          '<span class="patrol-upload__name" id="' + id + '-name">' + escapeHtml(name || emptyText) + '</span>' +
        '</div>';
      }

      function mediaPhotos(record, rowIndex) {
        if (!record.photos.length) return '<span class="text-slate-500">无</span>';
        return '<div class="patrol-media-row">' + record.photos.map(function (photo, index) {
          return '<span class="patrol-thumb" data-action="preview-photo" data-row="' + rowIndex + '" data-index="' + index + '"><img src="' + photo + '" alt="巡查照片"></span>';
        }).join("") + '</div>';
      }

      function mediaVideos(record, rowIndex) {
        if (!record.videos.length) return '<span class="text-slate-500">无</span>';
        return '<div class="patrol-media-row">' + record.videos.map(function (video, index) {
          return '<span class="patrol-video-thumb" data-action="preview-video" data-row="' + rowIndex + '" data-index="' + index + '"><img src="' + video.poster + '" alt="' + escapeHtml(video.name) + '"></span>';
        }).join("") + '</div>';
      }

      function rowActions(record, rowIndex) {
        return '<div class="patrol-actions">' +
          '<span class="patrol-action" data-action="edit-patrol" data-row="' + rowIndex + '"><i class="fa-regular fa-pen-to-square"></i>编辑</span>' +
          '<span class="patrol-action patrol-action--confirm" data-action="confirm-patrol" data-row="' + rowIndex + '"><i class="fa-regular fa-circle-check"></i>工班确认</span>' +
          '<span class="patrol-action patrol-action--reject" data-action="reject-patrol" data-row="' + rowIndex + '"><i class="fa-regular fa-circle-xmark"></i>拒绝</span>' +
          '<span class="patrol-action patrol-action--delete" data-action="delete-patrol" data-row="' + rowIndex + '"><i class="fa-regular fa-trash-can"></i>删除</span>' +
          '<span class="patrol-action" data-action="view-records" data-row="' + rowIndex + '"><i class="fa-regular fa-clock"></i>操作记录</span>' +
        '</div>';
      }

      function applyFilters() {
        var line = document.getElementById("filter-line").value;
        var direction = document.getElementById("filter-direction").value;
        var section = document.getElementById("filter-section").value;
        var station = document.getElementById("filter-station").value;
        var type = document.getElementById("filter-type").value;
        var start = parseDateValue(document.getElementById("filter-start").value);
        var end = parseDateValue(document.getElementById("filter-end").value);
        var keyword = document.getElementById("filter-keyword").value.trim();
        filteredRecords = patrolRecords.filter(function (record) {
          var patrolAt = parseDateValue(record.patrolDate);
          var matchKeyword = !keyword || [record.id, record.projectName, record.patrolUser].join(" ").indexOf(keyword) > -1;
          return (!line || record.line === line) && (!direction || record.direction === direction) && (!section || record.section === section) && (!station || record.station === station) && (!type || record.type === type) && (!start || patrolAt >= start) && (!end || patrolAt <= end) && matchKeyword;
        });
        currentPage = 1;
        renderTable();
      }

      function resetFilters() {
        ["filter-line", "filter-direction", "filter-section", "filter-station", "filter-type"].forEach(function (id) { document.getElementById(id).selectedIndex = 0; });
        document.getElementById("filter-start").value = "";
        document.getElementById("filter-end").value = "";
        document.getElementById("filter-keyword").value = "";
        filteredRecords = patrolRecords.slice();
        currentPage = 1;
        renderTable();
      }

      function renderTable() {
        var pageCount = Math.max(1, Math.ceil(filteredRecords.length / pageSize));
        if (currentPage > pageCount) currentPage = pageCount;
        var start = (currentPage - 1) * pageSize;
        var rows = filteredRecords.slice(start, start + pageSize);
        totalEl.textContent = filteredRecords.length;
        currentPageEl.textContent = currentPage;
        document.getElementById("page-jump").value = currentPage;
        if (!rows.length) {
          tableBody.innerHTML = '<tr><td colspan="12"><div class="patrol-empty"><i class="fa-regular fa-folder-open text-2xl mb-1"></i>暂无巡查记录</div></td></tr>';
          return;
        }
        tableBody.innerHTML = rows.map(function (record, index) {
          var rowIndex = patrolRecords.indexOf(record);
          return '<tr class="' + (index % 2 ? "bg-slate-900/35" : "bg-slate-950/25") + '">' +
            '<td class="px-3 text-slate-100/95">' + record.id + '</td>' +
            '<td class="px-3 text-slate-100/95">' + badge(record.type) + '</td>' +
            '<td class="px-3 text-slate-100/95">' + record.line + '</td>' +
            '<td class="px-3 text-slate-100/95">' + record.section + '<div class="text-[10px] text-slate-500 mt-1">' + record.station + ' / ' + record.direction + '</div></td>' +
            '<td class="px-3 text-slate-100/95">' + record.projectName + '</td>' +
            '<td class="px-3 text-slate-100/95 max-w-[260px] truncate" title="' + escapeHtml(record.progress) + '">' + record.progress + '</td>' +
            '<td class="px-3 text-slate-100/95">' + mediaPhotos(record, rowIndex) + '</td>' +
            '<td class="px-3 text-slate-100/95">' + mediaVideos(record, rowIndex) + '</td>' +
            '<td class="px-3 text-slate-100/95">' + record.patrolDate + '</td>' +
            '<td class="px-3 text-slate-100/95">' + record.patrolUser + '</td>' +
            '<td class="px-3 text-slate-100/95">' + record.updatedAt + '</td>' +
            '<td class="px-3 text-slate-100/95">' + rowActions(record, rowIndex) + '</td>' +
          '</tr>';
        }).join("");
      }

      function previewMarkup() {
        var payload = previewPayload || {};
        var meta = [];
        if (payload.type) meta.push("巡查类型：" + payload.type);
        if (payload.date) meta.push("巡查日期：" + payload.date);
        if (payload.user) meta.push("巡查人：" + payload.user);
        var body = payload.kind === "image"
          ? '<img class="patrol-preview-image" src="' + payload.url + '" alt="' + escapeHtml(payload.name || "预览图片") + '">'
          : '<div class="patrol-preview-file"><i class="fa-regular fa-circle-play"></i><div class="text-base text-white mb-2">' + escapeHtml(payload.name || "巡查视频") + '</div><div class="text-xs text-cyan-100/70">' + escapeHtml(payload.tip || "当前原型展示视频文件信息和封面预览") + '</div></div>';
        return '<div class="patrol-preview-shell"><div class="patrol-preview-head"><div class="font-medium text-cyan-50">' + escapeHtml(payload.title || "预览") + '</div><div>' + escapeHtml(meta.join("  |  ")) + '</div></div><div class="patrol-preview-body">' + body + '</div></div>';
      }

      function openModal(mode, title) {
        modalMode = mode;
        modalTitle.textContent = title;
        if (mode === "preview") {
          modalBody.innerHTML = previewMarkup();
        } else {
          var item = editIndex > -1 ? (patrolRecords[editIndex] || {}) : {};
          modalBody.innerHTML = '<div class="space-y-4 max-w-[680px] mx-auto">' +
            '<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">' +
              '<label class="flex items-center gap-3"><span class="patrol-form-label patrol-required">巡查类型：</span><select id="patrol-type" class="wh-input h-8 flex-1 px-2"><option' + ((item.type || "") === "无人机" ? ' selected' : '') + '>无人机</option><option' + ((item.type || "") === "人工" ? ' selected' : '') + '>人工</option></select></label>' +
              '<label class="flex items-center gap-3"><span class="patrol-form-label patrol-required">编号：</span><input id="patrol-id" class="wh-input h-8 flex-1 px-2" value="' + escapeHtml(item.id || "") + '" placeholder="请输入编号" /></label>' +
              '<label class="flex items-center gap-3"><span class="patrol-form-label patrol-required">所属线路：</span><select id="patrol-line" class="wh-input h-8 flex-1 px-2"><option' + ((item.line || "") === "8号线" ? ' selected' : '') + '>8号线</option><option' + ((item.line || "") === "7号线" ? ' selected' : '') + '>7号线</option><option' + ((item.line || "") === "19号线" ? ' selected' : '') + '>19号线</option></select></label>' +
              '<label class="flex items-center gap-3"><span class="patrol-form-label patrol-required">上下行：</span><select id="patrol-direction" class="wh-input h-8 flex-1 px-2"><option' + ((item.direction || "") === "上行" ? ' selected' : '') + '>上行</option><option' + ((item.direction || "") === "下行" ? ' selected' : '') + '>下行</option></select></label>' +
              '<label class="flex items-center gap-3"><span class="patrol-form-label patrol-required">所属区间：</span><input id="patrol-section" class="wh-input h-8 flex-1 px-2" value="' + escapeHtml(item.section || "") + '" placeholder="请输入所属区间" /></label>' +
              '<label class="flex items-center gap-3"><span class="patrol-form-label patrol-required">所在站点：</span><input id="patrol-station" class="wh-input h-8 flex-1 px-2" value="' + escapeHtml(item.station || "") + '" placeholder="请输入所在站点" /></label>' +
              '<label class="flex items-center gap-3 md:col-span-2"><span class="patrol-form-label patrol-required">项目名称：</span><select id="patrol-project-name" class="wh-input h-8 flex-1 px-2">' + projectNameOptions(item.projectName || "") + '</select></label>' +
              '<label class="flex items-center gap-3"><span class="patrol-form-label patrol-required">巡查日期：</span><input id="patrol-date" type="datetime-local" class="wh-input h-8 flex-1 px-2" value="' + escapeHtml((item.patrolDate || "").replace(" ", "T")) + '" /></label>' +
              '<label class="flex items-center gap-3"><span class="patrol-form-label patrol-required">巡查人：</span><input id="patrol-user" class="wh-input h-8 flex-1 px-2" value="' + escapeHtml(item.patrolUser || "") + '" placeholder="请输入巡查人" /></label>' +
            '</div>' +
            '<label class="flex items-start gap-3"><span class="patrol-form-label">项目进度：</span><textarea id="patrol-progress" class="wh-input min-h-[92px] flex-1 px-2 py-2" placeholder="请输入项目进度">' + escapeHtml(item.progress || "") + '</textarea></label>' +
            '<label class="flex items-start gap-3"><span class="patrol-form-label">巡查照片：</span><div class="flex-1">' + uploadField("patrol-photo", item.photos && item.photos.length ? "已关联 " + item.photos.length + " 张照片" : "", "未上传照片") + '</div></label>' +
            '<label class="flex items-start gap-3"><span class="patrol-form-label">巡查视频：</span><div class="flex-1">' + uploadField("patrol-video", item.videos && item.videos.length ? item.videos[0].name : "", "未上传视频") + '</div></label>' +
          '</div>';
        }
        modalMask.classList.add("show");
      }

      function closeModal() {
        modalMask.classList.remove("show");
        modalMode = "";
        editIndex = -1;
        previewPayload = null;
      }

      function saveRecord() {
        var id = document.getElementById("patrol-id").value.trim();
        var patrolDate = document.getElementById("patrol-date").value.trim();
        var patrolUser = document.getElementById("patrol-user").value.trim();
        var existing = editIndex > -1 ? patrolRecords[editIndex] : null;
        var record = {
          id: id,
          type: document.getElementById("patrol-type").value,
          line: document.getElementById("patrol-line").value,
          direction: document.getElementById("patrol-direction").value,
          section: document.getElementById("patrol-section").value.trim(),
          station: document.getElementById("patrol-station").value.trim(),
          projectName: document.getElementById("patrol-project-name").value.trim(),
          progress: document.getElementById("patrol-progress").value.trim(),
          photos: existing ? (existing.photos || []).slice() : [photoLibrary[0], photoLibrary[1], photoLibrary[2]],
          videos: existing ? (existing.videos || []).slice() : [{ name: "新增巡查视频.mp4", poster: videoPosters[0] }],
          patrolDate: patrolDate ? patrolDate.replace("T", " ") : "",
          patrolUser: patrolUser,
          updatedAt: new Date().toISOString().slice(0, 16).replace("T", " "),
          status: existing ? existing.status : "待确认",
          logs: existing ? (existing.logs || []).slice() : [{ action:"新增项目巡查", user:"鲍雄澎", time:"2026-05-12 14:40:31" }]
        };
        if (!record.id || !record.section || !record.station || !record.projectName || !record.patrolDate || !record.patrolUser) {
          showToast("请先填写必填项");
          return;
        }
        var photoInput = document.getElementById("patrol-photo-input");
        var videoInput = document.getElementById("patrol-video-input");
        if (photoInput && photoInput.files && photoInput.files[0]) record.photos = [URL.createObjectURL(photoInput.files[0])].concat(record.photos.slice(0, 3));
        if (videoInput && videoInput.files && videoInput.files[0]) record.videos = [{ name: videoInput.files[0].name, poster: videoPosters[1] }];
        record.logs.push({ action: existing ? "编辑项目巡查" : "新增项目巡查", user: record.patrolUser, time: "2026-05-12 14:40:31" });
        if (editIndex > -1) patrolRecords[editIndex] = record;
        else patrolRecords.unshift(record);
        closeModal();
        applyFilters();
        showToast("已保存");
      }

      function openConfirm(kind, index, trigger) {
        pendingConfirm = { kind: kind, index: index };
        confirmText.textContent = kind === "confirm" ? "确定通过？" : "确定拒绝？";
        confirmIcon.className = "fa-solid fa-star " + (kind === "confirm" ? "text-amber-400" : "text-red-400");
        var rect = trigger.getBoundingClientRect();
        confirmPop.style.left = Math.max(16, rect.left + rect.width / 2 - 66) + "px";
        confirmPop.style.top = Math.max(16, rect.top - 92) + "px";
        confirmPop.classList.remove("hidden");
      }

      function closeConfirm() {
        confirmPop.classList.add("hidden");
        pendingConfirm = null;
      }

      function openRecords(index) {
        var logs = (patrolRecords[index] && patrolRecords[index].logs) || [];
        recordBody.innerHTML = logs.map(function (log) {
          return '<div class="record-item"><div class="mb-3">' + escapeHtml(log.action) + '</div><div class="text-[13px] text-slate-400 mb-3">日期：' + escapeHtml(log.time) + '</div><div class="text-[13px] text-slate-400">操作者：' + escapeHtml(log.user) + '</div></div>';
        }).join("") || '<div class="text-sm text-slate-500 py-10 text-center">暂无操作记录</div>';
        recordMask.classList.add("show");
      }

      document.addEventListener("click", function (event) {
        var trigger = event.target.closest("[data-action]");
        if (!trigger) return;
        var action = trigger.getAttribute("data-action");
        if (action === "search-patrol") { applyFilters(); showToast("已按当前条件筛选"); }
        if (action === "reset-patrol") { resetFilters(); showToast("筛选条件已重置"); }
        if (action === "export-patrol") showToast("已生成导出任务");
        if (action === "batch-refresh-patrol") showToast("已刷新当前列表");
        if (action === "add-patrol") { editIndex = -1; openModal("form", "新增项目巡查"); }
        if (action === "edit-patrol") { editIndex = Number(trigger.getAttribute("data-row")); openModal("form", "编辑项目巡查"); }
        if (action === "confirm-patrol") openConfirm("confirm", Number(trigger.getAttribute("data-row")), trigger);
        if (action === "reject-patrol") openConfirm("reject", Number(trigger.getAttribute("data-row")), trigger);
        if (action === "delete-patrol") {
          var deleteIndex = Number(trigger.getAttribute("data-row"));
          patrolRecords.splice(deleteIndex, 1);
          applyFilters();
          showToast("巡查记录已删除");
        }
        if (action === "view-records") openRecords(Number(trigger.getAttribute("data-row")));
        if (action === "preview-photo") {
          var photoRow = patrolRecords[Number(trigger.getAttribute("data-row"))] || {};
          var photo = (photoRow.photos || [])[Number(trigger.getAttribute("data-index"))];
          previewPayload = { kind:"image", title:"巡查照片预览", url:photo, name:photoRow.projectName, type:photoRow.type, date:photoRow.patrolDate, user:photoRow.patrolUser };
          openModal("preview", "巡查照片预览");
        }
        if (action === "preview-video") {
          var videoRow = patrolRecords[Number(trigger.getAttribute("data-row"))] || {};
          var video = (videoRow.videos || [])[Number(trigger.getAttribute("data-index"))] || {};
          previewPayload = { kind:"video", title:"巡查视频预览", name:video.name || "巡查视频", type:videoRow.type, date:videoRow.patrolDate, user:videoRow.patrolUser, tip:"当前原型展示视频文件信息和封面预览" };
          openModal("preview", "巡查视频预览");
        }
        if (action === "close-patrol-modal") closeModal();
        if (action === "save-patrol-modal") saveRecord();
        if (action === "cancel-confirm") closeConfirm();
        if (action === "submit-confirm" && pendingConfirm) {
          var targetRecord = patrolRecords[pendingConfirm.index];
          if (targetRecord) {
            targetRecord.status = pendingConfirm.kind === "confirm" ? "已确认" : "已拒绝";
            targetRecord.logs = targetRecord.logs || [];
            targetRecord.logs.push({ action: pendingConfirm.kind === "confirm" ? "工班确认" : "拒绝", user: "鲍雄澎", time: "2026-05-12 14:40:31" });
            renderTable();
            showToast(pendingConfirm.kind === "confirm" ? "已完成工班确认" : "已拒绝该巡查记录");
          }
          closeConfirm();
        }
        if (action === "close-record") recordMask.classList.remove("show");
        if (action === "page-prev") { if (currentPage > 1) currentPage -= 1; renderTable(); }
        if (action === "page-next") { var pageCount = Math.max(1, Math.ceil(filteredRecords.length / pageSize)); if (currentPage < pageCount) currentPage += 1; renderTable(); }
        if (action === "page-jump") { var pageCountJump = Math.max(1, Math.ceil(filteredRecords.length / pageSize)); var pageValue = Number(document.getElementById("page-jump").value || 1); currentPage = Math.min(pageCountJump, Math.max(1, pageValue || 1)); renderTable(); }
      });

      document.addEventListener("change", function (event) {
        var target = event.target;
        if (!target) return;
        if (target.id === "page-size") { pageSize = Number(target.value || 7); currentPage = 1; renderTable(); }
        if (target.getAttribute("data-upload-input")) {
          var uploadKey = target.getAttribute("data-upload-input");
          var nameEl = document.getElementById(uploadKey + "-name");
          var chosen = target.files && target.files[0] ? target.files[0].name : "未选择文件";
          if (nameEl) nameEl.textContent = chosen;
        }
      });

      resetFilters();
    })();
  </script>
  <script src="assets/js/menu-config.js"></script>
  <script src="assets/js/workbench-mega.js"></script>
  <script src="assets/js/shell.js"></script>
</body>
</html>
