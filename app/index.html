<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>武汉地铁保护区 — 移动端原型</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="assets/css/miniapp.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"PingFang SC"', '"PingFang TC"', '-apple-system', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>
<body class="miniapp-device-root">
  <div class="device-iphone15" aria-label="iPhone 15 原型预览">
    <div class="device-screen">
      <div class="device-status" aria-hidden="true">
        <span class="device-status__time" id="device-time">9:41</span>
        <span class="device-status__icons">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-full"></i>
        </span>
      </div>
      <iframe id="app-frame" title="小程序内容" src="map/pages/gis.html"></iframe>
      <nav class="device-tabbar" aria-label="主导航">
        <button type="button" class="device-tabbar__item is-active" data-tab-id="map">
          <i class="fa-solid fa-map"></i>
          <span>全景地图</span>
        </button>
        <button type="button" class="device-tabbar__item" data-tab-id="patrol">
          <i class="fa-solid fa-clipboard-check"></i>
          <span>巡检</span>
        </button>
        <button type="button" class="device-tabbar__item" data-tab-id="asset">
          <i class="fa-solid fa-cubes"></i>
          <span>资产</span>
        </button>
        <button type="button" class="device-tabbar__item" data-tab-id="stats">
          <i class="fa-solid fa-chart-simple"></i>
          <span>数据统计</span>
        </button>
        <button type="button" class="device-tabbar__item" data-tab-id="mine">
          <i class="fa-solid fa-user"></i>
          <span>我的</span>
        </button>
      </nav>
    </div>
  </div>
  <script src="assets/js/miniapp-config.js"></script>
  <script src="assets/js/miniapp-ui.js"></script>
  <script>
    (function () {
      var el = document.getElementById("device-time");
      if (el) {
        var d = new Date();
        el.textContent = d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
      }
    })();
  </script>
</body>
</html>
