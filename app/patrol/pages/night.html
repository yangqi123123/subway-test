<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>夜班作业</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/miniapp.css" />
  <link rel="stylesheet" href="../../assets/css/in-project-mobile.css" />
  <link rel="stylesheet" href="../../../assets/css/patrol-media-gallery.css" />
  <link rel="stylesheet" href="../../assets/css/disease-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/night-mobile.css" />
</head>
<body class="mp-disease-page mp-night-page mp-project-page miniapp-page" data-miniapp="page" data-module="patrol" data-title="夜班作业" data-base="../">
  <header class="miniapp-navbar miniapp-navbar--inner">
    <button type="button" class="miniapp-navbar__back" data-action="mp-nav-back" aria-label="返回">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h1 class="miniapp-navbar__title" id="night-nav-title">夜班作业</h1>
  </header>

  <div id="night-app" class="mp-disease-app mp-project-app">
    <section id="night-list-view" class="mp-project-view">
      <div class="mp-list-scroll">
        <div class="mp-project-stats">
          <div class="mp-stat-card mp-stat-card--total">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-list-check"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-total">0</div>
              <div class="mp-stat-card__label">作业总数</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--key">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-calendar-plus"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-month">0</div>
              <div class="mp-stat-card__label">本月新增</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--general">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-hourglass-half"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-pending">0</div>
              <div class="mp-stat-card__label">待确认</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--month">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-circle-check"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-completed">0</div>
              <div class="mp-stat-card__label">已完成作业</div>
            </div>
          </div>
        </div>

        <div class="mp-project-searchbar">
          <div class="mp-search-input-wrap" data-action="open-night-search" role="button" tabindex="0" aria-label="搜索夜班作业">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <input type="text" id="night-search-trigger" class="mp-search-input" placeholder="搜索编号" readonly />
            <button type="button" class="mp-search-clear" id="night-search-clear" hidden aria-label="清空搜索">
              <i class="fa-solid fa-circle-xmark"></i>
            </button>
          </div>
          <button type="button" class="mp-filter-text-btn" data-action="open-night-filter">筛选 <i class="fa-solid fa-filter" aria-hidden="true"></i></button>
        </div>

        <div id="night-mobile-list" class="mp-project-list" role="list"></div>
        <span id="table-total" hidden aria-hidden="true">0</span>
      </div>
      <footer class="mp-detail-footer" id="mp-night-list-footer">
        <button type="button" class="mp-detail-footer__btn mp-detail-footer__btn--primary" data-action="new-night">新增夜班作业</button>
      </footer>
    </section>

    <section id="night-detail-view" class="hidden mp-detail-view">
      <span id="detail-night-title" hidden aria-hidden="true"></span>
      <div class="mp-disease-detail-scroll">
        <div id="night-detail-body" class="mp-disease-detail-body"></div>
      </div>
    </section>

    <section id="night-form-view" class="hidden mp-detail-view">
      <span id="night-form-title" hidden aria-hidden="true">新建夜班作业</span>
      <div class="mp-disease-form-scroll">
        <div class="mp-form-grid" id="night-form-root">
          <div class="mp-form-row">
            <label class="project-form-label project-required">编号</label>
            <input id="f-id" class="wh-input mp-field" readonly placeholder="自动生成" />
          </div>
          <div class="mp-form-row">
            <label class="project-form-label project-required">所属线路</label>
            <select id="f-line" class="wh-input mp-field">
              <option value="">请选择</option>
              <option value="5号线">5号线</option>
              <option value="2号线">2号线</option>
              <option value="19号线">19号线</option>
            </select>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label project-required">上下行</label>
            <select id="f-direction" class="wh-input mp-field">
              <option value="">请选择</option>
              <option value="上行">上行</option>
              <option value="下行">下行</option>
            </select>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label">所在区间</label>
            <select id="f-section" class="wh-input mp-field">
              <option value="">请选择</option>
              <option value="白沙六路-光霞">白沙六路-光霞</option>
              <option value="盘龙城-宏图大道">盘龙城-宏图大道</option>
            </select>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label">站点</label>
            <select id="f-station" class="wh-input mp-field">
              <option value="">请选择</option>
              <option value="白沙六路">白沙六路</option>
              <option value="盘龙城">盘龙城</option>
              <option value="天河停车场">天河停车场</option>
            </select>
          </div>
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label project-required">夜班作业描述</label>
            <textarea id="f-desc" class="wh-input mp-field mp-field--textarea" placeholder="请输入夜班作业描述"></textarea>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label">作业单位</label>
            <input id="f-company" class="wh-input mp-field" placeholder="作业单位" />
          </div>
          <div class="mp-form-row">
            <label class="project-form-label">特种作业类型</label>
            <select id="f-special-type" class="wh-input mp-field">
              <option value="">请选择</option>
              <option value="动火作业">动火作业</option>
              <option value="吊装作业">吊装作业</option>
              <option value="有限空间作业">有限空间作业</option>
            </select>
          </div>
          <div class="mp-form-row mp-form-row--full mp-disease-upload-row">
            <label class="project-form-label">特种作业资料</label>
            <div class="mp-disease-upload-wrap">
              <label id="f-doc-tile" class="mp-disease-upload-tile">
                <i class="fa-solid fa-plus"></i><span>上传</span>
                <input id="f-doc-input" type="file" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.zip,.rar" />
              </label>
              <div id="f-doc-list" class="mp-disease-upload-list"></div>
              <p class="mp-disease-upload-hint">支持 PDF、Word、Excel、ZIP/RAR，单文件不超过 50MB</p>
            </div>
          </div>
          <div class="mp-form-row mp-form-row--full mp-disease-upload-row">
            <label class="project-form-label">作业照片</label>
            <div class="mp-disease-upload-wrap">
              <label id="f-photo-tile" class="mp-disease-upload-tile">
                <i class="fa-solid fa-plus"></i><span>上传</span>
                <input id="f-photo-input" type="file" multiple accept="image/jpeg,image/png,image/webp,image/gif,.jpg,.jpeg,.png,.webp,.gif" />
              </label>
              <div id="f-photo-list" class="mp-disease-upload-list"></div>
              <p id="f-photo-hint" class="mp-disease-upload-hint">支持 JPG、PNG、WEBP、GIF，最多上传 9 张，单张不超过 20MB</p>
            </div>
          </div>
          <div class="mp-form-row mp-form-row--full mp-disease-upload-row">
            <label class="project-form-label">作业视频</label>
            <div class="mp-disease-upload-wrap">
              <label id="f-video-tile" class="mp-disease-upload-tile">
                <i class="fa-solid fa-plus"></i><span>上传</span>
                <input id="f-video-input" type="file" multiple accept="video/mp4,video/webm,video/quicktime,.mp4,.webm,.mov" />
              </label>
              <div id="f-video-list" class="mp-disease-upload-list"></div>
              <p id="f-video-hint" class="mp-disease-upload-hint">支持 MP4、WEBM、MOV，最多上传 9 个，单个不超过 200MB</p>
            </div>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label project-required">作业时间</label>
            <input id="f-time" class="wh-input mp-field" placeholder="作业时间" />
          </div>
        </div>
      </div>
      <footer class="mp-detail-footer">
        <button type="button" class="mp-detail-footer__btn mp-detail-footer__btn--ghost" data-action="cancel-night">取消</button>
        <button type="button" class="mp-detail-footer__btn mp-detail-footer__btn--primary" data-action="save-night">保存</button>
      </footer>
    </section>

    <tbody id="night-table-body" hidden aria-hidden="true"></tbody>
  </div>

  <div id="night-filter-sheet" class="mp-filter-sheet" aria-hidden="true">
    <div class="mp-filter-sheet__mask" data-action="close-night-filter"></div>
    <div class="mp-filter-sheet__panel" role="dialog" aria-label="筛选条件">
      <div class="mp-filter-sheet__head">
        <h2>快捷筛选</h2>
        <button type="button" class="mp-icon-btn" data-action="close-night-filter" aria-label="关闭"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="mp-filter-sheet__body project-filter-panel">
        <label class="mp-filter-field"><span>所属线路</span>
          <select id="filter-line" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="5号线">5号线</option>
            <option value="2号线">2号线</option>
            <option value="19号线">19号线</option>
          </select>
        </label>
        <label class="mp-filter-field"><span>上下行</span>
          <select id="filter-direction" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="上行">上行</option>
            <option value="下行">下行</option>
          </select>
        </label>
        <label class="mp-filter-field"><span>所在区间</span>
          <select id="filter-section" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="白沙六路-光霞">白沙六路-光霞</option>
            <option value="盘龙城-宏图大道">盘龙城-宏图大道</option>
          </select>
        </label>
        <label class="mp-filter-field"><span>所在站点</span>
          <select id="filter-station" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="白沙六路">白沙六路</option>
            <option value="盘龙城">盘龙城</option>
            <option value="天河停车场">天河停车场</option>
          </select>
        </label>
        <label class="mp-filter-field mp-filter-field--full"><span>开始时间</span>
          <input id="filter-date-start" type="datetime-local" class="wh-input w-full px-2" />
        </label>
        <label class="mp-filter-field mp-filter-field--full"><span>结束时间</span>
          <input id="filter-date-end" type="datetime-local" class="wh-input w-full px-2" />
        </label>
      </div>
      <div class="mp-filter-sheet__foot">
        <button type="button" class="mp-btn mp-btn--ghost flex-1" data-action="reset-night-filter">重置</button>
        <button type="button" class="mp-btn mp-btn--primary flex-1" data-action="search-night">搜索</button>
      </div>
    </div>
  </div>

  <div id="night-record-mask" class="project-modal-mask" aria-hidden="true">
    <div class="project-modal mp-project-modal mp-record-modal" role="dialog" aria-labelledby="night-record-title">
      <div class="mp-project-modal__head">
        <h3 id="night-record-title" class="mp-project-modal__title">操作记录</h3>
        <button type="button" class="gis-mobile-sheet-close mp-modal-close" data-action="close-night-record" aria-label="关闭">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div id="night-record-body" class="mp-record-modal__body record-list"></div>
    </div>
  </div>

  <div id="night-confirm-mask" class="mp-confirm-mask" aria-hidden="true">
    <div class="mp-confirm-mask__panel" role="alertdialog" aria-labelledby="night-confirm-title">
      <h3 id="night-confirm-title" class="mp-confirm-mask__title">确认操作</h3>
      <p id="night-confirm-msg" class="mp-confirm-mask__msg">确定执行该操作吗？</p>
      <div class="mp-confirm-mask__actions">
        <button type="button" class="mp-confirm-mask__btn" data-action="night-confirm-cancel">取消</button>
        <button type="button" class="mp-confirm-mask__btn mp-confirm-mask__btn--danger" data-action="night-confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <div id="mp-picker-sheet" class="mp-picker-sheet" aria-hidden="true">
    <div class="mp-picker-sheet__mask" data-action="mp-picker-mask-close"></div>
    <div class="mp-picker-sheet__panel" role="dialog">
      <div class="mp-picker-sheet__head">
        <button type="button" class="mp-picker-sheet__btn" data-action="mp-picker-cancel">取消</button>
        <h3 id="mp-picker-title" class="mp-picker-sheet__title">请选择</h3>
        <button type="button" class="mp-picker-sheet__btn mp-picker-sheet__btn--ok" data-action="mp-picker-confirm">确定</button>
      </div>
      <div id="mp-picker-body" class="mp-picker-sheet__body"></div>
    </div>
  </div>

  <div id="mp-media-preview" class="mp-media-preview" aria-hidden="true">
    <button type="button" class="mp-media-preview__close" data-action="mp-media-preview-close" aria-label="关闭预览">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <img id="mp-media-preview-img" class="mp-media-preview__img" alt="" />
  </div>

  <div id="mp-file-preview-mask" class="project-modal-mask mp-file-preview-mask" aria-hidden="true">
    <div class="project-modal mp-project-modal mp-file-preview" role="dialog" aria-labelledby="mp-file-preview-title">
      <div class="mp-project-modal__head">
        <h3 class="mp-project-modal__title" id="mp-file-preview-title">文件预览</h3>
        <button type="button" class="gis-mobile-sheet-close mp-modal-close" data-action="mp-file-preview-close" aria-label="关闭">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="mp-file-preview__body" id="mp-file-preview-body"></div>
    </div>
  </div>

  <div class="project-toast" id="night-toast" aria-live="polite"></div>

  <script src="../../../assets/js/project-operation-log.js"></script>
  <script src="../../../assets/js/patrol-media-gallery.js"></script>
  <script src="../../../assets/js/in-night-data.js"></script>
  <script src="../../../assets/js/patrol-crud-page.js"></script>
  <script src="../../../assets/js/in-night-page.js"></script>
  <script src="../../../assets/js/in-project-mobile.js"></script>
  <script src="../../assets/js/miniapp-frame.js"></script>
  <script src="../../assets/js/night-page-boot.js"></script>
</body>
</html>
