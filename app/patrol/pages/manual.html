<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>人工巡检记录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/miniapp.css" />
  <link rel="stylesheet" href="../../assets/css/in-project-mobile.css" />
  <link rel="stylesheet" href="../../../assets/css/patrol-media-gallery.css" />
  <link rel="stylesheet" href="../../assets/css/disease-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/manual-mobile.css" />
</head>
<body class="mp-disease-page mp-manual-page mp-project-page miniapp-page" data-miniapp="page" data-module="patrol" data-title="人工巡检记录" data-base="../">
  <header class="miniapp-navbar miniapp-navbar--inner">
    <button type="button" class="miniapp-navbar__back" data-action="mp-nav-back" aria-label="返回">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h1 class="miniapp-navbar__title" id="manual-nav-title">人工巡检记录</h1>
  </header>

  <div id="manual-app" class="mp-disease-app mp-project-app">
    <section id="manual-list-view" class="mp-project-view">
      <div class="mp-list-scroll">
        <div class="mp-project-stats">
          <div class="mp-stat-card mp-stat-card--total">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-list-check"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-total">0</div>
              <div class="mp-stat-card__label">巡查总数</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--key">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-calendar-plus"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-month">0</div>
              <div class="mp-stat-card__label">本月新增</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--general">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-hourglass-half"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-pending">0</div>
              <div class="mp-stat-card__label">待确认</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--month">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-circle-check"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-completed">0</div>
              <div class="mp-stat-card__label">已完成巡查</div>
            </div>
          </div>
        </div>

        <div class="mp-project-searchbar">
          <div class="mp-search-input-wrap" data-action="open-manual-search" role="button" tabindex="0" aria-label="搜索人工巡检记录">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <input type="text" id="manual-search-trigger" class="mp-search-input" placeholder="搜索项目名称" readonly />
            <button type="button" class="mp-search-clear" id="manual-search-clear" hidden aria-label="清空搜索">
              <i class="fa-solid fa-circle-xmark"></i>
            </button>
          </div>
          <button type="button" class="mp-filter-text-btn" data-action="open-manual-filter">筛选 <i class="fa-solid fa-filter" aria-hidden="true"></i></button>
        </div>

        <div id="manual-mobile-list" class="mp-project-list" role="list"></div>
        <span id="table-total" hidden aria-hidden="true">0</span>
      </div>
      <footer class="mp-detail-footer" id="mp-manual-list-footer">
        <button type="button" class="mp-detail-footer__btn mp-detail-footer__btn--primary" data-action="new-manual">新增人工巡查</button>
      </footer>
    </section>

    <section id="manual-detail-view" class="hidden mp-detail-view">
      <span id="detail-manual-title" hidden aria-hidden="true"></span>
      <div class="mp-disease-detail-scroll">
        <div id="manual-detail-body" class="mp-disease-detail-body"></div>
      </div>
    </section>

    <section id="manual-form-view" class="hidden mp-detail-view">
      <span id="manual-form-title" hidden aria-hidden="true">新建人工巡查记录</span>
      <div class="mp-disease-form-scroll">
        <div class="mp-form-grid" id="manual-form-root">
          <div class="mp-form-row">
            <label class="project-form-label project-required">编号</label>
            <input id="f-id" class="wh-input mp-field" readonly placeholder="自动生成" />
          </div>
          <div class="mp-form-row">
            <label class="project-form-label project-required">所属线路</label>
            <select id="f-line" class="wh-input mp-field">
              <option value="">请选择</option>
              <option value="8号线">8号线</option>
              <option value="2号线">2号线</option>
              <option value="7号线">7号线</option>
            </select>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label project-required">上下行</label>
            <select id="f-direction" class="wh-input mp-field">
              <option value="">请选择</option>
              <option value="上行">上行</option>
              <option value="下行">下行</option>
            </select>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label">所在区间</label>
            <select id="f-section" class="wh-input mp-field">
              <option value="">请选择</option>
              <option value="水果湖-洪山路">水果湖-洪山路</option>
              <option value="洪山路-小洪山">洪山路-小洪山</option>
              <option value="金潭路-宏图大道">金潭路-宏图大道</option>
            </select>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label">站点</label>
            <select id="f-station" class="wh-input mp-field">
              <option value="">请选择</option>
              <option value="洪山路">洪山路</option>
              <option value="小洪山">小洪山</option>
              <option value="宏图大道">宏图大道</option>
            </select>
          </div>
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label project-required">所在项目</label>
            <select id="f-project" class="wh-input mp-field">
              <option value="">请选择项目</option>
              <option value="新建商业文化设施项目">新建商业文化设施项目</option>
              <option value="洪山路至小洪山商业公寓项目">洪山路至小洪山商业公寓项目</option>
              <option value="三金潭车辆段上盖物业综合开发项目">三金潭车辆段上盖物业综合开发项目</option>
            </select>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label project-required">巡查日期</label>
            <input id="f-patrol-date" class="wh-input mp-field" placeholder="巡查日期" />
          </div>
          <div class="mp-form-row mp-form-row--full mp-disease-upload-row">
            <label class="project-form-label">巡查照片</label>
            <div class="mp-disease-upload-wrap">
              <label id="f-photo-tile" class="mp-disease-upload-tile">
                <i class="fa-solid fa-plus"></i><span>上传</span>
                <input id="f-photo-input" type="file" multiple accept="image/jpeg,image/png,image/webp,image/gif,.jpg,.jpeg,.png,.webp,.gif" />
              </label>
              <div id="f-photo-list" class="mp-disease-upload-list"></div>
              <p id="f-photo-hint" class="mp-disease-upload-hint">支持 JPG、PNG、WEBP、GIF，最多上传 9 张，单张不超过 20MB</p>
            </div>
          </div>
          <div class="mp-form-row mp-form-row--full mp-disease-upload-row">
            <label class="project-form-label">巡查视频</label>
            <div class="mp-disease-upload-wrap">
              <label id="f-video-tile" class="mp-disease-upload-tile">
                <i class="fa-solid fa-plus"></i><span>上传</span>
                <input id="f-video-input" type="file" multiple accept="video/mp4,video/webm,video/quicktime,.mp4,.webm,.mov" />
              </label>
              <div id="f-video-list" class="mp-disease-upload-list"></div>
              <p id="f-video-hint" class="mp-disease-upload-hint">支持 MP4、WEBM、MOV，最多上传 9 个，单个不超过 200MB</p>
            </div>
          </div>
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label project-required">项目进展</label>
            <textarea id="f-progress" class="wh-input mp-field mp-field--textarea" placeholder="请输入项目进展"></textarea>
          </div>
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label">协调情况及备注</label>
            <textarea id="f-remark" class="wh-input mp-field mp-field--textarea" placeholder="协调情况及备注"></textarea>
          </div>
        </div>
      </div>
      <footer class="mp-detail-footer">
        <button type="button" class="mp-detail-footer__btn mp-detail-footer__btn--ghost" data-action="cancel-manual">取消</button>
        <button type="button" class="mp-detail-footer__btn mp-detail-footer__btn--primary" data-action="save-manual">保存</button>
      </footer>
    </section>

    <tbody id="manual-table-body" hidden aria-hidden="true"></tbody>
  </div>

  <div id="manual-filter-sheet" class="mp-filter-sheet" aria-hidden="true">
    <div class="mp-filter-sheet__mask" data-action="close-manual-filter"></div>
    <div class="mp-filter-sheet__panel" role="dialog" aria-label="筛选条件">
      <div class="mp-filter-sheet__head">
        <h2>快捷筛选</h2>
        <button type="button" class="mp-icon-btn" data-action="close-manual-filter" aria-label="关闭"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="mp-filter-sheet__body project-filter-panel">
        <label class="mp-filter-field"><span>所属线路</span>
          <select id="filter-line" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="8号线">8号线</option>
            <option value="2号线">2号线</option>
            <option value="7号线">7号线</option>
          </select>
        </label>
        <label class="mp-filter-field"><span>上下行</span>
          <select id="filter-direction" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="上行">上行</option>
            <option value="下行">下行</option>
          </select>
        </label>
        <label class="mp-filter-field"><span>所在区间</span>
          <select id="filter-section" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="水果湖-洪山路">水果湖-洪山路</option>
            <option value="洪山路-小洪山">洪山路-小洪山</option>
            <option value="金潭路-宏图大道">金潭路-宏图大道</option>
          </select>
        </label>
        <label class="mp-filter-field"><span>所在站点</span>
          <select id="filter-station" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="洪山路">洪山路</option>
            <option value="小洪山">小洪山</option>
            <option value="宏图大道">宏图大道</option>
          </select>
        </label>
        <label class="mp-filter-field mp-filter-field--full"><span>开始时间</span>
          <input id="filter-date-start" type="datetime-local" class="wh-input w-full px-2" />
        </label>
        <label class="mp-filter-field mp-filter-field--full"><span>结束时间</span>
          <input id="filter-date-end" type="datetime-local" class="wh-input w-full px-2" />
        </label>
      </div>
      <div class="mp-filter-sheet__foot">
        <button type="button" class="mp-btn mp-btn--ghost flex-1" data-action="reset-manual-filter">重置</button>
        <button type="button" class="mp-btn mp-btn--primary flex-1" data-action="search-manual">搜索</button>
      </div>
    </div>
  </div>

  <div id="manual-record-mask" class="project-modal-mask" aria-hidden="true">
    <div class="project-modal mp-project-modal mp-record-modal" role="dialog" aria-labelledby="manual-record-title">
      <div class="mp-project-modal__head">
        <h3 id="manual-record-title" class="mp-project-modal__title">操作记录</h3>
        <button type="button" class="gis-mobile-sheet-close mp-modal-close" data-action="close-manual-record" aria-label="关闭">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div id="manual-record-body" class="mp-record-modal__body record-list"></div>
    </div>
  </div>

  <div id="manual-confirm-mask" class="mp-confirm-mask" aria-hidden="true">
    <div class="mp-confirm-mask__panel" role="alertdialog" aria-labelledby="manual-confirm-title">
      <h3 id="manual-confirm-title" class="mp-confirm-mask__title">确认操作</h3>
      <p id="manual-confirm-msg" class="mp-confirm-mask__msg">确定执行该操作吗？</p>
      <div class="mp-confirm-mask__actions">
        <button type="button" class="mp-confirm-mask__btn" data-action="manual-confirm-cancel">取消</button>
        <button type="button" class="mp-confirm-mask__btn mp-confirm-mask__btn--danger" data-action="manual-confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <div id="mp-picker-sheet" class="mp-picker-sheet" aria-hidden="true">
    <div class="mp-picker-sheet__mask" data-action="mp-picker-mask-close"></div>
    <div class="mp-picker-sheet__panel" role="dialog">
      <div class="mp-picker-sheet__head">
        <button type="button" class="mp-picker-sheet__btn" data-action="mp-picker-cancel">取消</button>
        <h3 id="mp-picker-title" class="mp-picker-sheet__title">请选择</h3>
        <button type="button" class="mp-picker-sheet__btn mp-picker-sheet__btn--ok" data-action="mp-picker-confirm">确定</button>
      </div>
      <div id="mp-picker-body" class="mp-picker-sheet__body"></div>
    </div>
  </div>

  <div id="mp-media-preview" class="mp-media-preview" aria-hidden="true">
    <button type="button" class="mp-media-preview__close" data-action="mp-media-preview-close" aria-label="关闭预览">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <img id="mp-media-preview-img" class="mp-media-preview__img" alt="" />
  </div>

  <div id="mp-file-preview-mask" class="project-modal-mask mp-file-preview-mask" aria-hidden="true">
    <div class="project-modal mp-project-modal mp-file-preview" role="dialog" aria-labelledby="mp-file-preview-title">
      <div class="mp-project-modal__head">
        <h3 class="mp-project-modal__title" id="mp-file-preview-title">文件预览</h3>
        <button type="button" class="gis-mobile-sheet-close mp-modal-close" data-action="mp-file-preview-close" aria-label="关闭">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="mp-file-preview__body" id="mp-file-preview-body"></div>
    </div>
  </div>

  <div class="project-toast" id="manual-toast" aria-live="polite"></div>

  <script src="../../../assets/js/project-operation-log.js"></script>
  <script src="../../../assets/js/patrol-media-gallery.js"></script>
  <script src="../../../assets/js/in-manual-data.js"></script>
  <script src="../../../assets/js/patrol-crud-page.js"></script>
  <script src="../../../assets/js/in-manual-page.js"></script>
  <script src="../../../assets/js/in-project-mobile.js"></script>
  <script src="../../assets/js/miniapp-frame.js"></script>
  <script src="../../assets/js/manual-page-boot.js"></script>
</body>
</html>
