<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>应急仓库</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/miniapp.css" />
  <link rel="stylesheet" href="../../assets/css/in-project-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/disease-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/emergency-warehouse-mobile.css" />
</head>
<body class="mp-disease-page mp-warehouse-page mp-project-page miniapp-page" data-miniapp="page" data-module="asset" data-title="应急仓库" data-base="../">
  <header class="miniapp-navbar miniapp-navbar--inner">
    <button type="button" class="miniapp-navbar__back" data-action="mp-nav-back" aria-label="返回">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h1 class="miniapp-navbar__title" id="warehouse-nav-title">应急仓库</h1>
  </header>

  <div id="warehouse-app" class="mp-disease-app mp-project-app">
    <section id="warehouse-list-view" class="mp-project-view">
      <div class="mp-list-scroll">
        <div class="mp-project-stats">
          <div class="mp-stat-card mp-stat-card--total">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-warehouse"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-total">0</div>
              <div class="mp-stat-card__label">仓库总数</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--general">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-train-subway"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-lines">0</div>
              <div class="mp-stat-card__label">覆盖线路</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--key">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-building"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-dept">0</div>
              <div class="mp-stat-card__label">覆盖部门</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--month">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-user-tie"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-owners">0</div>
              <div class="mp-stat-card__label">负责人</div>
            </div>
          </div>
        </div>

        <div class="mp-project-searchbar">
          <div class="mp-search-input-wrap" data-action="open-warehouse-search" role="button" tabindex="0" aria-label="搜索应急仓库">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <input type="text" id="warehouse-search-trigger" class="mp-search-input" placeholder="搜索仓库名称" readonly />
            <button type="button" class="mp-search-clear" id="warehouse-search-clear" data-action="warehouse-search-clear" hidden aria-label="清空搜索">
              <i class="fa-solid fa-circle-xmark"></i>
            </button>
          </div>
          <button type="button" class="mp-filter-text-btn" data-action="open-warehouse-filter">筛选 <i class="fa-solid fa-filter" aria-hidden="true"></i></button>
        </div>

        <div id="warehouse-mobile-list" class="mp-project-list" role="list"></div>
        <span id="table-total" hidden aria-hidden="true">0</span>
      </div>
      <footer class="mp-detail-footer" id="mp-warehouse-list-footer">
        <button type="button" class="mp-detail-footer__btn mp-detail-footer__btn--primary" data-action="new-warehouse">新建应急仓库</button>
      </footer>
    </section>

    <section id="warehouse-detail-view" class="hidden mp-detail-view">
      <span id="detail-warehouse-title" hidden aria-hidden="true"></span>
      <div class="mp-disease-detail-scroll">
        <div id="warehouse-detail-body" class="mp-disease-detail-body"></div>
      </div>
    </section>

    <section id="warehouse-form-view" class="hidden mp-detail-view">
      <span id="warehouse-form-title" hidden aria-hidden="true">新增应急仓库</span>
      <div class="mp-disease-form-scroll">
        <div class="mp-form-grid" id="warehouse-form-root">
          <div class="mp-form-row">
            <label class="project-form-label project-required">名称</label>
            <input id="warehouse-name" class="wh-input mp-field" placeholder="请输入名称" />
          </div>
          <div class="mp-form-row">
            <label class="project-form-label project-required">所属部门</label>
            <select id="warehouse-dept" class="wh-input mp-field">
              <option value="">请选择部门</option>
              <option value="物资部">物资部</option>
              <option value="巡检部">巡检部</option>
              <option value="应急中心">应急中心</option>
            </select>
          </div>
          <div class="mp-form-row">
            <label class="project-form-label">所属线路</label>
            <select id="warehouse-line" class="wh-input mp-field">
              <option value="2号线">2号线</option>
              <option value="5号线">5号线</option>
              <option value="7号线">7号线</option>
            </select>
          </div>
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label project-required">仓库地址</label>
            <input id="warehouse-address" class="wh-input mp-field" placeholder="请输入仓库地址" />
          </div>
          <div class="mp-form-row">
            <label class="project-form-label">地址经度</label>
            <input id="warehouse-lng" class="wh-input mp-field" placeholder="请输入仓库地址经度" />
          </div>
          <div class="mp-form-row">
            <label class="project-form-label">地址纬度</label>
            <input id="warehouse-lat" class="wh-input mp-field" placeholder="请输入仓库地址纬度" />
          </div>
          <div class="mp-form-row">
            <label class="project-form-label project-required">负责人</label>
            <input id="warehouse-owner" class="wh-input mp-field" placeholder="请输入负责人" />
          </div>
          <div class="mp-form-row">
            <label class="project-form-label project-required">联系电话</label>
            <input id="warehouse-phone" class="wh-input mp-field" placeholder="请输入联系电话" inputmode="tel" />
          </div>
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label">备注</label>
            <textarea id="warehouse-remark" class="wh-input mp-field mp-field--textarea" placeholder="请输入备注"></textarea>
          </div>
        </div>
      </div>
      <footer class="mp-detail-footer">
        <button type="button" class="mp-detail-footer__btn mp-detail-footer__btn--ghost" data-action="cancel-warehouse-form">取消</button>
        <button type="button" class="mp-detail-footer__btn mp-detail-footer__btn--primary" data-action="save-warehouse-form">保存</button>
      </footer>
    </section>
  </div>

  <div id="warehouse-filter-sheet" class="mp-filter-sheet" aria-hidden="true">
    <div class="mp-filter-sheet__mask" data-action="close-warehouse-filter"></div>
    <div class="mp-filter-sheet__panel" role="dialog" aria-label="筛选条件">
      <div class="mp-filter-sheet__head">
        <h2>快捷筛选</h2>
        <button type="button" class="mp-icon-btn" data-action="close-warehouse-filter" aria-label="关闭"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="mp-filter-sheet__body project-filter-panel">
        <label class="mp-filter-field"><span>所属线路</span>
          <select id="filter-line" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="2号线">2号线</option>
            <option value="5号线">5号线</option>
            <option value="7号线">7号线</option>
          </select>
        </label>
        <label class="mp-filter-field"><span>所属部门</span>
          <select id="filter-dept" class="wh-input w-full px-2">
            <option value="">全部</option>
            <option value="物资部">物资部</option>
            <option value="巡检部">巡检部</option>
            <option value="应急中心">应急中心</option>
          </select>
        </label>
      </div>
      <div class="mp-filter-sheet__foot">
        <button type="button" class="mp-btn mp-btn--ghost flex-1" data-action="reset-warehouse-filter">重置</button>
        <button type="button" class="mp-btn mp-btn--primary flex-1" data-action="search-warehouse">搜索</button>
      </div>
    </div>
  </div>

  <div id="warehouse-confirm-mask" class="mp-confirm-mask" aria-hidden="true">
    <div class="mp-confirm-mask__panel" role="alertdialog" aria-labelledby="warehouse-confirm-title">
      <h3 id="warehouse-confirm-title" class="mp-confirm-mask__title">删除确认</h3>
      <p id="warehouse-confirm-msg" class="mp-confirm-mask__msg">确认删除当前仓库记录吗？</p>
      <div class="mp-confirm-mask__actions">
        <button type="button" class="mp-confirm-mask__btn" data-action="warehouse-confirm-cancel">取消</button>
        <button type="button" class="mp-confirm-mask__btn mp-confirm-mask__btn--danger" data-action="warehouse-confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <div id="mp-picker-sheet" class="mp-picker-sheet" aria-hidden="true">
    <div class="mp-picker-sheet__mask" data-action="mp-picker-mask-close"></div>
    <div class="mp-picker-sheet__panel" role="dialog">
      <div class="mp-picker-sheet__head">
        <button type="button" class="mp-picker-sheet__btn" data-action="mp-picker-cancel">取消</button>
        <h3 id="mp-picker-title" class="mp-picker-sheet__title">请选择</h3>
        <button type="button" class="mp-picker-sheet__btn mp-picker-sheet__btn--ok" data-action="mp-picker-confirm">确定</button>
      </div>
      <div id="mp-picker-body" class="mp-picker-sheet__body"></div>
    </div>
  </div>

  <div class="project-toast" id="warehouse-toast" aria-live="polite"></div>

  <script src="../../../assets/js/am-emergency-warehouse-data.js"></script>
  <script src="../../../assets/js/am-emergency-warehouse-page.js"></script>
  <script src="../../../assets/js/in-project-mobile.js"></script>
  <script src="../../assets/js/miniapp-frame.js"></script>
  <script src="../../assets/js/emergency-warehouse-page-boot.js"></script>
</body>
</html>
