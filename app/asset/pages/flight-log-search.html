<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>搜索飞行日志</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/miniapp.css" />
  <link rel="stylesheet" href="../../assets/css/project-search.css" />
</head>
<body class="mp-project-search-page miniapp-page" data-miniapp="page" data-module="asset" data-title="搜索飞行日志" data-base="../">
  <header class="miniapp-navbar miniapp-navbar--inner">
    <button type="button" class="miniapp-navbar__back" id="flight-log-search-back" aria-label="返回">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h1 class="miniapp-navbar__title">搜索飞行日志</h1>
  </header>

  <main class="mp-project-search-main">
    <div class="mp-project-search-bar">
      <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
      <input
        type="text"
        id="flight-log-search-input"
        class="mp-project-search-bar__input"
        placeholder="任务ID / 无人机 / 操作员"
        autocomplete="off"
        enterkeyhint="search"
      />
      <button type="button" class="mp-project-search-bar__clear" id="flight-log-search-clear" hidden aria-label="清空">
        <i class="fa-solid fa-circle-xmark"></i>
      </button>
      <button type="button" class="mp-project-search-bar__submit" id="flight-log-search-submit">搜索</button>
    </div>
    <p class="mp-project-search-hint" id="flight-log-search-hint">输入任务ID、无人机编号或操作员后点击搜索，将返回飞行日志列表展示筛选结果</p>
  </main>

  <script src="../../assets/js/miniapp-frame.js"></script>
  <script src="../../assets/js/flight-log-search-page.js"></script>
  <script>
    if (window.MiniAppFrame && window.MiniAppFrame.syncTabbar) window.MiniAppFrame.syncTabbar();
  </script>
</body>
</html>
