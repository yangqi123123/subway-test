<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>飞行日志</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/miniapp.css" />
  <link rel="stylesheet" href="../../assets/css/in-project-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/disease-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/flight-log-mobile.css" />
</head>
<body class="mp-disease-page mp-flight-log-page mp-project-page miniapp-page" data-miniapp="page" data-module="asset" data-title="飞行日志" data-base="../">
  <header class="miniapp-navbar miniapp-navbar--inner">
    <button type="button" class="miniapp-navbar__back" data-action="mp-nav-back" aria-label="返回">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h1 class="miniapp-navbar__title" id="flight-log-nav-title">飞行日志</h1>
  </header>

  <div id="flight-log-app" class="mp-disease-app mp-project-app">
    <section id="flight-log-list-view" class="mp-project-view">
      <div class="mp-list-scroll">
        <div class="mp-project-stats">
          <div class="mp-stat-card mp-stat-card--total">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-plane"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-total">0</div>
              <div class="mp-stat-card__label">日志总数</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--key">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-circle-check"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-success">0</div>
              <div class="mp-stat-card__label">成功</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--month">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-abnormal">0</div>
              <div class="mp-stat-card__label">异常/取消</div>
            </div>
          </div>
          <div class="mp-stat-card mp-stat-card--general">
            <div class="mp-stat-card__icon" aria-hidden="true"><i class="fa-solid fa-circle-xmark"></i></div>
            <div class="mp-stat-card__body">
              <div class="mp-stat-card__value" id="stat-fail">0</div>
              <div class="mp-stat-card__label">失败</div>
            </div>
          </div>
        </div>

        <div class="mp-project-searchbar">
          <div class="mp-search-input-wrap" data-action="open-flight-log-search" role="button" tabindex="0" aria-label="搜索飞行日志">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <input type="text" id="flight-log-search-trigger" class="mp-search-input" placeholder="任务ID / 无人机 / 操作员" readonly />
            <button type="button" class="mp-search-clear" id="flight-log-search-clear" data-action="flight-log-search-clear" hidden aria-label="清空搜索">
              <i class="fa-solid fa-circle-xmark"></i>
            </button>
          </div>
        </div>

        <div id="flight-log-mobile-list" class="mp-project-list" role="list"></div>
        <span id="table-total" hidden aria-hidden="true">0</span>
      </div>
    </section>

    <section id="flight-log-detail-view" class="hidden mp-detail-view">
      <span id="detail-flight-log-title" hidden aria-hidden="true"></span>
      <div class="mp-disease-detail-scroll">
        <div id="flight-log-detail-body" class="mp-disease-detail-body"></div>
      </div>
    </section>
  </div>

  <div class="project-toast" id="flight-log-toast" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="../../../assets/js/am-flight-log-data.js"></script>
  <script src="../../../assets/js/am-flight-log-page.js"></script>
  <script src="../../../assets/js/track-playback.js"></script>
  <script src="../../../assets/js/flight-report-modal.js"></script>
  <script src="../../../assets/js/in-project-mobile.js"></script>
  <script src="../../assets/js/miniapp-frame.js"></script>
  <script src="../../assets/js/flight-log-page-boot.js"></script>
</body>
</html>
