<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>忘记密码</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/miniapp.css" />
  <link rel="stylesheet" href="../../assets/css/in-project-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/disease-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/mine-mobile.css" />
</head>
<body class="mp-disease-page mp-mine-page mp-project-page miniapp-page">
  <header class="miniapp-navbar miniapp-navbar--inner">
    <button type="button" class="miniapp-navbar__back" data-action="mp-nav-back" aria-label="返回">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h1 class="miniapp-navbar__title">忘记密码</h1>
  </header>

  <div id="profile-app" class="mp-disease-app mp-project-app">
    <section id="profile-form-view" class="mp-detail-view">
      <form id="forgot-form" class="mp-disease-form-scroll">
        <p class="mp-forgot-hint">请输入注册手机号并完成验证码核验。<span class="mp-forgot-hint__demo">原型演示验证码：123456</span></p>
        <div class="mp-form-grid">
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label project-required" for="forgot-phone">手机号</label>
            <input id="forgot-phone" type="tel" class="wh-input mp-field" placeholder="请输入手机号" inputmode="tel" maxlength="11" />
          </div>
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label project-required" for="forgot-code">验证码</label>
            <div class="mp-forgot-code-row">
              <input id="forgot-code" type="text" class="wh-input mp-field" placeholder="请输入验证码" inputmode="numeric" maxlength="6" />
              <button type="button" id="forgot-send-code">获取验证码</button>
            </div>
          </div>
        </div>
      </form>
      <footer class="mp-detail-footer">
        <button type="submit" form="forgot-form" class="mp-detail-footer__btn mp-detail-footer__btn--primary">验证并继续</button>
      </footer>
    </section>
  </div>

  <div id="forgot-toast" aria-live="polite"></div>

  <script src="../../../assets/js/wb-password-mobile.js"></script>
  <script src="../../assets/js/miniapp-frame.js"></script>
  <script src="../../assets/js/mine-page-boot.js"></script>
  <script>
    WHPasswordMobile.bootForgotPassword();
    MinePageBoot.start({
      homeHref: WHPasswordMobile.isFromLoginPage()
        ? "../../login/screen.html"
        : "change-password.html",
    });
  </script>
</body>
</html>
