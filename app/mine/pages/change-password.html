<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>修改密码</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/miniapp.css" />
  <link rel="stylesheet" href="../../assets/css/in-project-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/disease-mobile.css" />
  <link rel="stylesheet" href="../../assets/css/mine-mobile.css" />
</head>
<body class="mp-disease-page mp-mine-page mp-project-page miniapp-page">
  <header class="miniapp-navbar miniapp-navbar--inner">
    <button type="button" class="miniapp-navbar__back" data-action="mp-nav-back" aria-label="返回">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h1 class="miniapp-navbar__title">修改密码</h1>
  </header>

  <div id="profile-app" class="mp-disease-app mp-project-app">
    <section id="profile-form-view" class="mp-detail-view">
      <form id="change-password-form" class="mp-disease-form-scroll">
        <div class="mp-form-grid">
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label project-required" for="pwd-old">旧密码</label>
            <div class="mp-password-field">
              <input id="pwd-old" type="password" class="wh-input mp-field mp-password-field__input" placeholder="请输入旧密码" autocomplete="current-password" />
              <button type="button" class="mp-password-field__toggle" data-action="toggle-password" aria-label="显示密码">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label project-required" for="pwd-new">新密码</label>
            <div class="mp-password-field">
              <input id="pwd-new" type="password" class="wh-input mp-field mp-password-field__input" placeholder="请输入新密码" autocomplete="new-password" />
              <button type="button" class="mp-password-field__toggle" data-action="toggle-password" aria-label="显示密码">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="mp-form-row mp-form-row--full">
            <label class="project-form-label project-required" for="pwd-confirm">确认密码</label>
            <div class="mp-password-field">
              <input id="pwd-confirm" type="password" class="wh-input mp-field mp-password-field__input" placeholder="请再次输入新密码" autocomplete="new-password" />
              <button type="button" class="mp-password-field__toggle" data-action="toggle-password" aria-label="显示密码">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
        </div>
        <p class="mp-password-hint">密码必须是8-16位英文字母、数字组合，不能是纯数字</p>
        <div class="mp-password-forgot-row">
          <a class="mp-password-forgot-btn" href="forgot-password.html">忘记密码</a>
        </div>
      </form>
      <footer class="mp-detail-footer">
        <button type="submit" form="change-password-form" class="mp-detail-footer__btn mp-detail-footer__btn--primary">确认修改</button>
      </footer>
    </section>
  </div>

  <div id="change-pwd-toast" aria-live="polite"></div>

  <script src="../../../assets/js/wb-password-mobile.js"></script>
  <script src="../../assets/js/miniapp-frame.js"></script>
  <script src="../../assets/js/mine-page-boot.js"></script>
  <script>
    WHPasswordMobile.bootChangePasswordPage();
    MinePageBoot.start({ homeHref: "../home.html" });
  </script>
</body>
</html>
